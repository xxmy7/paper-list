set, and cross-time, and build a testbed covering 6 datasets, 16 comparative methods (implemented with CNN-based and Transformerbased architectures), and two model selection protocols. Then, we conduct extensive experiments and present several findings for future research, e.g., no single method consistently outperforms others, highlighting substantial opportunity for advancement. Our codebase is highly modular and easy to extend for new datasets, algorithms, comparisons, and analysis, with the hope to facilitate the research in OOD-based HAR. Our implementation is released and can be found at https://github.com/AIFrontierLab/HAROOD.","ins":["William & Mary","Department of Data Science"]},{"i":"conf/kdd/ShaoFDYWX26","t":"Generating Realistic Human Mobility Data with Hybrid Large Language Model Agent","au":[["Chenyang Shao",[0,1,2,3]],["Bingbing Fan",[0,1,2]],["Jingtao Ding",[0,1,2]],["Yuan Yuan",[0,1,2]],["Meng Wang",[4,5]],["Fengli Xu",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3785685","dblp":"https://dblp.org/rec/conf/kdd/ShaoFDYWX26.html","g":["LLM","Agent","Spatiotemporal/Urban","Diffusion/Generation"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785685","c":"jul","a":"Mobility data is crucial for understanding human dynamics and facilitating many applications, but collecting them is often expensive and privacy sensitive. Previous efforts on mobiliy data generation focus on fitting the statistical distribution and often overlook the underlying intentions behind mobility behavior. Recent breakthrough in large language models (LLMs) shows emergent capabilities of human-like reasoning, inspiring us to harness their power for intention-aware mobility generation. However, this problem is non-trivial since LLMs are not originally optimized for inferring human mobility behavior. To bridge this gap, we propose a novel data generator called Chain-of-Planned-Behavior (CoPB) that consists of 3 key components: (1) a behavior science-inspired agentic workflow that adapts LLMs for mobility intention reasoning. We draw on the Theory of Planned Behavior to integrate the factors of attitude, subjective norms, and perceived behavioral control to jointly decide the next mobility intention. (2) a conditional generative diffusion model that grounds the abstract intents into physical space by generating behavior intention-conditioned mobility trajectory. (3) a lightweight data generator solution that implements a cost-effective alternative data generator. Specifically, we use knowledge distillation to transfer the intent reasoning capability of LLMs to smaller language models (SLMs). We also explore the potential of substituting diffusion model with physics-informed mechanistic model. Experiments on three real-world datasets show that our generated data exhibits a strong alignment with real data, substantially reducing the error rate of intent reasoning by an average of 59.8%, and improving the average spatial metrics by 18.5%. Moreover, the This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785685 lightweight data generator allow us to remove the API costs and reduces the generation time by 28.8% without significant performance loss. Both the generator and the accompanying constructed dataset are publicly available at https://github.com/tsinghua-fib-lab/CoPB.","ins":["Department of Electronic","Engineering, BNRist","Tsinghua University","Zhongguancun Academy","School of Computer Science and Information Engineering","Hefei University of Technology"]},{"i":"conf/kdd/ShenWHLQMZZZCZ26","t":"Let's Verify Math Questions Step by Step","au":[["Chengyu Shen",0],["Zhen Hao Wong",0],["Runming He",0],["Hao Liang",0],["Meiyi Qiang",0],["Zimo Meng",0],["Zhengyang Zhao",0],["Bohan Zeng",0],["Zhengzhou Zhu",0],["Bin Cui",0],["Wentao Zhang",0]],"u":"https://doi.org/10.1145/3770854.3785700","dblp":"https://dblp.org/rec/conf/kdd/ShenWHLQMZZZCZ26.html","g":["LLM","Benchmark/Dataset"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785700","c":"jul","a":"Large Language Models (LLMs) have recently achieved remarkable progress in mathematical reasoning. To enable such capabilities, many existing works distill strong reasoning models into long chains of thought or design algorithms to construct high-quality math question-answer (QA) data for training. However, these efforts primarily focus on generating correct reasoning paths and answers, while largely overlooking the correctness of the questions themselves. In this work, we present ValiMath, a benchmark consisting of 2147 human-verified mathematical questions covering a wide range of domains such as arithmetic, algebra, and geometry, which are synthesized and curated from the NuminaMath dataset. Each question is annotated with its logical structure, domain coverage, and question correctness, enabling fine-grained evaluation of question quality. ValiMath serves as a high-quality gold-standard test set for validating mathematical questions in LLM training corpora. Building upon this benchmark, we further propose MathQ-Verify, a pipeline that performs fine-grained parsing of mathematical questions into atomic assumptions and conclusions, and evaluates their semantic soundness through consistency checks. This pipeline achieves high precision in detecting flawed questions and provides a reliable foundation for cleaning noisy mathematical datasets. Experiments show that MathQ-Verify ∗These authors contributed equally to this work. †Project leader. ‡Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785700 achieves state-of-the-art performance across multiple benchmarks, improving the F1 score by up to 25 percentage points over the direct verification baseline. MathQ-Verify offers a scalable and accurate solution for curating reliable mathematical datasets, reducing label noise and avoiding unnecessary computation on invalid questions. Our code and data are available at the repository https://github.com/OpenDCAI/MathQ-Verify.","ins":["Peking University"]},{"i":"conf/kdd/SunCCQLOMMZSXJ26","t":"X-MethaneWet: A Cross-scale Global Wetland Methane Emission Benchmark Dataset for Advancing Science Discovery with AI","au":[["Yiming Sun",0],["Shuo Chen",1],["Shengyu Chen",0],["Chonghao Qiu",0],["Licheng Liu",2],["Youmi Oh",3],["Sparkle L. Malone",4],["Gavin McNicol",5],["Qianlai Zhuang",1],["Chris Smith",3],["Yiqun Xie",[6,7]],["Xiaowei Jia",0]],"u":"https://doi.org/10.1145/3770854.3785682","dblp":"https://dblp.org/rec/conf/kdd/SunCCQLOMMZSXJ26.html","g":["Benchmark/Dataset","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785682","c":"jul","a":"Methane (CH4) is the second most powerful greenhouse gas after carbon dioxide and plays a crucial role in climate change due to its high global warming potential. Accurately modeling CH4 fluxes across the globe and at fine temporal scales is essential for understanding its spatial and temporal variability and developing effective mitigation strategies. In this work, we introduce the firstof-its-kind cross-scale global wetland methane benchmark dataset (X-MethaneWet), which synthesizes physics-based model simulation data from TEM-MDM and the real-world observation data from FLUXNET-CH4. This dataset can offer opportunities for improving global wetland CH4 modeling and science discovery with new AI algorithms. To set up AI model baselines for methane flux prediction, we evaluate the performance of various sequential deep learning models on X-MethaneWet. Furthermore, we explore four different transfer learning techniques to leverage simulated data from TEM-MDM to improve the generalization of deep learning models on real-world FLUXNET-CH4 observations. Our extensive experiments demonstrate the effectiveness of these approaches, highlighting their potential for advancing methane emission modeling and identifying new opportunities for developing more accurate and scalable AI-driven climate models. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785682","ins":["University of Pittsburgh","Purdue University","University of Minnesota","NOAA Global Monitoring Laboratory","Yale University","University of Illinois Chicago","University of Maryland","College Park, MD, USA"]},{"i":"conf/kdd/TranNON26","t":"IRLBench: A Multi-modal, Culturally Grounded, Parallel Irish-English Benchmark for Open-Ended LLM Reasoning Evaluation","au":[["Khanh-Tung Tran",0],["Duc-Hai Nguyen",0],["Barry O’Sullivan",0],["Hoang D. Nguyen",0]],"u":"https://doi.org/10.1145/3770854.3785693","dblp":"https://dblp.org/rec/conf/kdd/TranNON26.html","g":["Benchmark/Dataset","LLM","Multimodal/VLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785693","c":"jul","a":"Recent advances in Large Language Models (LLMs) have demonstrated promising capabilities, yet their performance in multilingual and low-resource settings remains modest. Existing benchmarks often exhibit cultural bias, restrict evaluation to text-only, rely on multiple-choice formats, and, more importantly, are ineffectual for extremely low-resource languages. To address these gaps, we introduce IRLBench, presented in parallel English and Irish, which is considered definitely endangered by UNESCO. Our benchmark consists of 12 representative subjects developed from the 2024 Irish Leaving Certificate exam, enabling fine-grained analysis of model capabilities across domains. By framing the task as long-form generation and leveraging the official marking scheme, it supports not only a comprehensive evaluation of correctness but also language fidelity. Our extensive experiments of leading closed-source and open-source LLMs reveal a persistent performance gap between English and Irish, in which models produce valid Irish responses less than 80% of the time, and answer correctly 55.8% of the time compared to 76.2% in English for the best-performing model. With Irish as the case study, our work exposes systemic weaknesses in today’s multilingual LLMs and provides a rigorous benchmark for evaluating true multilingual capabilities. We release IRLBench1 and an accompanying evaluation codebase2 to enable future research on robust, culturally aware multilingual AI development.","ins":["University College Cork"]},{"i":"conf/kdd/VarvarigosMZBCT26","t":"LitBench: A Graph-Centric Large Language Model Benchmarking Tool For Literature Tasks","au":[["Andreas Varvarigos",0],["Ali Maatouk",0],["Jiasheng Zhang",0],["Ngoc Bui",0],["Jialin Chen",0],["Leandros Tassiulas",0],["Rex Ying",0]],"u":"https://doi.org/10.1145/3770854.3785679","dblp":"https://dblp.org/rec/conf/kdd/VarvarigosMZBCT26.html","g":["Benchmark/Dataset","LLM","Graph/GNN"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785679","c":"jul","a":"While large language models (LLMs) have become the de facto framework for literature-related tasks, they still struggle to function as domain-specific literature agents due to their inability to connect pieces of knowledge and reason across domain-specific contexts, terminologies, and nomenclatures. This challenge underscores the need for a tool that facilitates such domain-specific adaptation and enables rigorous benchmarking across literature tasks. To that end, we introduce LitBench, a benchmarking tool designed to enable the development and evaluation of domain-specific LLMs tailored to literature-related tasks. At its core, LitBench uses a data curation process that generates domain-specific literature sub-graphs and constructs training and evaluation datasets based on the textual attributes of the resulting nodes and edges. The tool is designed for flexibility, supporting the curation of literature graphs across any domain chosen by the user, whether high-level fields or specialized interdisciplinary areas. In addition to dataset curation, LitBench defines a comprehensive suite of literature tasks, ranging from node and edge level analyses to advanced applications such as related work generation. These tasks enable LLMs to internalize domain-specific knowledge and relationships embedded in the curated graph during training, while also supporting rigorous evaluation of model performance. Our results show that small domain-specific LLMs trained and evaluated on LitBench datasets achieve competitive performance compared to state-of-the-art models like GPT-4o and DeepSeek-R1. To enhance accessibility and ease of use, we open-source the tool along with an AI agent tool that streamlines data curation, model training, and evaluation. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785679","ins":["Yale University"]},{"i":"conf/kdd/WangZLZGTWW26","t":"From Memorization to Creation: Evaluating the Cognitive Depth of LLM?Generated Educational Questions","au":[["Xiaolong Wang",0],["Squirrel Ai Learning",0],["Zhe Zhao",0],["Song Lai",0],["Chaoli Zhang",1],["Squirrel Ai Learning",2],["Zijie Geng",2],["Yu Tong",3],["Ye Wei",0],["Qingsong Wen",null],["Squirrel Ai Learning",null]],"u":"https://doi.org/10.1145/3770854.3785686","dblp":"https://dblp.org/rec/conf/kdd/WangZLZGTWW26.html","g":["Benchmark/Dataset","LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785686","c":"jul","a":"While LLMs show promise in automating educational content creation, their ability to generate questions that stimulate higher-order thinking remains understudied. This work evaluates six widelyused LLMs through a Bloom’s Taxonomy lens, focusing on their capacity to transcend rote memorization and achieve cognitive leaps. Using a hybrid human–AI evaluation protocol, we generate and analyze 20,700 questions across computer science, K–12 math, and social-science domains. Key contributions include: (1) a finegrained prompting strategy that reduces question repetitiveness by 24.45% for Qwen2.5-7B-Instruct, and increases the proportion of higher-order cognitive level outputs by 11.53% for InternLM3- 8B-Instruct; (2) quantitative metrics for cognitive shift intensity (CogShift) and category drift, revealing InternLM3’s superior performance in multi-level transitions; (3) an interpretability analysis revealing metric-level correlations that enhance the transparency of Chain-of-Thought prompting. Our findings highlight the importance of cognitive-aware prompt design and provide benchmarks for deploying LLMs in personalized learning systems.","ins":["City University of Hong Kong","Zhejiang Normal University","University of Science and Technology","Wuhan University"]},{"i":"conf/kdd/YangYCJH26","t":"Heaven-Sent or Hell-Bent? Benchmarking the Intelligence and Defectiveness of LLM Hallucinations","au":[["Chengxu Yang",[0,1]],["Jingling Yuan",0],["Siqi Cai",0],["Jiawei Jiang",2],["Chuang Hu",2]],"u":"https://doi.org/10.1145/3770854.3785704","dblp":"https://dblp.org/rec/conf/kdd/YangYCJH26.html","g":["Benchmark/Dataset","LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785704","c":"jul","a":"Hallucinations in large language models (LLMs) are commonly regarded as errors to be minimized. However, recent perspectives suggest that some hallucinations may encode creative or epistemically valuable content, a dimension that remains underquantified in current literature. Existing hallucination detection methods primarily focus on factual consistency, struggling to handle heterogeneous scientific tasks and balance creativity with accuracy. To address these challenges, we propose HIC-Bench, a novel evaluation framework that categorizes hallucinations into Intelligent Hallucinations (IH) and Defective Hallucinations (DH), enabling systematic investigation of their interplay in LLM creativity. HIC-Bench features three core characteristics: (1) Structured IH/DH Assessment. using a multi-dimensional metric matrix integrating Torrance Tests of Creative Thinking (TTCT) metrics (Originality, Feasibility, Value) with hallucination-specific dimensions (scientific plausibility, factual deviation); (2) Cross-Domain Applicability. spanning ten scientific domains with open-ended innovation tasks; and (3) Dynamic Prompt Optimization. leveraging the Dynamic Hallucination Prompt (DHP) to guide models toward creative and reliable outputs. The evaluation process employs multiple LLM judges, averaging scores to mitigate bias, with human annotators verifying IH/DH classifications. Experimental results reveal a nonlinear relationship between IH and DH, demonstrating that creativity and correctness can be jointly optimized. These insights position IH as a catalyst for creativity and reveal the ability of LLM hallucinations to drive scientific innovation.Additionally, the HIC-Bench offers a valuable platform for advancing research into the creative intelligence of LLM hallucinations.1","ins":["Wuhan University of Technology","BreathingCORE","Wuhan University"]},{"i":"conf/kdd/YangSCSZSOCW26","t":"GUI-Robust: A Comprehensive Dataset for Testing GUI Agent Robustness in Real-World Anomalies","au":[["Jingqi Yang",0],["Zhilong Song",1],["Zhejiang Intelligence Indeed",1],["Jiawei Chen",0],["Mingli Song",0],["Sheng Zhou",0],["Linjun Sun",1],["Zhejiang Intelligence Indeed",1],["Xiaogang Ouyang",1],["Zhejiang Intelligence Indeed",1],["Chun Chen",0],["Can Wang",0]],"u":"https://doi.org/10.1145/3770854.3785695","dblp":"https://dblp.org/rec/conf/kdd/YangSCSZSOCW26.html","g":["Benchmark/Dataset","Agent","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785695","c":"jul","a":"The development of high-quality datasets is crucial for benchmarking and advancing research in Graphical User Interface (GUI) agents. Despite their importance, existing datasets are often constructed under idealized conditions, overlooking the diverse anomalies frequently encountered in real-world deployments. To address this limitation, we introduce GUI-Robust, a novel dataset designed for comprehensive GUI agent evaluation, explicitly incorporating seven common types of anomalies observed in everyday GUI interactions. Furthermore, we propose a semi-automated dataset construction paradigm that collects user action sequences from natural interactions via RPA tools and then generate corresponding step and task descriptions for these actions with the assistance of MLLMs. This paradigm significantly reduces annotation time cost by a factor of over 19 times. Finally, we assess state-of-the-art GUI agents using the GUI-Robust dataset, revealing their substantial performance degradation in abnormal scenarios. We anticipate that our work will highlight the importance of robustness in GUI agents and inspires more future research in this direction. The dataset and code are available at https://github.com/chessbean1/GUI-Robust. ∗Corresponding author. †College of Computer Science and Technology, Zhejiang University. ‡State Key Laboratory of Blockchain and Data Security, Zhejiang University. §Hangzhou High-Tech Zone (Binjiang) Institute of Blockchain and Data Security. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785695","ins":["Zhejiang University","Technology Co., Ltd"]},{"i":"conf/kdd/YeLZWCMLRZ26","t":"MM-SpuBench: Towards Better Understanding of Spurious Biases in Multimodal LLMs","au":[["Wenqian Ye",0],["Bohan Liu",0],["Guangtao Zheng",0],["Di Wang",0],["Xu Cao",[1,2]],["Yunsheng Ma",3],["Bolin Lai",4],["James M. Rehg",[1,2]],["Aidong Zhang",0]],"u":"https://doi.org/10.1145/3770854.3785678","dblp":"https://dblp.org/rec/conf/kdd/YeLZWCMLRZ26.html","g":["Benchmark/Dataset","Multimodal/VLM","LLM","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785678","c":"jul","a":"Spurious bias, a tendency to exploit spurious correlations between superficial input attributes and prediction targets, has revealed a severe robustness pitfall in classical machine learning problems. Multimodal Large Language Models (MLLMs), which leverage pretrained vision and language models, have recently demonstrated strong capability in joint vision-language understanding. However, both the presence and severity of spurious biases in MLLMs remain poorly understood. In this work, we address this gap by analyzing the spurious biases in the multimodal setting and uncovering the specific inference-time data patterns that can manifest this problem. To support this analysis, we introduce MM- SpuBench, a comprehensive, human-verified benchmark dataset consisting of image-class pairs annotated with core and spurious attributes, grounded in our taxonomy of nine distinct types of spurious correlations. The benchmark is constructed using humaninterpretable attribute information to capture a wide range of spurious patterns reflective of real-world knowledge. Leveraging this benchmark, we conduct a comprehensive evaluation of the stateof-the-art open-source and proprietary MLLMs with both standard accuracy and the proposed Conditional Generation Likelihood Advantage (CGLA). Our findings highlight the persistence of reliance on spurious correlations and the difficulty of mitigation on our benchmark. We hope this work can inspire new technical strides to mitigate these biases. Our benchmark is publicly available at https://huggingface.co/datasets/mmbench/MM-SpuBench. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785678","ins":["University of Virginia","University of Illinois","Urbana-Champaign","Purdue University","Georgia Institute of Technology"]},{"i":"conf/kdd/ZengLHNWTC26","t":"Automated Annotation of Privacy Information in User Interactions with Large Language Models","au":[["Hang Zeng",0],["Xiangyu Liu",1],["Yong Hu",1],["Chaoyue Niu",0],["Fan Wu",0],["Shaojie Tang",2],["Guihai Chen",0]],"u":"https://doi.org/10.1145/3770854.3785680","dblp":"https://dblp.org/rec/conf/kdd/ZengLHNWTC26.html","g":["LLM","Privacy/DP"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785680","c":"jul","a":"Users interacting with large language models (LLMs) under their real identifiers often unknowingly risk disclosing private information. Automatically notifying users whether their queries leak privacy and which phrases leak what private information has therefore become a practical need. Existing privacy detection methods, however, were designed for different objectives and application domains, typically tagging personally identifiable information (PII) in anonymous content, which is insufficient in real-name interaction scenarios with LLMs. In this work, to support the development and evaluation of privacy detection models for LLM interactions that are deployable on local user devices, we construct a large-scale multilingual dataset with 249K user queries and 154K annotated privacy phrases. In particular, we build an automated privacy annotation pipeline with strong LLMs to automatically extract privacy phrases from dialogue datasets and annotate leaked information. We also design evaluation metrics at the levels of privacy leakage, extracted privacy phrase, and privacy information. We further establish baseline methods using light-weight LLMs with both tuning-free and tuning-based methods, and report a comprehensive evaluation of their performance. Evaluation results demonstrate that the 1B model, fine-tuned with our dataset, outperforms the directly prompted 72B model. However, a gap remains between current performance and the requirements of real-world LLM applications, motivating future research into more effective local privacy detection methods grounded in our dataset1. ∗Chaoyue Niu is the corresponding author. 1The constructed dataset can be accessed at https://huggingface.co/datasets/Nidhoggzh/Interaction_Dialogue_with_Privacy and the data processing code is publicly available at https://github.com/Nidryen-zh/PrivacyAnnotation. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785680","ins":["Shanghai Jiao Tong University","WeChat Tencent","State University of New York at Buffalo"]},{"i":"conf/kdd/ZhangLGDJLZWWGT26","t":"Exploring Recommender System Evaluation: A Multi-Modal LLM Agent Framework for A/B Testing","au":[["Wenlin Zhang",0],["Xiangyang Li",1],["Qiyuan Ge",0],["Kuicai Dong",1],["Pengyue Jia",0],["Xiaopeng Li",0],["Zijian Zhang",2],["Maolin Wang",0],["Yichao Wang",1],["Huifeng Guo",1],["Ruiming Tang",1],["Xiangyu Zhao",0]],"u":"https://doi.org/10.1145/3770854.3785688","dblp":"https://dblp.org/rec/conf/kdd/ZhangLGDJLZWWGT26.html","g":["Recommendation","Multimodal/VLM","LLM","Agent"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785688","c":"jul","a":"In recommender systems, online A/B testing is a crucial method for evaluating the performance of different models. However, conducting online A/B testing often presents significant challenges, including substantial economic costs, user experience degradation, and considerable time requirements. With the Large Language Models’ powerful capacity, LLM-based agent shows great potential to replace traditional online A/B testing. Nonetheless, current agents fail to simulate the perception process and interaction patterns, due to the lack of real environments and visual perception capability. To address these challenges, we introduce a multi-modal user agent for A/B testing (A/B Agent). Specifically, we construct a recommendation sandbox environment for A/B testing, enabling multimodal and multi-page interactions that align with real user behavior on online platforms. The designed agent leverages multimodal information perception, fine-grained user preferences, and integrates profiles, action memory retrieval, and a fatigue system to simulate complex human decision-making. We validated the potential of the agent as an alternative to traditional A/B testing testing from three perspectives: model, data, and features. Furthermore, we found that ∗Contributed equally to this work. †Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785688 the data generated by A/B Agent can effectively enhance the capabilities of recommendation models. Our code is publicly available at https://github.com/Applied-Machine-Learning-Lab/ABAgent.","ins":["City University of Hong Kong","Huawei Technologies Ltd.","Jilin University"]},{"i":"conf/kdd/ZhangZZWA26","t":"FinWorld: An All-in-One Open-Source Platform for End-to-End Financial AI Research and Deployment","au":[["Wentao Zhang",0],["Skywork AI",0],["Yilei Zhao",0],["Chuqiao Zong",0],["Xinrun Wang",1],["Bo An",0],["Skywork AI",null]],"u":"https://doi.org/10.1145/3770854.3785689","dblp":"https://dblp.org/rec/conf/kdd/ZhangZZWA26.html","g":["Benchmark/Dataset","LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785689","c":"jul","a":"Financial AI holds great promise for transforming modern !nance, with the potential to support a wide range of tasks such as market forecasting, portfolio management, quantitative trading, and automated analysis. However, existing platforms remain limited in task coverage, lack robust multimodal data integration, and o\"er insu#cient support for the training and deployment of large language models (LLMs). In response to these limitations, we present FinWorld, an all-in-one open-source platform that provides endto-end support for the entire! nancial AI work$ow, from data acquisition to experimentation and deployment. FinWorld distinguishes itself through native integration of heterogeneous!nancial data, uni!ed support for diverse AI paradigms, and advanced agent automation, enabling seamless development and deployment. Leveraging data from 2 representative markets, 4 stock pools, and over 800 million! nancial data points, we conduct comprehensive experiments on 4 key! nancial AI tasks. These experiments systematically evaluate deep learning and reinforcement learning algorithms, with particular emphasis on RL-based! netuning for LLMs and LLM Agents. The empirical results demonstrate that FinWorld signi!cantly enhances reproducibility, supports transparent benchmarking, and streamlines deployment, thereby providing a strong foundation for future research and real-world applications. Code, tutorials, and paper full version are available at Github and Arxiv 1.","ins":["Nanyang Technological University","Singapore Management University"]},{"i":"conf/kdd/ZhangDKZ26","t":"Learning Multimodal Embeddings for Traffic Accident Prediction and Causal Estimation","au":[["Ziniu Zhang",0],["Minxuan Duan",0],["Haris Koutsopoulos",0],["Hongyang R. Zhang",0]],"u":"https://doi.org/10.1145/3770854.3785677","dblp":"https://dblp.org/rec/conf/kdd/ZhangDKZ26.html","g":["Multimodal/VLM","Spatiotemporal/Urban","Causal"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785677","c":"jul","a":"We consider analyzing traffic accident patterns using both road network data and satellite images aligned to road graph nodes. Previous work for predicting accident occurrences relies primarily on road network structural features while overlooking physical and environmental information from the road surface and its surroundings. In this work, we construct a large multimodal dataset across six U.S. states, containing nine million traffic accident records from official sources, and one million high-resolution satellite images for each node of the road network. Additionally, every node is annotated with features such as the region’s weather statistics and road type (e.g., residential vs. motorway), and each edge is annotated with traffic volume information (i.e., Average Annual Daily Traffic). Utilizing this dataset, we conduct a comprehensive evaluation of multimodal learning methods that integrate both visual and network embeddings. Our findings show that integrating both data modalities improves prediction accuracy, achieving an average AUROC of 90.1%, which is a 3.7% gain over graph neural network models that only utilize graph structures. With the improved embeddings, we conduct a causal analysis based on a matching estimator to estimate the key contributing factors influencing traffic accidents. We find that accident rates rise by 24% under higher precipitation, by 22% on higher-speed roads such as motorways, and by 29% due to seasonal patterns, after adjusting for other confounding factors. Ablation studies confirm that satellite imagery features are essential for achieving accurate prediction. We release the dataset and the experimental code for using this dataset at https://github.com/VirtuosoResearch/MMTraCE.","ins":["Northeastern University"]},{"i":"conf/kdd/ZhaoLY26","t":"QuaMap: A Multi-Backend Benchmark Dataset for Quantum Circuit Mapping and Learning-Based Compiler Evaluation","au":[["Ziming Zhao",0],["Tingting Li",[0,1]],["Jianwei Yin",0]],"u":"https://doi.org/10.1145/3770854.3785697","dblp":"https://dblp.org/rec/conf/kdd/ZhaoLY26.html","g":["Benchmark/Dataset"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785697","c":"jul","a":"Mapping quantum circuits to specific hardware backends is a crucial step in quantum program compilation, yet current benchmarks rarely capture the backend-aware effects of this process. We present QuaMap, the first large-scale, open benchmark dataset that systematically links 75 representative quantum algorithms with over 210,000 hardware-aware transpiled circuits on 10 IBM Quantum devices. Unlike existing circuit collections, QuaMap explicitly records the impact of topology-constrained compilation by providing both the original and transpiled circuits together with rich structural and performance metrics (circuit depth, gate counts with various qubits, and CNOT count). QuaMap defines four benchmark tasks, involving circuit embedding classification, transpilation metric prediction, mapping quality ranking, and transferability evaluation, and includes reproducible baselines for each task, showing that graph neural networks substantially outperform heuristic and classical models. By making the data, code, and evaluation protocols openly available, QuaMap establishes a standardized foundation for data-driven research on quantum compilation, enabling the community to analyze layout effects, design predictive models, and compare mapping strategies across devices.","ins":["Zhejiang University","Shanghai Qi Zhi Institute"]},{"i":"conf/kdd/ZhaoLLZ26","t":"VQFlow: A Benchmark Dataset for Encrypted Video Streaming Traffic across QoS Configurations","au":[["Ziming Zhao",0],["Zhaoxuan Li",1],["Tingting Li",[2,3]],["Fan Zhang",0]],"u":"https://doi.org/10.1145/3770854.3785690","dblp":"https://dblp.org/rec/conf/kdd/ZhaoLLZ26.html","g":["Benchmark/Dataset"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785690","c":"jul","a":"Understanding video streaming traffic behavior under diverse Quality of Service (QoS) conditions is essential for improving both network performance and user experience. We present VQFlow, a large-scale and publicly available dataset that systematically captures encrypted video streaming traffic under controlled variations of key QoS parameters, including resolution, frame rate, and bitrate control policies. Unlike prior datasets, VQFlow combines packetlevel traces with temporally aligned ground-truth annotations of playback configurations and network conditions, enabling finegrained analysis of how QoS settings influence traffic dynamics. We demonstrate the utility of VQFlow through comprehensive characterization studies and standardized benchmarks on tasks such as QoS classification, bitrate estimation, traffic pattern modeling, and anomaly detection. Results show that VQFlow offers a reproducible foundation for research in multimedia systems, network management, and machine learning on encrypted traffic, and we release the dataset along with baseline implementations to accelerate future work in this domain.","ins":["Zhejiang University","State Key Laboratory of Cyberspace","Zhejiang University, Hangzhou, China","Shanghai Qi Zhi Institute, Shanghai, China"]},{"i":"conf/kdd/ZhouWLLSWLC26","t":"FireSentry: A Multi-Modal Spatio-temporal Benchmark Dataset for Fine-Grained Wildfire Spread Forecasting","au":[["Nan Zhou",0],["Shenzhen International Graduate",0],["Huandong Wang",[1,2]],["Jiahao Li",0],["Shenzhen International Graduate",0],["Han Li",0],["Shenzhen International Graduate",0],["Yali Song",[3,4,5]],["Qiuhua Wang",6],["Yong Li",[1,2]],["Xinlei Chen",0],["Shenzhen International Graduate",0]],"u":"https://doi.org/10.1145/3770854.3785696","dblp":"https://dblp.org/rec/conf/kdd/ZhouWLLSWLC26.html","g":["Benchmark/Dataset","Multimodal/VLM","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785696","c":"jul","a":"Fine-grained wildfire spread prediction is crucial for enhancing emergency response efficacy and decision-making precision. However, existing research predominantly focuses on coarse spatiotemporal scales and relies on low-resolution satellite data, capturing only macroscopic fire states while fundamentally constraining highprecision localized fire dynamics modeling capabilities. To bridge this gap, we present FireSentry, a provincial-scale multi-modal wildfire dataset characterized by sub-meter spatial and sub-second temporal resolution. Collected using synchronized UAV platforms, FireSentry provides visible and infrared video streams, in-situ environmental measurements, and manually validated fire masks. Building on FireSentry, we establish a comprehensive benchmark encompassing physics-based, data-driven, and generative models, revealing the limitations of existing mask-only approaches. Our analysis proposes FiReDiff, a novel dual-modality paradigm that first predicts future video sequences in the infrared modality, and then precisely segments fire masks in the mask modality based on the generated dynamics. FiReDiff achieves state-of-the-art performance, with video quality gains of 39.2% in PSNR, 36.1% in SSIM, 50.0% in LPIPS, 29.4% in FVD, and mask accuracy gains of 3.3% in AUPRC, 59.1% in F1 score, 42.9% in IoU, and 62.5% in MSE when applied to generative models. The FireSentry benchmark dataset and FiReDiff paradigm collectively advance fine-grained wildfire forecasting and ∗Both authors contributed equally to this research. †The corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785696 dynamic disaster simulation. The processed benchmark dataset is publicly available at: https://github.com/Munan222/FireSentryBenchmark-Dataset.","ins":["School, Tsinghua University","Department of Electronic","Engineering, Tsinghua University","College of Soil and Water","Conservation, Southwest Forestry","University","College of Civil Engineering, Southwest Forestry University"]},{"i":"conf/kdd/ZhuQLJZX26","t":"MemeBridge: A Dataset for Benchmarking and Mitigating the Bidirectional Cultural Gap in Meme Interpretation","au":[["Hangxiao Zhu",[0,1]],["Suliu Qin",1],["Independent Researcher",1],["Zhuoyan Li",2],["Ming Jiang",3],["Yu Zhang",[0,1]],["Meng Xia",[0,1]]],"u":"https://doi.org/10.1145/3770854.3785691","dblp":"https://dblp.org/rec/conf/kdd/ZhuQLJZX26.html","g":["Benchmark/Dataset","Multimodal/VLM","Web/Social"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785691","c":"jul","a":"Communicating across cultures is inherently challenging, especially through culturally dense and ambiguous formats like memes. While people expect large language models (LLMs) hold promise for bridging such gaps, existing benchmark datasets often fail to capture the cultural context necessary for accurate interpretation. To address this, we introduce MemeBridge, a curated dataset centered on U.S.-originated memes, designed to capture two complementary perspectives: (1) how Chinese participants interpret these memes, and (2) how U.S. participants anticipate how people from other cultures might misunderstand them. Here, context refers to implicit cultural knowledge—background beliefs, norms, and shared assumptions that shape meme comprehension. The dataset was constructed via a multi-stage crowdsourcing pipeline with rigorous validation, including human agreement checks and GPT-based classification verification. Each meme is annotated with sentiment, emotion, cultural significance, and knowledge type, providing rich supervision for downstream tasks. Notably, we observe that the anticipated misunderstandings from U.S. participants are often inaccurate, highlighting the asymmetries in cultural understanding and the challenges of adopting perspectives beyond one’s own. This bidirectional framing—focusing on both expression and perception—enables more nuanced benchmarking of cross-cultural comprehension. Our probing of multiple LLMs reveals that while models developed in different cultural contexts exhibit partial crosscultural understanding, they often struggle with sophisticated interpretations. By contrast, fine-tuning with MemeBridge improves model performance, underscoring the value of culturally grounded resources for training and evaluating LLMs in globally diverse settings.","ins":["Texas A&M University","College Station, USA","Purdue University","University of Wisconsin–Madison"]}],"badges":{"field":"d","items":[{"key":"research","text":"Research","class":"track-blue"},{"key":"ads","text":"Applied DS","class":"track-purple"},{"key":"benchmark","text":"Benchmark","class":"track-amber"}]}}</script>

<script src="../favorites.js"></script>
<script>
const CONF = JSON.parse(document.getElementById('data').textContent);
const INDEX = JSON.parse(document.getElementById('index-data').textContent);
const PAPERS = CONF.papers || [];

// Stable per-paper index (1-based).
// Survives filtering / pagination / sorting — paper #437 always renders as #437.
PAPERS.forEach((p, i) => { p._idx = String(i + 1); });
const FIELDS = new Set(CONF.fields_present || []);
const DESIGNATIONS = CONF.designations || null;  // null => no tab filter
const BADGES = CONF.badges || null;              // optional: separate from tabs (e.g. KDD cycles)
const TOPIC_FIELD = CONF.topic_field || null;
const KW_FIELD = CONF.keyword_field || null;
const LINKS_CFG = CONF.links || [];

const HAS_ABSTRACT = FIELDS.has('a');
const HAS_AUTHORS = FIELDS.has('au');
const HAS_INST = FIELDS.has('ins');
const HAS_DESIGNATION = !!(DESIGNATIONS && DESIGNATIONS.tabs && DESIGNATIONS.tabs.length);
const HAS_KEYWORDS = !!(KW_FIELD && FIELDS.has(KW_FIELD));
const HAS_TOPIC = !!(TOPIC_FIELD && FIELDS.has(TOPIC_FIELD));

// ---- Header setup -------------------------------------------------------
document.title = `${CONF.name || 'Papers'} — Paper List`;
document.getElementById('conf-title').textContent = `${CONF.name || ''} Paper List`.trim();
document.getElementById('conf-count').textContent = `(${PAPERS.length} papers)`;

const $confSelect = document.getElementById('conf-select');
const indexList = (INDEX && INDEX.conferences) || [];
if (indexList.length > 0) {
  for (const e of indexList) {
    const opt = document.createElement('option');
    opt.value = e.browser_path;
    opt.textContent = `${e.name} (${e.paper_count})`;
    if (e.id === CONF.id) opt.selected = true;
    $confSelect.appendChild(opt);
  }
  // Cross-conference favorites view (generated by build_browser.py --favorites).
  const favOpt = document.createElement('option');
  favOpt.value = 'browsers/favorites.html';
  favOpt.textContent = '★ Favorites';
  if (CONF.is_favorites_view) favOpt.selected = true;
  $confSelect.appendChild(favOpt);
  $confSelect.addEventListener('change', () => {
    if ($confSelect.value) {
      // Navigate relative to the current browsers/ folder.
      // Strip the "browsers/" prefix since we are already inside it.
      const path = $confSelect.value.replace(/^browsers\//, '');
      window.location.href = path;
    }
  });
} else {
  $confSelect.style.display = 'none';
}

// ---- Tab construction ---------------------------------------------------
const $tabs = document.getElementById('tabs');
if (HAS_DESIGNATION) {
  const allTab = document.createElement('div');
  allTab.className = 'tab active';
  allTab.dataset.filter = 'all';
  allTab.innerHTML = `All <span class="count" id="cnt-all">0</span>`;
  $tabs.appendChild(allTab);
  for (const t of DESIGNATIONS.tabs) {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.filter = t.key;
    tab.innerHTML = `${escapeHtml(t.label)} <span class="count" id="cnt-${t.key}">0</span>`;
    $tabs.appendChild(tab);
  }
}

// Field-presence-driven UI hiding.
if (!HAS_ABSTRACT) {
  document.getElementById('search-abs-label').classList.add('hidden');
}
if (!HAS_AUTHORS && !HAS_INST) {
  document.getElementById('search-authors-label').classList.add('hidden');
}
if (!HAS_KEYWORDS) {
  document.getElementById('kw-label').classList.add('hidden');
  document.getElementById('kw-topic').classList.add('hidden');
}
if (!HAS_TOPIC) {
  document.getElementById('official-label').classList.add('hidden');
  document.getElementById('official-topic').classList.add('hidden');
}
const $trackTabs = document.getElementById('track-tabs');
const $trackTabsRow = document.getElementById('track-tabs-row');
const HAS_TRACK_FILTER = !!(BADGES && BADGES.field && Array.isArray(BADGES.items) && BADGES.items.length);
if (!HAS_TRACK_FILTER) {
  $trackTabsRow.classList.add('hidden');
} else {
  // Build a second row of tabs for the track dimension — same UX as the
  // top-level cycle tabs, just one row lower.
  const trackCounts = {};
  for (const p of PAPERS) {
    const v = p[BADGES.field];
    if (v) trackCounts[v] = (trackCounts[v] || 0) + 1;
  }
  const allTab = document.createElement('div');
  allTab.className = 'tab active';
  allTab.dataset.trackFilter = '';
  allTab.innerHTML = `All <span class="count">${PAPERS.length}</span>`;
  $trackTabs.appendChild(allTab);
  for (const item of BADGES.items) {
    if (!trackCounts[item.key]) continue;
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.trackFilter = item.key;
    tab.innerHTML = `${item.text} <span class="count">${trackCounts[item.key]}</span>`;
    $trackTabs.appendChild(tab);
  }
  $trackTabs.addEventListener('click', e => {
    const t = e.target.closest('.tab');
    if (!t) return;
    $trackTabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTrack = t.dataset.trackFilter;
    currentPage = 1;
    applyFilter(true);
  });
}

// ---- State --------------------------------------------------------------
const AUTHOR_PREVIEW_LIMIT = 8;
const IS_FAVORITES_VIEW = !!CONF.is_favorites_view;
const FAV_KEY = 'paper-list-favorites:v1';
let pageSize = 50;
let currentFilter = 'all';
let currentKwTopic = '';
let currentOfficialTopic = '';
let currentTrack = '';  // only used when BADGES is configured (e.g. KDD)
let currentQuery = '';
let searchInAbstract = HAS_ABSTRACT;
let searchInAuthors = HAS_AUTHORS || HAS_INST;
let currentPage = 1;
let filtered = PAPERS;
let historyDepth = 0;
let favorites = loadFavorites();
// In the merged favorites view, "favorites only" is forced ON (that's the
// point of the view); the toggle is hidden. In a per-conf view, it starts
// OFF — user opts in.
let favoritesOnly = IS_FAVORITES_VIEW;

const $list = document.getElementById('list');
const $stats = document.getElementById('stats');
const $pagination = document.getElementById('pagination');
const $loading = document.getElementById('loading');
const $renderProgress = document.getElementById('render-progress');
const $search = document.getElementById('search');
const $searchAbs = document.getElementById('search-abs');
const $searchAuth = document.getElementById('search-authors');
const $kwTopic = document.getElementById('kw-topic');
const $officialTopic = document.getElementById('official-topic');
const $pageSize = document.getElementById('page-size');
const $sizeWarn = document.getElementById('size-warn');
const $backBtn = document.getElementById('back-btn');
const $favOnly = document.getElementById('fav-only');
const $favOnlyLabel = document.getElementById('fav-only-label');
const $favCount = document.getElementById('fav-count');
const $favExport = document.getElementById('fav-export');
const $favReload = document.getElementById('fav-reload');
const $favSave = document.getElementById('fav-save');

// ---- Counts -------------------------------------------------------------
if (HAS_DESIGNATION) {
  const cntAll = document.getElementById('cnt-all');
  if (cntAll) cntAll.textContent = PAPERS.length;
  for (const t of DESIGNATIONS.tabs) {
    const el = document.getElementById('cnt-' + t.key);
    if (el) el.textContent = PAPERS.filter(p => p[DESIGNATIONS.field] === t.key).length;
  }
}

// ---- Keyword tag dropdown ----------------------------------------------
if (HAS_KEYWORDS) {
  const kwCount = {};
  PAPERS.forEach(p => {
    const tags = p[KW_FIELD];
    if (Array.isArray(tags)) tags.forEach(t => { kwCount[t] = (kwCount[t]||0)+1; });
  });
  for (const [t, c] of Object.entries(kwCount).sort((a,b) => b[1]-a[1])) {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = `${t} (${c})`;
    $kwTopic.appendChild(opt);
  }
}

// ---- Official topic dropdown -------------------------------------------
if (HAS_TOPIC) {
  const officialMap = {};
  let untaggedCount = 0;
  PAPERS.forEach(p => {
    const v = p[TOPIC_FIELD];
    if (v) {
      officialMap[v] = (officialMap[v]||0)+1;
    } else {
      untaggedCount++;
    }
  });
  // Split topics into grouped (with Primary->Sub) and bare (top-level).
  // Bare topics render as flat <option>s after the optgroups.
  const grouped = {};
  const bareTopics = [];
  for (const [topic, count] of Object.entries(officialMap)) {
    if (topic.includes('->')) {
      const [primary, sub] = topic.split('->');
      if (!grouped[primary]) grouped[primary] = [];
      grouped[primary].push([topic, sub, count]);
    } else {
      bareTopics.push([topic, topic, count]);
    }
  }
  const primaryOrder = Object.entries(grouped).map(([p, items]) => [p, items.reduce((a,b)=>a+b[2], 0)]).sort((a,b)=>b[1]-a[1]);
  for (const [primary, _] of primaryOrder) {
    const og = document.createElement('optgroup');
    og.label = primary;
    grouped[primary].sort((a,b) => a[1].localeCompare(b[1], undefined, {numeric: true})).forEach(([fullTopic, sub, count]) => {
      const opt = document.createElement('option');
      opt.value = fullTopic;
      opt.textContent = `  ${sub} (${count})`;
      og.appendChild(opt);
    });
    $officialTopic.appendChild(og);
  }
  bareTopics.sort((a,b) => a[1].localeCompare(b[1], undefined, {numeric: true})).forEach(([fullTopic, sub, count]) => {
    const opt = document.createElement('option');
    opt.value = fullTopic;
    opt.textContent = `${sub} (${count})`;
    opt.className = 'top-level';
    $officialTopic.appendChild(opt);
  });
  if (untaggedCount > 0) {
    const unOpt = document.createElement('option');
    unOpt.value = '__UNCLASSIFIED__';
    unOpt.textContent = `(Unclassified) (${untaggedCount})`;
    $officialTopic.appendChild(unOpt);
  }
}

// ---- Helpers ------------------------------------------------------------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function processTextMacros(s) {
  return s
    .replace(/\\textbf\{([^{}]+)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^{}]+)\}/g, '<em>$1</em>')
    .replace(/\\emph\{([^{}]+)\}/g, '<em>$1</em>')
    .replace(/\\texttt\{([^{}]+)\}/g, '<code>$1</code>')
    .replace(/\\url\{([^{}]+)\}/g, '$1');
}
function highlightWithMath(text, q) {
  let escaped = escapeHtml(text);
  escaped = processTextMacros(escaped);
  if (!q) return escaped;
  let re;
  try { re = new RegExp('(' + escapeRegex(q) + ')', 'gi'); }
  catch (e) { return escaped; }
  const parts = escaped.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*\$)/g);
  return parts.map((part, i) => {
    if (i % 2 === 1) return part;
    return part.replace(re, '<mark>$1</mark>');
  }).join('');
}
function authorHtml(authorEntry, q) {
  const name = highlightWithMath(authorEntry[0] || '', q);
  const idx = authorEntry[1];
  if (idx === null || idx === undefined) return name;
  // idx can be a single int (single affiliation) or an array of ints
  // (multi-affiliation, e.g. visiting researcher). Render as e.g. "Name²,³".
  if (Array.isArray(idx)) {
    if (idx.length === 0) return name;
    return `${name}<sup>${idx.map(i => i + 1).join(',')}</sup>`;
  }
  return `${name}<sup>${idx+1}</sup>`;
}
function formatLinkUrl(template, paper) {
  return template.replace(/\{(\w+)\}/g, (_m, k) => {
    const v = paper[k];
    return v == null ? '' : String(v);
  });
}
function designationFor(paper) {
  if (!HAS_DESIGNATION) return null;
  const val = paper[DESIGNATIONS.field];
  return DESIGNATIONS.tabs.find(t => t.key === val) || null;
}
function badgeFor(paper) {
  // Dedicated badge config (e.g. KDD where tabs filter by cycle, badge
  // shows track). Returns {badge_class, badge_text, card_class}.
  if (BADGES && BADGES.field && Array.isArray(BADGES.items)) {
    const val = paper[BADGES.field];
    const item = BADGES.items.find(b => b.key === val);
    if (!item) return null;
    return {
      badge_class: item.class || '',
      badge_text: item.text || '',
      card_class: item.card_class || '',
    };
  }
  // Fallback: badge mirrors the designation (ICML / WWW).
  return designationFor(paper);
}

// ---- Favorites ---------------------------------------------------------
// Storage model:
//   localStorage["paper-list-favorites:v1"] = JSON of {conf_id: [paper_id, ...]}
// On first load (or after Reload), bootstrap from window.FAVORITES_SYNCED
// (loaded from ../favorites.js, committed in repo). Export writes a fresh
// favorites.js that the user can drop in to overwrite the synced state.
function loadFavorites() {
  try {
    const stored = localStorage.getItem(FAV_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      if (parsed && typeof parsed === 'object') return parsed;
    }
  } catch (e) {}
  // Bootstrap from synced
  const synced = (window.FAVORITES_SYNCED || {});
  const fresh = {};
  for (const k of Object.keys(synced)) {
    if (k === 'version') continue;
    if (Array.isArray(synced[k])) fresh[k] = synced[k].slice();
  }
  try { localStorage.setItem(FAV_KEY, JSON.stringify(fresh)); } catch (e) {}
  return fresh;
}
function saveFavorites() {
  try { localStorage.setItem(FAV_KEY, JSON.stringify(favorites)); } catch (e) {}
}
function isFav(confId, paperId) {
  // Coerce to string: ICML paper IDs are integers in JSON, KDD/WWW are
  // strings (DBLP keys). data-id round-trips through the DOM as a string,
  // so the canonical storage form is string — coerce here to avoid an
  // int-vs-string mismatch silently returning false.
  if (!confId || !favorites[confId]) return false;
  return favorites[confId].indexOf(String(paperId)) >= 0;
}
function toggleFav(confId, paperId) {
  const id = String(paperId);
  if (!favorites[confId]) favorites[confId] = [];
  const arr = favorites[confId];
  const i = arr.indexOf(id);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(id);
  saveFavorites();
  updateFavCount();
  return i < 0;
}
function favsForCurrent() {
  if (IS_FAVORITES_VIEW) {
    let n = 0;
    for (const k of Object.keys(favorites)) {
      if (Array.isArray(favorites[k])) n += favorites[k].length;
    }
    return n;
  }
  return (favorites[CONF.id] || []).length;
}
function updateFavCount() {
  const n = favsForCurrent();
  if ($favCount) $favCount.textContent = n;
  if (IS_FAVORITES_VIEW) {
    const el = document.getElementById('conf-count');
    if (el) el.textContent = `(${n} starred)`;
  }
}
function buildFavoritesContent() {
  const out = {version: 1};
  const synced = (window.FAVORITES_SYNCED || {});
  const seen = new Set();
  // Preserve key order from the synced file, then append any new confs.
  for (const k of Object.keys(synced)) {
    if (k === 'version') continue;
    out[k] = (favorites[k] || []).slice().sort();
    seen.add(k);
  }
  for (const k of Object.keys(favorites)) {
    if (seen.has(k)) continue;
    out[k] = favorites[k].slice().sort();
  }
  return '// Persistent favorites — committed to the repo as the synced source of truth.\n'
    + '// Each browser bootstraps localStorage from this file on first load. Use the\n'
    + '// "Export" button in any browser to overwrite this file with your current\n'
    + '// localStorage state, then commit + push to sync across machines.\n'
    + '//\n'
    + '// Hand-editing is fine: keep the structure {conf_id: [paper_id, ...]}.\n'
    + 'window.FAVORITES_SYNCED = ' + JSON.stringify(out, null, 2) + ';\n';
}
function exportFavorites() {
  const blob = new Blob([buildFavoritesContent()], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'favorites.js';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function isLocalhostHost() {
  const h = location.hostname;
  return h === 'localhost' || h === '127.0.0.1' || h === '::1';
}
async function saveFavoritesToRepo() {
  // Save writes the repo's favorites.js directly. Only possible when the
  // page is served by our scripts/serve.py running on this machine.
  if (location.protocol === 'file:') {
    alert('Save needs the page loaded over http://localhost.\n\nRun:\n  python scripts/serve.py\n\nThen open http://localhost:8000/ and try Save again.\n\n(Or use Export to download the file.)');
    return;
  }
  if (!isLocalhostHost()) {
    alert(`Save writes the repo's favorites.js directly — only possible when scripts/serve.py is running on this machine.\n\nYou are on ${location.host}, which is a remote/static host. Use Export to download favorites.js, then commit + push it locally.`);
    return;
  }
  const content = buildFavoritesContent();
  const endpoint = '/save-favorites';
  const orig = $favSave ? $favSave.textContent : '';
  if ($favSave) { $favSave.textContent = '… Saving'; $favSave.style.pointerEvents = 'none'; }
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/javascript'},
      body: content,
    });
    if (r.status === 405 || r.status === 501) {
      throw new Error('The server at ' + location.host + " doesn't expose /save-favorites.\n\nMake sure you started `python scripts/serve.py` (not `python -m http.server`).");
    }
    if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
    // Refresh the in-memory synced snapshot to match what we just wrote.
    // Build it directly from `favorites` rather than parsing `content` —
    // the file's comments contain a literal "{conf_id: [paper_id, ...]}"
    // that broke a naïve JSON.parse of the whole text.
    const newSynced = {version: 1};
    for (const k of Object.keys(favorites)) {
      if (k === 'version') continue;
      if (Array.isArray(favorites[k])) newSynced[k] = favorites[k].slice();
    }
    window.FAVORITES_SYNCED = newSynced;
    if ($favSave) {
      $favSave.textContent = '✓ Saved';
      setTimeout(() => { $favSave.textContent = orig; $favSave.style.pointerEvents = ''; }, 1500);
    }
  } catch (e) {
    if ($favSave) { $favSave.textContent = orig; $favSave.style.pointerEvents = ''; }
    alert('Save failed.\n\n' + e.message);
  }
}
function reloadFavoritesFromFile() {
  const synced = (window.FAVORITES_SYNCED || {});
  const fresh = {};
  for (const k of Object.keys(synced)) {
    if (k === 'version') continue;
    if (Array.isArray(synced[k])) fresh[k] = synced[k].slice();
  }
  favorites = fresh;
  saveFavorites();
}
function paperConfId(p) {
  // In the merged favorites view each paper carries `_conf`; per-conf
  // views use the wrapper id.
  return p._conf || CONF.id;
}

// ---- URL state ----------------------------------------------------------
function parseURLState() {
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  return {
    tab: params.get('tab') || 'all',
    kw: params.get('kw') || '',
    official: params.get('official') || '',
    track: params.get('track') || '',
    q: params.get('q') || '',
    sa: params.get('sa') !== '0',
    sau: params.get('sau') !== '0',
    ps: parseInt(params.get('ps')) || 50,
    p: parseInt(params.get('p')) || 1,
    fav: params.get('fav') === '1',
  };
}
function buildURL() {
  const params = new URLSearchParams();
  if (currentFilter !== 'all') params.set('tab', currentFilter);
  if (currentKwTopic) params.set('kw', currentKwTopic);
  if (currentOfficialTopic) params.set('official', currentOfficialTopic);
  if (currentTrack) params.set('track', currentTrack);
  if (currentQuery) params.set('q', currentQuery);
  if (!searchInAbstract) params.set('sa', '0');
  if (!searchInAuthors) params.set('sau', '0');
  if (pageSize !== 50) params.set('ps', String(pageSize));
  if (currentPage !== 1) params.set('p', String(currentPage));
  // In the merged favorites view, fav-only is implicit; don't pollute the URL.
  if (favoritesOnly && !IS_FAVORITES_VIEW) params.set('fav', '1');
  const str = params.toString();
  return str ? '#' + str : window.location.pathname + window.location.search;
}
function updateURL(push) {
  const newURL = buildURL();
  const currentURL = window.location.pathname + window.location.search + window.location.hash;
  if (push && newURL !== currentURL) {
    try { history.pushState({ depth: ++historyDepth }, '', newURL); } catch (e) {}
  } else {
    try { history.replaceState(history.state, '', newURL); } catch (e) {}
  }
  updateBackBtn();
}
function updateBackBtn() {
  $backBtn.style.display = historyDepth > 0 ? 'inline' : 'none';
}

// ---- Filtering ---------------------------------------------------------
function recomputeFiltered() {
  const q = currentQuery.toLowerCase().trim();
  filtered = PAPERS.filter(p => {
    if (favoritesOnly && !isFav(paperConfId(p), p.i)) return false;
    if (HAS_DESIGNATION && currentFilter !== 'all' && p[DESIGNATIONS.field] !== currentFilter) return false;
    if (HAS_TRACK_FILTER && currentTrack && p[BADGES.field] !== currentTrack) return false;
    if (HAS_KEYWORDS && currentKwTopic) {
      const tags = p[KW_FIELD];
      if (!Array.isArray(tags) || !tags.includes(currentKwTopic)) return false;
    }
    if (HAS_TOPIC && currentOfficialTopic) {
      const v = p[TOPIC_FIELD];
      if (currentOfficialTopic === '__UNCLASSIFIED__') {
        if (v) return false;
      } else if (v !== currentOfficialTopic) {
        return false;
      }
    }
    if (!q) return true;
    if (p.t && p.t.toLowerCase().includes(q)) return true;
    if (searchInAbstract && p.a && p.a.toLowerCase().includes(q)) return true;
    if (searchInAuthors) {
      if (p.au && p.au.some(a => a[0] && a[0].toLowerCase().includes(q))) return true;
      if (p.ins && p.ins.some(i => i.toLowerCase().includes(q))) return true;
    }
    return false;
  });
}
function applyFilter(push) {
  recomputeFiltered();
  currentPage = 1;
  render();
  updateURL(push);
}

function typesetMath(root) {
  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise([root]).catch(err => console.warn('MathJax error:', err));
  }
}

// ---- Card rendering ----------------------------------------------------
function buildCard(p, q) {
  const designation = badgeFor(p);
  const cardClass = designation && designation.card_class ? designation.card_class : '';
  const card = document.createElement('div');
  card.className = 'card' + (cardClass ? ' ' + cardClass : '');
  card.dataset.idx = p._idx;

  const hasAbs = HAS_ABSTRACT && !!p.a;

  const tags = (HAS_KEYWORDS && Array.isArray(p[KW_FIELD])) ? p[KW_FIELD] : [];
  const kwTagsHtml = tags.map(t => `<span class="kw-tag" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('');

  const topicVal = HAS_TOPIC ? p[TOPIC_FIELD] : null;
  const officialHtml = topicVal ? `<span class="official-tag" data-tag="${escapeHtml(topicVal)}">${escapeHtml(String(topicVal).split('->').pop())}</span>` : '';

  let authorsHtml = '';
  if (HAS_AUTHORS && p.au && p.au.length > 0) {
    if (p.au.length <= AUTHOR_PREVIEW_LIMIT) {
      authorsHtml = `<div class="authors">${p.au.map(a => authorHtml(a, q)).join(', ')}</div>`;
    } else {
      const preview = p.au.slice(0, AUTHOR_PREVIEW_LIMIT).map(a => authorHtml(a, q)).join(', ');
      const restRaw = p.au.slice(AUTHOR_PREVIEW_LIMIT).map(a => authorHtml(a, q)).join(', ');
      const restEscaped = restRaw.replace(/"/g, '&quot;');
      authorsHtml = `<div class="authors">${preview}<span class="more-authors" data-more="${restEscaped}"> … +${p.au.length - AUTHOR_PREVIEW_LIMIT} more</span></div>`;
    }
  }

  let instHtml = '';
  if (HAS_INST && p.ins && p.ins.length > 0) {
    const items = p.ins.map((inst, idx) => `<span class="inst-item"><span class="inst-num">${idx+1}.</span> ${highlightWithMath(inst, q)}</span>`).join('');
    instHtml = `<div class="institutions">${items}</div>`;
  }

  // Build the link list from CONF.links — each entry is rendered if its required field has a truthy value.
  const linksHtml = LINKS_CFG
    .filter(l => p[l.field] != null && p[l.field] !== '')
    .map(l => `<a href="${escapeHtml(formatLinkUrl(l.url_template, p))}" target="_blank">${escapeHtml(l.label)}</a>`)
    .join('');

  // When BADGES is its own dimension (e.g. KDD tracks), expose the
  // underlying value so the badge can be a click-to-filter affordance.
  const badgeTrack = HAS_TRACK_FILTER ? (p[BADGES.field] || '') : '';
  const badgeHtml = designation
    ? `<span class="badge ${escapeHtml(designation.badge_class || '')}"${badgeTrack ? ` data-track="${escapeHtml(badgeTrack)}"` : ''}>${escapeHtml(designation.badge_text || '')}</span>`
    : '';

  const topLinksHtml = linksHtml ? `<div class="top-links no-mathjax">${linksHtml}</div>` : '';
  const hasBottomChips = hasAbs || officialHtml || kwTagsHtml;

  const cardConfId = paperConfId(p);
  const favOn = isFav(cardConfId, p.i);
  const favBtnHtml = `<button class="fav-btn${favOn ? ' is-fav' : ''}" type="button" data-id="${escapeHtml(String(p.i || ''))}" data-conf="${escapeHtml(cardConfId)}" title="${favOn ? 'Unfavorite' : 'Favorite'}" aria-label="Toggle favorite">${favOn ? '★' : '☆'}</button>`;

  card.innerHTML = `
    <div class="card-head">
      <div class="top-row">
        ${badgeHtml}
        ${topLinksHtml}
        ${favBtnHtml}
      </div>
      <div style="flex:1">
        <div class="title">${highlightWithMath(p.t || '', q)}</div>
        ${authorsHtml}
        ${instHtml}
        ${hasBottomChips ? `<div class="links no-mathjax">
          ${hasAbs ? '<span class="toggle-abs">Abstract ▾</span>' : ''}
          ${officialHtml}
          ${kwTagsHtml}
        </div>` : ''}
        ${hasAbs ? `<div class="abstract">${highlightWithMath(p.a, q)}</div>` : ''}
      </div>
    </div>
  `;
  if (hasAbs) {
    const toggle = card.querySelector('.toggle-abs');
    const abs = card.querySelector('.abstract');
    toggle.addEventListener('click', () => {
      const wasOpen = abs.classList.contains('open');
      abs.classList.toggle('open');
      toggle.textContent = abs.classList.contains('open') ? 'Abstract ▴' : 'Abstract ▾';
      if (!wasOpen) typesetMath(abs);
    });
  }
  const moreAuth = card.querySelector('.more-authors');
  if (moreAuth) {
    moreAuth.addEventListener('click', () => {
      const rest = moreAuth.dataset.more;
      const span = document.createElement('span');
      span.innerHTML = ', ' + rest;
      moreAuth.replaceWith(span);
    });
  }
  const favBtn = card.querySelector('.fav-btn');
  if (favBtn) {
    favBtn.addEventListener('click', () => {
      const id = favBtn.dataset.id;
      const cid = favBtn.dataset.conf;
      const now = toggleFav(cid, id);
      favBtn.classList.toggle('is-fav', now);
      favBtn.textContent = now ? '★' : '☆';
      favBtn.title = now ? 'Unfavorite' : 'Favorite';
      // When filtering by favorites, unfavoriting should hide the card.
      if (favoritesOnly && !now) applyFilter(false);
    });
  }
  card.querySelectorAll('.kw-tag').forEach(el => {
    el.addEventListener('click', () => {
      $kwTopic.value = el.dataset.tag;
      currentKwTopic = el.dataset.tag;
      applyFilter(true);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
  card.querySelectorAll('.official-tag').forEach(el => {
    el.addEventListener('click', () => {
      $officialTopic.value = el.dataset.tag;
      currentOfficialTopic = el.dataset.tag;
      applyFilter(true);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
  if (HAS_TRACK_FILTER) {
    card.querySelectorAll('.badge[data-track]').forEach(el => {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => {
        const track = el.dataset.track;
        currentTrack = track;
        $trackTabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        const tab = $trackTabs.querySelector('.tab[data-track-filter="' + track + '"]');
        if (tab) tab.classList.add('active');
        applyFilter(true);
        window.scrollTo({top:0,behavior:'smooth'});
      });
    });
  }
  return card;
}

function render() {
  const total = filtered.length;
  const effectiveSize = pageSize === -1 ? total : pageSize;
  const totalPages = effectiveSize > 0 ? Math.max(1, Math.ceil(total / effectiveSize)) : 1;
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * effectiveSize;
  const end = Math.min(start + effectiveSize, total);
  const slice = filtered.slice(start, end);
  const q = currentQuery.toLowerCase().trim();

  $stats.textContent = total === 0 ? 'No matches' : `Showing ${start+1}–${end} of ${total}`;

  if (total === 0) {
    $list.innerHTML = '<div class="empty">No papers match the current filter.</div>';
    $pagination.innerHTML = '';
    return;
  }

  if (slice.length > 300) {
    $list.innerHTML = '';
    $renderProgress.style.display = 'block';
    $renderProgress.textContent = `Rendering ${slice.length} papers…`;
    setTimeout(() => {
      const frag = document.createDocumentFragment();
      for (const p of slice) frag.appendChild(buildCard(p, q));
      $list.appendChild(frag);
      $renderProgress.style.display = 'none';
      typesetMath($list);
    }, 30);
  } else {
    const frag = document.createDocumentFragment();
    for (const p of slice) frag.appendChild(buildCard(p, q));
    $list.innerHTML = '';
    $list.appendChild(frag);
    typesetMath($list);
  }

  if (pageSize === -1 || totalPages === 1) {
    $pagination.innerHTML = '';
    return;
  }
  const buttons = [];
  buttons.push(`<button ${currentPage===1?'disabled':''} data-page="1">« First</button>`);
  buttons.push(`<button ${currentPage===1?'disabled':''} data-page="${currentPage-1}">‹ Prev</button>`);
  buttons.push(`<span class="info">Page ${currentPage} / ${totalPages}</span>`);
  buttons.push(`<button ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">Next ›</button>`);
  buttons.push(`<button ${currentPage===totalPages?'disabled':''} data-page="${totalPages}">Last »</button>`);
  $pagination.innerHTML = buttons.join('');
  $pagination.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      const p = parseInt(b.dataset.page);
      if (!isNaN(p)) { currentPage = p; render(); updateURL(true); window.scrollTo({top:0,behavior:'smooth'}); }
    });
  });
}

// ---- Event handlers ----------------------------------------------------

document.querySelectorAll('#tabs .tab').forEach(t => {

    document.querySelectorAll('#tabs .tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentFilter = t.dataset.filter;
    applyFilter(true);
  });
});

$kwTopic.addEventListener('change', e => { currentKwTopic = e.target.value; applyFilter(true); });
$officialTopic.addEventListener('change', e => { currentOfficialTopic = e.target.value; applyFilter(true); });
$pageSize.addEventListener('change', e => {
  pageSize = parseInt(e.target.value);
  $sizeWarn.style.display = (pageSize === -1 || pageSize >= 500) ? 'inline' : 'none';

});

  }, 150);
});
$searchAbs.addEventListener('change', e => { searchInAbstract = e.target.checked; if (currentQuery) applyFilter(false); else updateURL(false); });
$searchAuth.addEventListener('change', e => { searchInAuthors = e.target.checked; if (currentQuery) applyFilter(false); else updateURL(false); });

if ($favOnly) {
  $favOnly.addEventListener('change', e => {
    favoritesOnly = e.target.checked;
    applyFilter(true);
  });
}
if ($favExport) {
  $favExport.addEventListener('click', exportFavorites);
}
if ($favSave) {
  $favSave.addEventListener('click', saveFavoritesToRepo);
  // Dim the button when Save can't work here, so the user sees the
  // constraint without having to click first.
  if (location.protocol === 'file:') {
    $favSave.style.opacity = '0.55';
    $favSave.title += '\n\nCurrently on file:// — Save is disabled. Run scripts/serve.py and reopen via http://localhost.';
  } else if (!isLocalhostHost()) {
    $favSave.style.opacity = '0.55';
    $favSave.title += '\n\nCurrently on ' + location.host + ' (remote/static) — Save only works locally via scripts/serve.py. Use Export here.';
  }
}
if ($favReload) {
  $favReload.addEventListener('click', () => {
    const localCount = favsForCurrent();
    const synced = (window.FAVORITES_SYNCED || {});
    let syncedCount = 0;
    for (const k of Object.keys(synced)) {
      if (k === 'version') continue;
      if (Array.isArray(synced[k])) syncedCount += synced[k].length;
    }
    if (!confirm(`Overwrite your local favorites (${localCount} starred) with the committed favorites.js (${syncedCount} starred)?\n\nThis cannot be undone — Export first if you want to keep your local state.`)) return;
    reloadFavoritesFromFile();
    updateFavCount();
    applyFilter(false);
  });
}
// Merged favorites view: hide the toggle (it's always on) and the per-conf
// reset button (no per-view filter state to reset).
if (IS_FAVORITES_VIEW && $favOnlyLabel) {
  $favOnlyLabel.classList.add('hidden');
}

document.getElementById('reset').addEventListener('click', () => {
  currentFilter = 'all';
  currentKwTopic = '';
  currentOfficialTopic = '';
  currentTrack = '';
  currentQuery = '';
  pageSize = 50;
  currentPage = 1;
  searchInAbstract = HAS_ABSTRACT;
  searchInAuthors = HAS_AUTHORS || HAS_INST;
  favoritesOnly = IS_FAVORITES_VIEW;
  $kwTopic.value = '';
  $officialTopic.value = '';
  $search.value = '';
  $pageSize.value = '50';
  $searchAbs.checked = searchInAbstract;
  $searchAuth.checked = searchInAuthors;
  if ($favOnly) $favOnly.checked = favoritesOnly;
  $sizeWarn.style.display = 'none';
  document.querySelectorAll('#tabs .tab').forEach(x => x.classList.remove('active'));
  const allTab = document.querySelector('#tabs .tab[data-filter="all"]');
  if (allTab) allTab.classList.add('active');
  if (HAS_TRACK_FILTER) {
    $trackTabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    const allTrack = $trackTabs.querySelector('.tab[data-track-filter=""]');
    if (allTrack) allTrack.classList.add('active');
  }
  applyFilter(true);
});

$backBtn.addEventListener('click', () => { history.back(); });

window.addEventListener('popstate', (e) => {
  historyDepth = (e.state && typeof e.state.depth === 'number') ? e.state.depth : 0;
  initFromURL();
  recomputeFiltered();
  render();
  updateBackBtn();
});

function initFromURL() {
  const state = parseURLState();
  // Validate the URL-supplied filters against the venue's actual tab keys.
  // This protects against stale bookmarks (e.g. an old `tab=research` from
  // when tracks were the top-level tabs, now stuck after a schema change).
  const designKeys = new Set(HAS_DESIGNATION ? DESIGNATIONS.tabs.map(t => t.key) : []);
  currentFilter = (state.tab === 'all' || designKeys.has(state.tab)) ? state.tab : 'all';
  const trackKeys = new Set(HAS_TRACK_FILTER ? BADGES.items.map(b => b.key) : []);
  currentTrack = (state.track === '' || trackKeys.has(state.track)) ? state.track : '';
  currentKwTopic = state.kw;
  currentOfficialTopic = state.official;
  currentQuery = state.q;
  searchInAbstract = HAS_ABSTRACT && state.sa;
  searchInAuthors = (HAS_AUTHORS || HAS_INST) && state.sau;
  pageSize = state.ps;
  currentPage = state.p;
  favoritesOnly = IS_FAVORITES_VIEW || state.fav;
  if ($favOnly) $favOnly.checked = favoritesOnly;
  updateFavCount();
  document.querySelectorAll('#tabs .tab').forEach(x => x.classList.remove('active'));
  const activeTab = document.querySelector('#tabs .tab[data-filter="' + currentFilter + '"]');
  if (activeTab) activeTab.classList.add('active');
  if (HAS_TRACK_FILTER) {
    $trackTabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    const activeTrack = $trackTabs.querySelector('.tab[data-track-filter="' + currentTrack + '"]');
    if (activeTrack) activeTrack.classList.add('active');
  }
  $kwTopic.value = currentKwTopic;
  $officialTopic.value = currentOfficialTopic;
  $search.value = currentQuery;
  $searchAbs.checked = searchInAbstract;
  $searchAuth.checked = searchInAuthors;
  $pageSize.value = String(pageSize);
  $sizeWarn.style.display = (pageSize === -1 || pageSize >= 500) ? 'inline' : 'none';
}

$loading.style.display = 'none';
initFromURL();
recomputeFiltered();
render();
try { history.replaceState({ depth: 0 }, '', buildURL()); } catch (e) {}
updateBackBtn();
</script>
</body>
</html>
