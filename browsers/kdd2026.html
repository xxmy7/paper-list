e the growing popularity of Reinforcement Learning (RL) methods in optimizing TSC, these methods often prioritize driving efficiency over safety, thus failing to address the critical balance between these two aspects. Additionally, these methods usually need more interpretability. CounterFactual (CF) learning is a promising approach for various causal analysis fields. In this study, we introduce a novel framework to improve RL for safety aspects in TSC. This framework introduces a novel method based on CF learning to address the question: “What if, when an unsafe event occurs, we backtrack to perform alternative actions, and will this unsafe event still occur in the subsequent period?” To answer this question, we propose a new structure causal model to predict the result after executing different actions, and we propose a new CF module that integrates with additional “X” modules to promote safe RL practices. Our proposed algorithm, CFLight, achieves a near-zero collision control strategy for complex intersection safety. Extensive experiments on real-world and synthetic datasets demonstrate that CFLight significantly outperforms conventional and state-of-the-art safe RL methods in both safety and traffic efficiency. The data and code are available in the github1. ∗Qiang Wu is the corresponding author 1https://github.com/AdvancedAI-ComplexSystem/SmartCity/tree/main/CFLight This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780308","ins":["Lanzhou University;","Beijing University of Posts and Telecommunications, Lanzhou, China","Beijing University of Posts and Telecommunications, Beijing, China","Griffith University, Brisbane, Australia","University of Wollongong, Wollongong, Australia","Lanzhou University"]},{"i":"conf/kdd/LiHWWSW26","t":"Self-Guided Diffusion Model for Accelerating Computational Fluid Dynamics","au":[["Ruoyan Li",0],["Zijie Huang",0],["Haixin Wang",0],["Guancheng Wan",0],["Yizhou Sun",0],["Wei Wang",0]],"u":"https://doi.org/10.1145/3770854.3780314","dblp":"https://dblp.org/rec/conf/kdd/LiHWWSW26.html","g":["Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780314","c":"jul","a":"Machine learning methods, such as diffusion models, are widely explored as a promising way to accelerate high-fidelity fluid dynamics computation via a super-resolution process from faster-tocompute low-fidelity input. However, existing approaches usually make impractical assumptions that the low-fidelity data is downsampled from high-fidelity data. In reality, low-fidelity data is produced by numerical solvers that use a coarser resolution. Solvergenerated low-fidelity data usually sacrifices fine-grained details, such as small-scale vortices compared to high-fidelity ones. Our findings show that SOTA diffusion models struggle to reconstruct high-fidelity outputs from solver-generated low-fidelity inputs. To bridge this gap, we propose SG-Diff, a novel diffusion model for reconstruction, where both low-fidelity inputs and high-fidelity targets are generated from numerical solvers. We propose an Importance Weight strategy during training that serves as a form of self-guidance, focusing on intricate fluid details, and a PredictorCorrector-Advancer SDE solver that embeds physical guidance into the diffusion sampling process. Together, these techniques steer the diffusion model toward more accurate reconstructions. Experimental results on four 2D turbulent flow datasets demonstrate the efficacy of SG-Diff against state-of-the-art baselines. Code, datasets, and additional appendix are available at https://github.com/RuoyanL i2002/Self-Guided-Diffusion-Model-for-Accelerating-Computationa l-Fluid-Dynamics.git","ins":["University of California, Los Angeles"]},{"i":"conf/kdd/LiAPB26","t":"FedKDMR: Robust Federated Learning via Joint Knowledge Distillation & Model Recombination","au":[["Wenhao Li",[0,1]],["Christos Anagnostopoulos",[0,1]],["Shameem A Puthiya Parambath",[0,1]],["Kevin Bryson",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780160","dblp":"https://dblp.org/rec/conf/kdd/LiAPB26.html","g":["Federated","Robust/Noisy/Spurious","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780160","c":"jul","a":"Federated Learning (FL) presents a compelling distributed learning paradigm that enables resource-constrained clients to collaboratively train machine learning models while preserving data privacy. However, inter-client data heterogeneity poses fundamental challenges to federated optimization efficacy. Although Knowledge Distillation (KD) effectively addresses model performance alignment under heterogeneity, its inherent constraints restrict client parameter exploration capacity, thus, inducing confinement to suboptimal basins. To reconcile this trade-off, we introduce FedKDMR, a novel FL paradigm unifying KD constraints with exploration via model recombination. FedKDMR imposes global model consistency and robustness in training through dynamic KD while sufficiently harnessing model recombination-induced perturbations for diverse parameter exploration. We establish convergence guarantees for strongly convex and smooth objectives. Extensive experiments on FL benchmark datasets demonstrate that FedKDMR achieves a superior accuracy-robustness trade-off against state-of-the-art methods when tackling non-independent and identically distributed and heterogeneous data in FL environments.","ins":["School of Computing Science","University of Glasgow"]},{"i":"conf/kdd/LiCHC26","t":"Robust LLM-based Multi-Agent System with Action Negotiation and Sharing Redundancy Enhancement","au":[["Xujia Li",0],["Beirong Cui",1],["Junyu Huang",1],["Lei Chen",0]],"u":"https://doi.org/10.1145/3770854.3780202","dblp":"https://dblp.org/rec/conf/kdd/LiCHC26.html","g":["LLM","Agent","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780202","c":"jul","a":"Large Language Model-based Multi-Agent Systems (LLM-MAS) have attracted significant attention due to their advantages in handling complex tasks. Current research primarily focuses on task-specific agent design, cooperation mechanisms, and pipeline optimization. However, the robustness of LLM-MAS remains underexplored. Internal conflicts and insufficient information sharing among agents can expose the system to global-level failures, especially under abnormal conditions or adversarial attacks. To address these challenges, we propose a generalizable and computationally efficient protection mechanism, RollMAS. First, we design the action negotiation algorithm that mitigates risks arising from agent discrepancies by enabling multiple local policies to converge through signal synchronization in the vector space. Second, the sharing redundancy enhancement algorithm optimizes MAS robustness by maximizing an approximate natural eigenvalue of the corresponding adjacency matrix, facilitating resilient and efficient information sharing with controlled communication overhead. Extensive experiments on traffic control and question answering tasks, spanning 7 datasets and 13 baselines, demonstrate that our methods substantially enhance the robustness and effectiveness of LLM-MAS.","ins":["Hong Kong University of Science and Technology","Central South University"]},{"i":"conf/kdd/LiJZHC26","t":"Multi-View Urban Region Embedding via Commonality-Specificity Disentanglement","au":[["Zechen Li",0],["Hongwei Jia",[1,2]],["Kai Zhao",3],["Weiming Huang",4],["Meng Chen",[0,5,6]]],"u":"https://doi.org/10.1145/3770854.3780234","dblp":"https://dblp.org/rec/conf/kdd/LiJZHC26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780234","c":"jul","a":"Multi-view region embedding has become an important technique to be pursued due to the increasing availability of diverse urban sensing data. Existing methods typically adopt attention-based fusion or contrastive alignment to integrate multiple data sources such as human mobility and points-of-interest (POIs) into unified region representations. However, these approaches often fail to effectively balance cross-view commonality modeling with the preservation of view-specific characteristics. To address this limitation, we propose ComSRE, a novel region embedding framework that explicitly disentangles shared and distinctive components in multiview region representations. ComSRE integrates three key modules: (1) a Multi-view Representation Learning module that fuses complementary information across views, (2) a View-to-Commonality Contrastive Alignment module that aligns the representation of each view to a shared commonality anchor to enhance cross-view consistency, and (3) a Multi-view Differential Orthogonality module that isolates distinctive signals unique to each view and promotes their independence through orthogonality constraints. Extensive experiments on three real-world urban datasets demonstrate that ComSRE consistently outperforms state-of-the-art methods across multiple downstream tasks, achieving superior predictive accuracy and representation quality.","ins":["School of Software, Shandong University","Graduate School of Comprehensive","Human Sciences, University of Tsukuba","AI Lab, Workday AI","School of Geography, University of Leeds","Key Laboratory of Urban Land","Resources Monitoring and Simulation, Ministry of Natural Resources"]},{"i":"conf/kdd/LiWSLYH26","t":"ZRing: A Dynamic Sketch for Weighted Cardinality Estimation in Data Streams","au":[["Zhicheng Li",0],["Pinghui Wang",0],["Qiheng Song",0],["Rundong Li",0],["Tong Yang",1],["Qun Huang",1]],"u":"https://doi.org/10.1145/3770854.3780289","dblp":"https://dblp.org/rec/conf/kdd/LiWSLYH26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780289","c":"jul","a":"Estimating the number of distinct elements in a dataset, known as cardinality estimation, plays a central role in data management tasks such as query optimization, network monitoring, and privacypreserving analytics. In practical scenarios, data often arrive as high-speed streams, making it impractical to store or process the entire dataset. This challenge is further exacerbated in Weighted Cardinality Estimation (WCE), where elements carry different importance levels, and the goal is to estimate the total weight of distinct elements. While existing solutions address WCE under insert-only assumptions, they fall short in fully dynamic settings where both insertions and deletions occur. In this work, we propose a novel sketch-based approach for fully dynamic WCE. We first develop a multi-layer perceptron-based estimator that learns from the structural features of the sketch. To further enhance accuracy, we introduce a Markov-process-inspired probabilistic estimator, which yields unbiased results. We evaluate our approach on both synthetic and real-world datasets, demonstrating up to an orderof-magnitude improvement in estimation accuracy over existing techniques under the same memory budget.","ins":["Xi’an Jiaotong University","Peking University"]},{"i":"conf/kdd/LiLZW26","t":"M2NO: An Efficient Multi-Resolution Operator Framework for Dynamic Multi-Scale PDE Solvers","au":[["Zhihao Li",[0,1]],["Zhilu Lai",1],["Internet of Things Thrust",1],["Xiaobo Zhang",[2,3]],["Wei Wang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780179","dblp":"https://dblp.org/rec/conf/kdd/LiLZW26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780179","c":"jul","a":"Solving high-dimensional partial differential equations (PDEs) efficiently requires handling multi-scale features across varying resolutions. To address this challenge, we present the Multiwavelet-based Multigrid Neural Operator (M2NO), a deep learning framework that integrates a multigrid structure with predefined multiwavelet spaces. M2NO leverages multi-resolution analysis to selectively transfer low-frequency error components to coarser grids while preserving high-frequency details at finer levels. This design enhances both accuracy and computational efficiency without introducing additional complexity. Moreover, M2NO serves as an effective preconditioner for iterative solvers, further accelerating convergence in large-scale PDE simulations. Through extensive evaluations on diverse PDE benchmarks, including high-resolution, super-resolution tasks, and preconditioning settings, M2NO consistently outperforms existing models. Its ability to efficiently capture fine-scale variations and large-scale structures makes it a robust and versatile solution for complex PDE simulations. Our code and datasets are available on https://github.com/lizhihao2022/M2NO.","ins":["Data Science and Analytics Thrust","The Hong Kong University of Science and Technology","School of computing and Artificial intelligence","Southwest Jiaotong University"]},{"i":"conf/kdd/LiangZF26","t":"Accelerated Coordinate Descent for Directed Densest Subgraph Discovery","au":[["Luocheng Liang",[0,1]],["Yingli Zhou",[0,1]],["Yixiang Fang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780186","dblp":"https://dblp.org/rec/conf/kdd/LiangZF26.html","g":["Graph/GNN","Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780186","c":"jul","a":"Given a directed graph 𝐺, the directed densest subgraph (DDS) problem refers to finding a subgraph from 𝐺, whose density is the highest among all subgraphs of 𝐺. The DDS problem is fundamental to a wide range of applications, such as fake follower detection and community mining. However, existing DDS solutions often provide weaker theoretical guarantees. To tackle these issues, we present a theoretically efficient (1 + 𝜖) approximate DDS discovery algorithm in this paper. Specifically, we first introduce a novel LP formulation for the DDS problem and then propose an efficient approximation algorithm based on the accelerated random coordinate descent method (ACDM) to solve it efficiently. We theoretically prove that our algorithm requires fewer iterations to achieve the same solution accuracy compared to state-of-the-art approximation DDS algorithms. We have performed an extensive empirical evaluation of our approaches on 15 real large datasets. The results show that our proposed algorithms are up to 1000× faster than the current state-of-the-art.","ins":["The Chinese University of Hong","Kong, Shenzhen"]},{"i":"conf/kdd/LiangQZHD26","t":"InfoDCL: Informative Noise Enhanced Diffusion Based Contrastive Learning","au":[["Xufeng Liang",0],["Zhida Qin",0],["Chong Zhang",1],["Tianyu Huang",0],["Gangyi Ding",0]],"u":"https://doi.org/10.1145/3770854.3780288","dblp":"https://dblp.org/rec/conf/kdd/LiangQZHD26.html","g":["Diffusion/Generation","Self-Supervised/Contrastive"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780288","c":"jul","a":"Contrastive learning has demonstrated promising potential in recommender systems. Existing methods typically construct sparser views by randomly perturbing the original interaction graph, as they have no idea about the authentic user preferences. Owing to the sparse nature of recommendation data, this paradigm can only capture insufficient semantic information. To address the issue, we propose InfoDCL, a novel diffusion-based contrastive learning framework for recommendation. Rather than injecting randomly sampled Gaussian noise, we employ a single-step diffusion process that integrates noise with auxiliary semantic information to generate signals and feed them to the standard diffusion process to generate authentic user preferences as contrastive views. Besides, based on a comprehensive analysis of the mutual influence between generation and preference learning in InfoDCL, we build a collaborative training objective strategy to transform the interference between them into mutual collaboration. Additionally, we employ multiple GCN layers only during inference stage to incorporate higher-order co-occurrence information while maintaining training efficiency. Extensive experiments on five real-world datasets demonstrate that InfoDCL significantly outperforms state-of-theart methods. Our InfoDCL offers an effective solution for enhancing recommendation performance and suggests a novel paradigm for applying diffusion method in contrastive learning frameworks.","ins":["Beijing Institute of Technology","Xi’an Jiaotong University"]},{"i":"conf/kdd/LiaoZSHL26","t":"Invariant Graph Transformer for Out-of-Distribution Generalization","au":[["Tianyin Liao",0],["Ziwei Zhang",1],["Yufei Sun",0],["Chunyu Hu",0],["Jianxin Li",1]],"u":"https://doi.org/10.1145/3770854.3780247","dblp":"https://dblp.org/rec/conf/kdd/LiaoZSHL26.html","g":["Graph/GNN","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780247","c":"jul","a":"Graph Transformers (GTs) have demonstrated great effectiveness across various graph analytical tasks. However, the existing GTs focus on training and testing graph data originated from the same distribution, but fail to generalize under distribution shifts. Graph invariant learning, aiming to capture generalizable graph structural patterns with labels under distribution shifts, is potentially a promising solution, but how to design attention mechanisms and positional and structural encodings (PSEs) based on graph invariant learning principles remains challenging. To solve these challenges, we introduce Graph Out-Of-Distribution generalized Transformer (GOODFormer), aiming to learn generalized graph representations by capturing invariant relationships between predictive graph structures and labels through jointly optimizing three modules. Specifically, we first develop a GT-based entropy-guided invariant subgraph disentangler to separate invariant and variant subgraphs while preserving the sharpness of the attention function. Next, we design an evolving subgraph positional and structural encoder to effectively and efficiently capture the encoding information of dynamically changing subgraphs during training. Finally, we propose an invariant learning module utilizing subgraph node representations and encodings to derive graph representations that can generalize to unseen test graphs. We also provide theoretical justifications for our method. Extensive experiments on benchmark datasets demonstrate the superiority of our method over state-ofthe-art baselines under distribution shifts.","ins":["Nankai University","Beihang University"]},{"i":"conf/kdd/LiaoLX26","t":"HyFunc: Accelerating LLM-based Function Calls for Agentic AI through Hybrid-Model Cascade and Dynamic Templating","au":[["Weibin Liao",0],["Jian-guang Lou",1],["Haoyi Xiong",1]],"u":"https://doi.org/10.1145/3770854.3780283","dblp":"https://dblp.org/rec/conf/kdd/LiaoLX26.html","g":["LLM","Agent","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780283","c":"jul","a":"While agentic AI systems rely on LLMs to translate user intent into structured function calls, this process is fraught with computational redundancy, leading to high inference latency that hinders real-time applications. This paper identifies and addresses three key redundancies: (1) the redundant processing of a large library of function descriptions for every request; (2) the redundant use of a large, slow model to generate an entire, often predictable, token sequence; and (3) the redundant generation of fixed, boilerplate parameter syntax. We introduce HyFunc, a novel framework that systematically eliminates these inefficiencies. HyFunc employs a hybrid-model cascade where a large model distills user intent into a single “soft token.” This token guides a lightweight retriever to select relevant functions and directs a smaller, prefix-tuned model to generate the final call, thus avoiding redundant context processing and full-sequence generation by the large model. To eliminate syntactic redundancy, our “dynamic templating” technique injects boilerplate parameter syntax on-the-fly within an extended vLLM engine. To avoid potential limitations in generalization, we evaluate HyFunc on an unseen benchmark dataset, BFCL. Experimental results demonstrate that HyFunc achieves an excellent balance between efficiency and performance. It achieves an inference latency of 0.828 seconds, outperforming all baseline models, and reaches a performance of 80.1%, surpassing all models with a comparable parameter scale. These results suggest that HyFunc offers a more efficient paradigm for agentic AI. Our code is publicly available at https://github.com/MrBlankness/HyFunc.","ins":["Peking University","Microsoft Corporation"]},{"i":"conf/kdd/LiuCYFHZLZ26","t":"How Do Graph Signals Affect Recommendation: Unveiling the Mystery of Low and High-Frequency Graph Signals","au":[["Feng Liu",[0,1]],["Hao Cang",[0,1]],["Huanhuan Yuan",[0,1]],["Jiaqing Fan",[0,1]],["Yongjing Hao",[2,3,4]],["Fuzhen Zhuang",[5,6]],["Critical Software Environment",7],["Guanfeng Liu",[8,9]],["Pengpeng Zhao",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780194","dblp":"https://dblp.org/rec/conf/kdd/LiuCYFHZLZ26.html","g":["Recommendation","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780194","c":"jul","a":"Spectral graph neural networks (GNNs) are highly effective in modeling graph signals, with their success in recommendation often attributed to low-pass filtering. However, recent studies highlight the importance of high-frequency signals. The role of lowfrequency and high-frequency graph signals in recommendation remains unclear. This paper aims to bridge this gap by investigating the influence of graph signals on recommendation performance. We theoretically prove that the effects of low-frequency and highfrequency graph signals are equivalent in recommendation tasks, as both contribute by smoothing the similarities between user-item pairs. To leverage this insight, we propose a frequency signal scaler, a plug-and-play module that adjusts the graph signal filter function to fine-tune the smoothness between user-item pairs, making it compatible with any GNN model. Additionally, we identify and prove that graph embedding-based methods cannot fully capture the characteristics of graph signals. To address this limitation, a space flip method is introduced to restore the expressive power of ∗Feng Liu and Hao Cang contributed equally to this work. †Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780194 graph embeddings. Remarkably, we demonstrate that either lowfrequency or high-frequency graph signals alone are sufficient for effective recommendations. Extensive experiments on four public datasets validate the effectiveness of our proposed methods. Code is avaliable at https://github.com/mojosey/SimGCF.","ins":["School of Computer Science and Technology","Soochow University","School of Electronic and Information","Engineering","Suzhou University of Science and Technology","Institute of Artificial Intelligence, Beihang University","State Key Laboratory of Complex &","Beihang University","School of Computing","Macquarie University"]},{"i":"conf/kdd/LiuGLZZWY26","t":"RUQuant: Towards Refining Uniform Quantization for Large Language Models","au":[["Han Liu",0],["Haotian Gao",0],["Changya Li",0],["Feng Zhang",1],["Xiaotong Zhang",0],["Wei Wang",2],["Hong Yu",0]],"u":"https://doi.org/10.1145/3770854.3780259","dblp":"https://dblp.org/rec/conf/kdd/LiuGLZZWY26.html","g":["LLM","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780259","c":"jul","a":"The increasing size and complexity of large language models (LLMs) have raised significant challenges in deployment efficiency, particularly under resource constraints. Post-training quantization (PTQ) has emerged as a practical solution by compressing models without requiring retraining. While existing methods focus on uniform quantization schemes for both weights and activations, they often suffer from substantial accuracy degradation due to the nonuniform nature of activation distributions. In this work, we revisit the activation quantization problem from a theoretical perspective grounded in the Lloyd-Max optimality conditions. We identify the core issue as the non-uniform distribution of activations within the quantization interval, which causes the optimal quantization point under the Lloyd-Max criterion to shift away from the midpoint of the interval. To address this issue, we propose a two-stage orthogonal transformation method, RUQuant. In the first stage, activations are divided into blocks. Each block is mapped to uniformly sampled target vectors using composite orthogonal matrices, which are constructed from Householder reflections and Givens rotations. In the second stage, a global Householder reflection is fine-tuned to further minimize quantization error using Transformer output discrepancies. Empirical results show that our method achieves near-optimal quantization performance without requiring model fine-tuning: RUQuant achieves 99.8% of full-precision accuracy with W6A6 and 97% with W4A4 quantization for a 13B LLM, within approximately one minute. A fine-tuned variant yields even higher accuracy, demonstrating the effectiveness and scalability of our approach. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780259","ins":["Dalian University of Technology","Peking University","Macao Polytechnic University"]},{"i":"conf/kdd/LiuGHLHL26","t":"When Deepfake Detection Meets Graph Neural Network: A Unified and Lightweight Framework","au":[["Haoyu Liu",0],["Chaoyu Gong",0],["Mengke He",0],["Jiate Li",1],["Kai Han",2],["Siqiang Luo",0]],"u":"https://doi.org/10.1145/3770854.3780219","dblp":"https://dblp.org/rec/conf/kdd/LiuGHLHL26.html","g":["Graph/GNN","Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780219","c":"jul","a":"The proliferation of generative video models has made detecting AI-generated and manipulated videos an urgent challenge. Existing detection approaches often fail to generalize across diverse manipulation types due to their reliance on isolated spatial, temporal, or spectral information, and typically require large models to perform well. This paper introduces SSTGNN, a lightweight Spatial-SpectralTemporal Graph Neural Network framework that represents videos as structured graphs, enabling joint reasoning over spatial inconsistencies, temporal artifacts, and spectral distortions. SSTGNN incorporates learnable spectral filters and spatial-temporal differential modeling into a unified graph-based architecture, capturing subtle manipulation traces more effectively. Extensive experiments on diverse benchmark datasets demonstrate that SSTGNN not only achieves superior performance in both in-domain and cross-domain settings, but also offers strong efficiency and resource allocation. Remarkably, SSTGNN accomplishes these results with up to 42× fewer parameters than state-of-the-art models, making it highly lightweight and resource-friendly for real-world deployment.","ins":["Nanyang Technological University","University of Southern California","The University of Hong Kong"]},{"i":"conf/kdd/LiuZDLY26","t":"WARP: A Word-Level Backdoor Attack Targeting RAG Systems via Retrieval Corpus Poisoning","au":[["Hui Liu",0],["Yibo Zhou",0],["Liguo Dong",0],["Weidong Li",1],["Shui Yu",2]],"u":"https://doi.org/10.1145/3770854.3780227","dblp":"https://dblp.org/rec/conf/kdd/LiuZDLY26.html","g":["Security/Attack","RAG/Retrieval"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780227","c":"jul","a":"Retrieval-Augmented Generation (RAG) systems retrieve relevant documents from a corpus database to mitigate issues like hallucination, outdated knowledge, and limited domain coverage. While enhancing large language models (LLMs) performance, RAG also introduces a new attack surface: adversaries can inject triggerembedded malicious documents into the corpus database, potentially causing the LLM to produce attacker-controlled outputs. To expose this vulnerability, we propose the first word-level backdoor attack targeting RAG systems through retrieval corpus poisoning named WARP. WARP crafts adversarial texts that are highly similar to triggers in embedding space, and appends attackercontrolled content (e.g. malicious phishing links) to generate adversarial corpus (advCorps). When a user’s query contains a welldesignated word-level trigger, these advCorps are retrieved, prompting the LLM to generate attacker-specified outputs. We formulate the generation of adversarial texts as a constrained optimization problem in embedding space, ensuring that trigger-related queries lead the RAG’s retriever to accurately select the advCorps. To demonstrate the real-world threat, we craft adversarial texts with phishing links and deploy a word-level backdoor attack against RAG across multiple retrievers, mainstream LLMs, and real-world corpora. WARP achieves a robust average ASR of 55.8%, improving upon existing methods by 17.2%, with less than 0.1% degradation on benign queries. Moreover, WARP-generated adversarial texts exhibit an average perplexity of 69.98, representing a 95.6% reduction compared to state-of-the-art (SOTA) baselines, demonstrating superior linguistic naturalness and stealth.","ins":["Central China Normal University","Wuhan University","University of Technology Sydney"]},{"i":"conf/kdd/LiuSSYLZW26","t":"Rethinking Popularity Bias in Collaborative Filtering via Analytical Vector Decomposition","au":[["Lingfeng Liu",0],["Yixin Song",0],["Dazhong Shen",1],["Bing Yin",[2,3,4]],["Hao Li",4],["Yanyong Zhang",0],["Chao Wang",[0,2,3]]],"u":"https://doi.org/10.1145/3770854.3780295","dblp":"https://dblp.org/rec/conf/kdd/LiuSSYLZW26.html","g":["Recommendation","Fairness/Bias"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780295","c":"jul","a":"Popularity bias fundamentally undermines the personalization capabilities of collaborative filtering (CF) models, causing them to disproportionately recommend popular items while neglecting users’ genuine preferences for niche content. While existing approaches treat this as an external confounding factor, we reveal that popularity bias is an intrinsic geometric artifact of Bayesian Pairwise Ranking (BPR) optimization in CF models. Through rigorous mathematical analysis, we prove that BPR systematically organizes item embeddings along a dominant “popularity direction” where embedding magnitudes directly correlate with interaction frequency. This geometric distortion forces user embeddings to simultaneously handle two conflicting tasks—expressing genuine preference and calibrating against global popularity—trapping them in suboptimal configurations that favor popular items regardless of individual tastes. We propose Directional Decomposition and Correction (DDC), a universally applicable framework that surgically corrects this embedding geometry through asymmetric directional updates. DDC guides positive interactions along personalized preference directions while steering negative interactions away from the global ∗Chao Wang is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780295 popularity direction, disentangling preference from popularity at the geometric source. Extensive experiments across multiple BPR- based architectures demonstrate that DDC significantly outperforms state-of-the-art debiasing methods, reducing training loss to less than 5% of heavily-tuned baselines while achieving superior recommendation quality and fairness. Code is available in https://github.com/LingFeng-Liu-AI/DDC.","ins":["School of Artificial Intelligence and Data Science, University of Science and Technology of China","College of Computer Science and Technology, Nanjing University of Aeronautics and Astronautics","State Key Laboratory of Cognitive","Intelligence","iFLYTEK Research, iFLYTEK"]},{"i":"conf/kdd/LiuZL26","t":"Wukong Framework for Not Safe For Work Detection in Text-to-Image Systems","au":[["Mingrui Liu",0],["Sixiao Zhang",0],["Cheng Long",0]],"u":"https://doi.org/10.1145/3770854.3780226","dblp":"https://dblp.org/rec/conf/kdd/LiuZL26.html","g":["Diffusion/Generation","Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780226","c":"jul","a":"Text-to-Image (T2I) generation is a popular AI-generated content (AIGC) technology enabling diverse and creative image synthesis. However, some outputs may contain Not Safe For Work (NSFW) content (e.g., violence), violating community guidelines. Detecting NSFW content efficiently and accurately, known as external safeguarding, is essential. Existing external safeguards fall into two types: text filters, which analyze user prompts but overlook T2I model-specific variations and are prone to adversarial attacks; and image filters, which analyze final generated images but are computationally costly and introduce latency. Diffusion models, the foundation of modern T2I systems like Stable Diffusion, generate images through iterative denoising using a U-Net architecture with ResNet and Transformer blocks. We observe that: (1) early denoising steps define the semantic layout of the image, and (2) cross-attention layers in U-Net are crucial for aligning text and image regions. Based on these insights, we propose Wukong, a transformer-based NSFW detection framework that leverages intermediate outputs from early denoising steps and reuses U-Net’s pre-trained cross-attention parameters. Wukong operates within the diffusion process, enabling early detection without waiting for full image generation. We also introduce a new dataset containing prompts, seeds, and imagespecific NSFW labels, and evaluate Wukong on this and two public benchmarks. Results show that Wukong significantly outperforms text-based safeguards and achieves comparable accuracy of image filters, while offering much greater efficiency. Warning: This paper contains potentially offensive text and images.","ins":["Nanyang Technological University"]},{"i":"conf/kdd/LiuYLCB26","t":"Traj-MLLM: Can Multimodal Large Language Models Reform Trajectory Data Mining?","au":[["Shuo Liu",[0,1,2,3]],["Di Yao",3],["Yan Lin",4],["Gao Cong",[5,6,7]],["Jingping Bi",3]],"u":"https://doi.org/10.1145/3770854.3780225","dblp":"https://dblp.org/rec/conf/kdd/LiuYLCB26.html","g":["Multimodal/VLM","LLM","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780225","c":"jul","a":"Building a general model capable of analyzing human trajectories across different geographic regions and different tasks becomes an emergent yet important problem for various applications. However, existing works suffer from the generalization problem, i.e., they are either restricted to train for specific regions or only suitable for a few tasks. Given the recent advances of multimodal large language models (MLLMs), we raise the question: can MLLMs reform current trajectory data mining and solve the problem? Nevertheless, due to the modality gap of trajectory, how to generate task-independent multimodal trajectory representations and how to adapt flexibly to different tasks remain the foundational challenges. In this paper, we propose Traj-MLLM, which is the first general framework using MLLMs for trajectory data mining. By integrating multiview contexts, Traj-MLLM transforms raw trajectories into interleaved image-text sequences while preserving key spatial-temporal characteristics, and directly utilizes the reasoning ability of MLLMs for trajectory analysis. Additionally, a prompt optimization method is proposed to finalize data-invariant prompts for task adaptation. Extensive experiments on four publicly available datasets show that Traj-MLLM outperforms state-of-the-art baselines by 48.05%, 15.52%, 51.52%, 1.83% on travel time estimation, mobility prediction, anomaly detection and transportation mode identification, respectively. Traj-MLLM achieves these superior performances without requiring any training data or fine-tuning the MLLM backbones. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780225","ins":["School of Advanced Interdisciplinary","Sciences, University of Chinese","Academy of Sciences","State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences","Department of Computer Science, Aalborg University","College of Computing and Data","Science, Nanyang Technological","University"]},{"i":"conf/kdd/LiuZTL26","t":"Mixture of Meta-Policies for Cross-Environment Meta-Reinforcement Learning","au":[["Xinyu Liu",0],["Qingyu Zeng",0],["Chenwei Tang",0],["Jiancheng Lv",0]],"u":"https://doi.org/10.1145/3770854.3780332","dblp":"https://dblp.org/rec/conf/kdd/LiuZTL26.html","g":["Reinforcement Learning","Few-Shot/Zero-Shot","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780332","c":"jul","a":"Meta-Reinforcement Learning (Meta-RL) aims to enable agents to rapidly adapt to new tasks by leveraging prior experience from related ones. However, existing approaches typically assume consistent state and action spaces across tasks, limiting the ability of Meta-RL methods to generalize to environments with diverse morphologies, dynamics, and reward structures, common in real-world applications. To address this, we propose Mixture of Meta-Policies (MoMP), a modular and scalable Meta-RL framework designed for effective knowledge transfer across structurally heterogeneous environments. MoMP represents policies as sparse combinations of shared submodules, where each submodule is itself an attentionbased policy block. During meta-training, MoMP learns to specialize and reuse these attention modules by optimizing their taskconditioned activation across multiple environments. Once trained, the shared module can be plugged into new agents to accelerate learning in novel tasks. Sparse activation enables targeted reuse of prior knowledge while mitigating interference, improving both adaptation speed and long-term retention. Experiments across diverse MuJoCo agents show that MoMP significantly outperforms strong meta-RL baselines, highlighting its effectiveness in crossenvironment generalization and efficient meta-policy reuse.","ins":["School of Computer Science, Sichuan University"]},{"i":"conf/kdd/LiuYHW26","t":"Offline Policy Enhancement and Transfer by Combining Experimental and External One-Sided Treatment Data","au":[["Xueqing Liu",0],["Qinwei Yang",0],["Zhiyu Hao",1],["Peng Wu",0]],"u":"https://doi.org/10.1145/3770854.3780273","dblp":"https://dblp.org/rec/conf/kdd/LiuYHW26.html","g":["Reinforcement Learning","Causal"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780273","c":"jul","a":"In this article, we investigate a novel setting for offline policy enhancement and transfer that involves two distinct datasets: an experimental dataset and an external one-sided treatment dataset. The experimental dataset, though unconfounded, is constrained by its small sample. Consequently, methods based solely on the experimental dataset may suffer from low accuracy and limited generalizability. In contrast, the external one-sided treatment dataset typically has a larger sample size but includes observations from only one treatment arm (e.g., all units belong to the control group, with no units receiving the treatment). Based only on the external one-sided treatment dataset, it cannot identify the policy reward. By combining the two datasets, we propose a principled framework to accomplish two key tasks: (1) policy enhancement: improving the accuracy of offline policy evaluation and learning in the experimental dataset by leveraging the external one-sided treatment dataset; (2) policy transfer: enabling offline policy evaluation and learning in the external one-sided treatment dataset by utilizing information from the experimental dataset, and thus making the learned policies applicable to a broader range of data distributions. Extensive experiments demonstrate that our proposed methods not only estimate rewards more accurately but also learn policies that closely approximate the theoretically optimal policy. The code is available at https://anonymous.4open.science/r/Offline-PolicyEnhancement-and-Transfer-E0D1 for double-blind review.","ins":["Beijing Technology and Business University","Northeast Normal University"]},{"i":"conf/kdd/LiuCCS26","t":"Rethinking and Red-Teaming Protective Perturbation in Personalized Diffusion Models","au":[["Yixin Liu",[0,1]],["Ruoxi Chen",[0,1]],["Xun Chen",[0,1]],["Independent Researcher",[0,1]],["Lichao Sun",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780303","dblp":"https://dblp.org/rec/conf/kdd/LiuCCS26.html","g":["Diffusion/Generation","Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780303","c":"jul","a":"Personalized diffusion models (PDMs) have become prominent for adapting pre-trained text-to-image models to generate images of specific subjects using minimal training data. However, PDMs are susceptible to minor adversarial perturbations, leading to significant degradation when fine-tuned on corrupted datasets. These vulnerabilities are exploited to create protective perturbations that prevent unauthorized image generation. Existing purification methods attempt to red-team the protective perturbation to break the protection but often over-purify images, resulting in information loss. In this work, we conduct an in-depth analysis of the fine-tuning process of PDMs through the lens of shortcut learning. We hypothesize and empirically demonstrate that adversarial perturbations induce a latent-space misalignment between images and their text prompts in the CLIP embedding space. This misalignment causes the model to erroneously associate noisy patterns with unique identifiers during fine-tuning, resulting in poor generalization. Based on these insights, we propose a systematic red-teaming framework that includes data purification and contrastive decoupling learning. We first employ off-the-shelf image restoration techniques to realign images with their original semantic content in latent space. Then, we introduce contrastive decoupling learning with noise tokens to decouple the learning of personalized concepts from spurious noise patterns. Our study not only uncovers shortcut learning vulnerabilities in PDMs but also provides a thorough evaluation framework for developing stronger protection. Our extensive evaluation demonstrates its advantages over existing purification methods and its robustness against adaptive perturbations.","ins":["Lehigh University","Computer Science and Engineering"]},{"i":"conf/kdd/LiuZZLL26","t":"UniLLM: A Unified Large Language Model for Multi?Modal Urban Dynamics Prediction","au":[["Yuhang Liu",0],["Yingxue Zhang",0],["Xin Zhang",1],["Yanhua Li",2],["Jun Luo",3],["Logistics and Supply Chain MultiTech",3]],"u":"https://doi.org/10.1145/3770854.3780232","dblp":"https://dblp.org/rec/conf/kdd/LiuZZLL26.html","g":["LLM","Multimodal/VLM","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780232","c":"jul","a":"Modern cities generate vast streams of urban dynamics data reflecting mobility demand, environmental conditions, and traffic patterns. The value of these data lies not only in individual modalities but in their integration—urban signals are highly interdependent, with changes in one modality often influencing others. Consequently, predicting any single urban dynamic requires information from multiple interrelated sources. Although numerous methods—ranging from deep learning models to recent LLM-based approaches—have been proposed, most are limited in scope. They either focus on single-modality prediction, rely on rigid model designs that lack flexibility, or overlook inter-modal dependencies. As a result, they struggle to adapt to dynamic urban conditions and suffer from degraded predictive performance across modalities. In this paper, we propose UniLLM, a unified large language model for multi-modal urban dynamics prediction. At its core, UniLLM introduces a Unified Cross-Modal Alignment Module that transforms heterogeneous urban data into latent representations while preserving modalityspecific patterns and capturing cross-modal correlations through a contrastive learning objective. To support dynamic adaptation across tasks and modalities, we design a Routing-Aware Prompting Mechanism that learns soft prompts based on task context and modality semantics. Furthermore, a Multi-Modal Memory-Guided Adaptive Algorithm employs replay-based gradient coordination and Frank–Wolfe optimization to mitigate cross-modal catastrophic forgetting during fine-tuning. Extensive experiments across multiple cities and urban modalities demonstrate that UniLLM consistently outperforms state-of-the-art baselines. These results highlight UniLLM’s potential as a flexible and robust forecasting model for real-world, multi-modal urban environments. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780232 Figure 1: Illustration of key challenges, including complex urban dynamics and cross-modal forgetting.","ins":["State University of New York at Binghamton","San Diego State University","Worcester Polytechnic Institute","R&D Centre"]},{"i":"conf/kdd/LiuLCHZH26","t":"Learning Hierarchical Knowledge in Text-Rich Networks with Taxonomy-Informed Representation Learning","au":[["Yunhui Liu",[0,1,2,3]],["Yongchao Liu",3],["Yinfeng Chen",[0,1,2]],["Chuntao Hong",3],["Tao Zheng",[0,1,2]],["Tieke He",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3780260","dblp":"https://dblp.org/rec/conf/kdd/LiuLCHZH26.html","g":["Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780260","c":"jul","a":"Hierarchical knowledge structures are ubiquitous across real-world domains and play a vital role in organizing information from coarse to fine semantic levels. While such structures have been widely used in taxonomy systems, biomedical ontologies, and retrievalaugmented generation, their potential remains underexplored in the context of Text-Rich Networks (TRNs), where each node contains rich textual content and edges encode semantic relationships. Existing methods for learning on TRNs often focus on flat semantic modeling, overlooking the inherent hierarchical semantics embedded in textual documents. To this end, we propose TIER (Hierarchical Taxonomy-Informed REpresentation Learning on TextRich Networks), which first constructs an implicit hierarchical taxonomy and then integrates it into the learned node representations. Specifically, TIER employs similarity-guided contrastive learning to build a clustering-friendly embedding space, upon which it performs hierarchical K-Means followed by LLM-powered clustering refinement to enable semantically coherent taxonomy construction. Leveraging the resulting taxonomy, TIER introduces a cophenetic correlation coefficient-based regularization loss to align the learned embeddings with the hierarchical structure. By learning representations that respect both fine-grained and coarsegrained semantics, TIER enables more interpretable and structured modeling of real-world TRNs. We demonstrate that our approach significantly outperforms existing methods on multiple datasets ∗Corresponding authors. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780260 across diverse domains, highlighting the importance of hierarchical knowledge learning for TRNs. Our code is open-sourced at https://github.com/Cloudy1225/TIER. 1","ins":["State Key Laboratory for Novel","Software Technology","Nanjing University","Ant Group"]},{"i":"conf/kdd/LourencoGXM26","t":"In-context Learning of Evolving Data Streams with Tabular Foundational Models","au":[["Afonso Lourenço",0],["João Gama",1],["Eric P. Xing",[2,3]],["Goreti Marreiros",0]],"u":"https://doi.org/10.1145/3770854.3780305","dblp":"https://dblp.org/rec/conf/kdd/LourencoGXM26.html","g":["Tabular","LLM","Continual/Incremental"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780305","c":"jul","a":"State-of-the-art data stream mining has long drawn from ensembles of the Very Fast Decision Tree, a seminal algorithm honored with the 2015 KDD Test-of-Time Award. However, the emergence of large tabular models, i.e., transformers designed for structured numerical data, marks a significant paradigm shift. These models move beyond traditional weight updates, instead employing in-context learning through prompt tuning. By using on-the-fly sketches to summarize unbounded streaming data, one can feed this information into a pre-trained model for efficient processing. This work bridges advancements from both areas, highlighting how transformers’ implicit meta-learning abilities, pre-training on drifting natural data, and reliance on context optimization directly address the core challenges of adaptive learning in dynamic environments. Exploring real-time model adaptation, this research demonstrates that TabPFN, coupled with a simple sliding memory strategy, consistently outperforms ensembles of Hoeffding trees, such as Adaptive Random Forest, and Streaming Random Patches, across all non-stationary benchmarks.","ins":["GECAD, ISEP, Polytechnic of Porto","INESC-TEC, FEP, University of Porto","Carnegie Mellon University","Mohamed bin Zayed University of AI"]},{"i":"conf/kdd/LuderssenNP26","t":"Four-Cycle Counting in Low-Degeneracy Graph Streams","au":[["Sebastian Lüderssen",0],["TU Wien",0],["TU Wien",0]],"u":"https://doi.org/10.1145/3770854.3780199","dblp":"https://dblp.org/rec/conf/kdd/LuderssenNP26.html","g":["Graph/GNN","Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780199","c":"jul","a":"We study the problem of (1 + 𝜀)-approximating the number of fourcycles in graphs given as arbitrary order edge streams. We propose two new algorithms based on sampling induced subgraphs. Our first contribution is a two-pass algorithm that uses e 𝑂(𝜅𝑚/ √ 𝑇) space, where 𝑚is the number of edges, 𝑇is the number of four-cycles, and 𝜅is the graph’s degeneracy. This algorithm improves upon existing theoretical bounds and is provably optimal for constantdegeneracy graphs, matching a known Ω(𝑚/ √ 𝑇) lower bound up to lower-order factors. Our second contribution is a one-pass algorithm that remains accurate when four-cycles are not highly concentrated on individual nodes, edges, or wedges; this structural property is common in sparse social and collaboration networks. We evaluate both algorithms on a variety of real-world graph streams. The two-pass algorithm consistently outperforms state-of-the-art methods, using substantially less space to achieve a desired accuracy. The one-pass algorithm is competitive when four cycles are evenly distributed, matching our theoretical analysis. Unlike several recent works, our algorithms perform well even on non-bipartite graphs such as social networks.","ins":["University of Science and Technology"]},{"i":"conf/kdd/LuoLJZH26","t":"ESTIM: Efficient and Scalable Tensorial Incomplete Multi-view Semi-supervised Classification","au":[["Tingjin Luo",[0,1]],["Xiangyao Li",[0,1]],["Zhangqi Jiang",[0,1]],["Shuanghui Zhang",[2,1]],["Dewen Hu",3]],"u":"https://doi.org/10.1145/3770854.3780185","dblp":"https://dblp.org/rec/conf/kdd/LuoLJZH26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780185","c":"jul","a":"Due to hardware limitations, the dual missing problem with absent views and scarce labels often occurs in multi-view semi-supervised learning (MvSSL), challenging their real-world applications. To solve it, traditional tensor-based methods introduced a third-order tensor to recover the local structures of missing data and existing MvSSL methods have adopted label propagation to enhance the label information of unlabeled data. However, the computational complexity of these methods is cubically dependent on the scale of instances, which severely hampers the scalability to largescale data. To address these issues, we propose an Efficient and Scalable Tensorial Incomplete Multi-view semi-supervised classification named ESTIM. Specifically, we first replace sample-level graphs with compact bipartite graphs, and then design tensorial graph imputation to explore high-order cross-view information and recover the missing values. Besides, a consensus bipartite graph fusion scheme is designed to align bipartite graphs across views and learn a robust consensus graph against the distorted local structure in label propagation. Moreover, to solve the formulated objective, we derive an efficient optimization algorithm with theoretically proved convergence, whose time complexity is sublinear to the sample sizes. Finally, experimental results across diverse datasets demonstrate the superiority of our ESTIM.","ins":["College of Science, National","University of Defense Technology","School of Electronic Science, National","College of Intelligence Science and Technology, National University of Defense Technology"]},{"i":"conf/kdd/LuoTSLZW26","t":"CLASS: Deep Partial Label Feature Selection with Cluster-Guided Disambiguation and Structured Sparsity","au":[["Tingjin Luo",[0,1]],["Mengyuan Tong",[0,1]],["Qingyang Shu",[2,3]],["Yueying Liu",[0,1]],["Hao Zhou",4],["Zhen Wang",[5,6]]],"u":"https://doi.org/10.1145/3770854.3780163","dblp":"https://dblp.org/rec/conf/kdd/LuoTSLZW26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780163","c":"jul","a":"Partial label learning efficiently extracts accurate labels from weak supervision, where each instance has multiple candidate labels but only one is correct. Existing partial label learning methods typically employ a two-stage process and fall into a suboptimal solution in high-dimensional settings, lacking an effective feedback mechanism between feature selection and label disambiguation. Nevertheless, existing methods suffer from at least one of two issues, i.e., redundant features and the uncertainty of label disambiguation. To address these problems, we propose a unified and deep partial label feature selection method with CLuster-guided disAmbiguation and Structured Sparsity (CLASS), which simultaneously preserve discriminative features and promotes candidate label disambiguation by bidirectional optimization. Specifically, we integrate nonlinear deep networks to capture high-order semantic relations and feature interactions, while employing a linear sparse gating mechanism to preserve the label-specific, discriminative and interpretable features. Moreover, a cluster-guided disambiguation module is designed to enforce inter-class global separation and intra-class local cohesion via distance constraint and confidence penalty and dynamically align predicted labels with the semantics of class prototypes. Extensive experimental results validate the superiority and effectiveness of our proposed CLASS over state-of-the-art methods.","ins":["College of Science, National","University of Defense Technology","Statistics and Data Science, Southwest","University of Finance and Economics","College of Intelligence Science and Technology, Naval University of Engineering","School of Cybersecurity, Northwestern Polytechnical","University"]},{"i":"conf/kdd/LuoGHS26","t":"Learning Guarantee of Reward Modeling Using Deep Neural Networks","au":[["Yuanhang Luo",0],["Yeheng Ge",0],["Ruijian Han",0],["Guohao Shen",0]],"u":"https://doi.org/10.1145/3770854.3780316","dblp":"https://dblp.org/rec/conf/kdd/LuoGHS26.html","g":["Optimization/Theory","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780316","c":"jul","a":"In this work, we study the learning theory of reward modeling with pairwise comparison data using deep neural networks. We establish a novel non-asymptotic regret bound for deep reward estimators in a non-parametric setting, which depends explicitly on the network architecture. Furthermore, to underscore the critical importance of clear human beliefs, we introduce a margin-type condition that assumes the conditional winning probability of the optimal action in pairwise comparisons is significantly distanced from 1/2. This condition enables a sharper regret bound, which substantiates the empirical efficiency of Reinforcement Learning from Human Feedback and highlights clear human beliefs in its success. Notably, this improvement stems from high-quality pairwise comparison data implied by the margin-type condition, is independent of the specific estimators used, and thus applies to various learning algorithms and models.","ins":["The Hong Kong Polytechnic University"]},{"i":"conf/kdd/LvGTSZY26","t":"Awaken the Giant: Activating LLMs via Deep Model Guidance for Boundary-aware Medication Recommendation","au":[["Hang Lv",[0,1,2]],["Zixuan Guo",[0,3,4]],["Yanchao Tan",[0,1,2]],["Wanzi Shao",[0,1,2]],["Hengyu Zhang",[5,6]],["Carl Yang",[7,8]]],"u":"https://doi.org/10.1145/3770854.3780297","dblp":"https://dblp.org/rec/conf/kdd/LvGTSZY26.html","g":["LLM","Recommendation","Healthcare/Bio"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780297","c":"jul","a":"Accurate and safe medication recommendations from Electronic Health Records (EHRs) are essential for clinical decision support. While Large Language Models (LLMs) have shown strong semantic reasoning capabilities in healthcare, they tend to make coarse binary predictions, overlooking medications near the decision boundary and leading to overprescription. In contrast, deep models offer fine-grained probability outputs but lack contextual reasoning needed for complex boundary cases. To address this, we propose a boundary-aware medication recommendation framework (GiantMed) that activates the potential of LLM “giant” under deep model guidance. Specifically, GiantMed leverages a deep model to identify boundary medications and directs the LLM to focus on these clinically ambiguous yet informative cases. Furthermore, we augment contextual knowledge of boundary medications by retrieving relevant historical EHRs and integrating Drug-Drug Interaction (DDI) constraints. The final recommendation is generated by incorporating the LLM-refined boundary medications with confident predictions from the deep model. Extensive experiments on two real-world EHR datasets demonstrate that GiantMed1 achieves state-of-the-art accuracy while reducing DDI rates.","ins":["Fuzhou University","College of Computer and Data","Science, Fuzhou, China","Maynooth International Engineering","College, Fuzhou, China","Macquarie University","School of Computing","Emory University","Department of Computer Science"]},{"i":"conf/kdd/LvLGMNGLW26","t":"RIPCN: A Road Impedance Principal Component Network for Probabilistic Traffic Flow Forecasting","au":[["Haochen Lv",[0,1]],["Yan Lin",[2,3]],["Shengnan Guo",[0,1,4,5]],["Xiaowei Mao",[0,1]],["Hong Nie",[0,1]],["Letian Gong",[0,1]],["Youfang Lin",[0,1,6]],["Huaiyu Wan",[0,1,6]],["Mining and Embodied Intelligence",null]],"u":"https://doi.org/10.1145/3770854.3780183","dblp":"https://dblp.org/rec/conf/kdd/LvLGMNGLW26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780183","c":"jul","a":"Accurate traffic flow forecasting is crucial for intelligent transportation services such as navigation and ride-hailing. In such applications, uncertainty estimation in forecasting is important because it helps evaluate traffic risk levels, assess forecast reliability, and provide timely warnings. As a result, probabilistic traffic flow forecasting (PTFF) has gained significant attention, as it produces both point forecasts and uncertainty estimates. However, existing PTFF approaches still face two key challenges: (1) how to uncover and model the causes of traffic flow uncertainty for reliable forecasting, and (2) how to capture the spatiotemporal correlations of uncertainty for accurate prediction. To address these challenges, we propose RIPCN, a Road Impedance Principal Component Network that integrates domain-specific transportation theory with spatiotemporal principal component learning for PTFF. RIPCN introduces a dynamic impedance evolution network that captures directional traffic transfer patterns driven by road congestion level and flow variability, revealing the direct ∗Equal contribution. †Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780183 causes of uncertainty and enhancing both reliability and interpretability. In addition, a principal component network is designed to forecast the dominant eigenvectors of future flow covariance, enabling the model to capture spatiotemporal uncertainty correlations. This design allows for accurate and efficient uncertainty estimation while also improving point prediction performance. Experimental results on real-world datasets show that our approach outperforms existing probabilistic forecasting methods.","ins":["School of Computer Science and Technology","Beijing Jiaotong University","Department of Computer Science","Aalborg University","Key Laboratory of Big Data &","Artificial Intelligence in Transportation, Ministry of Education","Beijing Key Laboratory of Traffic Data"]},{"i":"conf/kdd/LyuZL26","t":"Physics-Informed Teleconnection-Aware Transformer for Global Subseasonal-to-Seasonal Forecasting","au":[["Tengfei Lyu",0],["Artificial Intelligence Thrust",0],["Weijia Zhang",[0,1]],["Artificial Intelligence Thrust",[0,1]],["Hao Liu",0],["Artificial Intelligence Thrust",0]],"u":"https://doi.org/10.1145/3770854.3780198","dblp":"https://dblp.org/rec/conf/kdd/LyuZL26.html","g":["Time Series","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780198","c":"jul","a":"Subseasonal-to-seasonal (S2S) forecasting, which predicts climate conditions from several weeks to months in advance, represents a critical frontier for agricultural planning, energy management, and disaster preparedness. However, it remains one of the most challenging problems in atmospheric science, due to the chaotic dynamics of atmospheric systems and complex interactions across multiple scales. Current approaches often fail to explicitly model underlying physical processes and teleconnections that are crucial at S2S timescales. We introduce TelePiT, a novel deep learning architecture that enhances global S2S forecasting through integrated multiscale physics and teleconnection awareness. Our approach consists of three key components: (1) Spherical Harmonic Embedding, which accurately encodes global atmospheric variables onto spherical geometry; (2) Multi-Scale Physics-Informed Neural ODE, which explicitly captures atmospheric physical processes across multiple learnable frequency bands; (3) Teleconnection-Aware Transformer, which models critical global climate interactions through explicitly modeling teleconnection patterns into the self-attention. Extensive experiments demonstrate that TelePiT significantly outperforms state-of-the-art data-driven baselines and operational numerical weather prediction systems across all forecast horizons, marking a significant advance toward reliable S2S forecasting.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","gz.edu.cn"]},{"i":"conf/kdd/MiWHGWLS26","t":"Spatiotemporal Graph Learning with Direct Volumetric Information Passing and Feature Enhancement","au":[["Yuan Mi",0],["Qi Wang",0],["Xueqin Hu",1],["Yike Guo",2],["Ji-Rong Wen",0],["Yang Liu",3],["Hao Sun",0]],"u":"https://doi.org/10.1145/3770854.3780155","dblp":"https://dblp.org/rec/conf/kdd/MiWHGWLS26.html","g":["Spatiotemporal/Urban","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780155","c":"jul","a":"Data-driven learning of physical systems has attracted significant attention, where many neural models have been developed. In particular, mesh-based graph neural networks (GNNs) have demonstrated considerable potential in modeling spatiotemporal dynamics across arbitrary geometric domains. However, the existing nodeedge message-passing and aggregation mechanism in GNNs limits the representation learning capability. In this paper, we propose a dual-module framework, Cell-embedded and Feature-enhanced Graph Neural Network (CeFeGNN), for learning spatiotemporal dynamics. Specifically, we embed learnable cell attributions to the common node-edge message passing process, thereby better capturing the spatial dependency of regional features. Such a strategy essentially upgrades the local aggregation scheme from first order (e.g., from edge to node) to a higher order (e.g., from volume and edge to node), which takes advantage of volumetric information in message passing. Meanwhile, a novel feature-enhanced block is designed to further improve the model’s performance and alleviate the over-smoothing problem. Extensive experiments on various PDE systems and a real-world dataset demonstrate that CeFeGNN achieves superior performance compared with other baselines.","ins":["Renmin University of China","Wuhan University of Technology","Hong Kong University of Science and Technology","University of Chinese Academy of Sciences"]},{"i":"conf/kdd/MungariBMP26","t":"ARES: Anomaly Recognition Model For Edge Streams","au":[["Simone Mungari",[0,1]],["Revelis s.r.l.",[2,3]],["Albert Bifet",[2,3]],["Giuseppe Manco",1],["Bernhard Pfahringer",4]],"u":"https://doi.org/10.1145/3770854.3780242","dblp":"https://dblp.org/rec/conf/kdd/MungariBMP26.html","g":["Anomaly/Outlier","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780242","c":"jul","a":"Many real-world scenarios involving streaming information can be represented as temporal graphs, where data flows through dynamic changes in edges over time. Anomaly detection in this context has the objective of identifying unusual temporal connections within the graph structure. Detecting edge anomalies in real time is crucial for mitigating potential risks. Unlike traditional anomaly detection, this task is particularly challenging due to concept drifts, large data volumes, and the need for real-time response. To face these challenges, we introduce ARES, an unsupervised anomaly detection framework for edge streams. ARES combines Graph Neural Networks (GNNs) for feature extraction with Half-Space Trees (HST) for anomaly scoring. GNNs capture both spike and burst anomalous behaviors within streams by embedding node and edge properties in a latent space, while HST partitions this space to isolate anomalies efficiently. ARES operates in an unsupervised way without the need for prior data labeling. To further validate its detection capabilities, we additionally incorporate a simple yet effective supervised thresholding mechanism. This approach leverages statistical dispersion among anomaly scores to determine the optimal threshold using a minimal set of labeled data, ensuring adaptability across different domains. We validate ARES through extensive evaluations across several real-world cyber-attack scenarios, comparing its performance against existing methods while analyzing its space and time complexity. The code used to perform the experiments is publicly available at https: //github.com/AnomalyRecognitionModelForEdgeStreams/ARES.","ins":["University of Calabria","ICAR-CNR","Artificial Intelligence Institute, University of Waikato","LTCI, Télécom Paris, Institut Polytechnique de Paris","Artificial Intelligence Institute, University of Waikato, NZ"]},{"i":"conf/kdd/NakamuraKMS26","t":"Fast Mining and Dynamic Time-to-Event Prediction over Multi-sensor Data Streams","au":[["Kota Nakamura",0],["Koki Kawabata",1],["Yasuko Matsubara",1],["Yasushi Sakurai",1]],"u":"https://doi.org/10.1145/3770854.3780164","dblp":"https://dblp.org/rec/conf/kdd/NakamuraKMS26.html","g":["Time Series"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780164","c":"jul","a":"Given real-time sensor data streams obtained from machines, how can we continuously predict when a machine failure will occur? This work aims to continuously forecast the timing of future events by analyzing multi-sensor data streams. A key characteristic of realworld data streams is their dynamic nature, where the underlying patterns evolve over time. To address this, we present TimeCast, a dynamic prediction framework designed to adapt to these changes and provide accurate, real-time predictions of future event time. Our proposed method has the following properties: (a) Dynamic: it identifies the distinct time-evolving patterns (i.e., stages) and learns individual models for each, enabling us to make adaptive predictions based on pattern shifts. (b) Practical: it finds meaningful stages that capture time-varying interdependencies between multiple sensors and improve prediction performance; (c) Scalable: our algorithm scales linearly with the input size and enables online model updates on data streams. Extensive experiments on real datasets demonstrate that TimeCast provides higher prediction accuracy than state-of-the-art methods while finding dynamic changes in data streams with a great reduction in computational time.","ins":["InfoTech, Toyota Motor Corporation","SANKEN, Osaka University"]},{"i":"conf/kdd/NiZL26","t":"UniExtreme: A Universal Foundation Model for Extreme Weather Forecasting","au":[["Hang Ni",0],["Weijia Zhang",[0,1]],["Hao Liu",0]],"u":"https://doi.org/10.1145/3770854.3780172","dblp":"https://dblp.org/rec/conf/kdd/NiZL26.html","g":["Time Series","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780172","c":"jul","a":"Recent advancements in deep learning have led to the development of Foundation Models (FMs) for weather forecasting, yet their ability to predict extreme weather events remains limited. Existing approaches either focus on general weather conditions or specialize in specific-type extremes, neglecting the real-world atmospheric patterns of diversified extreme events. In this work, we identify two key characteristics of extreme events: (1) the spectral disparity against normal weather regimes, and (2) the hierarchical drivers and geographic blending of diverse extremes. Along this line, we propose UniExtreme, a universal extreme weather forecasting foundation model that integrates (1) an Adaptive Frequency Modulation (AFM) module that captures region-wise spectral differences between normal and extreme weather, through learnable Beta-distribution filters and multi-granularity spectral aggregation, and (2) an Event Prior Augmentation (EPA) module which incorporates region-specific extreme event priors to resolve hierarchical extreme diversity and composite extreme schema, via a dual-level memory fusion network. Extensive experiments demonstrate that UniExtreme outperforms state-of-the-art baselines in both extreme and general weather forecasting, showcasing superior adaptability across diverse extreme scenarios.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","gz.edu.cn"]},{"i":"conf/kdd/NiLWJJ26","t":"TimeDistill: Efficient Long-Term Time Series Forecasting with MLP via Cross-Architecture Distillation","au":[["Juntong Ni",0],["Zewen Liu",0],["Shiyu Wang",1],["Independent Researcher",1],["Ming Jin",1],["Wei Jin",0]],"u":"https://doi.org/10.1145/3770854.3780218","dblp":"https://dblp.org/rec/conf/kdd/NiLWJJ26.html","g":["Time Series","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780218","c":"jul","a":"Transformer-based and CNN-based methods demonstrate strong performance in long-term time series forecasting. However, their high computational and storage requirements can hinder large-scale deployment. To address this limitation, we propose integrating lightweight MLP with advanced architectures using knowledge distillation (KD). Our preliminary study reveals different models can capture complementary patterns, particularly multi-scale and multiperiod patterns in the temporal and frequency domains. Based on this observation, we introduce TimeDistill, a cross-architecture KD framework that transfers these patterns from teacher models (e.g., Transformers, CNNs) to MLP. Additionally, we provide a theoretical analysis, demonstrating that our KD approach can be interpreted as a specialized form of mixup data augmentation. TimeDistill improves MLP performance by up to 18.6%, surpassing teacher models on eight datasets. It also achieves up to 7× faster inference and requires 130× fewer parameters. Furthermore, we conduct extensive evaluations to highlight the versatility and effectiveness of TimeDistill. The code is available at Github Code Repo.","ins":["Emory University","Griffith University"]},{"i":"conf/kdd/ParkKW26","t":"Fair Class-Incremental Learning using Sample Weighting","au":[["Jaeyoung Park",0],["Minsu Kim",0],["Steven Euijong Whang",0]],"u":"https://doi.org/10.1145/3770854.3780167","dblp":"https://dblp.org/rec/conf/kdd/ParkKW26.html","g":["Continual/Incremental","Fairness/Bias"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780167","c":"jul","a":"Model fairness is becoming important in class-incremental learning for Trustworthy AI. While accuracy has been a central focus in class-incremental learning, fairness has been relatively understudied. However, naïvely using all the samples of the current task for training results in unfair catastrophic forgetting for certain sensitive groups including classes. We theoretically analyze that forgetting occurs if the average gradient vector of the current task data is in an “opposite direction” compared to the average gradient vector of a sensitive group, which means their inner products are negative. We then propose a fair class-incremental learning framework that adjusts the training weights of current task samples to change the direction of the average gradient vector and thus reduce the forgetting of underperforming groups and achieve fairness. For various group fairness measures, we formulate optimization problems to minimize the overall losses of sensitive groups while minimizing the disparities among them. We also show the problems can be solved with linear programming and propose an efficient Fairnessaware Sample Weighting (FSW) algorithm. Experiments show that FSW achieves better accuracy-fairness tradeoff results than stateof-the-art approaches on real datasets. The source code is released at https://github.com/jyparkkr/FSW.","ins":["Korea Advanced Institute of Science and Technology"]},{"i":"conf/kdd/ParkLJCL26","t":"TimeBridge: Better Diffusion Prior Design with Bridge Models for Time Series Generation","au":[["Jinseong Park",0],["Seungyun Lee",1],["Woojin Jeong",1],["Yujin Choi",1],["Jaewook Lee",1]],"u":"https://doi.org/10.1145/3770854.3780195","dblp":"https://dblp.org/rec/conf/kdd/ParkLJCL26.html","g":["Time Series","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780195","c":"jul","a":"Time series generation is widely used in real-world applications such as simulation, data augmentation, and hypothesis testing. Recently, diffusion models have emerged as the de facto approach to time series generation, enabling diverse synthesis scenarios. However, the fixed standard-Gaussian diffusion prior may be ill-suited for time series data, which exhibit properties such as temporal order and fixed time points. In this paper, we propose TimeBridge, a framework that flexibly synthesizes time series data by using diffusion bridges to learn paths between a chosen prior and the data distribution. We then explore several prior designs tailored to time series synthesis. Our framework covers (i) data- and time-dependent priors for unconditional generation and (ii) scale-preserving priors for conditional generation. Experiments show that our framework with data-driven priors outperforms standard diffusion models on time series generation.","ins":["Korea Institute for Advanced Study","Seoul National University"]},{"i":"conf/kdd/ParkLK26","t":"Fast and Accurate Online Coupled Matrix-Tensor Factorization via Frequency Regularization","au":[["Yong-chan Park",0],["SeungJoo Lee",0],["U Kang",0]],"u":"https://doi.org/10.1145/3770854.3780203","dblp":"https://dblp.org/rec/conf/kdd/ParkLK26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780203","c":"jul","a":"How can we efficiently and accurately factorize multi-source data in dynamic and real-time environments? Coupled matrix-tensor factorization (CMTF) is a powerful tool for such tasks, but existing methods often struggle with scalability, particularly when dealing with continuously streaming data. Traditional CMTF approaches, while effective at capturing complex relationships, suffer from computational inefficiencies and the need for retraining as new data arrive. Moreover, many techniques fail to properly incorporate the inherent temporal characteristics of the data, which could significantly enhance both accuracy and convergence speed. In this paper, we propose FOCAL (Frequency-regularized Online Coupled Approximation for Low-rank factorization), an efficient CP decomposition method designed to enhance online coupled matrixtensor factorization. By effectively distinguishing between old and new data, FOCAL optimizes computationa
