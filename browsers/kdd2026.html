ods, highlighting the advantage of autoregressive contextual modeling for precise control of molecular attributes. Our code is available at https://github.com/KyGao/Mol-StrucTok.","ins":["Huazhong University of Science and Technology","Xi’an Jiaotong University","University of Science and Technology","Zhongguancun Academy","Laboratory","Renmin University of China","Cornell University","Shanghai Innovation institute"]},{"i":"conf/kdd/GiorgiVST26","t":"Countering Overfitting with Counterfactual Examples","au":[["Flavio Giorgi",0],["Fabiano Veglianti",0],["Fabrizio Silvestri",1],["Gabriele Tolomei",1]],"u":"https://doi.org/10.1145/3770854.3780243","dblp":"https://dblp.org/rec/conf/kdd/GiorgiVST26.html","g":["Causal","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780243","c":"jul","a":"Overfitting is a well-known issue in machine learning that occurs when a model struggles to generalize its predictions to new, unseen data beyond the scope of its training set. Traditional techniques to mitigate overfitting include early stopping, data augmentation, and regularization. In this work, we demonstrate that the degree of overfitting of a trained model is correlated with the ability to generate counterfactual examples. The higher the overfitting, the easier it will be to find a valid counterfactual example for a randomly chosen input data point. Therefore, we introduce CF-Reg, a novel regularization term in the training loss that controls overfitting by ensuring enough margin between each instance and its corresponding counterfactual. Experiments conducted across multiple datasets and models show that our counterfactual regularizer generally outperforms existing regularization techniques.","ins":["Sapienza University of Rome","Sapienza University of Rome, Rome & ISTI-CNR, Pisa"]},{"i":"conf/kdd/GongHNYJ26","t":"Scalable Graph Condensation with Evolving Capabilities","au":[["Shengbo Gong",0],["Mohammad Hashemi",0],["Juntong Ni",0],["Carl Yang",0],["Wei Jin",0]],"u":"https://doi.org/10.1145/3770854.3780217","dblp":"https://dblp.org/rec/conf/kdd/GongHNYJ26.html","g":["Graph/GNN","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780217","c":"jul","a":"The rapid growth of graph data creates significant scalability challenges as most graph algorithms scale quadratically with size. To mitigate these issues, Graph Condensation (GC) methods have been proposed to learn a small graph from a larger one, accelerating downstream tasks. However, existing approaches critically assume a static training set, which conflicts with the inherently dynamic and evolving nature of real-world graph data. This work introduces a novel framework for continual graph condensation, enabling efficient updates to the distilled graph that handle data streams without requiring costly retraining. This limitation leads to inefficiencies when condensing growing training sets. In this paper, we introduce GECC (Graph Evolving Clustering Condensation), a scalable graph condensation method designed to handle large-scale and evolving graph data. GECC employs a traceable and efficient approach by performing class-wise clustering on aggregated features. Furthermore, it can inherit previous condensation results as clustering centroids when the condensed graph expands, thereby attaining an evolving capability. This methodology is supported by robust theoretical foundations and demonstrates superior empirical performance. Comprehensive experiments including real world scenario show that GECC achieves better performance than most state-of-the-art graph condensation methods while delivering an around 1000× speedup on large datasets.","ins":["Emory University"]},{"i":"conf/kdd/GuHZ26","t":"Malicious Domain Detection on Out-of-Distribution Gray Data through Graph Contrastive Learning with Structure Aggregation","au":[["Hongjie Gu",[0,1]],["Daojing He",[1,0]],["Xun Zhou",[1,2]]],"u":"https://doi.org/10.1145/3770854.3780237","dblp":"https://dblp.org/rec/conf/kdd/GuHZ26.html","g":["Anomaly/Outlier","Graph/GNN","Self-Supervised/Contrastive"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780237","c":"jul","a":"Graph-based threat detection methods model Indicators of Compromise (IoC) using heterogeneous graphs and train node classifiers to identify malicious domains. Despite their promising performance, these approaches still face two major challenges. Firstly, the high cost of node annotation leads to a lack of evaluation on extensive gray data (unlabeled data). Secondly, the previous observations reveal a significant distribution shift in the Domain Maliciousness Graph (DMG), where structural differences between labeled and unlabeled domains hinder model performance. Existing graph learning methods have not yet considered both of these challenges simultaneously. To fill the gap, we frame the problem as semi-supervised graph node classification under out-of-distribution (OOD) constraints. We introduce graph aggregative contrastive learning (GRAVEL), which leverages the inherent structure of DMG to enhance detection performance on OOD unlabeled domains. GRAVEL is pre-trained end-to-end on abundant in-distribution malicious and benign samples, then fine-tuned with scarce OOD malicious data via mixup. During pre-training, label propagation seeds pseudo-labels, and a label-guided aggregation classifier is used to warm up the model, after which multi-view contrastive learning sharpens features for unlabeled domains. Extensive industrial evaluations demonstrate that GRAVEL improves F1 by 5–20% across diverse benchmarks for OOD malicious domain detection, consistently outperforming state-of-the-art baselines.","ins":["East China Normal University","Harbin Institute of Technology, Shenzhen","Shenzhen Loop Area Institute"]},{"i":"conf/kdd/GuanDKXZ26","t":"SIGHP: Scalable Information-Guided Hypergraph Partitioner","au":[["Huhao Guan",[0,1]],["Zezhong Ding",2],["Ao Ke",[0,1]],["Xike Xie",[0,1]],["Kevin S. Zhou",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780266","dblp":"https://dblp.org/rec/conf/kdd/GuanDKXZ26.html","g":["Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780266","c":"jul","a":"Large-scale hypergraph analysis is crucial for modeling complex higher-order relationships in modern data-intensive applications, yet existing distributed computing solutions face significant scalability challenges. While previous approaches attempt to adapt traditional graph partitioning methods for hypergraphs, they fail to effectively handle the unique characteristics of hyperedge size distributions. This work introduces SIGHP (Scalable InformationGuided Hypergraph Partitioner), a novel approach that leverages the discovered correlation between partitioning quality and intrapartition vertex co-occurrence information. By extending Shannon’s information theory to hypergraph structures, SIGHP provides a theoretical framework that unifies information-theoretic and hypergraph-theoretic perspectives for high-quality partitioning. Our comprehensive evaluation on real-world hypergraphs demonstrates SIGHP’s superior performance, achieving up to 40% reduction in communication costs, 60% lower memory overhead, and 10× faster partitioning speed compared to state-of-the-art methods. These improvements directly enhance the efficiency of downstream distributed hypergraph computing tasks, making SIGHP particularly valuable for large-scale hypergraph data analytics applications.","ins":["Suzhou Institute for Advanced","Research, University of Science and Technology of China","School of Artificial Intelligence and Data Science, Suzhou Institute for Advanced Research, University of Science and Technology of China"]},{"i":"conf/kdd/GuiYYZZC26","t":"PilotANN: Memory-Bounded GPU Acceleration for Vector Search","au":[["Yuntao Gui",0],["Peiqi Yin",0],["Xiao Yan",[1,2]],["Chaorui Zhang",3],["Weixi Zhang",3],["James Cheng",0]],"u":"https://doi.org/10.1145/3770854.3780192","dblp":"https://dblp.org/rec/conf/kdd/GuiYYZZC26.html","g":["Search/IR","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780192","c":"jul","a":"Approximate Nearest Neighbor Search (ANNS) has become fundamental to modern deep learning applications, having gained particular prominence through its integration into recent generative models that work with increasingly complex datasets and higher vector dimensions. Existing CPU-only solutions, even the most efficient graph-based ones, struggle to meet these growing computational demands, while GPU-only solutions face memory constraints. As a solution, we propose PilotANN, a hybrid CPU-GPU system for graph-based ANNS that utilizes both CPU’s abundant RAM and GPU’s parallel processing capabilities. Our key innovation lies in decomposing the top-𝑘search process into three complementary stages of increasing precision and decreasing computational cost: (i) GPU-accelerated subgraph traversal using SVD-reduced vectors; (ii) CPU refinement; and (iii) precise search using complete vectors. Furthermore, we introduce fast entry selection to improve search starting points while maximizing GPU utilization. Experimental results demonstrate that PilotANN achieves 3.9 −5.4× speedup in throughput on 100-million scale datasets, and is able to handle datasets up to 12× larger than the GPU memory.","ins":["The Chinese University of Hong Kong","Centre for Perceptual and Interactive","Intelligence","Theory Lab, 2012 Labs of Huawei"]},{"i":"conf/kdd/GuoHLWZ26","t":"Leveraging the Spatial Hierarchy: Coarse-to-fine Trajectory Generation via Cascaded Hybrid Diffusion","au":[["Baoshen Guo",0],["Zhiqing Hong",[1,2]],["Junyi Li",0],["Shenhao Wang",3],["Jinhua Zhao",4]],"u":"https://doi.org/10.1145/3770854.3780191","dblp":"https://dblp.org/rec/conf/kdd/GuoHLWZ26.html","g":["Spatiotemporal/Urban","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780191","c":"jul","a":"Urban mobility data has significant connections with economic growth and plays an essential role in various smart-city applications. Due to privacy concerns and substantial data collection costs, fine-grained human mobility trajectories are challenging to make publicly available on a large scale. A promising solution to address this issue is trajectory synthesizing, which generates synthetic trajectories that preserve aggregate spatiotemporal distributions. However, existing works often neglect the road network structural constraints or rely on instance-level external supervision, thus limiting their scalability in generating fine-grained and high-fidelity trajectories. In this paper, we propose Cardiff, a coarse-to-fine Cascaded hybrid diff usion-based framework for fine-grained and structure-plausible trajectory generation. By leveraging the hierarchical nature of urban mobility, Cardiff decomposes the generation process into two cascaded levels, i.e., discrete road segment-level and continuous fine-grained GPS-level: (i) At the segment level, to reduce computational costs and redundancy in raw trajectories, we first encode the discrete road segments into low-dimensional latent embeddings and design a diffusion transformer-based latent denoising network for segment-level synthesis. (ii) Taking the first stage of generation as conditions, we then design a fine-grained GPS-level conditional denoising network with a noise augmentation mechanism to achieve road-network-constrained and finegrained generation. The cascaded progressive generation yields high-fidelity fine-grained trajectories while adhering to road geometry and topology constraints. Experimental results on three large real-world trajectory datasets demonstrate that our method outperforms state-of-the-art baselines in various metrics. The code is available at https://github.com/urban-mobility-generation/Cardiff.","ins":["Singapore-MIT Alliance for Research and Technology","Hong Kong University of Science &","Technology (Guangzhou)","University of Florida","Massachusetts Institute of Technology"]},{"i":"conf/kdd/GuoWYY26","t":"Mining Intrinsic Rewards from LLM Hidden States for Efficient Best-of-N Sampling","au":[["Jizhou Guo",[0,1]],["Zhaomin Wu",[2,3]],["Hanchen Yang",4],["Philip S. Yu",5]],"u":"https://doi.org/10.1145/3770854.3780302","dblp":"https://dblp.org/rec/conf/kdd/GuoWYY26.html","g":["LLM","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780302","c":"jul","a":"Best-of-N sampling is a powerful method for improving Large Language Model (LLM) performance, but it is often limited by its dependence on massive, text-based reward models. These models are not only computationally expensive but also data-hungry, requiring extensive labeled datasets for training. This creates a significant data challenge, as they overlook a rich, readily available data source: the LLM’s own internal hidden states. To address this data and efficiency gap, we introduce SWIFT (Simple Weighted Intrinsic Feedback Technique), a novel and lightweight method that learns a reward function directly from the rich information embedded in LLM hidden states. Operating at the token embedding level, SWIFT employs simple linear layers to effectively distinguish between preferred and dispreferred generations, eliminating the need for computationally intensive text-based modeling. Extensive experiments on standard benchmarks show that SWIFT outperforms existing baselines (12.7% higher accuracy than EurusRM-7B on MATH dataset) while using less than 0.005% of their parameters. Its robust scalability, compatibility with certain closed-source models via logit access, and ability to combine with traditional reward models for additional performance highlight SWIFT’s practical value and contribution to more efficient data-driven LLM post-training. Our code is available at https://github.com/aster2024/SWIFT.","ins":["Zhiyuan College","Shanghai Jiao Tong University","Department of Computer Science","National University of Singapore","Tongji University","University of Illinois Chicago"]},{"i":"conf/kdd/GuoCZGZY26","t":"DSPIGCN: Dual-stream Physics-informed Graph Convolutional Network for Reliable Pedestrian Trajectory Prediction","au":[["Runkang Guo",[0,1]],["Bin Chen",[2,3,4]],["Zhengqiu Zhu",[0,1]],["Chen Gao",5],["Yong Zhao",[0,1]],["Quanjun Yin",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780329","dblp":"https://dblp.org/rec/conf/kdd/GuoCZGZY26.html","g":["Spatiotemporal/Urban","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780329","c":"jul","a":"Accurately forecasting pedestrian trajectories is critical for safe and efficient urban-mobility services, yet existing data-driven models often (i) ignore the kinematic laws that bound human motion and (ii) report performance merely on the single “best” trajectory sample. These limitations undermine both physical plausibility and real-world reliability. To address these challenges, we introduce DSPIGCN, a dual-stream physics-informed graph convolutional network that fuses domain physics with deep representation learning. Specifically, DSPIGCN employs a novel dual-stream spatiotemporal graph encoding architecture to jointly capture latent dependencies in displacement and velocity pathways, with a physics-informed neural network leveraged to connect displacement and velocity streams via explicit motion equations. To preserve predictive diversity without sacrificing distributional fidelity, we design a Gaussian mixture model-based anchor sampling strategy and propose mean ADE/FDE—an evaluation protocol that averages error across all generated trajectories rather than only the best one. Experiments on two public benchmarks (GC and UCY Datasets) show that DSPIGCN improves mean ADE/FDE by 9%/28%, over state-of-the-art baselines while matching them on the conventional min ADE/FDE metric. Qualitative analyses confirm that the model generates physically consistent paths, especially for pedestrians exhibiting steady motion patterns.","ins":["College of Systems Engineering, National University of Defense","Technology","The Institute of Intelligent","Computing, University of Electronic","Science and Technology","BNRist, Tsinghua University"]},{"i":"conf/kdd/HeLTSSY26","t":"Devil's Hand: Data Poisoning Attacks to Locally Private Graph Learning Protocols","au":[["Longzhu He",0],["Chaozhuo Li",0],["Peng Tang",1],["Li Sun",0],["Sen Su",[0,2]],["Philip S. Yu",3]],"u":"https://doi.org/10.1145/3770854.3780158","dblp":"https://dblp.org/rec/conf/kdd/HeLTSSY26.html","g":["Security/Attack","Graph/GNN","Privacy/DP"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780158","c":"jul","a":"Graph neural networks (GNNs) have achieved significant success in graph representation learning and have been applied to various domains. However, many real-world graphs contain sensitive personal information, such as user profiles in social networks, raising serious privacy concerns when graph learning is performed using GNNs. To address this issue, locally private graph learning protocols have gained considerable attention. These protocols leverage the privacy advantages of local differential privacy (LDP) and the effectiveness of GNN’s message-passing in calibrating noisy data, offering strict privacy guarantees for users’ local data while maintaining high utility (e.g., node classification accuracy) for graph learning. Despite these advantages, such protocols may be vulnerable to data poisoning attacks, a threat that has not been considered in previous research. Identifying and addressing these threats is crucial for ensuring the robustness and security of privacy-preserving graph learning frameworks. This work introduces the first data poisoning attack targeting locally private graph learning protocols. The attacker injects fake users into the protocol, manipulates these fake users to establish links with genuine users, and sends carefully crafted data to the server, ultimately compromising the utility of private graph learning. The effectiveness of the attack is demonstrated both theoretically and empirically. In addition, several defense strategies have also been explored, but their limited effectiveness highlights the need for more robust defenses.","ins":["Beijing University of Posts and Telecommunications","Shandong University","Chongqing University of Posts and Telecommunications","University of Illinois Chicago"]},{"i":"conf/kdd/HeWGHY26","t":"MFC: Mixed Federated Clustering based on Cross-modal Feature Decoupling","au":[["Xiaxia He",[0,1]],["Boyue Wang",[0,1]],["Junbin Gao",2],["Discipline of Business Analytics",[0,1]],["Yongli Hu",[0,1]],["Baocai Yin",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780327","dblp":"https://dblp.org/rec/conf/kdd/HeWGHY26.html","g":["Federated","Multimodal/VLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780327","c":"jul","a":"Existing federated clustering methods typically assume that either all clients supply the same type of single-modal/multi-modal data, or that different clients provide various modalities describing the same object. However, a prevalent real-world scenario involves clients contributing data from diverse and unrelated modalities. Addressing the challenge of uncovering clustering patterns from such heterogeneous modality data distributed across distinct clients is crucial. In this paper, we propose a novel cross-modal feature decoupling-based mixed federated clustering model. To address client heterogeneity, we introduce a cross-modal feature decoupling module for each client, designed to decouple modality-agnostic and modality-specific features through distinct encoders. Only the modality-agnostic encoder parameters and clustering centers of each client are transmitted to the server. This enables the server to aggregate various modality-agnostic encoders, effectively discovering the global clustering structure while avoiding interference from modality-specific noise. Moreover, we develop a global consistent complementary clustering module to integrate the complementary clustering centers from various clients. The global clustering centers are then dispatched back to clients to guide and calibrate their local clustering models. Experimental results on three public datasets show the superiority of the proposed model compared to classic federated clustering methods.","ins":["Beijing University of Technology","Beijing Key Laboratory of Multimedia and Intelligent Software Technology","The University of Sydney"]},{"i":"conf/kdd/HeFWLMJW26","t":"Graph Defense Diffusion Model","au":[["Xin He",0],["Wenqi Fan",[1,2]],["Yili Wang",0],["Chengyi Liu",[1,2]],["Rui Miao",0],["Xin Juan",0],["Xin Wang",0]],"u":"https://doi.org/10.1145/3770854.3780207","dblp":"https://dblp.org/rec/conf/kdd/HeFWLMJW26.html","g":["Graph/GNN","Diffusion/Generation","Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780207","c":"jul","a":"Graph Neural Networks (GNNs) are highly vulnerable to adversarial attacks, which can greatly degrade their performance. Existing graph purification methods attempt to address this issue by filtering attacked graphs. However, they struggle to defend effectively against multiple types of adversarial attacks (e.g., targeted attacks and non-targeted attacks) simultaneously due to limited flexibility. Additionally, these methods lack comprehensive modeling of graph data, relying heavily on heuristic prior knowledge. To overcome these challenges, we introduce the Graph Defense Diffusion Model (GDDM), a flexible purification method that leverages the denoising and modeling capabilities of diffusion models. The iterative nature of diffusion models aligns well with the stepwise process of adversarial attacks, making them particularly suitable for defense. By iteratively adding and removing noises (edges), GDDM effectively purifies attacked graphs, restoring their original structures and features. Our GDDM consists of two key components: (1) Graph Structure-Driven Refiner, which preserves the basic fidelity of the graph during the denoising process, and ensures that the generated graph remains consistent with the original scope; and (2) Node Feature-Constrained Regularizer, which removes residual impurities from the denoised graph, further enhancing the purification effect. By designing tailored denoising strategies to handle different types of adversarial attacks, we improve the GDDM’s adaptability to various attack scenarios. Furthermore, GDDM demonstrates strong scalability, leveraging its structural properties to seamlessly transfer across similar datasets without retraining. Extensive experiments on three real-world datasets demonstrate that GDDM ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780207 outperforms state-of-the-art methods in defending against various adversarial attacks, showcasing its robustness and effectiveness.","ins":["Jilin University","The Hong Kong Polytechnic","University"]},{"i":"conf/kdd/HeXLQXWHT26","t":"PowerGrow: Feasible Co-Growth of Structures and Dynamics for Power Grid Synthesis","au":[["Xinyu He",0],["Chenhan Xiao",1],["Haoran Li",2],["Ruizhong Qiu",0],["Zhe Xu",3],["Yang Weng",1],["Jingrui He",0],["Hanghang Tong",0]],"u":"https://doi.org/10.1145/3770854.3780235","dblp":"https://dblp.org/rec/conf/kdd/HeXLQXWHT26.html","g":["Graph/GNN","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780235","c":"jul","a":"Modern power systems are becoming increasingly dynamic, with changing topologies and time-varying loads driven by renewable energy variability, electric vehicle adoption, and active grid reconfiguration. Despite these changes, publicly available test cases remain scarce, due to security concerns and the significant effort required to anonymize real systems. Such limitations call for generative tools that can jointly synthesize grid structure and nodal dynamics. However, modeling the joint distribution of network topology, branch attributes, bus properties, and dynamic load profiles remains a major challenge, while preserving physical feasibility and avoiding prohibitive computational costs. We present PowerGrow, a co-generative framework that significantly reduces computational overhead while maintaining operational validity. The core idea is dependence decomposition: the complex joint distribution is factorized into a chain of conditional distributions over feasible grid topologies, time-series bus loads, and other system attributes, leveraging their mutual dependencies. By constraining the generation process at each stage, we implement a hierarchical graph beta-diffusion process for structural synthesis, paired with a temporal autoencoder that embeds time-series data into a compact latent space, improving both training stability and sample fidelity. Experiments across benchmark settings show that PowerGrow not only outperforms prior diffusion models in fidelity and diversity but also achieves a 98.9% power flow convergence rate and improved N-1 contingency resilience. This demonstrates its ability to generate operationally valid and realistic power grid scenarios. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780235","ins":["University of Illinois at Urbana-Champaign","Arizona State University","Massachusetts Institute of Technology","Meta"]},{"i":"conf/kdd/HeWXWK26","t":"Continuous-Time Counterfactual Quantile Learning for Risk-Sensitive Policy Optimization","au":[["Yi He",0],["Anpeng Wu",0],["Ruoxuan Xiong",1],["Yingrong Wang",0],["Kun Kuang",0]],"u":"https://doi.org/10.1145/3770854.3780271","dblp":"https://dblp.org/rec/conf/kdd/HeWXWK26.html","g":["Causal","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780271","c":"jul","a":"This paper studies the problem of Continuous-Time Counterfactual Quantile Learning (CT-CQL) for risk-sensitive policy optimization. In many real-world applications such as patient blood pressure monitoring, financial market analysis, and autonomous driving, data is high-frequency and continuously evolving. However, most existing causal inference methods focus on expectation-based or discrete-time counterfactual reasoning, which fail to capture finegrained temporal dynamics. As a result, policies optimized under these frameworks may overlook critical risks—e.g., a treatment policy with good average outcomes may still expose patients to lifethreatening episodes. To overcome these limitations, we propose CT-CQL, a framework built upon a novel identification theory and featuring three key components: (1) modeling full counterfactual outcome distributions via Stochastic Differential Equations (SDEs) governed by the Fokker–Planck Equation (FPE); (2) enhancing robustness through a minimax objective that minimizes FPE residuals under adversarial perturbations; and (3) mitigating confounding bias using a double-robust AIPW loss. CT-CQL enables robust policy optimization by identifying optimal intervention strategies that maximize expected utility while adhering to real-world budget and safety constraints. Experiments on widely-used benchmarks and the real-world MIMIC-III dataset demonstrate the validation and superiority of the proposed method. The project is available at: https://github.com/Eliza-YiHe/CT-CQL/.","ins":["Zhejiang University","Emory University"]},{"i":"conf/kdd/HongLZWZ26","t":"TAMEing Long Contexts in Personalization: Towards Training-Free and State-Aware MLLM Personalized Assistant","au":[["Rongpei Hong",0],["Jian Lang",0],["Ting Zhong",0],["Yong Wang",1],["Fan Zhou",[0,2,3]]],"u":"https://doi.org/10.1145/3770854.3780214","dblp":"https://dblp.org/rec/conf/kdd/HongLZWZ26.html","g":["LLM","Multimodal/VLM","Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780214","c":"jul","a":"Multimodal Large Language Model (MLLM) Personalization is a critical research problem that facilitates personalized dialogues with MLLMs targeting specific entities (known as personalized concepts). However, existing methods and benchmarks focus on the simple, context-agnostic visual identification and textual replacement of the personalized concept (e.g., “A yellow puppy” →“Your puppy Mochi”), overlooking the ability to support long-context conversations. An ideal personalized MLLM assistant is capable of engaging in long-context dialogues with humans and continually improving its experience quality by learning from past dialogue histories. To bridge this gap, we propose LCMP, the first Long-Context MLLM Personalization evaluation benchmark. LCMP assesses the capability of MLLMs in perceiving variations of personalized concepts and generating contextually appropriate personalized responses that reflect these variations. As a strong baseline for LCMP, we introduce a novel training-free and state-aware framework TAME. TAME endows MLLMs with double memories to manage the temporal and persistent variations of each personalized concept in a differentiated manner. In addition, TAME incorporates a new trainingfree Retrieve-then-Align Augmented Generation (RA2G) paradigm. RA2G introduces an alignment step to extract the contextually fitted information from the multi-memory retrieved knowledge to the current questions, enabling better interactions for complex real-world user queries. Experiments on LCMP demonstrate that TAME achieves the best performance, showcasing remarkable and evolving interaction experiences in long-context scenarios. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780214","ins":["University of Electronic Science and Technology of China","Aiwen Technology Co., Ltd.","Intelligent Digital Media Technology","Key Laboratory of Sichuan Province"]},{"i":"conf/kdd/HongBZHWW26","t":"PSQE: A Theoretical-Practical Approach to Pseudo Seed Quality Enhancement for Unsupervised Multimodal Entity Alignment","au":[["Yunpeng Hong",[0,1]],["Chenyang Bu",[0,1]],["Jie Zhang",[0,1]],["Yi He",2],["of William and Mary",[3,4]],["Di Wu",[3,4]],["Xindong Wu",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780249","dblp":"https://dblp.org/rec/conf/kdd/HongBZHWW26.html","g":["Knowledge Graph","Multimodal/VLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780249","c":"jul","a":"Multimodal Entity Alignment (MMEA) aims to identify equivalent entities across different data modalities, enabling structural data integration that in turn improves the performance of various large language model applications. To lift the requirement of labeled seed pairs that are difficult to obtain, recent methods shifted to an unsupervised paradigm using pseudo-alignment seeds. However, unsupervised entity alignment in multimodal settings remains underexplored, mainly because the incorporation of multimodal information often results in imbalanced coverage of pseudo-seeds within the knowledge graph. To overcome this, we propose PSQE (Pseudo-Seed Quality Enhancement) to improve the precision and graph coverage balance of pseudo seeds via multimodal information and clustering-resampling. Theoretical analysis reveals the impact of pseudo seeds on existing contrastive learning-based MMEA models. In particular, pseudo seeds can influence the attraction and the repulsion terms in contrastive learning at once, whereas imbalanced graph coverage causes models to prioritize high-density regions, thereby weakening their learning capability for entities in sparse regions. Experimental results validate our theoretical findings and show that PSQE as a plug-and-play module can improve the performance of baselines by considerable margins.","ins":["Key Laboratory of Knowledge","Engineering with Big Data (the Ministry of Education of China), Hefei University of Technology","Department of Data Science, College","College of Computer and Information Science, Southwest","University"]},{"i":"conf/kdd/HuLZLWL26","t":"How to Train Your Mamba for Time Series Forecasting","au":[["Jiaxi Hu",0],["Disen Lan",1],["Ziyu Zhou",2],["Gefeng Luo",2],["Qingsong Wen",[3,4]],["Yuxuan Liang",2]],"u":"https://doi.org/10.1145/3770854.3780279","dblp":"https://dblp.org/rec/conf/kdd/HuLZLWL26.html","g":["Time Series"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780279","c":"jul","a":"State Space Models (SSMs) have emerged as a powerful framework for sequence modeling in recent years. By approximating continuous dynamical systems and applying discretization techniques, SSMs are particularly well-suited for modeling time-series data. However, despite their growing popularity, most existing applications of SSMs in time-series forecasting treat the models as black boxes. Besides, the underlying mechanisms that contribute to their effectiveness remain unclear, and common claims regarding their advantages in efficiency and expressiveness are not fully substantiated. To address these gaps, this paper establishes a theoretical connection between SSMs and classical spectral transformations from signal processing, thereby providing a more interpretable foundation. Furthermore, we conduct comprehensive ablation studies to examine the properties of different SSM configurations. Our goal is to offer both theoretical insight and empirical guidance for future research on SSM-based approaches in time-series forecasting.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","Fudan University","University of Science and Technology","AI Research Institute, Squirrel Ai","Learning"]},{"i":"conf/kdd/HuA26","t":"Stein-type Estimator Assisted by Dynamics","au":[["Shanfeng Hu",[0,1]],["Nauman Aslam",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780166","dblp":"https://dblp.org/rec/conf/kdd/HuA26.html","g":["Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780166","c":"jul","a":"Estimating the equilibrium parameters of environmental systems is a fundamental task, yet it is often hampered by sparse and noisy sensor data. While the standard Maximum Likelihood Estimator (MLE) is intuitive, Stein’s paradox famously shows that it is statistically inefficient in high dimensions. To address this, we introduce STEADY, an estimator that generalises Stein’s paradox by integrating physical knowledge. We derive our estimator from a principled empirical Bayes model where the prior distribution over the equilibria is a direct consequence of the stationary properties of the system’s governing differential equations. This leads to a novel adaptive shrinkage mechanism, where the amount of shrinkage applied to each observation is naturally modulated by the physical stability of the measured system. We provide a rigorous frequentist analysis of our estimator, proving that STEADY not only dominates the MLE but is also minimax under certain conditions, offering the strongest possible guarantee of robustness. We validate our claims on synthetic data and demonstrate STEADY’s utility on the global Argo ocean float dataset, showing that it effectively filters noise to reveal the “North Atlantic Warming Hole”. The source code is available at https://github.com/shanfenghu/steady","ins":["School of Computer Science","Northumbria University"]},{"i":"conf/kdd/JangPKK26","t":"Accelerating Storage-based Training for Graph Neural Networks","au":[["Myung-Hwan Jang",0],["Jeong-Min Park",0],["Yunyong Ko",1],["Sang-Wook Kim",0]],"u":"https://doi.org/10.1145/3770854.3780309","dblp":"https://dblp.org/rec/conf/kdd/JangPKK26.html","g":["Graph/GNN","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780309","c":"jul","a":"Graph neural networks (GNNs) have achieved breakthroughs in various real-world downstream tasks due to their powerful expressiveness. As the scale of real-world graphs has been continuously growing, a storage-based approach to GNN training has been studied, which leverages external storage (e.g., NVMe SSDs) to handle such web-scale graphs on a single machine. Although such storagebased GNN training methods have shown promising potential in large-scale GNN training, we observed that they suﬀer from a severe bottleneck in data preparation since they overlook a critical challenge: how to handle a large number of small storage I/Os. To address the challenge, in this paper, we propose a novel storage-based GNN training framework, named AGNES, that employs a method of block-wise storage I/O processing to fully utilize the I/O bandwidth of high-performance storage devices. Moreover, to further enhance the eﬃciency of each storage I/O, AGNES employs a simple yet eﬀective strategy, hyperbatch-based processing based on the characteristics of real-world graphs. Comprehensive experiments on ﬁve real-world graphs reveal that AGNES consistently outperforms four state-of-the-art methods, up to 4.1× faster than the best competitor.","ins":["Hanyang University","Chung-Ang University"]},{"i":"conf/kdd/JiangWYXCZLZSD26","t":"Self-Enhanced Density Clustering for High Dimension and Low Sample Size Data","au":[["Bingbing Jiang",0],["Zhongli Wang",0],["Jie Yang",1],["Guang-Kui Xu",2],["Wei Chen",1],["Chenglong Zhang",3],["Xinyan Liang",4],["Peng Zhou",5],["Weiguo Sheng",0],["Weiping Ding",6]],"u":"https://doi.org/10.1145/3770854.3780293","dblp":"https://dblp.org/rec/conf/kdd/JiangWYXCZLZSD26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780293","c":"jul","a":"Clustering on high-dimensional and low sample size (HDLSS) data remains a critical, persistent challenge where extreme sparsity and noise confound cluster analysis. This creates a dilemma: spectral methods fail as distance metrics degrade, while deep clustering tends to over-fit scarce data. To break this dilemma, a Self-Enhanced Density Clustering (SEDC) framework that integrates the cluster structure discovery and embedding representation learning into an iterative enhancement process is proposed in this paper. Specifically, SEDC uses adaptive density-derived centroids to parameterize probabilistic soft labels, which in turn supervise a lightweight multilayer perceptron (MLP) to learn the low-dimensional embedding from data. The resulting embedding provides a refined metric space for further generating superior labels in the subsequent interaction process. This feedback forms a mutual reinforcement that progressively enhances the discrimination of embedding while rigorously mitigating over-fitting. Extensive experiments on 43 challenging HDLSS datasets demonstrate state-of-the-art performance, substantially outperforming popular clustering methods. This work delivers a principled and promising solution for robust data clustering in HDLSS situations. ∗Corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780293","ins":["Hangzhou Normal University","The University of Sydney","Xi’an Jiaotong University","Nanjing University","Shanxi University","Anhui University","Nantong University"]},{"i":"conf/kdd/JiangBMW26","t":"CAVIAR: Disentangling Root Causes with an ICA-based VAE for Large-Scale Microservice Systems","au":[["Xinrui Jiang",[0,1]],["Tingzhu Bi",[0,1]],["Meng Ma",[2,3]],["Ping Wang",[2,3]]],"u":"https://doi.org/10.1145/3770854.3780229","dblp":"https://dblp.org/rec/conf/kdd/JiangBMW26.html","g":["Anomaly/Outlier","Causal"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780229","c":"jul","a":"Microservice architectures in modern software engineering generate vast quantities of heterogeneous metrics, making fault diagnosis notoriously difficult. Conventional root cause analysis (RCA) methods often struggle with high-dimensional, diverse data where only a small subset of metrics may truly drive the observed failures. In this paper, we propose CAVIAR (Causality-based Analysis via VAE and ICA for Anomaly Root-cause), a two-phase framework for interpretable RCA in large-scale microservice systems. First, we train a variational autoencoder (VAE) enhanced with Independent Component Analysis (ICA) principles to learn a lowdimensional, disentangled representation of normal microservice operation. By enforcing independence among latent variables, we discover semantically coherent factors, such as specific service loads or network-level conditions. Second, when a fault occurs, we treat anomalies as external interventions on some latent factor and optimize an interventional matrix to identify the culprit dimension. This factor is then mapped back to the original metrics for actionable diagnostics. Empirical results on both industrial-scale and publicly available datasets show that CAVIAR outperforms baseline approaches in accurately localizing root causes—even at high dimensionalities where graph-based or homogeneous-metric methods fail. A detailed case study on a microservice platform demonstrates that our approach naturally uncovers the hidden propagation paths of failures, offering a clear explanation of how a single overloaded service can trigger system-wide latency breaches. We conclude that ICA-based VAEs provide a scalable, interpretable alternative for ∗Corresponding author. †Also with the School of Software and Microelectronics, Peking University and the Key Laboratory of High Confidence Software Technologies (PKU), Ministry of Education. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780229 fault diagnosis, bridging the gap between deep generative modeling and practical software engineering needs.","ins":["School of Software and Microelectronics, Peking","University","National Engineering Research Center for Software","Engineering, Peking University"]},{"i":"conf/kdd/KeZYRH26","t":"Adversarial Signed Graph Learning with Differential Privacy","au":[["Haobin Ke",[0,1]],["Sen Zhang",[0,1]],["Qingqing Ye",[0,1]],["Xun Ran",[0,1]],["Haibo Hu",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3780282","dblp":"https://dblp.org/rec/conf/kdd/KeZYRH26.html","g":["Graph/GNN","Privacy/DP","Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780282","c":"jul","a":"Signed graphs with positive and negative edges can model complex relationships in social networks. Leveraging on balance theory that deduces edge signs from multi-hop node pairs, signed graph learning can generate node embeddings that preserve both structural and sign information. However, training on sensitive signed graphs raises significant privacy concerns, as model parameters may leak private link information. Existing methods with differential privacy (DP) typically rely on edge or gradient perturbation for protecting unsigned graphs. Yet, they are not well-suited for signed graphs: edge perturbation may trigger cascading errors in edge sign inference under balance theory, while gradient perturbation necessitates substantial noise injection due to increased gradient sensitivity arising from node interdependence and gradient polarity change caused by sign flips. In this paper, motivated by the robustness of adversarial learning to noisy interactions, we present ASGL, a privacy-preserving adversarial signed graph learning method that preserves high utility while achieving node-level DP. We first decompose signed graphs into positive and negative subgraphs based on edge signs, and then design a gradient-perturbed adversarial module to approximate the true signed connectivity distribution. In particular, the gradient perturbation helps mitigate cascading errors, while the subgraph separation facilitates sensitivity reduction. Further, we devise a constrained breadth-first search tree strategy that fuses with balance theory to identify the edge signs between generated node pairs. This strategy also enables gradient decoupling, thereby effectively lowering gradient sensitivity. Extensive experiments on real-world datasets show that ASGL achieves favorable privacy-utility trade-offs across multiple downstream tasks. ∗Haibo Hu is the corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780282","ins":["The Hong Kong Polytechnic","University","Research Centre for Privacy and Security Technologies in Future","Smart Systems, PolyU"]},{"i":"conf/kdd/KhadkaSBLKK26","t":"ABLE: Using Adversarial Pairs to Construct Local Models for Explaining Model Predictions","au":[["Krishna Khadka",[0,1,2]],["Sunny Shree",[0,1,2]],["Pujan Budhathoki",[0,1,2]],["Yu Lei",[0,1,2]],["Raghu Kacker",[3,4]],["D. Richard Kuhn",[3,4]]],"u":"https://doi.org/10.1145/3770854.3780306","dblp":"https://dblp.org/rec/conf/kdd/KhadkaSBLKK26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780306","c":"jul","a":"Machine learning models are increasingly used in critical applications but are mostly \"black boxes\" due to their lack of transparency. Local explanation approaches, such as LIME, address this issue by approximating the behavior of complex models near a test instance using simple, interpretable models. However, these approaches often suffer from instability and poor local fidelity. In this paper, we propose a novel approach called Adversarially Bracketed Local Explanation (ABLE) to address these limitations. Our approach first generates a set of neighborhood points near the test instance, 𝑥test , by adding bounded Gaussian noise. For each neighborhood point 𝐷, we apply an adversarial attack to generate an adversarial point 𝐴with minimal perturbation that results in a different label than 𝐷. A second adversarial attack is then performed on 𝐴to generate a point 𝐴′ that has the same label as 𝐷(and thus different than A). The points 𝐴and 𝐴′ form an adversarial pair that brackets the local decision boundary for 𝑥test . We then train a linear model on these adversarial pairs to approximate the local decision boundary. Experimental results on six UCI benchmark datasets across three deep neural network architectures demonstrate that our approach achieves higher stability and fidelity than the state-of-the-art.","ins":["Department of Computer Science &","Engineering","University of Texas at Arlington","Information Technology Lab","National Institute of Standards and Technology"]},{"i":"conf/kdd/KimMPL26","t":"MergeRec: Model Merging for Data-Isolated Cross-Domain Sequential Recommendation","au":[["Hyunsoo Kim",0],["Jaewan Moon",0],["Seongmin Park",0],["Jongwuk Lee",0]],"u":"https://doi.org/10.1145/3770854.3780264","dblp":"https://dblp.org/rec/conf/kdd/KimMPL26.html","g":["Recommendation","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780264","c":"jul","a":"Modern recommender systems trained on domain-specific data often struggle to generalize across multiple domains. Cross-domain sequential recommendation has emerged as a promising research direction to address this challenge; however, existing approaches face fundamental limitations, such as reliance on overlapping users or items across domains, or unrealistic assumptions that ignore privacy constraints. In this work, we propose a new framework, MergeRec, based on model merging under a new and realistic problem setting termed data-isolated cross-domain sequential recommendation, where raw user interaction data cannot be shared across domains. MergeRec consists of three key components: (1) merging initialization, (2) pseudo-user data construction, and (3) collaborative merging optimization. First, we initialize a merged model using training-free merging techniques. Next, we construct pseudo-user data by treating each item as a virtual sequence in each domain, enabling the synthesis of meaningful training samples without relying on real user interactions. Finally, we optimize domain-specific merging weights through a joint objective that combines a recommendation loss, which encourages the merged model to identify relevant items, and a distillation loss, which transfers collaborative filtering signals from the fine-tuned source models. Extensive experiments demonstrate that MergeRec not only preserves the strengths of the original models but also significantly enhances generalizability to unseen domains. Compared to conventional model merging methods, MergeRec consistently achieves superior performance, with average improvements of up to 17.21% in Recall@10, highlighting the potential of model merging as a scalable and effective approach for building universal recommender systems. The source code is available at github.com/DIALLab-SKKU/MergeRec.","ins":["Sungkyunkwan University"]},{"i":"conf/kdd/KimHW26","t":"GradMix: Gradient-based Selective Mixup for Robust Data Augmentation in Class-Incremental Learning","au":[["Minsu Kim",0],["Seong-Hyeon Hwang",0],["Steven Euijong Whang",0]],"u":"https://doi.org/10.1145/3770854.3780300","dblp":"https://dblp.org/rec/conf/kdd/KimHW26.html","g":["Continual/Incremental","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780300","c":"jul","a":"In the context of continual learning, acquiring new knowledge while maintaining previous knowledge presents a significant challenge. Existing methods often use experience replay techniques that store a small portion of previous task data for training. In experience replay approaches, data augmentation has emerged as a promising strategy to further improve the model performance by mixing limited previous task data with sufficient current task data. However, we theoretically and empirically analyze that training with mixed samples from random sample pairs may harm the knowledge of previous tasks and cause greater catastrophic forgetting. We then propose GradMix, a robust data augmentation method specifically designed for mitigating catastrophic forgetting in class-incremental learning. GradMix performs gradient-based selective mixup using a class-based criterion that mixes only samples from helpful class pairs and not from detrimental class pairs for reducing catastrophic forgetting. Our experiments on various real datasets show that GradMix outperforms data augmentation baselines in accuracy by minimizing the forgetting of previous knowledge. The source code is available at: https://github.com/minsu716-kim/GradMix.","ins":["Korea Advanced Institute of Science and Technology"]},{"i":"conf/kdd/KunzelW26","t":"BSP k-Means","au":[["Sebastian Künzel",0],["Daniel Weiskopf",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3780248","dblp":"https://dblp.org/rec/conf/kdd/KunzelW26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780248","c":"jul","a":"We present a parallel k-Means clustering algorithm specifically designed to address large datasets and cluster counts. Our approach, BSP (binary space partitioning) k-Means, recursively partitions the input space optimally across the first principal component of the current subset of the data. From a single space partitioning, clusterings with arbitrary 𝑘can be found by a greedy tree search. Combining a reduction onto the first principal component and optimal binary clustering of 1D data is highly effective at reducing clustering costs. We attribute this to the close relationship between directional variance and the within-cluster sum of squares. We analyze our approach theoretically and, under an idealized population model, prove that the runtime is in 𝑂(𝑛· max(𝑑, ln𝑛) · ln𝑛) for a broad class of input distributions with high probability. We demonstrate that our algorithm consistently outperforms k-Means++ and performs similarly or better than other sophisticated algorithms in an evaluation with nine datasets and up to six cluster sizes. Our algorithm is parallelizable using common database operations such as Scan, Reduce, and Sort. We show that with our CUDA implementation, a significant speedup can be achieved. Additionally, our algorithm generates centers and datapoint assignments alike, removing the expensive cluster assignment step after initial seeding. Furthermore, our algorithm approximates k-Means accurately so that any additional use of Lloyd’s algorithm is optional and yields only incremental improvement. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780248","ins":["University of Stuttgart","Figure 1: Space partitioning (orange lines) and cluster centers (white dots) computed using our k-Means clustering algorithm","(without post-processing). Datapoints in each cell are assigned to the cell’s corresponding cluster center. The background shows","a log-scaled histogram of the 2D dataset (n = 524,800). From left to right: varying numbers of clusters k = 2, 20, 100, 500."]},{"i":"conf/kdd/LangHZCGZ26","t":"From Shallow Humor to Metaphor: Towards Label-Free Harmful Meme Detection via LMM Agent Self-Improvement","au":[["Jian Lang",0],["Rongpei Hong",0],["Ting Zhong",0],["Leiting Chen",0],["Qiang Gao",1],["Fan Zhou",[0,2,3]]],"u":"https://doi.org/10.1145/3770854.3780213","dblp":"https://dblp.org/rec/conf/kdd/LangHZCGZ26.html","g":["Multimodal/VLM","Agent","Web/Social"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780213","c":"jul","a":"The proliferation of harmful memes on online media poses significant risks to public health and stability. Existing detection methods heavily rely on large-scale labeled data for training, which necessitates substantial manual annotation efforts and limits their adaptability to the continually evolving nature of harmful content. To address these challenges, we present ALARM, the first lAbeL-free hARmful Meme detection framework powered by Large Multimodal Model (LMM) agent self-improvement. The core innovation of ALARM lies in exploiting the expressive information from “shallow” memes to iteratively enhance its ability to tackle more complex and subtle ones. ALARM consists of a novel Confidence-based Explicit Meme Identification mechanism that isolates the explicit memes from the original dataset and assigns them pseudo-labels. Besides, a new Pairwise Learning Guided Agent Self-Improvement paradigm is introduced, where the explicit memes are reorganized into contrastive pairs (positive vs. negative) to refine a learner LMM agent. This agent autonomously derives high-level detection cues from these pairs, which in turn empower the agent itself to handle complex and challenging memes effectively. Experiments on three diverse datasets demonstrate the superior performance and strong adaptability of ALARM to newly evolved memes. Notably, our method even outperforms label-driven methods. These results highlight the potential of label-free frameworks as a scalable and promising solution for adapting to novel forms and topics of harmful memes in dynamic online environments. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780213","ins":["University of Electronic Science and Technology of China","Southwestern University of Finance and Economics","Intelligent Digital Media Technology","Key Laboratory of Sichuan Province"]},{"i":"conf/kdd/LangHZWZ26","t":"Nip Rumors in the Bud: Retrieval-Guided Topic-Level Adaptation for Test-Time Fake News Video Detection","au":[["Jian Lang",0],["Rongpei Hong",0],["Ting Zhong",0],["Yong Wang",1],["Fan Zhou",[0,2,3]]],"u":"https://doi.org/10.1145/3770854.3780211","dblp":"https://dblp.org/rec/conf/kdd/LangHZWZ26.html","g":["Web/Social","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780211","c":"jul","a":"Fake News Video Detection (FNVD) is critical for social stability. Existing methods typically assume consistent news topic distribution between training and test phases, failing to detect fake news videos tied to emerging events and unseen topics. To bridge this gap, we introduce RADAR, the first framework that enables testtime adaptation to unseen news videos. RADAR pioneers a new retrieval-guided adaptation paradigm that leverages stable (sourceclose) videos from the target domain to guide robust adaptation of semantically related but unstable instances. Specifically, we propose an Entropy Selection-Based Retrieval mechanism that provides videos with stable (low-entropy), relevant references for adaptation. We also introduce a Stable Anchor-Guided Alignment module that explicitly aligns unstable instances’ representations to the source domain via distribution-level matching with their stable references, mitigating severe domain discrepancies. Finally, our novel TargetDomain Aware Self-Training paradigm can generate informative pseudo-labels augmented by stable references, capturing varying and imbalanced category distributions in the target domain and enabling RADAR to adapt to the fast-changing label distributions. Extensive experiments demonstrate that RADAR achieves superior performance for test-time FNVD, enabling strong on-the-fly adaptation to unseen fake news video topics.","ins":["University of Electronic Science and Technology of China","Aiwen Technology Co., Ltd.","Intelligent Digital Media Technology","Key Laboratory of Sichuan Province"]},{"i":"conf/kdd/LeiCT26","t":"Offline Behavioral Data Selection","au":[["Shiye Lei",[0,1]],["Zhihao Cheng",[0,1]],["Dacheng Tao",[2,3]]],"u":"https://doi.org/10.1145/3770854.3780320","dblp":"https://dblp.org/rec/conf/kdd/LeiCT26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780320","c":"jul","a":"Behavioral cloning is a widely adopted approach for offline policy learning from expert demonstrations. However, the large scale of offline behavioral datasets often results in computationally intensive training when used in downstream tasks. In this paper, we uncover the striking data saturation in offline behavioral data: policy performance rapidly saturates when trained on a small fraction of the dataset. We attribute this effect to the weak alignment between policy performance and test loss, revealing substantial room for improvement through data selection. To this end, we propose a simple yet effective method, Stepwise Dual Ranking (SDR), which extracts a compact yet informative subset from large-scale offline behavioral datasets. SDR is build on two key principles: (1) stepwise clip, which prioritizes early-stage data; and (2) dual ranking, which selects samples with both high action-value rank and low state-density rank. Extensive experiments and ablation studies on D4RL benchmarks demonstrate that SDR significantly enhances data selection for offline behavioral data. The code is available at https://github.com/LeavesLei/stepwise_dual_ranking.","ins":["School of Computer Science","The University of Sydney","College of Computing & Data Science","Nanyang Technological University"]},{"i":"conf/kdd/LeiWLHLX26","t":"HumanLLM: Towards Personalized Understanding and Simulation of Human Nature","au":[["Yuxuan Lei",0],["Tianfu Wang",1],["Jianxun Lian",2],["Zhengyu Hu",1],["Defu Lian",0],["Xing Xie",2]],"u":"https://doi.org/10.1145/3770854.3780294","dblp":"https://dblp.org/rec/conf/kdd/LeiWLHLX26.html","g":["LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780294","c":"jul","a":"Motivated by the remarkable progress of large language models (LLMs) in objective tasks like mathematics and coding, there is growing interest in their potential to simulate human behavior—a capability with profound implications for transforming social science research and customer-centric business insights. However, LLMs often lack a nuanced understanding of human cognition and behavior, limiting their effectiveness in social simulation and personalized applications. We posit that this limitation stems from a fundamental misalignment: standard LLM pretraining on vast, uncontextualized web data does not capture the continuous, situated context of an individual’s decisions, thoughts, and behaviors over time. To bridge this gap, we introduce HumanLLM, a foundation model designed for personalized understanding and simulation of individuals. We first construct the Cognitive Genome Dataset, a large-scale corpus curated from real-world user data on platforms like Reddit, Twitter, Blogger, and Amazon. Through a rigorous, multi-stage pipeline involving data filtering, synthesis, and quality control, we automatically extract over 5.5 million user logs to distill rich profiles, behaviors, and thinking patterns. We then formulate diverse learning tasks and perform supervised fine-tuning to empower the model to predict a wide range of individualized human behaviors, thoughts, and experiences. Comprehensive evaluations demonstrate that HumanLLM achieves superior performance in predicting user actions and inner thoughts, more accurately mimics user writing styles and preferences, and generates more authentic user profiles compared to base models. Furthermore, HumanLLM shows significant gains on out-of-domain social intelligence benchmarks, indicating enhanced generalization. This work paves the way for more human-centric AI systems by advancing research in social simulation, developing personalized companions, enabling ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780294 marketing intelligence through simulated customer feedback, and powering more realistic user simulation for recommender systems.","ins":["University of Science and Technology","The Hong Kong University of Science and Technology (Guangzhou)","Microsoft Research Asia"]},{"i":"conf/kdd/LiXXSZR26","t":"Multi-Modal Representation for Spatially Resolved Transcriptomics Based on Global Correlation and Dynamic Cluster Discovery","au":[["Chuanxiu Li",0],["Innovation Park",1],["Shengwu Xiong",0],["Innovation Park",[1,2,3]],["Zhenyu Xiong",0],["Innovation Park",1],["Mingxi Sun",0],["Innovation Park",1],["Qixiang Zou",0],["Innovation Park",1],["Yi Rong",[4,1,0]],["Innovation Park",1]],"u":"https://doi.org/10.1145/3770854.3780239","dblp":"https://dblp.org/rec/conf/kdd/LiXXSZR26.html","g":["Multimodal/VLM","Healthcare/Bio"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780239","c":"jul","a":"Constructing effective representations of spatial resolved transcriptomics (SRT) data, by appropriately characterizing the coherence in gene expression and histology with the spatial information of each sequencing spot, plays an important role in understanding the organization and function of complex tissues. Although much progress has been made, existing SRT representation methods typically establish local associative relationships for each spot only with those located in its surrounding spatial areas, thus failing to capture longrange correlations between distant regions. In addition, the absence of supervision signals on which cluster (with similar biological functions, pathological states or cell types) each spot should belong to also poses a great challenge in deriving an effective representation of SRT data. To this end, we propose a novel Multi-Modal SRT Representation Learning (MMSRL) method based on global spot correlation and dynamic cluster discovery. Specifically, given the gene expression and histological image, MMSRL first builds individual graph convolutional networks (GCNs) for these two modalities and bridges them through the adjacency matrix generated from the spatial locations of different spots. The extracted GCN features are ∗Yi Rong is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780239 then processed by a correlative self-attention operation to enhance their long-range correlations within each modality. Meanwhile, we also design a multi-modal interaction module (MMIM) to make these two-modal features interact with each other, and align their global correlation information across modalities. After that, we develop an attention-weighted fusion module (AWFM) to adaptively fuse the enhanced intra- and inter-modal features obtained above, so as to effectively integrate the multi-modal information. Finally, a dynamic cluster discovery process, which unsupervisedly assigns cluster labels to each spot, is incorporated to further refine the fused multi-modal representations in a contrastive learning manner.","ins":["Sanya Science and Education","Wuhan University of Technology","Hubei Institute for Heterogeneous","Computing Applications","School of Computer Science and Artificial Intelligence"]},{"i":"conf/kdd/LiZDDZ26","t":"Efficiently Learning Branching Networks for Multitask Algorithmic Reasoning","au":[["Dongyue Li",0],["Zhenshuo Zhang",0],["Minxuan Duan",0],["Edgar Dobriban",1],["Hongyang R. Zhang",0]],"u":"https://doi.org/10.1145/3770854.3780253","dblp":"https://dblp.org/rec/conf/kdd/LiZDDZ26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780253","c":"jul","a":"Algorithmic reasoning—the ability to perform step-by-step logical inference—has become a core benchmark for evaluating reasoning in graph neural networks (GNNs) and large language models (LLMs). Ideally, one would like to design a single model capable of performing well on multiple algorithmic reasoning tasks simultaneously. However, this is challenging when the execution steps of algorithms differ from one another, causing negative interference when they are trained together. We propose branching neural networks, a principled architecture for multitask algorithmic reasoning. Searching for the optimal𝑘-ary tree with 𝐿layers over 𝑛algorithmic tasks is combinatorial, requiring exploration of up to 𝑘𝑛𝐿possible structures. We develop AutoBRANE, an efficient algorithm that reduces this search to 𝑂(𝑛𝐿) time by solving a convex relaxation at each layer to determine an optimal task partition. The method clusters tasks using gradientbased affinity scores and applies on top of any base model, including GNNs and LLMs. We validate AutoBRANE on a broad suite of graph-algorithmic and text-based reasoning benchmarks. We show that gradient features estimate true task performance within 5% error across four GNNs and four LLMs (up to 34B parameters). On the CLRS benchmark, it outperforms the strongest single multitask GNN by 3.7% and the best baseline by 1.2%, while reducing runtime by 48% and memory by 26%. The learned branching structures reveal meaningful hierarchical clustering of related algorithms. On three text-based graph reasoning benchmarks, AutoBRANE improves over the best non-branching multitask baseline by 3.2%. Finally, on a large graph dataset with 21M edges and 500 tasks, AutoBRANE achieves a 28% accuracy gain over existing multitask and branching architectures, along with a 4.5× reduction in runtime.","ins":["Northeastern University","University of Pennsylvania"]},{"i":"conf/kdd/LiJWDQ26","t":"Vertical Federated K-Means for Multi-View Data Guided by a K-Means Cost Bound after Projection","au":[["Feijiang Li",[0,1,2,3]],["Jinhao Jiang",[4,5]],["Jieting Wang",[0,1,2,3]],["Liang Du",[0,1,2,3]],["Yuhua Qian",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3780182","dblp":"https://dblp.org/rec/conf/kdd/LiJWDQ26.html","g":["Federated"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780182","c":"jul","a":"Multi-view data is widely present in the real world. Multi-view clustering is an unsupervised method for capturing the grouping structure of such data. However, multi-view clustering struggles to meet the requirements of real-world scenarios, such as distributed storage of different views and data protection needs. These requirements align with the setting of vertical federated clustering. However, vertical federated clustering still faces two challenges: (1) Under the constraints of privacy protection mechanisms, how to theoretically analyze the clustering consistency between the data uploaded by clients to the server and the original client data is challenging. (2) The feature space differences among different clients make cross-view information sharing and fusion difficult. To address the first challenge, we provide a theoretical analysis of the upper bound of the loss of k-means for transformation matrix mapping, revealing the relationship between the k-means loss of the transformed data and the original data. We then propose a vertical federated clustering method (V-HDKM). In this method, clients handle the second challenge by transposing the feature matrix. Guided by the projected k-means loss bound, we expand the feature space and perform k-means clustering to obtain feature cluster centers, which are then uploaded to the server. The server aggregates the global centers and feeds back the optimized results, achieving crossview knowledge fusion through iterative interactions. Experimental results show that V-HDKM significantly improves local clustering performance and performances better than other seven vertical federated mthods on 20 multi-view datasets. Furthermore, sensitivity analysis on 8 UCI datasets with respect to the number of clients ∗Corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780182 demonstrates the stability of the method. The code is available at https://github.com/jiangjh/V-HDKM.","ins":["Key Laboratory of Evolutionary","Science Intelligence of Shanxi","Province, Shanxi University, Institute","of Big Data Science and Industry","Shanxi University, Institute of Big","Data Science and Industry"]},{"i":"conf/kdd/LiGWT26","t":"Neural Predictive Control to Coordinate Discrete- and Continuous-Time Models for Time-Series Analysis with Control-Theoretical Improvements","au":[["Haoran Li",0],["Muhao Guo",0],["Yang Weng",0],["Hanghang Tong",1]],"u":"https://doi.org/10.1145/3770854.3780261","dblp":"https://dblp.org/rec/conf/kdd/LiGWT26.html","g":["Time Series","Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780261","c":"jul","a":"Deep sequence models have achieved notable success in time-series analysis, such as interpolation and forecasting. Recent advances move beyond discrete-time architectures like Recurrent Neural Networks (RNNs) toward continuous-time formulations such as the family of Neural Ordinary Differential Equations (Neural ODEs). Generally, they have shown that capturing the underlying dynamics is beneficial for generic tasks like interpolation, extrapolation, and classification. However, existing methods approximate the dynamics using unconstrained neural networks, which struggle to adapt reliably under distributional shifts. In this paper, we recast time-series problems as the continuous ODE-based optimal control problem. Rather than learning dynamics solely from data, we optimize control actions that steer ODE trajectories toward task objectives, bringing control-theoretical performance guarantees. To achieve this goal, we need to (1) design the appropriate control actions and (2) apply effective optimal control algorithms. As the actions should contain rich context information, we propose to employ the discrete-time model to process past sequences and generate actions, leading to a coordinate model to extract long-term temporal features to modulate short-term continuous dynamics. During training, we apply model predictive control to plan multistep future trajectories, minimize a task-specific cost, and greedily select the optimal current action. We show that, under mild assumptions, this multi-horizon optimization leads to exponential convergence to infinite-horizon solutions, indicating that the coordinate model can gain robust and generalizable performance. Extensive experiments on diverse time-series datasets validate our method’s superior generalization and adaptability compared to state-of-the-art baselines.","ins":["Arizona State University","University of Illinois at Urbana-Champaign"]},{"i":"conf/kdd/LiZZLSZ26","t":"FCN: Fusing Exponential and Linear Cross Network for Click-Through Rate Prediction","au":[["Honghao Li",0],["Yiwen Zhang",0],["Yi Zhang",0],["Hanwei Li",0],["Lei Sang",0],["Jieming Zhu",[1,2]]],"u":"https://doi.org/10.1145/3770854.3780177","dblp":"https://dblp.org/rec/conf/kdd/LiZZLSZ26.html","g":["Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780177","c":"jul","a":"As an important modeling paradigm in click-through rate (CTR) prediction, the Deep & Cross Network and its derivative models have gained widespread recognition, primarily due to their success in trade-off computational cost and performance. However, this paradigm typically depends on deep neural network (DNN) to implicitly learn high-order feature interactions, without explicitly modeling extremely high-order interactions due to concerns about model complexity. To address this limitation, we propose a novel model for CTR prediction, called the Fusing Cross Network (FCN), which consists of two sub-networks: the Exponential Cross Network (ECN) and the Linear Cross Network (LCN). Specifically, ECN explicitly captures extremely high-order feature interactions whose order increases exponentially with network depth, while LCN captures low-order feature interactions with linearly increasing order. By integrating these two sub-networks, FCN is able to explicitly model a broad spectrum of feature interactions, thereby eliminating the need to rely on implicit modeling by DNN. Moreover, we introduce a low-cost aggregation method that reduces the number of parameters by 50% and inference latency by 23%. Meanwhile, we propose a simple yet effective loss function, Tri-BCE, which provides tailored supervision signals for each sub-network. We evaluate the effectiveness and efficiency of FCN on six public benchmark datasets and 16 baselines. Furthermore, we verify the effectiveness of the FCN on a real-world business dataset spanning seven days. The code, running logs, and detailed hyperparameter configurations are publicly available at https://github.com/salmon1802/FCN.","ins":["Anhui University","Huawei Noah’s Ark Lab","Shenzhen, Guangdong Province"]},{"i":"conf/kdd/LiZAST26","t":"IRG: Modular Synthetic Relational Database Generation with Complex Relational Schemas","au":[["Jiayu Li",0],["Zilong Zhao",1],["Milad Abdollahzadeh",1],["Betterdata AI",1],["Biplab Sikdar",1],["Y.C. Tay",1]],"u":"https://doi.org/10.1145/3770854.3780313","dblp":"https://dblp.org/rec/conf/kdd/LiZAST26.html","g":["Tabular","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780313","c":"jul","a":"Relational databases (RDBs) are widely used by corporations and governments to store multiple related tables. Their relational schemas pose unique challenges to synthetic data generation for privacypreserving data sharing, e.g., for collaborative analytical and data mining tasks, as well as software testing at various scales. Relational schemas typically include a set of primary and foreign key constraints to specify the intra-and inter-table entity relations, which also imply crucial intra-and inter-table data correlations in the RDBs. Existing synthetic RDB generation approaches often focus on the relatively simple and basic parent-child relations, failing to address the ubiquitous real-world complexities in relational schemas in key constraints like composite keys, intra-table correlations like sequential correlation, and inter-table data correlations like indirectly connected tables. In this paper, we introduce incremental relational generator (IRG), a modular framework designed to handle these real-world challenges. In IRG, each table is generated by learning context from a depth-first traversal of relational connections to capture indirect inter-table relationships and constructs different parts of a table through several classical generative and predictive modules to preserve complex key constraints and data correlations. Compared to 3 prior art algorithms across 10 real-world RDB datasets, IRG successfully handles the relational schemas and captures critical data relationships for all datasets while prior works are incapable of. The generated synthetic data also demonstrates better fidelity and utility than prior works, implying its higher potential as a replacement for the basis of analytical tasks and data mining applications. Code is available at: https://github.com/li-jiayu-ljy/irg.","ins":["University of Illinois, Urbana-Champaign","National University of Singapore"]},{"i":"conf/kdd/LiLLLYDSW26","t":"CFLight: Enhancing Safety with Traffic Signal Control through Counterfactual Learning","au":[["Mingyuan Li",[0,1]],["Chunyu Liu",2],["Zhuojun Li",2],["Xiao Liu",2],["Guangsheng Yu",3],["Independent Researcher",3],["Bo Du",3],["Jun Shen",4],["Qiang Wu",5]],"u":"https://doi.org/10.1145/3770854.3780308","dblp":"https://dblp.org/rec/conf/kdd/LiLLLYDSW26.html","g":["Spatiotemporal/Urban","Causal","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780308","c":"jul","a":"Traffic accidents result in millions of injuries and fatalities globally, with a significant number occurring at intersections each year. Traffic Signal Control (TSC) is an effective strategy for enhancing safety at these urban junctures. Despit
