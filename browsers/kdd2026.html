l efficiency, reducing redundant computations and eliminating the need for full retraining in streaming settings. Furthermore, FOCAL integrates frequency regularization into an online CMTF framework, which mitigates overfitting and improves accuracy. Through extensive experiments, we demonstrate that FOCAL outperforms existing state-of-the-art methods in terms of both speed and accuracy. We also present results on anomaly detection using real-world data, showcasing FOCAL’s effectiveness in identifying irregular patterns.","ins":["Seoul National University"]},{"i":"conf/kdd/PeiMRRWJWHL26","t":"Dual Data-centric Separation with Circular Mixup for Noise-resistant Time Series Learning","au":[["Yuhang Pei",0],["Fanchun Meng",0],["Qinghua Ran",1],["Tao Ren",0],["Yifan Wang",2],["Wei Ju",1],["Zimo Wang",3],["Xian-Sheng Hua",4],["Xiao Luo",5]],"u":"https://doi.org/10.1145/3770854.3780265","dblp":"https://dblp.org/rec/conf/kdd/PeiMRRWJWHL26.html","g":["Time Series","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780265","c":"jul","a":"Deep neural networks (DNNs) have achieved extensive progress in time series learning. However, they could suffer from performance degradation when it comes to label noise in the real world. Towards this end, this paper studies an underexplored yet realistic problem of noise-resistant time series learning and proposes a novel datacentric approach named Dual Data-centric Separation with Circular Mixup (DREAM) for this problem. The core of our DREAM is to explore and exploit the noisy data from dual data-centric views for reduced overfitting. On the one hand, we assume that samples with similar features share similar labels and infer the pseudo label of each sample using its affinity graph to capture the corresponding pseudo margin. On the other hand, we monitor the optimization status by simulating the mislabeled data to generate flexible criteria for accurate separation of clean and noisy samples. In addition, we leverage circular Mixup to interpolate between clean and noisy samples in the embedding space. These mixed samples are incorporated into a discrepancy-aware consistency learning framework to ensure robust time series representations of all the separated samples. Experimental results on a wide range of publicly accessible datasets reveal the effectiveness of our DREAM.","ins":["Northeastern University","Peking University","University of International Business and Economics","Beijing Bayi School","Tongji University","University of Wisconsin–Madison"]},{"i":"conf/kdd/PengLZF26","t":"Debiased Negative Mining Improves Out-of-distribution Detection with Pre-trained Vision-Language Models","au":[["Bo Peng",0],["Jie Lu",0],["Guangquan Zhang",0],["Zhen Fang",0]],"u":"https://doi.org/10.1145/3770854.3780169","dblp":"https://dblp.org/rec/conf/kdd/PengLZF26.html","g":["Multimodal/VLM","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780169","c":"jul","a":"Aiming at identifying unexpected inputs from unknown classes, out-of-distribution (OOD) detection has emerged as a pivotal approach to enhancing the reliability of machine learning models. This paper focuses on the burgeoning paradigm of post-hoc OOD detection with pre-trained vision-language models (VLMs), where a popular pipeline is to detect OOD inputs by examining their affinities between ID labels and negative labels, i.e., those semantically different from ID labels. Due to the unavailability of target OOD labels, existing works predominantly rely on heuristic rules to mine negative labels from unlabeled wild corpus data. Despite the empirical success, we argue that the power of VLM-based OOD detection has yet to be fully unleashed since the notorious false negative problem is far from addressed in the literature. With this motivation, we are interested in addressing the challenge of mining true negative labels for OOD scoring. To this end, we develop a theoretical framework for correcting the sampling bias of negatives labels by indirectly approximating the distribution of negative labels. Perhaps surprisingly, we show that the debiased negative mining can be naturally converted into Monte-Carlo sampling based on ID labels and the unlabeled wild corpus data. Extensive experiments empirically manifest that our method establishes a new state-of-the-art in a variety of OOD detection setups.","ins":["University of Technology Sydney"]},{"i":"conf/kdd/QiaoCAZLH26","t":"Live or Lie: Action-Aware Capsule Multiple Instance Learning for Risk Assessment in Live Streaming Platforms","au":[["Yiran Qiao",0],["Jing Chen",1],["Xiang Ao",0],["Qiwei Zhong",1],["Yang Liu",0],["Qing He",0]],"u":"https://doi.org/10.1145/3770854.3780246","dblp":"https://dblp.org/rec/conf/kdd/QiaoCAZLH26.html","g":["Web/Social","Anomaly/Outlier"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780246","c":"jul","a":"Live streaming has become a cornerstone of today’s internet, enabling massive real-time social interactions. However, it faces severe risks arising from sparse, coordinated malicious behaviors among multiple participants, which are often concealed within normal activities and challenging to detect timely and accurately. In this work, we provide a pioneering study on risk assessment in live streaming rooms, characterized by weak supervision where only room-level labels are available. We formulate the task as a Multiple Instance Learning (MIL) problem, treating each room as a bag and defining structured user–timeslot capsules as instances. These capsules represent subsequences of user actions within specific time windows, encapsulating localized behavioral patterns. Based on this formulation, we propose AC-MIL, an Actionaware Capsule MIL framework that models both individual behaviors and group-level coordination patterns. AC-MIL captures multi-granular semantics and behavioral cues through a serial and parallel architecture that jointly encodes temporal dynamics and cross-user dependencies. These signals are integrated for robust room-level risk prediction, while also offering interpretable evidence at the behavior segment level. Extensive experiments on large-scale industrial datasets from Douyin demonstrate that AC- MIL significantly outperforms MIL and sequential baselines, establishing new state-of-the-art performance in room-level risk assessment for live streaming. Moreover, AC-MIL provides capsule-level interpretability, enabling identification of risky behavior segments as actionable evidence for intervention. The project page is available at: https://qiaoyran.github.io/AC-MIL/ ∗This work was conducted during Yiran’s internship at ByteDance China. †Corresponding Author. ‡State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences. §Also with University of Chinese Academy of Sciences. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780246","ins":["Institute of Computing Technology, Chinese Academy of Sciences","ByteDance China"]},{"i":"conf/kdd/QinCLXZSWA26","t":"FineFT: Efficient and Risk-Aware Ensemble Reinforcement Learning for Futures Trading","au":[["Molei Qin",0],["Xinyu Cai",0],["Yewen Li",0],["Haochong Xia",0],["Chuqiao Zong",0],["Shuo Sun",1],["Xinrun Wang",2],["Bo An",0]],"u":"https://doi.org/10.1145/3770854.3780187","dblp":"https://dblp.org/rec/conf/kdd/QinCLXZSWA26.html","g":["Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780187","c":"jul","a":"Futures are contracts obligating the exchange of an asset at a predetermined date and price, notable for their high leverage (e.g., 5-fold) and liquidity (e.g., trillions of dollars) and, therefore, thrive in the Crypto market. Reinforcement learning (RL) has been widely applied in various quantitative tasks. However, most methods focus on the spot (e.g., stock) and could not be directly applied to the futures market with high leverage because of 2 key challenges. First, high leverage amplifies reward fluctuations, making RL training highly stochastic and difficult to converge. Second, prior works lacked self-awareness of capability boundaries, exposing them to the risk of significant capital loss when encountering previously unseen market state representations (e.g., during a black swan event like COVID-19). To tackle these challenges, we propose the eFficient and rIsk-aware eNsemble rEinforcement learning for Futures Trading (FineFT), a novel three-stage ensemble RL framework with stable training and proper risk management. In stage I, ensemble Q learners are selectively updated by ensemble temporal difference (TD) errors, i.e., TD errors across different learners, to improve convergence and performance. In stage II, we filter the Q-learners based on their profitabilities under different market dynamics and train variational autoencoders (VAEs) on market representations of each dynamic to identify the capability boundaries of the filtered learners. In stage III, we dynamically choose from the filtered ensemble and a conservative policy, guided by trained VAEs, to maintain profitability and mitigate risk with new market states. Through extensive experiments on crypto futures in a high-frequency trading environment with high fidelity and 5× leverage, we demonstrate that ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, August 09–13, 2026, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780187 FineFT significantly outperforms 12 state-of-the-art baselines in 6 widely-used financial metrics, reducing risk by more than 40% while achieving superior profitability compared to the runner-up. Visualization of the selective update mechanism shows that different agents specialize in distinct market dynamics, and ablation studies certify routing with VAEs reduces maximum drawdown effectively, and selective update improves convergence and performance.","ins":["Nanyang Technological University","Hong Kong University of Science and Technology (Guangzhou)","Singapore Management University"]},{"i":"conf/kdd/QiuZSCZY26","t":"SEW: Strengthening Robustness of Black-box DNN Watermarking via Specificity Enhancement","au":[["Huming Qiu",0],["Mi Zhang",0],["Junjie Sun",1],["Peiyi Chen",0],["Xiaohan Zhang",0],["Min Yang",0]],"u":"https://doi.org/10.1145/3770854.3780272","dblp":"https://dblp.org/rec/conf/kdd/QiuZSCZY26.html","g":["Security/Attack","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780272","c":"jul","a":"To ensure the responsible distribution and use of open-source deep neural networks (DNNs), DNN watermarking has become a crucial technique to trace and verify unauthorized model replication or misuse. In practice, black-box watermarks manifest as specific predictive behaviors for specially crafted samples. However, due to the generalization nature of DNNs, the keys to extracting the watermark message are not unique, which would provide attackers with more opportunities. Advanced attack techniques can reverseengineer approximate replacements for the original watermark keys, enabling subsequent watermark removal. In this paper, we explore black-box DNN watermarking specificity, which refers to the accuracy of a watermark’s response to a key. Using this concept, we introduce Specificity-Enhanced Watermarking (SEW), a new method that improves specificity by reducing the association between the watermark and approximate keys. Through extensive evaluation using three popular watermarking benchmarks, we validate that enhancing specificity significantly contributes to strengthening robustness against removal attacks. SEW effectively defends against six state-of-the-art removal attacks, while maintaining model usability and watermark verification performance.","ins":["Fudan University","Alibaba Group"]},{"i":"conf/kdd/QiuGSHH26","t":"Instruction-based Time Series Editing","au":[["Jiaxing Qiu",0],["Dongliang Guo",0],["Brynne Sullivan",0],["Teague R. Henry",0],["Thomas Hartvigsen",0]],"u":"https://doi.org/10.1145/3770854.3780299","dblp":"https://dblp.org/rec/conf/kdd/QiuGSHH26.html","g":["Time Series"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780299","c":"jul","a":"In time series editing, we aim to modify some properties of a given time series without altering others. For example, when analyzing a hospital patient’s blood pressure, we may add a sudden early drop and observe how it impacts their future, while preserving other conditions. Existing diffusion-based editors rely on rigid, predefined attribute vectors as conditions and produce all-or-nothing edits through sampling. This attribute- and sampling-based approach limits flexibility in condition format and lacks customizable control over editing strength. To overcome these limitations, we introduce Instruction-based Time Series Editing, where users specify intended edits using natural language. This allows users to express a wider range of edits in a more accessible format. We then introduce InstructTime, the first instruction-based time series editor. InstructTime takes in time series and instructions, embeds them into a shared multi-modal representation space, then decodes their embeddings to generate edited time series. By learning a structured multi-modal representation space, we can easily interpolate between embeddings to achieve varying degrees of edit. To handle local and global edits together, we propose multi-resolution encoders. In our experiments, we use synthetic and real datasets and find that InstructTime is a state-of-the-art time series editor: InstructTime achieves high-quality edits with controllable strength, can generalize to unseen instructions, and can be easily adapted to unseen conditions through few-shot learning.","ins":["University of Virginia"]},{"i":"conf/kdd/QiuLZCZSJ26","t":"APT-CGLP: Advanced Persistent Threat Hunting via Contrastive Graph-Language Pre-Training","au":[["Xuebo Qiu",0],["Mingqi Lv",[1,2,3]],["Information Intelligent Processing",0],["Yimei Zhang",0],["Tieming Chen",[1,2,3]],["Information Intelligent Processing",0],["Tiantian Zhu",0],["Qijie Song",[1,2]],["Shouling Ji",4]],"u":"https://doi.org/10.1145/3770854.3780275","dblp":"https://dblp.org/rec/conf/kdd/QiuLZCZSJ26.html","g":["Security/Attack","Graph/GNN","Self-Supervised/Contrastive"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780275","c":"jul","a":"Provenance-based threat hunting identifies Advanced Persistent Threats (APTs) on endpoints by correlating attack patterns described in Cyber Threat Intelligence (CTI) with provenance graphs derived from system audit logs. A fundamental challenge in this paradigm lies in the modality gap—the structural and semantic disconnect between provenance graphs and CTI reports. Prior work addresses this by framing threat hunting as a graph matching task: 1) extracting attack graphs from CTI reports, and 2) aligning them with provenance graphs. However, this pipeline incurs severe information loss during graph extraction and demands intensive manual curation, undermining scalability and effectiveness. In this paper, we present APT-CGLP, a novel cross-modal APT hunting system via Contrastive Graph-Language Pre-training, facilitating end-to-end semantic matching between provenance graphs and CTI reports without human intervention. First, empowered by the Large Language Model (LLM), APT-CGLP mitigates data scarcity by synthesizing high-fidelity provenance graph-CTI report pairs, while simultaneously distilling actionable insights from noisy web-sourced CTIs to improve their operational utility. Second, APT-CGLP incorporates a tailored multi-objective training ∗Corresponding author. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780275 algorithm that synergizes contrastive learning with inter-modal masked modeling, promoting cross-modal attack semantic alignment at both coarse- and fine-grained levels. Extensive experiments on four real-world APT datasets demonstrate that APT-CGLP consistently outperforms state-of-the-art threat hunting baselines in terms of accuracy and efficiency.","ins":["College of Computer Science and Technology, Zhejiang University of Technology","College of Geoinformatics, Zhejiang","University of Technology","Zhejiang Key Laboratory of Visual","College of Computer Science and Technology, Zhejiang University"]},{"i":"conf/kdd/QuWMHOJ26","t":"Can Prompt Difficulty be Online Predicted for Accelerating RL Finetuning of Reasoning Models?","au":[["Yun Qu",0],["Qi Wang",0],["Yixiu Mao",0],["Vincent Tao Hu",[1,2]],["Björn Ommer",[1,2]],["Xiangyang Ji",0]],"u":"https://doi.org/10.1145/3770854.3780263","dblp":"https://dblp.org/rec/conf/kdd/QuWMHOJ26.html","g":["LLM","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780263","c":"jul","a":"Recent advances have witnessed the effectiveness of reinforcement learning (RL) finetuning in enhancing the reasoning capabilities of large language models (LLMs). The optimization process often requires numerous iterations to achieve satisfactory performance, resulting in high computational costs due to the need for frequent prompt evaluations under intensive LLM interactions and repeated policy updates. Appropriate online prompt selection methods reduce iteration steps by prioritizing informative prompts during training, while the pipeline’s reliance on exhaustive prompt evaluation and subset selection for optimization still incurs substantial computational overhead due to frequent LLM inference calls. Distinguished from these direct evaluate-then-select schemes, this work investigates iterative approximate evaluation for arbitrary prompts and introduces Model Predictive Prompt Selection (MoPPS), a Bayesian risk-predictive framework that online estimates prompt difficulty without requiring costly LLM interactions. Technically, MoPPS models each prompt’s success rate as a latent variable, performs streaming Bayesian inference, and employs posterior sampling in a constructed multi-armed bandit machine, enabling efficient and adaptive prompt selection. Extensive experiments across mathematics, planning, and vision-based geometry tasks show that MoPPS reliably predicts prompt difficulty and accelerates training with significantly reduced LLM rollouts. Our code is available at https://github.com/thu-rllab/MoPPS.","ins":["Tsinghua University","CompVis @ LMU Munich, Munich","Center for Machine Learning (MCML)"]},{"i":"conf/kdd/RenZTR26","t":"AnchorGK: Anchor-based Incremental and Stratified Graph Learning Framework for Inductive Spatio-Temporal Kriging","au":[["Xiaobin Ren",[0,1]],["Kaiqi Zhao",[2,3,4]],["Katerina Taškova",[0,1]],["Patricia Riddle",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780189","dblp":"https://dblp.org/rec/conf/kdd/RenZTR26.html","g":["Spatiotemporal/Urban","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780189","c":"jul","a":"Spatio-temporal kriging is an essential research problem in sensor networks due to the sparsity of deployed sensors. While recent studies consider spatial and temporal correlations, they often overlook the sparse spatial distribution of locations and the incomplete features across locations. To tackle these problems, we propose an Anchor-based Incremental and Stratified Graph Learning Framework for Inductive Spatio-Temporal Kriging (AnchorGK). AnchorGK introduces anchor locations to enable effective data stratification for accurate kriging. Anchor locations are constructed based on feature availability, and strata are subsequently established based on the anchor locations. This stratification serves two purposes: 1) it ensures that the spatial correlations between unknown areas (no observations) and surrounding known locations are accurately represented and dynamically updated within the graph learning framework, and 2) it facilitates the use of all available features across different strata through a novel incremental representation method. Building on the data stratification, we propose a dual-view graph learning layer that integrates information from relevant features and locations and learns distinct representations for different strata. Finally, kriging is performed based on the obtained strata representations. Experimental results on multiple benchmark datasets demonstrate that AnchorGK consistently outperforms existing state-of-the-art methods1.","ins":["School of Computer Science","University of Auckland","Shenzhen Key Laboratory of Internet Information","Collaboration","Harbin Institute of Technology, Shenzhen"]},{"i":"conf/kdd/ShaGLLLFSVWWZ26","t":"Deep Hierarchical Knowledge Loss for Fault Intensity Diagnosis","au":[["Yu Sha",[0,1]],["Shuiping Gou",[2,3]],["Bo Liu",[2,3]],["Haofan Lu",3],["Ningtao Liu",4],["Jiahui Fu",5],["Horst Stoecker",6],["Domagoj Vnucec",[0,2,1]],["SAMSOM AG",[0,2,1]],["Nadine Wetzstein",[0,2,1]],["SAMSOM AG",[0,2,1]],["Andreas Widl",[0,2,1]],["SAMSOM AG",[0,2,1]],["Kai Zhou",[0,2,1]]],"u":"https://doi.org/10.1145/3770854.3780290","dblp":"https://dblp.org/rec/conf/kdd/ShaGLLLFSVWWZ26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780290","c":"jul","a":"Fault intensity diagnosis (FID) plays a pivotal role in intelligent manufacturing while neglecting dependencies among target classes hinders its practical deployment. This paper introduces a novel and general framework with deep hierarchical knowledge loss (DHK) to achieve hierarchical consistent representation and prediction. We develop a novel hierarchical tree loss to enable a holistic mapping of same-attribute classes, leveraging tree-based positive and negative hierarchical knowledge constraints. We further design a focal hierarchical tree loss to enhance its extensibility and devise two adaptive weighting schemes based on tree height. In addition, we propose a group tree triplet loss with hierarchical dynamic margin by incorporating hierarchical group concepts and tree distance to model boundary structural knowledge across classes. The joint two losses significantly improve the recognition of subtle faults. Extensive experiments are performed on four real-world datasets from various industrial domains (three cavitation datasets from SAMSON AG and one publicly available dataset) for FID, all showing superior results and outperforming recent state-of-the-art FID methods. ∗CUHK-SZ: The Chinese University of HongKong, Shenzhen FIAS: Frankfurt Institute for Advanced Studies †LIST: Luoyang Institate of Science and Technology ‡GSI: GSI Helmholtzzentrum für Schwerionenforschung GmbH §Kai Zhou is the corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780290","ins":["School of Science and Engineering","CUHK-SZ, FIAS","School of Artificial Intelligence","Xidian University","LIST","FIAS","FIAS, Goethe Universität and GSI"]},{"i":"conf/kdd/ShangLWLSWZ26","t":"Medusa: Cross-Modal Transferable Adversarial Attacks on Multimodal Medical Retrieval-Augmented Generation","au":[["Yingjia Shang",0],["Yi Liu",[1,2]],["Huimin Wang",3],["Furong Li",4],["Wenfang Sun",4],["Chengyu Wu",4],["Yefeng Zheng",4]],"u":"https://doi.org/10.1145/3770854.3780277","dblp":"https://dblp.org/rec/conf/kdd/ShangLWLSWZ26.html","g":["Security/Attack","Multimodal/VLM","RAG/Retrieval","Healthcare/Bio"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780277","c":"jul","a":"With the rapid advancement of retrieval-augmented visionlanguage models, multimodal medical retrieval-augmented generation (MMed-RAG) systems are increasingly adopted in clinical decision support. These systems enhance medical applications by performing cross-modal retrieval to integrate relevant visual and textual evidence for tasks, e.g., report generation and disease diagnosis. However, their complex architecture also introduces underexplored adversarial vulnerabilities, particularly via visual input perturbations. In this paper, we propose Medusa, a novel framework for crafting cross-modal transferable adversarial attacks on MMedRAG systems under a black-box setting. Specifically, Medusa formulates the attack as a perturbation optimization problem, leveraging a multi-positive InfoNCE loss (MPIL) to align adversarial visual embeddings with medically plausible but malicious textual targets, thereby hijacking the retrieval process. To enhance transferability, we adopt a surrogate model ensemble and design a dual-loop optimization strategy augmented with invariant risk minimization (IRM). Extensive experiments on two real-world medical tasks, including medical report generation and disease diagnosis, demonstrate that Medusa achieves over 90% average attack success rate across various generation models and retrievers under appropriate parameter configuration, while remaining robust against four mainstream defenses, outperforming state-of-the-art baselines. Our results reveal critical vulnerabilities in the MMed-RAG systems and highlight the necessity of robustness benchmarking in safetycritical medical applications. The code and data are available at https://github.com/yiliucs/MMed-RAG-Attack. ∗Authors marked with * contributed equally. Yi Liu is the lead author. †Corresponding author. Yefeng Zheng was supported by the Zhejiang Leading Innovative and Entrepreneur Team Introduction Program (No. 2024R01007). This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780277","ins":["Westlake University and Heilongjiang University","City University of Hong","Kong","Tencent YouTu Lab","Westlake University"]},{"i":"conf/kdd/ShaoCLYYW26","t":"Multi-Agent Debate based Concept Augmentation for Enhanced Cognitive Diagnosis","au":[["Pengyang Shao",0],["Lei Chen",1],["Fei Liu",2],["Yonghui Yang",0],["Xun Yang",1],["Meng Wang",2]],"u":"https://doi.org/10.1145/3770854.3780196","dblp":"https://dblp.org/rec/conf/kdd/ShaoCLYYW26.html","g":["Agent","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780196","c":"jul","a":"Cognitive Diagnosis (CD) models are constrained by the data quality of students’ response logs. Recent advancements in Large Language Model (LLM) based data augmentation show promise for enhancing CD. However, ensuring the reliability and accuracy of LLM-generated annotations remains a significant challenge. In this paper, we propose Multi-Agent based Concept Augmentation for Cognitive Diagnosis (MACA-CD), a novel approach that enhances CD by generating and fusing reliable concept descriptions and relations based solely on concept names. MACA-CD consists of two main components: (1) a Multi-Agent Debate (MAD) based concept augmentation process that generates diverse and reliable concept descriptions and relations, reducing reliance on behavioral data. For concept descriptions, two agents generate outputs that include definitions, core features, and real-world applications, and continue debating until a judge agent determines that consensus has been reached. Concept relations are then identified using a Breadth-First Search approach to efficiently and progressively uncover relationships based on concept descriptions, with each step carried out by MAD. (2) a concept augmentation-enhanced CD model that refines concept embeddings using a graph self-supervised learning fusion layer and a pairwise comparator-based Description Fusion Layer, leading to more reliable and accurate concept embeddings. Experimental results on three real-world datasets show that MACA- CD consistently outperforms existing methods under various realworld scenarios.","ins":["National University of Singapore","University of Science and Technology","Hefei University of Technology"]},{"i":"conf/kdd/SonKKHKLY26","t":"CREAM: Continual Retrieval on Dynamic Streaming Corpora with Adaptive Soft Memory","au":[["HuiJeong Son",0],["Hyeongu Kang",0],["Sunho Kim",0],["Subeen Ho",0],["SeongKu Kang",0],["Dongha Lee",1],["Susik Yoon",0]],"u":"https://doi.org/10.1145/3770854.3780281","dblp":"https://dblp.org/rec/conf/kdd/SonKKHKLY26.html","g":["Search/IR","Continual/Incremental"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780281","c":"jul","a":"Information retrieval (IR) in dynamic data streams is a challenging task, as shifts in data distribution degrade the performance of AI-powered IR systems. To mitigate this issue, memory-based continual learning has been widely adopted for IR. However, existing methods rely on a fixed set of queries with ground-truth documents, which limits generalization to unseen data, making them impractical for real-world applications. To enable more effective learning with unseen topics of a new corpus without groundtruth labels, we propose CREAM, a self-supervised framework for memory-based continual retrieval. CREAM captures the evolving semantics of streaming queries and documents into dynamically structured soft memory and leverages it to adapt to both seen and unseen topics in an unsupervised setting. We realize this through three key techniques: fine-grained similarity estimation, regularized cluster prototyping, and stratified coreset sampling. Experiments on two benchmark datasets demonstrate that CREAM exhibits superior adaptability and retrieval accuracy, outperforming the strongest method in a label-free setting by 27.79% in Success@5 and 44.5% in Recall@10 on average, and achieving performance comparable to or even exceeding that of supervised methods.","ins":["Korea University","Yonsei University"]},{"i":"conf/kdd/SongYHX26","t":"Improving Enzyme Prediction with Chemical Reaction Equations by Hypergraph-Enhanced Knowledge Graph Embeddings","au":[["Tengwei Song",[0,1]],["Long Yin",2],["Zhen Han",3],["Zhiqiang Xu",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780178","dblp":"https://dblp.org/rec/conf/kdd/SongYHX26.html","g":["Healthcare/Bio","Knowledge Graph","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780178","c":"jul","a":"Predicting enzyme-substrate interactions has long been a fundamental problem in biochemistry and metabolic engineering. While existing methods could leverage databases of expert-curated enzymesubstrate pairs for models to learn from known pair interactions, the databases are often sparse, i.e., there are only limited and incomplete examples of such pairs, and also labor-intensive to maintain. This lack of sufficient training data significantly hinders the ability of traditional enzyme prediction models to generalize to unseen interactions. In this work, we try to exploit chemical reaction equations from domain-specific databases, given their easier accessibility and denser, more abundant data. However, interactions of multiple compounds, e.g., educts and products, with the same enzymes create complex relational data patterns that traditional models cannot easily capture. To tackle that, we represent chemical reaction equations as triples of (educt, enzyme, product) within a knowledge graph, such that we can take advantage of knowledge graph embedding (KGE) to infer missing enzyme-substrate pairs for graph completion. Particularly, in order to capture intricate relationships among compounds, we propose our knowledge-enhanced hypergraph model for enzyme prediction, i.e., Hyper-Enz, which integrates a hypergraph transformer with a KGE model to learn representations of the hyper-edges that involve multiple educts and products. Also, a multi-expert paradigm is introduced to guide the learning of enzyme-substrate interactions with both the proposed model and chemical reaction equations. Experimental results show a significant improvement, with up to a 88% relative improvement in average enzyme retrieval accuracy and 30% improvement in pairlevel prediction compared to traditional models, demonstrating the effectiveness of our approach. ∗This work does not relate to Zhen Han’s position at Amazon. †Corresponding Author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780178","ins":["Machine Learning Department, MBZUAI","Abu Dhabi, United Arab Emirates","Meituan","Think Forward Lab, Amazon"]},{"i":"conf/kdd/SongYT26","t":"Signed Proximity Matters in Graph-based Recommendation","au":[["Yifan Song",0],["Renchi Yang",1],["Jing Tang",[0,2]]],"u":"https://doi.org/10.1145/3770854.3780298","dblp":"https://dblp.org/rec/conf/kdd/SongYT26.html","g":["Recommendation","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780298","c":"jul","a":"Graph-based models are a powerful technique for recommendation systems, which seek to leverage the graph structure created by user-item interactions for elevated performance. The majority of them are designed for unsigned graphs, which fail to exploit negative interactions (e.g., dislikes, returns) from users, and hence, incur compromised effectiveness. To tap into such negative signals, in recent years, a number of efforts have been invested towards extending graph neural networks (GNNs) and Transformer models to signed graphs. Unfortunately, the former approaches produce subpar results due to the lack of access to global information, whereas the latter achieve superior performance for recommendation but suffer from severe over-globalizing problems and substantial computational overhead. To bridge this gap, this paper presents SPGNN, which significantly unleashes the capabilities of GNNs and advances its performance for top-𝐾recommendation in signed graphs through two non-trivial technical contributions. Firstly, we propose to upgrade the neighborhood aggregation scheme in GNNs with two novel notions of signed local proximity (SLP) and signed global proximity (SGP) based on weak balance theory, which can accurately capture sign-aware multi-scale relations between nodes in signed graphs. On top of that, SPGNN includes a theoretically-grounded module for effective feature initialization, which carefully crafts sign-aware structure embeddings via fast spectral decomposition. Extensive experiments show that SPGNN significantly outperforms other unsigned and sign-aware models on six benchmark datasets with up to a gain of 19.42% in Recall and 28.18% in NDCG, which indicates the traditional GNN architecture also holds great potential for signed graph recommendation with appropriate modification. Our code is available at https://github.com/yfsong00/SPGNN.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","Hong Kong Baptist University","The Hong Kong University of Science and Technology"]},{"i":"conf/kdd/SunRXJZ26","t":"Beyond Content: Integrating Generated User Intent and Planned Behavior Theory for Reliable Fake News Detection","au":[["Ling Sun",[0,1]],["Yuan Rao",[0,1]],["Hongyang Xia",[0,1]],["Hongxu Jiang",[0,1]],["Chenlong Zhang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780276","dblp":"https://dblp.org/rec/conf/kdd/SunRXJZ26.html","g":["Web/Social"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780276","c":"jul","a":"With the rise of generative AI, the boundary between authentic and deceptive content has become increasingly ambiguous, challenging traditional fake news detection methods that rely solely on observable content or propagation structures. These approaches often neglect the underlying psychological motivations driving user behavior, leaving them susceptible to adversarial manipulation. However, as the user decision-making process is inherently unobservable, conventional deep learning models struggle to capture the cognitive mechanisms behind information sharing. To address this, we propose TPB-VAE, a psychologically grounded framework that integrates the Theory of Planned Behavior (TPB) with large language models (LLMs) to infer and encode users’ latent intent. TPB-VAE maps TPB constructs into a latent space, making the decision-making process computationally accessible. It employs semi-supervised learning specifically to infer users’ latent intent from a small subset of labeled samples, and uses the resulting intents to derive rich behavioral features for more reliable fake news detection. Extensive experiments on four real-world datasets demonstrate the effectiveness and adversarial resilience of our approach.","ins":["Xi’an Jiaotong University","School of Software Engineering"]},{"i":"conf/kdd/SunJW26","t":"On Saddle Point Avoidance and Stationary Distribution of Sharpness-Aware Minimization","au":[["Tao Sun",[0,1]],["Fan Jia",[2,3]],["Bao Wang",[2,3]]],"u":"https://doi.org/10.1145/3770854.3780209","dblp":"https://dblp.org/rec/conf/kdd/SunJW26.html","g":["Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780209","c":"jul","a":"We revisit the Sharpness-Aware Minimization (SAM) method and its unnormalized variant (USAM), which are widely used in training neural networks. In this work, we introduce three new theoretical results to enhance the understanding of (U)SAM. Firstly, we prove that deterministic USAM always converges to a local minimum and exhibits local acceleration compared to standard gradient descent, offering theoretical guarantees for its superior performance near minima. Secondly, we analyze the trade-off between convergence and escaping saddle points, showing that while SAM’s behavior may prevent convergence in some cases, it effectively helps escape saddle points, leading to better overall optimization. Lastly, we demonstrate that USAM behaves like a Markov chain in the presence of stationary noise, with the objective values on the stationary distribution being lower than those achieved by SGD, highlighting USAM’s advantages in noisy settings. All of our theoretical results are supported by the numerical experiments reported in this paper.","ins":["National University of Defense","Technology","Mathematics","University of Utah"]},{"i":"conf/kdd/SunLJZHC26","t":"Beyond Routines: Adaptive Mobility Prediction via Sequential-Relational Fusion","au":[["Tianao Sun",[0,1]],["Ruizhe Liu",[0,1]],["Wenzhen Jia",[2,3]],["Kai Zhao",4],["Workday AI",[5,6]],["Weiming Huang",[5,6]],["Meng Chen",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780268","dblp":"https://dblp.org/rec/conf/kdd/SunLJZHC26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780268","c":"jul","a":"Predicting human mobility remains a fundamental challenge, especially when individuals deviate from routine patterns due to exploration, disruptions, or rare events. While sequential models like Transformers excel at capturing regular movement patterns, their performance often degrades under nonroutine scenarios involving rare or unfamiliar transitions. To address this, we propose ROAM (Routine-Oriented Adaptive Mobility Predictor), a novel framework that jointly models human mobility from both sequential and relational perspectives, enabling adaptive handling of both routine and nonroutine behaviors during prediction. ROAM combines a sequential encoder that captures historically frequent transitions with a complementary graph-based relational reasoning module that encodes both user-specific and group-level mobility structures. To dynamically integrate these views, we introduce a hierarchical confidence-aware gating mechanism that adaptively balances sequential and relational predictions based on their internal reliability. Extensive experiments on real-world mobility datasets show that ROAM consistently outperforms state-of-the-art baselines in next location prediction. Further analysis reveals that the combination of sequential and relational reasoning substantially improves robustness, particularly under out-of-routine scenarios.","ins":["School of Software","Shandong University","Business School","Shandong Normal University","AI Lab","School of Geography","University of Leeds"]},{"i":"conf/kdd/TaiZW26","t":"Enhancing Node-Level Graph Domain Adaptation by Alleviating Local Dependency","au":[["Xinwei Tai",[0,1,2,3,4]],["Dongmian Zou",[5,6]],["Hongfei Wang",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3780221","dblp":"https://dblp.org/rec/conf/kdd/TaiZW26.html","g":["Graph/GNN","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780221","c":"jul","a":"Recent years have witnessed significant advancements in machine learning methods on graphs. However, transferring knowledge effectively from one graph to another remains a critical challenge. This highlights the need for algorithms capable of applying information extracted from a source graph to an unlabeled target graph, a task known as unsupervised graph domain adaptation (GDA). One key difficulty in unsupervised GDA is conditional shift, which hinders transferability. In this paper, we show that conditional shift can be observed only if there exists local dependencies among node features. To support this claim, we perform a rigorous analysis and also further provide generalization bounds of GDA when dependent node features are modeled using markov chains. Guided by the theoretical findings, we propose to improve GDA by decorrelating node features, which can be specifically implemented through decorrelated GCN layers and graph transformer layers. Our experimental results demonstrate the effectiveness of this approach, showing not only substantial performance enhancements over baseline GDA methods but also clear visualizations of small intra-class distances in the learned representations. Our code is available at https://github.com/TechnologyAiGroup/DFT. ∗Both authors contributed equally to this research. †Corresponding author. This work was supported by the National Natural Science Foundation of China (NSFC) under Grant No. 12301117, Grant No. 62372198 and Grant No. 62172173. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780221","ins":["Huazhong University of Science and Technology","School of Cyber Science and Engineering","Hubei Key Laboratory of Distributed System Security","Hubei Engineering Research Center on Big Data Security","Zhongguancun Academy","Zu Chongzhi Center, Digital Innovation Research Center","Duke Kunshan University"]},{"i":"conf/kdd/TanYQLYLWXQ26","t":"AURORA: Automated Training Framework of Universal Process Reward Models via Ensemble Prompting and Reverse Verification","au":[["Xiaoyu Tan",0],["Tianchu Yao",1],["Chao Qu",1],["Bin Li",[2,3]],["Minghao Yang",1],["Dakuan Lu",1],["Haozhe Wang",4],["Xu Yinghui",1],["Xihe Qiu",[2,3]]],"u":"https://doi.org/10.1145/3770854.3780168","dblp":"https://dblp.org/rec/conf/kdd/TanYQLYLWXQ26.html","g":["LLM","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780168","c":"jul","a":"The reasoning capabilities of advanced large language models (LLMs) like o1 have revolutionized artificial intelligence applications. Nevertheless, evaluating and optimizing complex reasoning processes remain significant challenges due to diverse policy distributions and the inherent limitations of human effort and accuracy. In this paper, we present AURORA1, a novel automated framework for training universal process reward models (PRMs) using ensemble prompting and reverse verification. The framework employs a two-phase approach: First, it uses diverse prompting strategies and ensemble methods to perform automated annotation and evaluation of processes, ensuring robust assessments for reward learning. Second, it leverages practical reference answers for reverse verification, enhancing the model’s ability to validate outputs and improving training accuracy. To assess the framework’s performance, we extend beyond the existing ProcessBench benchmark by introducing UniversalBench, which evaluates reward predictions across full trajectories under diverse policy distribtion with long Chain-of-Thought (CoT) outputs. Experimental results demonstrate that AURORA enhances process evaluation accuracy, improves PRMs’ accuracy for diverse policy distributions and long-CoT responses.","ins":["Tencent Youtu Lab","Fudan University","Shanghai University of Engineering","Science","The Hong Kong University of Science and Technology"]},{"i":"conf/kdd/TanWHYY26","t":"FedPRE: Robust Federated Graph Learning against Topological Corruption","au":[["Zihan Tan",[0,1]],["Guancheng Wan",[0,1]],["Wenke Huang",[0,1]],["Bin Yang",[0,1]],["Mang Ye",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780330","dblp":"https://dblp.org/rec/conf/kdd/TanWHYY26.html","g":["Federated","Graph/GNN","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780330","c":"jul","a":"Federated Graph Learning (FGL) has emerged as a compelling paradigm for distributed Graph Neural Networks (GNNs) training, prioritizing data privacy preservation. However, due to the limitations of data collection and storage conditions, FGL suffers from data corruption in real-world applications. While Federated Learning (FL) and FGL studies have addressed label corruption, the challenge of graph topological corruption remains unexamined. Specifically, this phenomenon significantly disrupts node connectivity patterns of graphs, leading GNNs to adopt flawed feature propagation paradigms. Existing methods with poor robustness are inevitably constrained due to the absence of targeted strategies for addressing the issues of global contaminated collaboration and local vulnerability. To tackle this challenge, we conduct the first comprehensive investigation of robust FGL against topological corruption and propose FedPRE. It comprises: (1) Feature Propagation Robustness Evaluation (FPRE), which evaluates client GNNs feature propagation robustness and adjusts their contribution during aggregation. (2) Topological Corruption-Resistant Enhancement (TCRE), which enhances robustness against corruption during local training. Extensive experiments validate the robustness and effectiveness of FedPRE against topological corruption. The code is available at https://github.com/OakleyTan/FedPRE.","ins":["School of Computer Science, Wuhan","University"]},{"i":"conf/kdd/WangLWQWG26","t":"SGA: Self-boosting Attributed Graph Alignment via Neighborhood Consistency-based Edge Enhancement","au":[["Chenxu Wang",[0,1]],["Wencong Lin",[0,1]],["Pinghui Wang",[2,1]],["Tao Qin",[2,1]],["Wei Wang",[0,1]],["Xiaohong Guan",[2,1]]],"u":"https://doi.org/10.1145/3770854.3780180","dblp":"https://dblp.org/rec/conf/kdd/WangLWQWG26.html","g":["Graph/GNN","Knowledge Graph"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780180","c":"jul","a":"Graph alignment, the task of identifying corresponding nodes across different graphs, is crucial for applications ranging from social network analysis to bioinformatics. Although most existing methods leverage graph neural networks (GNNs) to learn node embeddings for attributed graphs and match them based on node similarity, they often rely on objectives designed for node classification or link prediction. These approaches preserve node proximity within individual graphs but fail to capture cross-graph correspondence knowledge, leading to suboptimal alignment performance. This paper presents SGA (Self-boosting Graph Alignment), a novel framework that introduces a self-supervised objective and an iterative refinement scheme for robustly aligning attributed graphs. SGA begins with an unsupervised Graph Convolutional Network (GCN) to learn initial node representations. Then, a contrastive loss is designed to train the GCN using stably aligned node pairs derived from these initial embeddings. This constraint distinguishes closely connected nodes within individual graphs by leveraging crossgraph correspondence knowledge, thereby promoting accurate alignment across graphs. To handle graphs with incomplete topology, SGA incorporates an iterative refinement process enhanced by a neighborhood consistency metric. This metric evaluates the reliability of complementary edges, ensuring that only reliable connections are used to refine the graph structures. The refined graphs are then fed back into the GCN for the subsequent iterations, with the process terminating when no additional pseudo-aligned node pairs are identified or a maximum iteration count is reached. Extensive experiments on four real-world and two synthetic datasets demonstrate that SGA outperforms state-of-the-art graph alignment methods by an average of 5.8% in alignment accuracy. Our code is publicly available at https://github.com/XNetLab/SGA. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780180","ins":["School of Software Engineering","Xi’an Jiaotong University","MoE Key Lab of Intelligent Networks and Network Security"]},{"i":"conf/kdd/WangXZZ26","t":"Fast Algorithms for Group Markov Centrality Optimization","au":[["Gengyu Wang",[0,1]],["Haisong Xia",[0,1]],["Runze Zhang",[0,1]],["Zhongzhi Zhang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780201","dblp":"https://dblp.org/rec/conf/kdd/WangXZZ26.html","g":["Graph/GNN","Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780201","c":"jul","a":"The identification of crucial nodes in complex networks is a fundamental problem with broad applications in graph mining, influence maximization, and other domains. Centrality measures, such as Markov centrality, quantify node importance by leveraging random walk dynamics, particularly hitting times. However, optimizing group Markov centrality, which is defined as the inverse of the expected hitting time to a node set, poses significant computational challenges due to its NP-hard nature. In this work, we propose efficient approximation algorithms based on dynamic forest sampling and Schur complement techniques to address this problem. Our algorithms exploit the supermodularity of hitting time functions and employ rooted spanning forest sampling to estimate electrical network quantities, enabling scalable and accurate node selection. Theoretical guarantees demonstrate that our methods achieve near-linear solutions with provable error bounds. Extensive experiments on diverse real-world networks validate the practical effectiveness of our approaches, demonstrating significant improvements in computational efficiency and scalability compared to conventional methods.","ins":["College of Computer Science and Artificial Intelligence","Fudan University"]},{"i":"conf/kdd/WangYWFJ26","t":"Towards Resilient Transportation: A Conditional Transformer for Accident-Informed Traffic Forecasting","au":[["Hongjun Wang",0],["Jiawei Yong",1],["Jiawei Wang",0],["Shintaro Fukushima",1],["Renhe Jiang",0]],"u":"https://doi.org/10.1145/3770854.3780312","dblp":"https://dblp.org/rec/conf/kdd/WangYWFJ26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780312","c":"jul","a":"Traffic prediction remains a key challenge in spatio-temporal data mining, despite progress in deep learning. Accurate forecasting is hindered by the complex influence of external factors such as traffic accidents and regulations, often overlooked by existing models due to limited data integration. To address these limitations, we present two enriched traffic datasets from Tokyo and California, incorporating traffic accident and regulation data. Leveraging these datasets, we propose ConFormer (Conditional Transformer), a novel framework that integrates graph propagation with guided normalization layer. This design dynamically adjusts spatial and temporal node relationships based on historical patterns, enhancing predictive accuracy. Our model surpasses the state-of-the-art STAEFormer in both predictive performance and efficiency, achieving lower computational costs and reduced parameter demands. Extensive evaluations demonstrate that ConFormer consistently outperforms mainstream spatio-temporal baselines across multiple metrics, underscoring its potential to advance traffic prediction research.The code is released in https://github.com/Dreamzz5/ConFormer.","ins":["The University of Tokyo","Toyota Motor Corporation"]},{"i":"conf/kdd/WangXL26","t":"Lower Bias, Higher Welfare: How Creator Competition Reshapes Bias-Variance Tradeoff in Recommendation Platforms?","au":[["Kang Wang",[0,1,2]],["Renzhe Xu",[0,3,2]],["Bo Li",[4,5]]],"u":"https://doi.org/10.1145/3770854.3780228","dblp":"https://dblp.org/rec/conf/kdd/WangXL26.html","g":["Recommendation","Fairness/Bias"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780228","c":"jul","a":"Understanding the bias-variance tradeoff in user representation learning is essential for improving recommendation quality in modern content platforms. While well studied in static settings, this tradeoff becomes significantly more complex when content creators strategically adapt to platform incentives. To analyze how such competition reshapes the tradeoff for maximizing user welfare, we introduce the Content Creator Competition with Bias-Variance Tradeoff (𝐶3 𝐵𝑉) framework, a tractable game-theoretic model that captures the platform’s decision on regularization strength in user feature estimation. We derive and compare the platform’s optimal policy under two key settings: a non-strategic baseline with fixed content and a strategic environment where creators compete in response to the platform’s algorithmic design. Our theoretical analysis in a stylized model shows that, compared to the non-strategic environment, content creator competition shifts the platform’s optimal policy toward weaker regularization, thereby favoring lower bias in the bias-variance tradeoff. To validate and assess the robustness of these insights beyond the stylized setting, we conduct extensive experiments on both synthetic and real-world benchmark datasets. The empirical results consistently support our theoretical conclusion: in strategic environments, reducing bias leads to higher user welfare. These findings offer practical implications for the design of real-world recommendation algorithms in the presence of content creator competition.†","ins":["Institute for Theoretical Computer","Science","Shanghai University of Finance and Economics","Science, MoE Key Laboratory of Interdisciplinary Research of Computation and Economics","School of Economics and Management","Tsinghua University"]},{"i":"conf/kdd/WangWNZWMD26","t":"SaVe-TAG: LLM-based Interpolation for Long-Tailed Text-Attributed Graphs","au":[["Leyao Wang",0],["Yu Wang",1],["Bo Ni",2],["Yuying Zhao",2],["Hanyu Wang",3],["Yao Ma",[4,5]],["Tyler Derr",2]],"u":"https://doi.org/10.1145/3770854.3780311","dblp":"https://dblp.org/rec/conf/kdd/WangWNZWMD26.html","g":["Graph/GNN","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780311","c":"jul","a":"Real-world graph data often follows long-tailed distributions, making it difficult for Graph Neural Networks (GNNs) to generalize well across both head and tail classes. Recent advances in Vicinal Risk Minimization (VRM) have shown promise in mitigating class imbalance with numeric interpolation; however, existing approaches largely rely on embedding-space arithmetic, which fails to capture the rich semantics inherent in text-attributed graphs. In this work, we propose our method SaVe-TAG (Semantic-aware Vicinal Risk Minimization for Long-Tailed Text-Attributed Graphs), a novel VRM framework that leverages Large Language Models (LLMs) to perform text-level interpolation, generating on-manifold, boundary-enriching synthetic samples for minority classes. To mitigate the risk of noisy generation, we introduce a confidence-based edge assignment mechanism that uses graph topology as a natural filter to ensure structural consistency. We provide theoretical justification for our method and conduct extensive experiments on benchmark datasets, showing that our approach consistently outperforms both numeric interpolation and prior long-tailed node classification baselines. Our results highlight the importance of integrating semantic and structural signals for balanced and effective learning on text-attributed graphs. The source code is publicly available at: https://github.com/LWang-Laura/SaVe-TAG.","ins":["Yale University","University of Oregon","Vanderbilt University","Renmin University of China","Rensselaer Polytechnic","Institute"]},{"i":"conf/kdd/WangZLC26","t":"Enhancing Multimodal Recommendation via Multimodal Representation Calibration in Spectral Domain","au":[["Minghui Wang",[0,1,2]],["Tingting Zhang",3],["Yu Li",[0,1,2]],["Yi Chang",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3780208","dblp":"https://dblp.org/rec/conf/kdd/WangZLC26.html","g":["Recommendation","Multimodal/VLM"],"g_source":"claude-direct","d":"research","ins":["School of Artificial Intelligence, Engineering Research","Center of Knowledge-Driven Human-Machine Intelligence","of Ministry of Education, Jilin University","Institute of Big Data and Interdisciplinary Science, School of Statistics and Data Science, Jilin University of Finance and Economics"],"acm":"https://dl.acm.org/doi/10.1145/3770854.3780208","c":"jul","a":"Multimodal recommendation, which integrates user-item interactions with rich item multimodal features to infer user preferences, has emerged as one of the state-of-the-art recommendation paradigms. However, most existing multimodal recommendation methods focus solely on the multimodal fusion process of items, overlooking the impact of modality-specific noise characteristics and inter-modal distribution shifts on the fusion process. As a result, noise from specific modalities may be inadvertently amplified during the fusion of multimodal representations, thereby degrading the quality of fused representations and ultimately undermining recommendation accuracy. To address this issue, we propose a novel framework, DAMPS, which Denoises and cAlibrates multimodal representations in the spectral domain from the perspectives of both aMplitude and Phase Spectrum. Specifically, we first apply the Fast Fourier Transform to decompose multimodal representations into amplitude spectrum and phase spectrum components. We then propose the adaptive phase calibrator, which resolves the phase distribution shift between modalities through the optimal minimum variance unbiased estimate of phase offset and adaptive phase rotation. We further develop the amplitude variance-ratio filter, which suppresses modality-specific amplitude noise while preserving prominent modality-specific representations. Finally, we introduce the inter-modal coherence filter, which quantifies and enhances the intrinsic shared information between modalities through amplitude-squared coherence, thereby eliminating irrelevant modality noise. Technically, DAMPS is model-agnostic and highly flexible, enabling seamless integration with various multimodal recommendation backbones. Extensive evaluations on five public multimodal recommendation datasets demonstrate that ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780208 DAMPS consistently improves recommendation performance and achieves state-of-the-art results."},{"i":"conf/kdd/WangZWH26","t":"AbFlow: End-to-end Paratope-Centric Antibody Design by Interaction Enhanced Flow Matching","au":[["Wenda Wang",0],["Yang Zhang",[1,0]],["Zhewei Wei",0],["Wenbing Huang",0]],"u":"https://doi.org/10.1145/3770854.3780296","dblp":"https://dblp.org/rec/conf/kdd/WangZWH26.html","g":["Healthcare/Bio","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780296","c":"jul","a":"Antigen-antibody binding is a critical process in the immune response. Although recent progress has advanced antibody design, current methods lack a generative framework for end-to-end modeling of full-atom antibody structures and struggle to fully exploit antigen-specific geometric information for optimizing local binding interfaces and global structures. To overcome these limitations, we introduce AbFlow, a flow-matching framework that leverages optimal transport to design full-atom antibodies end-to-end. AbFlow incorporates an extended velocity field network featuring an equivariant Surface Multi-channel Encoder, which uses surface-level antigen interaction data to refine the antibody structure, particularly the CDR-H3 region. Extensive experiments in paratoep-centric antibody design, multi-CDRs and full-atom antibody design, binding affinity optimization, and complex structure prediction show that AbFlow produces superior antigen-antibody complexes, especially at the contact interface, and markedly improves the binding affinity of generated antibodies.","ins":["Renmin University of China, Beijing, China","China National Institute of Standardization, Beijing, China"]},{"i":"conf/kdd/WangWMLHCGS26","t":"Towards Privacy-Preserving and Heterogeneity-aware Split Federated Learning via Probabilistic Masking","au":[["Xingchen Wang",0],["Feijie Wu",0],["Chenglin Miao",1],["Tianchun Li",0],["Haoyu Hu",0],["Qiming Cao",0],["Jing Gao",0],["Lu Su",0]],"u":"https://doi.org/10.1145/3770854.3780255","dblp":"https://dblp.org/rec/conf/kdd/WangWMLHCGS26.html","g":["Federated","Privacy/DP"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780255","c":"jul","a":"Split Federated Learning (SFL) has emerged as an efficient alternative to traditional Federated Learning (FL) by reducing client-side computation through model partitioning. However, exchanging of intermediate activations and model updates introduces significant privacy risks, especially from data reconstruction attacks that recover original inputs from intermediate representations. Existing defenses using noise injection often degrade model performance. To overcome these challenges, we present PM-SFL, a scalable and privacy-preserving SFL framework that incorporates Probabilistic Mask training to add structured randomness without relying on explicit noise. This mitigates data reconstruction risks while maintaining model utility. To address data heterogeneity, PM-SFL employs personalized mask learning that tailors submodel structures to each client’s local data. For system heterogeneity, we introduce a layer-wise knowledge compensation mechanism, enabling clients with varying resources to participate effectively under adaptive model splitting. Theoretical analysis confirms its privacy protection, and experiments on image and wireless sensing tasks demonstrate that PM-SFL consistently improves accuracy, communication efficiency, and robustness to privacy attacks, with particularly strong performance under data and system heterogeneity.","ins":["Purdue University","Iowa State University"]},{"i":"conf/kdd/WangHHX26","t":"Communication-efficient Federated Graph Classification via Generative Diffusion Modeling","au":[["Xiuling Wang",0],["Xin Huang",0],["Haibo Hu",1],["Jianliang Xu",0]],"u":"https://doi.org/10.1145/3770854.3780262","dblp":"https://dblp.org/rec/conf/kdd/WangHHX26.html","g":["Federated","Graph/GNN","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780262","c":"jul","a":"Graph Neural Networks (GNNs) unlock new ways of learning from graph-structured data, proving highly effective in capturing complex relationships and patterns. Federated GNNs (FGNNs) have emerged as a prominent distributed learning paradigm for training GNNs over decentralized data. However, FGNNs face two significant challenges: high communication overhead from multiple rounds of parameter exchanges and non-IID data characteristics across clients. To address these issues, we introduce CeFGC, a novel FGNN paradigm that facilitates efficient GNN training over non-IID data by limiting communication between the server and clients to three rounds only. The core idea of CeFGC is to leverage generative diffusion models to minimize direct client-server communication. Each client trains a generative diffusion model that captures its local graph distribution and shares this model with the server, which then redistributes it back to all clients. Using these generative models, clients generate synthetic graphs combined with their local graphs to train local GNN models. Finally, clients upload their model weights to the server for aggregation into a global GNN model. We theoretically analyze the I/O complexity of communication volume to show that CeFGC reduces to a constant of three communication rounds only. Extensive experiments on several real graph datasets demonstrate the effectiveness and efficiency of CeFGC against state-of-the-art competitors, reflecting our superior performance on non-IID graphs by aligning local and global model objectives and enriching the training set with diverse graphs.","ins":["Hong Kong Baptist University","Hong Kong Polytechnic University"]},{"i":"conf/kdd/WangMZWSQWLLWXZ26","t":"IMPACTNet: Unifying Auto-bidding in End-to-End Merged Auctions","au":[["Yuhan Wang",[0,1,2]],["Yuchao Ma",[0,1,2]],["Liang Zhang",[0,1,2]],["Ziyuan Wang",[0,1,2]],["Zhiyuan Su",[0,1,2]],["Qi Qi",[0,1,2,3]],["on Large Models and Intelligent",[4,5]],["Yafei Wang",6],["Xu Li",6],["Yuyao Liu",6],["Pengjie Wang",6],["Jian Xu",6],["Bo Zheng",6]],"u":"https://doi.org/10.1145/3770854.3780244","dblp":"https://dblp.org/rec/conf/kdd/WangMZWSQWLLWXZ26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780244","c":"jul","a":"Merging mechanisms, as a mature business model in the field of online advertising, refers to the practice where platforms sort and display sponsored ads provided by advertisers alongside organic results to users according to specific rules. However, in real-world industrial scenarios, advertisers are gradually adopting autobidding instead of manual bidding—they only need to provide high-level constraints like target Return-on-Spend (tROS) to the agent, which then bids on their behalf to maximize multi-round value. Existing studies often overlook this actual business form, resulting in suboptimal outcomes. Meanwhile, the coexistence of the same item in both ad and organic result forms within merging mechanisms further increases the complexity of the context. In terms of interests, advertisers aim to maximize conversion value, while platforms seek to increase the revenue while ensuring user experience, thereby enhancing reputation. Nevertheless, existing works often fail to address this multi-stakeholder challenge in the modern auto-bidding era. To address these issues, we introduce IMPACTNet, an end-toend framework based on automated mechanism design that learns a unified allocation and pricing mechanism. IMPACTNet directly incorporates advertisers’ tROS constraints, models complex contextual information using a transformer-based architecture, and introduces a learnable, state-aware de-duplication strategy. By formulating the design as a constrained optimization problem, our framework learns a mechanism that ensures Auto-bidding Incentive Compatibility (AIC), ensuring truthfully reporting tROS a dominant ∗Work done during internships at Alibaba Group. †Both authors contributed equally to this research. ‡Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780244 strategy. Extensive experiments on synthetic and large-scale industrial datasets demonstrate that IMPACTNet significantly outperforms established baselines, achieving a better balance of platform objectives, user experience, and advertiser tROS satisfaction.","ins":["Gaoling School of Artifcial","Intelligence","Renmin University of China","Beijing Key Laboratory of Research","Governance","Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE","Alibaba Group"]},{"i":"conf/kdd/WangYYMZ26","t":"Breaking Robustness Barriers in Cognitive Diagnosis: A One-Shot Neural Architecture Search Perspective","au":[["Ziwen Wang",[0,1,2,3]],["Shangshang Yang",[4,2,3]],["Xiaoshan Yu",5],["Haiping Ma",[6,3]],["Xingyi Zhang",4]],"u":"https://doi.org/10.1145/3770854.3780159","dblp":"https://dblp.org/rec/conf/kdd/WangYYMZ26.html","g":["Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780159","c":"jul","a":"With the advancement of network technologies, intelligent tutoring systems (ITS) have emerged to deliver increasingly precise and tailored personalized learning services. Cognitive diagnosis (CD) has emerged as a core research task in ITS, aiming to infer learners’ mastery of specific knowledge concepts by modeling the mapping between learning behavior data and knowledge states. However, existing research prioritizes model performance enhancement while neglecting the pervasive noise contamination in observed response data, significantly hindering practical deployment. Furthermore, current cognitive diagnosis models (CDMs) rely heavily on researchers’ domain expertise for structural design, which fails to exhaustively explore architectural possibilities, thus leaving model architectures’ full potential untapped. To address this issue, we propose OSCD, an evolutionary multi-objective OneShot neural architecture search method for Cognitive Diagnosis, designed to efficiently and robustly improve the model’s capability in assessing learner proficiency. Specifically, OSCD operates through two distinct stages: training and searching. During the training stage, we construct a search space encompassing diverse architectural combinations and train a weight-sharing supernet ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780159 represented via the complete binary tree topology, enabling comprehensive exploration of potential architectures beyond manual design priors. In the searching stage, we formulate the optimal architecture search under heterogeneous noise scenarios as a multiobjective optimization problem (MOP), and develop an optimization framework integrating a Pareto-optimal solution search strategy with cross-scenario performance evaluation for resolution. Extensive experiments on real-world educational datasets validate the effectiveness and robustness of the optimal architectures discovered by our OSCD model for CD tasks.","ins":["School of Computer Science and Technology, Key Laboratory of Intelligent Computing and Signal","Processing of Ministry of Education, Anhui University","Anhui Province Key Laboratory of Intelligent Computing and Applications, Huaibei Normal","University","School of Computer Science and Technology, Anhui University","School of Artificial Intelligence, Anhui University","Institutes of Physical Science and Information Technology, Anhui"]},{"i":"conf/kdd/WeiNZC26","t":"Beyond Basic A/B Testing: Improving Statistical Efficiency for Business Growth","au":[["Changshuai Wei",0],["Phuc Nguyen",0],["Benjamin Zelditch",0],["Joyce Chen",0]],"u":"https://doi.org/10.1145/3770854.3780326","dblp":"https://dblp.org/rec/conf/kdd/WeiNZC26.html","g":["Causal"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780326","c":"jul","a":"The standard A/B testing approaches are mostly based on t-test in large scale industry applications. These standard approaches however suffers from low statistical power in business settings, due to nature of small sample-size or non-Gaussian distribution or returnon-investment (ROI) consideration. In this paper, we (i) show the statistical efficiency of using estimating equation and U statistics, which can address these issues separately; and (ii) propose a novel doubly robust generalized U that allows flexible definition of treatment effect, and can handles small samples, distribution robustness, ROI and confounding consideration in one framework. We provide theoretical results on asymptotics and efficiency bounds, together with insights on the efficiency gain from theoretical analysis. We further conduct comprehensive simulation studies, apply the methods to multiple real A/B tests at LinkedIn, and share results and learnings that are broadly useful.","ins":["LinkedIn"]},{"i":"conf/kdd/WeiHWCWBZXZW26","t":"Balanced Anomaly-guided Ego-graph Diffusion Model for Inductive Graph Anomaly Detection","au":[["Chunyu Wei",0],["Siyuan He",0],["Yu Wang",0],["Independent Researcher",0],["Yueguo Chen",0],["Yunhai Wang",0],["Bing Bai",1],["Yidong Zhang",0],["Yong Xie",2],["Shunming Zhang",0],["Fei Wang",3]],"u":"https://doi.org/10.1145/3770854.3780240","dblp":"https://dblp.org/rec/conf/kdd/WeiHWCWBZXZW26.html","g":["Anomaly/Outlier","Graph/GNN","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780240","c":"jul","a":"Graph anomaly detection (GAD) is crucial in applications like fraud detection and cybersecurity. Despite recent advancements using graph neural networks (GNNs), two major challenges persist. At the model level, most methods adopt a transductive learning paradigm, which assumes static graph structures, making them unsuitable for dynamic, evolving networks. At the data level, the extreme class imbalance, where anomalous nodes are rare, leads to biased models that fail to generalize to unseen anomalies. These challenges are interdependent: static transductive frameworks limit effective data augmentation, while imbalance exacerbates model distortion in inductive learning settings. To address these challenges, we propose a novel data-centric framework that integrates dynamic graph modeling with balanced anomaly synthesis. Our framework features: (1) a discrete ego-graph diffusion model, which captures the local topology of anomalies to generate ego-graphs aligned with anomalous structural distribution, and (2) a curriculum anomaly augmentation mechanism, which dynamically adjusts synthetic data generation during training, focusing on underrepresented anomaly patterns to improve detection and generalization. Experiments on five datasets demonstrate that the effectiveness of our framework. ∗Both authors contributed equally to this research. †Corresponding author. He works at BRAIN of RUC. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780240","ins":["Renmin University of China","Microsoft","Nanjing University of Posts and Telecommunications","Cornell University"]},{"i":"conf/kdd/WeiYYSPWHF26","t":"Mitigating Privacy Risks in Graph Condensation from a Hyperbolic Geometry Perspective","au":[["Yuecen Wei",0],["Liu Yang",1],["Beining Yang",2],["Qingyun Sun",0],["Hao Peng",0],["Tianyu Wo",0],["Chunming Hu",0],["Xingcheng Fu",1]],"u":"https://doi.org/10.1145/3770854.3780335","dblp":"https://dblp.org/rec/conf/kdd/WeiYYSPWHF26.html","g":["Graph/GNN","Privacy/DP"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780335","c":"jul","a":"Graph condensation reduces large graphs into smaller synthetic ones for efficient training and potential privacy protection. While existing studies demonstrate graph condensation’s resilience against membership inference attacks (MIAs), key questions remain unanswered: Can the common MIAs’ accuracy truly represent the privacypreserving capabilities of graph condensation? Does it remain robust against more powerful adversaries? And what are the underlying reasons for its performance? This paper investigates the privacy risks of gradient-matching-based condensation via tailored MIAs. We reveal that existing methods often face a trade-off between performance and generalization, where increasing node diversity can unintentionally amplify privacy leakage. Moreover, existing methods either homogenize nodes of the same class to maximize task-specific performance at the cost of generalization or enhance node diversity by efficiently incorporating additional information to improve model generalization, but such diversity inevitably expands the attack reasoning due to increased data disparity. To better balance performance and privacy, we propose a novel graph condensation framework (HDGC) that investigates privacy issues in graph condensation from a hyperbolic geometric perspective. Specifically, we first leverage hyperbolic geometric properties to constrain gradient-matching directions (HGGM), thereby obtaining latent hierarchical semantic guidance when learning the synthetic graph’s topology. This mechanism measures node importance in hyperbolic space to enhance model generalization. Subsequently, we introduce hyperbolic adaptive differentially private noise during gradient matching (HADP). This perturbation intelligently adjusts noise influence based on local gradient importance and global geometric ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780335 radius, ensuring diversity among same-class nodes while preserving differential privacy. Finally, relying on the post-processing principle of differential privacy, we incorporate distributionally robust optimization to mitigate excessive utility degradation caused by noise injection without compromising privacy gu
