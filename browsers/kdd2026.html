<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paper List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Fraunces:opsz,wght,SOFT@9..144,400..600,0..100&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===========================================================
     Catalog — editorial reading list (light surface).
     Titles in clean sans; body / chips / marginalia in Fraunces.
     Palette: light page, ink, oxide-red, saffron, moss.
     =========================================================== */
  :root {
    --page:         #f6f8fa;     /* page background */
    --paper:        #ffffff;     /* card / header surface */
    --paper-rib:    #f1f3f5;     /* hover band */
    --paper-deep:   #eef1f4;     /* abstract block */
    --rule:         #e1e4e8;     /* hairline */
    --rule-soft:    #eef0f3;
    --ink:          #1a1a1a;
    --ink-2:        #383b40;
    --ink-3:        #5c636b;
    --ink-4:        #8a929b;
    --oxide:        #8c2b1c;     /* primary accent — active tab, links */
    --oxide-tint:   #fbe9e5;
    --oxide-deep:   #6b1f13;
    --saffron:      #b8862a;     /* spotlight bookmark — for badge text contrast */
    --saffron-tint: #fdf3d6;
    --gold:         #e3a318;     /* brighter gold for spotlight border + gutter number */
    --moss:         #2f6b46;
    --moss-tint:    #e2eee6;
    --slate:        #2a5680;     /* poster badge — cool counterpart to saffron */
    --slate-tint:   #e3ecf5;
    --slate-deep:   #1d3f5e;
    --highlight:    #fff3a0;
    --focus:        #8c2b1c;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--saffron-tint); color: var(--ink); }

  /* ---------- HEADER --------------------------------------- */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 14px 32px 10px;
  }
  header::after {
    /* chapter rule — a second hairline */
    content: "";
    position: absolute; left: 32px; right: 32px; bottom: 4px;
    height: 1px; background: var(--rule-soft);
  }

  /* h1 — Bricolage Grotesque: a modern variable grotesque with subtle
     character (slight optical-size flair at display sizes). */
  h1 {
    margin: 0 0 10px;
    font-family: 'Bricolage Grotesque', 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 24px;
    font-weight: 600;
    font-variation-settings: "opsz" 36;
    letter-spacing: -0.018em;
    color: var(--ink);
    display: flex;
    align-items: baseline;
    gap: 14px;
    line-height: 1.15;
  }
  h1 .conf-select {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 22px 4px 8px;
    border: 1px solid var(--rule);
    border-radius: 0;
    background: transparent
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='6' viewBox='0 0 8 6'><path d='M0 0l4 6 4-6z' fill='%238c2b1c'/></svg>")
      no-repeat right 6px center;
    color: var(--ink-2);
    cursor: pointer;
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    align-self: center;
  }
  h1 .conf-select:hover { border-color: var(--oxide); color: var(--ink); }
  h1 .conf-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 400;
    font-size: 12px;
    color: var(--ink-4);
    letter-spacing: 0.02em;
    align-self: center;
  }

  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .row:last-of-type { margin-bottom: 0; }

  /* Tabs — typographic, oxide underline on active */
  .tabs {
    display: flex;
    gap: 2px;
    align-items: stretch;
    margin-right: 4px;
  }
  .tab {
    padding: 5px 11px 6px;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: 'Inter Tight', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink-3);
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: color 120ms ease, border-color 120ms ease;
    border-radius: 0;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--oxide);
    border-bottom-color: var(--oxide);
    background: transparent;
  }
  .tab .count {
    margin-left: 5px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    font-weight: 400;
    color: var(--ink-4);
    letter-spacing: 0;
    text-transform: none;
  }
  .tab.active .count { color: var(--oxide); }

  /* Track sub-tabs (the second row, only when BADGES is configured).
     Slightly smaller / lighter than the cycle tabs above. */
  .track-tabs .tab {
    padding: 3px 9px 4px;
    font-size: 11px;
    letter-spacing: 0.03em;
  }
  .track-tabs .tab .count { font-size: 10px; }

  /* Inputs / selects — bottom-rule, no boxes */
  input[type=text],
  select {
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--rule);
    border-radius: 0;
    padding: 5px 8px 5px 10px;
    outline: none;
    transition: border-color 140ms ease;
  }
  select {
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    padding-right: 22px;
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='6' viewBox='0 0 8 6'><path d='M0 0l4 6 4-6z' fill='%235c636b'/></svg>")
      no-repeat right 4px center;
    cursor: pointer;
    max-width: 300px;
  }
  select:hover { border-color: var(--ink-3); }
  select option { background: var(--paper); color: var(--ink); padding: 6px 14px 6px 14px; }
  select option.top-level { font-weight: 600; color: var(--ink-2); }
  select optgroup { font-family: 'Inter Tight', sans-serif; font-style: normal; font-weight: 600; color: var(--ink-2); padding-left: 10px; }

  /* Keyword tag names can run long ("spatiotemporal forecasting" etc.) —
     give the keyword dropdown more room so the open list is comfortable. */
  #kw-topic { max-width: 460px; min-width: 280px; }
  #official-topic { max-width: 460px; min-width: 240px; }

  input[type=text] {
    min-width: 320px;
    border-bottom: 1px solid var(--ink-3);
    font-size: 14px;
    padding-left: 22px;
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235c636b' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>")
      no-repeat left 2px center;
  }
  input[type=text]:focus,
  select:focus { border-bottom-color: var(--oxide); }
  input[type=text]::placeholder {
    color: var(--ink-4);
    font-style: italic;
  }

  input[type=checkbox] {
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    width: 13px; height: 13px;
    border: 1px solid var(--ink-3);
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    position: relative;
    margin: 0 4px 0 0;
    vertical-align: -2px;
    transition: background-color 100ms ease, border-color 100ms ease;
  }
  input[type=checkbox]:checked {
    background: var(--oxide);
    border-color: var(--oxide);
  }
  input[type=checkbox]:checked::after {
    content: "";
    position: absolute; left: 3px; top: 0px;
    width: 4px; height: 8px;
    border: solid var(--paper);
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }

  label {
    font-size: 12px;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  label:hover { color: var(--ink); }

  .filter-label {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-3);
    margin-right: -4px;
    font-weight: 400;
    letter-spacing: 0.005em;
  }

  .stats {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-3);
    margin-left: auto;
    letter-spacing: 0.02em;
  }

  .reset {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--oxide);
    cursor: pointer;
    padding: 2px 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .reset:hover { color: var(--oxide-deep); }

  .back-btn {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    padding: 2px 4px;
    display: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .back-btn:hover { color: var(--oxide); }

  .warn {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    color: var(--saffron);
    display: none;
  }

  /* ---------- FAVORITES ------------------------------------ */
  .fav-only-label {
    font-size: 12px;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .fav-only-label input { margin: 0; cursor: pointer; }
  .fav-only-label .count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--saffron);
    padding: 1px 5px;
    background: var(--saffron-tint);
    border-radius: 2px;
    min-width: 18px;
    text-align: center;
  }
  .fav-tool {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-3);
    cursor: pointer;
    padding: 2px 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .fav-tool:hover { color: var(--saffron); }
  .fav-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 0 2px;
    margin: 0;
    font-size: 18px;
    line-height: 1;
    color: var(--ink-4);
    cursor: pointer;
    transition: color 0.12s, transform 0.08s;
    font-family: inherit;
  }
  .fav-btn:hover { color: var(--saffron); transform: scale(1.12); }
  .fav-btn.is-fav { color: var(--gold); }
  .fav-btn.is-fav:hover { color: var(--saffron); }
  .conf-pill {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 2px;
    color: var(--ink-3);
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    flex-shrink: 0;
  }

  /* ---------- MAIN / LIST --------------------------------- */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 32px 80px;
    position: relative;
  }

  /* Catalog entry — boxed card with numeric gutter + content. */
  .card {
    display: grid;
    grid-template-columns: 48px 1fr;
    column-gap: 16px;
    row-gap: 3px;
    padding: 10px 22px 14px 0;
    margin-bottom: 10px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--paper);
    position: relative;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .card:hover {
    border-color: var(--ink-4);
    box-shadow: 0 1px 3px rgba(26,26,26,0.04);
  }

  /* Stable paper number — pulled from data-idx (set in JS at load time
     using position in PAPERS array). Survives filter / pagination. */
  .card::before {
    grid-column: 1;
    grid-row: 1 / span 2;
    content: attr(data-idx);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    font-weight: 400;
    color: var(--ink-4);
    letter-spacing: 0.04em;
    padding-top: 13px;
    text-align: right;
    user-select: none;
    line-height: 1;
    border-right: 1px solid var(--rule);
    padding-right: 10px;
    margin-left: 6px;
    align-self: stretch;
  }
  #list { /* stable per-paper numbering — no counter reset needed */ }

  /* Spotlight — vivid gold left edge + gold-tinted number in the gutter.
     Number itself comes from data-idx (same as regular cards). */
  .card.spotlight-card {
    border-left: 3px solid var(--gold);
  }
  .card.spotlight-card:hover {
    border-color: var(--ink-4);
    border-left-color: var(--gold);
  }
  .card.spotlight-card::before {
    color: var(--gold);
    border-right-color: var(--gold);
  }

  .card-head {
    grid-column: 2;
    display: contents;
  }
  .badge {
    display: inline-block;
    min-width: 78px;
    text-align: center;
    font-family: 'JetBrains Mono', ui-monospace, "SF Mono", monospace;
    font-size: 9.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 12px 2px;
    margin: 0;
    flex-shrink: 0;
    border-radius: 2px;
    line-height: 1.4;
    align-self: flex-start;
    justify-self: start;
  }
  .badge.spotlight {
    background: var(--saffron-tint);
    color: var(--saffron);
    box-shadow: inset 0 0 0 1px rgba(184, 134, 42, 0.25);
  }
  .badge.regular {
    background: var(--slate-tint);
    color: var(--slate-deep);
    box-shadow: inset 0 0 0 1px rgba(42, 86, 128, 0.18);
  }
  /* Track-style badges for DBLP-sourced conferences (KDD / WWW).
     All hues tuned to the same saturation/lightness as track-red (plum):
     bg ≈ hsl(h, 22%, 90%), text ≈ hsl(h, 40-45%, 30%), shadow opacity 22%.
     This keeps the palette consistent — the "weight" of each color is
     visually equivalent. */
  .badge.track-blue {
    /* Azure — academic, the "primary" track color; bumped a notch
       brighter than the baseline-keynote saturation. */
    background: #d6e2ee;
    color: #264b78;
    box-shadow: inset 0 0 0 1px rgba(38, 75, 120, 0.24);
  }
  .badge.track-purple {
    /* Violet — replaces the green slot for Industry / ADS. */
    background: #e6deeb;
    color: #523d76;
    box-shadow: inset 0 0 0 1px rgba(82, 61, 118, 0.24);
  }
  .badge.track-amber {
    /* Honey — warm but distinct from oxide keyword tags; bumped
       brighter / more golden than the baseline. */
    background: #f0dfb8;
    color: #7e5e10;
    box-shadow: inset 0 0 0 1px rgba(126, 94, 16, 0.24);
  }
  .badge.track-red {
    /* Plum/wine — kept in the warm family but distinct from the oxide
       red used by keyword chips (avoids visual confusion). Reference
       saturation/lightness target for all the other track-* badges. */
    background: #ecdee4;
    color: #6e2a40;
    box-shadow: inset 0 0 0 1px rgba(110, 42, 64, 0.22);
  }
  .badge.track-neutral {
    /* Stone gray — quiet "default" for short papers etc. */
    background: #e6e8ec;
    color: #4d525a;
    box-shadow: inset 0 0 0 1px rgba(77, 82, 90, 0.22);
  }
  .card-head > div[style*="flex"] {
    grid-column: 2;
    min-width: 0;
  }
  .card-head > .badge + div[style*="flex"] { margin-left: 0; }

  /* Top row: badge on left + link buttons (ICML PAGE / OPENREVIEW / DBLP)
     pushed to right edge of the card. */
  .top-row {
    grid-column: 2;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .top-links {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
    align-items: center;
  }

  /* ---------- TITLE / AUTHORS / INST --------------------- */
  /* Title — clean sans, not fancy. Slightly larger than body. */
  .title {
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    font-weight: 650;
    line-height: 1.35;
    letter-spacing: -0.012em;
    color: var(--ink);
    margin: 0;
    text-wrap: balance;
  }

  .authors {
    margin-top: 8px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-2);
    font-weight: 400;
  }
  .authors sup {
    color: var(--oxide);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 9px;
    margin-left: 1px;
    top: -0.35em;
    position: relative;
    line-height: 0;
  }

  .institutions {
    margin-top: 2px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-3);
    font-style: italic;
  }
  .institutions .inst-num {
    color: var(--oxide);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-style: normal;
    font-size: 10px;
    margin-right: 2px;
  }
  .institutions .inst-item {
    margin-right: 14px;
    display: inline-block;
  }

  /* ---------- LINKS / CHIPS ----------------------------- */
  .links {
    margin-top: 6px;
    font-size: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px 10px;
    align-items: center;
  }
  .links a,
  .top-links a {
    color: var(--oxide);
    text-decoration: none;
    font-weight: 500;
    font-size: 10.5px;
    padding: 1px 0;
    border-bottom: 1px solid transparent;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: border-color 100ms ease;
  }
  .links a::before,
  .top-links a::before {
    content: "↗ ";
    font-weight: 400;
    font-size: 11px;
    color: var(--oxide);
    margin-right: 1px;
    letter-spacing: 0;
    text-transform: none;
  }
  .links a:hover,
  .top-links a:hover { border-bottom-color: var(--oxide); }

  /* Topic chip — moss-green, considered. */
  .official-tag {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 10px 1px;
    border-radius: 12px;
    background: var(--moss-tint);
    color: var(--moss);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: 1px solid transparent;
    transition: background-color 100ms ease, border-color 100ms ease;
  }
  .official-tag::before {
    content: "▸ ";
    color: var(--moss);
    margin-right: 1px;
  }
  .official-tag:hover { background: var(--moss); color: var(--paper); }
  .official-tag:hover::before { color: var(--paper); }

  /* Keyword chip — italic marginalia, soft warm pink with a touch of red.
     Same saturation/lightness target as the track badges (bg hsl(~8°,
     22%, 92%), text hsl(~10°, 40%, 30%)). Quieter than the original
     oxide-tint version but still carries red character. */
  .kw-tag {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 12px;
    font-weight: 400;
    padding: 1px 10px 2px;
    border-radius: 12px;
    background: #f2e3df;
    color: #6e342b;
    border: 1px solid #f2e3df;
    cursor: pointer;
    letter-spacing: 0.005em;
    transition: background-color 100ms ease, border-color 100ms ease, color 100ms ease;
  }
  .kw-tag::before {
    content: "#";
    font-style: normal;
    font-weight: 500;
    margin-right: 1px;
    opacity: 0.7;
  }
  .kw-tag:hover {
    background: var(--oxide-tint);
    border-color: var(--oxide);
    color: var(--oxide-deep);
  }
  .kw-tag:hover::before { opacity: 1; }

  /* ---------- ABSTRACT --------------------------------- */
  /* Abstract body — readable serif at body size. Kept Fraunces since
     this is body text, not a title. */
  .abstract {
    display: none;
    margin-top: 11px;
    padding: 12px 16px 12px 18px;
    background: var(--paper-deep);
    border-left: 2px solid var(--oxide);
    border-radius: 0;
    font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    font-optical-sizing: auto;
    font-variation-settings: "SOFT" 20, "opsz" 14;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-2);
    white-space: pre-wrap;
    text-wrap: pretty;
    hyphens: auto;
  }
  .abstract.open { display: block; }

  .toggle-abs {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    cursor: pointer;
    user-select: none;
    margin-left: 4px;
    padding: 1px 6px;
    border: 1px solid var(--rule);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: color 100ms ease, border-color 100ms ease;
  }
  .toggle-abs:hover { color: var(--oxide); border-color: var(--oxide); }

  .more-authors {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12.5px;
    color: var(--oxide);
    cursor: pointer;
    user-select: none;
    font-weight: 400;
  }
  .more-authors:hover { text-decoration: underline; }

  /* Search highlight — saffron, fountain-pen underline. */
  mark {
    background: var(--highlight);
    color: var(--ink);
    padding: 0 2px;
    border-radius: 0;
    box-shadow: 0 -1px 0 var(--highlight) inset, 0 -3px 0 rgba(184,134,42,.35) inset;
  }

  /* MathJax MUST stay inline. */
  mjx-container { display: inline !important; }
  .abstract mjx-container { font-size: 0.98em; }

  /* ---------- PAGINATION ------------------------------- */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    align-items: center;
    flex-wrap: wrap;
    font-family: 'Inter Tight', sans-serif;
  }
  .pagination button {
    padding: 5px 12px;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: 'Inter Tight', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid transparent;
    transition: color 100ms ease, border-color 100ms ease;
  }
  .pagination button:not(:disabled):hover {
    color: var(--oxide);
    border-bottom-color: var(--oxide);
  }
  .pagination button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .pagination .info {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-3);
    padding: 0 14px;
    letter-spacing: 0.04em;
  }

  /* ---------- MISC STATES ------------------------------ */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-3);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
  }
  .empty::before {
    content: "—";
    display: block;
    color: var(--oxide);
    font-size: 22px;
    margin-bottom: 12px;
    font-style: normal;
  }

  #loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
  }
  #render-progress {
    text-align: center;
    padding: 22px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: none;
  }

  .hidden { display: none !important; }

  /* ---------- RESPONSIVE ------------------------------- */
  @media (max-width: 780px) {
    header { padding: 12px 18px 8px; }
    main { padding: 18px 18px 60px; }
    h1 { font-size: 17px; gap: 10px; }
    .card { grid-template-columns: 34px 1fr; column-gap: 10px; --row-pad: 13px; }
    .card::before { font-size: 9.5px; padding-right: 8px; }
    .title { font-size: 14.5px; }
    input[type=text] { min-width: 200px; }
  }

  /* Focus rings — uniform, oxide. */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  .tab:focus-visible,
  .toggle-abs:focus-visible,
  .kw-tag:focus-visible,
  .official-tag:focus-visible,
  .reset:focus-visible,
  .back-btn:focus-visible,
  .more-authors:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

<script id="data" type="application/json">{"id":"kdd2026","name":"KDD 2026","venue":"KDD","year":2026,"source":"dblp","fields_present":["a","acm","au","c","d","dblp","g","i","ins","t","u"],"links":[{"label":"ACM","field":"acm","url_template":"{acm}"},{"label":"DBLP","field":"dblp","url_template":"{dblp}"}],"designations":{"field":"c","tabs":[{"key":"jul","label":"July Cycle","badge_class":"","badge_text":"","card_class":""}]},"topic_field":null,"keyword_field":"g","papers":[{"i":"conf/kdd/AbuissaR26","t":"VaLUH: Fast Algorithms for the Configuration Model of Vertex-Labeled Undirected Hypergraphs","au":[["Maryam Abuissa",0],["Matteo Riondato",1]],"u":"https://doi.org/10.1145/3770854.3780254","dblp":"https://dblp.org/rec/conf/kdd/AbuissaR26.html","g":["Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780254","c":"jul","ins":["Brown University","Amherst College"],"a":"We present VaLUH, a suite of Markov-Chain-Monte-Carlo algorithms for uniformly sampling non-degenerate, vertex-labeled, undirected hypergraphs with prescribed vertex degrees and hyperedge sizes (the hypergraph micro-canonical configuration model). One of our methods is based on stub-labeled hypergraphs, one on edgelabeled hypergraphs, and the third directly samples vertex-labeled hypergraphs. We theoretically show that our algorithms require as many or fewer steps to converge to the stationary distribution than existing ones, because they are higher in Peskun’s order. We obtain this improvement by carefully defining the state space graph of the Markov chains and by optimizing the transition probabilities, using the Metropolis-Hastings approach. Our experimental evaluation on real networks shows that our methods are up to 6x faster, in number of steps and also in wall-clock time, than existing approaches, as they require less computation per step, with the direct algorithm being the fastest."},{"i":"conf/kdd/AcharGP26","t":"Non-overlapped Frequency based Episode Significance under Markov Null Models","au":[["Avinash Achar",0],["Santhosh B. Gandreti",1],["Subbayya Sastry Pidaparthy",2]],"u":"https://doi.org/10.1145/3770854.3780274","dblp":"https://dblp.org/rec/conf/kdd/AcharGP26.html","g":["Time Series"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780274","c":"jul","a":"Frequent episode mining is a popular method for discovering temporal dependencies in symbolic time series data. In frequent pattern mining, it is important to assess statistical significance of discovered patterns so as to be able to discard unimportant patterns. In the literature, statistical significance is assessed through a hypothesis testing framework where the null hypothesis models data with no important patterns. Most currently available methods for frequent episode mining can handle only an iid null hypothesis. Since the data is a time series, it is desirable to deal with a null hypothesis that also allows for simple temporal dependencies. In this paper we present a method to characterize the distribution of non-overlapped occurrences of an episode and hence to assess its significance under a Markovian null hypothesis. This is the first such result. We illustrate the effectiveness of the method through simulations.","ins":["Tata Consultancy Services Research","Amazon Science","Vidyashilp University"]},{"i":"conf/kdd/AhnSS26","t":"Enriching Semantic Profiles into Knowledge Graph for Recommender Systems Using Large Language Models","au":[["Seokho Ahn",[0,1]],["Sungbok Shin",[2,3]],["Young-Duk Seo",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780324","dblp":"https://dblp.org/rec/conf/kdd/AhnSS26.html","g":["Recommendation","Knowledge Graph","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780324","c":"jul","a":"Rich and informative profiling to capture user preferences is essential for improving recommendation quality. However, there is still no consensus on how best to construct and utilize such profiles. To address this, we revisit recent profiling-based approaches in recommender systems along four dimensions: 1) knowledge base, 2) preference indicator, 3) impact range, and 4) subject. We argue that large language models (LLMs) are effective at extracting compressed rationales from diverse knowledge sources, while knowledge graphs (KGs) are better suited for propagating these profiles to extend their reach. Building on this insight, we propose a new recommendation model, called SPiKE. SPiKE consists of three core components: i) Entity profile generation, which uses LLMs to generate semantic profiles for all KG entities; ii) Profileaware KG aggregation, which integrates these profiles into the KG; and iii) Pairwise profile preference matching, which aligns LLM- and KG-based representations during training. In experiments, we demonstrate that SPiKE consistently outperforms state-of-the-art KG- and LLM-based recommenders in real-world settings.","ins":["Inha University","Department of Electrical and Computer Engineering","Sogang University","Department of Computer Science and Engineering"]},{"i":"conf/kdd/AmicoMKZA26","t":"DCFO: Density-Based Counterfactuals for Outliers","au":[["Tommaso Amico",[0,1]],["Pernille Matthews",[0,1]],["Lena Krieger",[2,3]],["Arthur Zimek",[4,5]],["Ira Assent",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3780205","dblp":"https://dblp.org/rec/conf/kdd/AmicoMKZA26.html","g":["Anomaly/Outlier","Causal"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780205","c":"jul","a":"Outlier detection identifies data points that significantly deviate from the majority of the data distribution. Explaining outliers is crucial for understanding the underlying factors that contribute to their detection, validating their significance, and identifying potential biases or errors. Effective explanations provide actionable insights, facilitating preventive measures to avoid similar outliers in the future. Counterfactual explanations clarify why specific data points are classified as outliers by identifying minimal changes required to alter their prediction. Although valuable, most existing counterfactual explanation methods overlook the unique challenges posed by outlier detection, and fail to target classical, widely adopted outlier detection algorithms. Local Outlier Factor (LOF) is one of the most popular unsupervised outlier detection methods, quantifying outlierness through relative local density. Despite LOF’s widespread use across diverse applications, it lacks interpretability. To address this limitation, we introduce Density-based Counterfactuals for Outliers (DCFO), a novel method specifically designed to generate counterfactual explanations for LOF. DCFO partitions the data space into regions where LOF behaves smoothly, enabling efficient gradient-based optimisation. Extensive experimental validation on 50 OpenML datasets demonstrates that DCFO consistently outperforms benchmarked competitors, offering superior proximity and validity of generated counterfactuals.","ins":["Aarhus University","Department of Computer Science","IAS-8, Forschungszentrum Jülich","Munich Center for Machine Learning, LMU Munich","University of Southern Denmark","Department of Computer Science and Mathematics"]},{"i":"conf/kdd/CaiGLSSTF26","t":"MGFRec: Towards Reinforced Reasoning Recommendation with Multiple Groundings and Feedback","au":[["Shihao Cai",0],["Chongming Gao",[1,2,3]],["Haoyan Liu",[1,2,3]],["Wentao Shi",0],["Jianshan Sun",4],["Ruiming Tang",5],["Fuli Feng",0]],"u":"https://doi.org/10.1145/3770854.3780206","dblp":"https://dblp.org/rec/conf/kdd/CaiGLSSTF26.html","g":["Recommendation","Reinforcement Learning","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780206","c":"jul","a":"The powerful reasoning and generative capabilities of large language models (LLMs) have inspired researchers to apply them to reasoning-based recommendation tasks, which require in-depth reasoning about user interests and the generation of recommended items. However, previous reasoning-based recommendation methods have typically performed inference within the language space alone, without incorporating the actual item space. This has led to over-interpreting user interests and deviating from real items. Towards this research gap, we propose performing multiple rounds of grounding during inference to help the LLM better understand the actual item space, which could ensure that its reasoning remains aligned with real items. Furthermore, we introduce a user agent that provides feedback during each grounding step, enabling the LLM to better recognize and adapt to user interests. Comprehensive experiments conducted on three Amazon review datasets demonstrate the effectiveness of incorporating multiple groundings and feedback. These findings underscore the critical importance of reasoning within the actual item space, rather than being confined to the language space, for recommendation tasks.","ins":["University of Science and Technology of China","University of Science and Technology of China, Intelligent Interconnected","Systems Laboratory of Anhui Province (Hefei","University of Technology)","Hefei University of Technology","Kuaishou Inc."]},{"i":"conf/kdd/CaoCHQCZX26","t":"Two Heads Are Better Than One: Generalized Cross-Domain Federated Learning via Dual-Prototype","au":[["Mingsheng Cao",0],["Tianci Chen",0],["Ming Hu",1],["Zhuang Qi",2],["Yangguang Cui",3],["Junlong Zhou",4],["Xiaofei Xie",5]],"u":"https://doi.org/10.1145/3770854.3780269","dblp":"https://dblp.org/rec/conf/kdd/CaoCHQCZX26.html","g":["Federated","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780269","c":"jul","a":"Cross-domain federated learning aims to collaboratively train a generalized model across clients with heterogeneous domain distributions without sharing data. Existing methods typically leverage prototypes to align intermediate representations among local models and enhance collaborative knowledge sharing, constructed either by directly aggregating class-center features across clients or by performing clustering to improve diversity. However, their performance is limited by the suboptimal ability to balance the learning of generalized and domain-specific features. To address this issue, this paper presents a novel dual-prototype guided FL framework named FedOrthrus, which decomposes the prototype into two components: i) the generalized prototype to capture cross-client domaininvariant features, and ii) the domain-specific prototype to extract the specific features of each domain. Specifically, the cloud server aggregates generalized prototypes to capture shared semantics across clients, thereby guiding each client to learn domain-invariant representations. Meanwhile, a clustering strategy is employed to adaptively construct domain-specific prototypes, ensuring that the representational capacity allocated to each domain is balanced according to its semantic complexity. Moreover, FedOrthrus employs a distribution-aware prototype construction scheme to dynamically assign the size of each part of prototypes, which enhances adaptability to different levels of domain heterogeneity. The experimental results on three datasets demonstrate that our FedOrthrus can achieve up to 14.56% and 3.96% accuracy improvement compared to traditional and state-of-the-art prototype-based FL methods. Our code is available at https://github.com/AAuZZ/FedOrthrus. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780269","ins":["University of Electronic Science and Technology of China","East China Normal University","Shandong University","Shanghai University","Nanjing University of Science and Technology","Singapore Management University"]},{"i":"conf/kdd/ChenZPL26","t":"BiCD: Learning Conditional Dependence for Continuous Dataset Shift in Regression","au":[["Hongrui Chen",[0,1]],["Yiming Zhai",2],["Mingjun Pan",3],["You-Wei Luo",0]],"u":"https://doi.org/10.1145/3770854.3780210","dblp":"https://dblp.org/rec/conf/kdd/ChenZPL26.html","g":["Robust/Noisy/Spurious","Causal"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780210","c":"jul","ins":["Beijing Normal University","The Hong Kong University of Science and Technology","China Mobile Internet Co., Ltd.","Peking University"],"a":"As a crucial data mining problem, domain adaptation (DA) under dataset shift offers an effective paradigm for transferring knowledge in changing environments (i.e., shifting data distributions). Recent theoretical advances show that learning conditional information is crucial for successful DA, and empirical models with provable performance have been developed under discrete priors. However, for many real-world complex tasks with continuous label spaces, e.g., regression, conditional information is generally intractable, and shift correction models remain unexplored due to the highdimensional nature of continuous variables. To deal with these challenges, we propose an information-theoretic learning principle called bi-level conditional dependence (BiCD) for continuous shift setting. BiCD characterizes the conditional information of learned representations from two aspects: conditional domain dependence and conditional label dependence, where our results prove that bi-level dependence learning is sufficient to obtain representations with desired properties and to minimize the generalization error. Moreover, BiCD also admits appealing properties for practical modeling: 1) an equivalent formulation with marginal dependence is derived to avoid the explicit computation of high-dimensional conditional dependence in practical modeling; 2) a kernel dependencebased variant is developed to serve as a guaranteed numerical proxy for the vanilla BiCD; 3) a graph Laplacian understanding is provided to justify the learning mechanism of BiCD. Empirically, BiCD is evaluated on standard DA regression datasets, where the significance of the proposed dependence learning principle is validated and SOTA performance is consistently achieved."},{"i":"conf/kdd/ChenC26","t":"Rethinking Temporal Knowledge Graph Representation Learning: From Entities to Evolutionary Event-Centric Clusters","au":[["Qian Chen",[0,1]],["Ling Chen",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780173","dblp":"https://dblp.org/rec/conf/kdd/ChenC26.html","g":["Knowledge Graph","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780173","c":"jul","a":"Existing research on Temporal Knowledge Graph (TKG) representation learning focuses on decomposing events into entities and relations, then employing various approaches to learn entity and relation representations in a low-dimensional vector space. However, all existing research overlooks the correlations among events, even though events are the core constituent elements of TKGs and involve heterogeneous correlations. To this end, we propose a Heterogeneous evolutionary Event cluster Aware Representation learning approach in Temporal Knowledge Graphs (HEART), which is the first event-centric approach in TKGs. Specifically, a heterogeneous event graph construction module is proposed to capture the diverse pairwise correlations between events by building coentity and proximity heterogeneous edges. In addition, an eventaware multi-step evolutionary clustering module is proposed to capture continuous high-order correlations among events at different timestamps. Furthermore, an event cluster-aware unsupervised alignment mechanism is proposed to preserve the temporal smoothness of event clusters through cross-temporal alignment. Moreover, an event cluster-based self-supervised optimization mechanism is proposed to optimize the representations of event clusters. Experimental results on seven real-world datasets demonstrate that HEART achieves the state-of-the-art performance, outperforming the runner-up by an average of 3.89%, 8.14%, 5.97%, and 6.92% in MRR, Hits@1, Hits@3, and Hits@10, respectively.","ins":["State Key Laboratory of Blockchain and Data Security, College of Computer Science and Technology","Zhejiang University"]},{"i":"conf/kdd/ChenZLZB26","t":"KFTD: Koopman-Fourier Time-Differentiable Network for Continuous Ocean Spatiotemporal Forecasting","au":[["Qinghui Chen",[0,1,2]],["Zekai Zhang",[0,1]],["Hailong Liu",[3,4]],["Jinglin Zhang",[0,1]],["Cong Bai",[5,6]]],"u":"https://doi.org/10.1145/3770854.3780278","dblp":"https://dblp.org/rec/conf/kdd/ChenZLZB26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780278","c":"jul","a":"Accurate oceanic forecasting is critical for climate monitoring and disaster early-warning. However, ocean spatiotemporal forecasting encounters the double challenges of modeling complex dynamical systems and ensuring computational efficiency. We present Koopman–Fourier Time-Differentiable (KFTD) Network, a timecontinuous two-stage paradigm that decouples interpolation from prediction to achieve efficient and scalable spatiotemporal modeling. We map complex nonlinear dynamics into the Koopman linear space and exploit Fourier analysis to enable continuous-time interpolation at arbitrary sub-steps. A lightweight residual network consumes the high-fidelity intermediate states to yield the final forecast. Unlike diffusion models, KFTD eliminates multi-step noise sampling and directly evolves the system in continuous time, yielding a 4× computational speed-up. We further introduce a D-PP Loss that supports arbitrary PDE constraints in an end-to-end manner, breaking the physical-consistency bottleneck of pure data-driven approaches. Empirical results on four ocean datasets confirm that our continuous-time framework reduces MSE by an average of 5.6% (up to 12.7% for SST) and improves efficiency over MCVD by 76.25%.","ins":["Shandong University","School of Control Science and Engineering","Laoshan Laboratory","Chinese Academy of sciences","Institute of Atmospheric Physics","Zhejiang University of Technology","College of Computer Science"]},{"i":"conf/kdd/ChenGZJ26","t":"Physics-enhanced Neural Operator: An Application in Simulating Turbulent Transport","au":[["Shengyu Chen",[0,1]],["Peyman Givi",[0,2]],["Can Zheng",[0,1]],["Xiaowei Jia",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780216","dblp":"https://dblp.org/rec/conf/kdd/ChenGZJ26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780216","c":"jul","ins":["University of Pittsburgh","Department of Computer Science","School of Engineering"],"a":"Accurate simulation of turbulent flows is of immense importance in a variety of scientific and engineering fields. Within the realm of turbulent flow simulation, direct numerical simulation (DNS) is widely considered to be the most reliable approach, but it is prohibitively expensive and thus has limited applicability to longterm and fine-scale simulation over various configurations. Given the pressing need for efficient simulation, there is an increasing interest in building machine learning models for simulating turbulence, either by reconstructing DNS from alternative low-fidelity simulations or sequentially predicting DNS from historical data. However, conventional machine learning models are not designed for capturing complex spatio-temporal characteristics of turbulent flows. This results in their limited performance and generalizability, especially when applied to complex flow data and various flow configurations. This paper presents a novel physics-enhanced neural operator (PENO) that efficiently models the complex flow dynamics while leveraging physical knowledge of partial differential equations (PDEs) to enhance the simulation process. We further introduce a self-augmentation mechanism to reduce the accumulated errors in long-term simulations. The proposed method is evaluated on multiple turbulent flow datasets, showcasing the model’s capability to reconstruct high-resolution DNS data, maintain the inherent physical properties of flow transport, and transfer across various resolution settings and simulation configurations. These encouraging results confirm its applicability to a wide range of real-world scenarios in which extensive simulations are needed under diverse settings."},{"i":"conf/kdd/ChenLSLG26","t":"Towards A Tri-View Diffusion Framework for Recommendation","au":[["Ximing Chen",[0,1]],["Pui Ieng Lei",[0,1]],["Yijun Sheng",[0,1]],["Yanyan Liu",[0,1]],["Zhiguo Gong",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780157","dblp":"https://dblp.org/rec/conf/kdd/ChenLSLG26.html","g":["Recommendation","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780157","c":"jul","a":"Diffusion models (DMs) have recently gained significant interest for their exceptional potential in recommendation tasks. This stems primarily from their prominent capability in distilling, modeling, and generating comprehensive user preferences. However, previous work fails to examine DMs in recommendation tasks through a rigorous lens. In this paper, we first experimentally investigate the completeness of recommender models from a thermodynamic view. We reveal that existing DM-based recommender models operate by maximizing the energy, while classic recommender models operate by reducing the entropy. Based on this finding, we propose a minimalistic diffusion framework that incorporates both factors via the maximization of Helmholtz free energy. Meanwhile, to foster the optimization, our reverse process is armed with a well-designed denoiser to maintain the inherent anisotropy, which measures the user-item cross-correlation in the context of bipartite graphs. Finally, we adopt an Acceptance-Rejection Gumbel Sampling Process (AR-GSP) to prioritize the far-outnumbered unobserved interactions for model robustness. AR-GSP integrates an acceptancerejection sampling to ensure high-quality hard negative samples for general recommendation tasks, and a timestep-dependent Gumbel Softmax to handle an adaptive sampling strategy for diffusion models. Theoretical analyses and extensive experiments demonstrate that our proposed framework has distinct superiority over baselines in terms of accuracy and efficiency.","ins":["Computer and Information Science","University of Macau"]},{"i":"conf/kdd/ChenHHWOLLWC26","t":"Vistar: Enhancing the Perception Capability of LLMs under Imprecise IMU-Text Alignment","au":[["Yatong Chen",0],["Chenzhi Hu",0],["Bowen He",0],["Ruijie Wang",1],["Xiaomin Ouyang",2],["Shengzhong Liu",0],["Jianxin Li",1],["Fan Wu",0],["Guihai Chen",0]],"u":"https://doi.org/10.1145/3770854.3780181","dblp":"https://dblp.org/rec/conf/kdd/ChenHHWOLLWC26.html","g":["LLM","Multimodal/VLM","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780181","c":"jul","ins":["Shanghai Jiao Tong University","Beihang University","Hong Kong University of Science and Technology"],"a":"This paper introduces Vistar, a novel self-supervised framework for inertial measurement unit (IMU) signal perception designed for large language models (LLMs). Unlike visual data, IMU signals are high-frequency time series with low interpretability, making manual annotation with natural language particularly challenging. Even when using vision-language models (VLMs) to describe events in videos synchronized with IMU signals, a semantic gap remains between high-level visual semantics and low-level IMU vibrations. The core idea of Vistar is to achieve accurate IMU signal perception through collaborations between offline cross-modal alignment and online retrieval-augmented generation. During offline training, Vistar uses pretrained vision and language encoders as anchors to learn IMU encoders via hierarchical cross-modal contrastive learning, establishing both inter- and intra-sample alignment. Given that the enhanced training strategy still fails to achieve precise alignment between IMU and text, during online inference, Vistar further employs a retrieval-augmented generation mechanism to generate distilled textual descriptions from similar text filtered based on structural relations of their paired IMU samples. Extensive evaluations on three multimodal datasets demonstrate that Vistar consistently outperforms state-of-the-art (SOTA) baselines by up to 57.45% in IMU-to-text retrieval and improves the generated text similarity with ground truths in IMU perception by up to 31.90%."},{"i":"conf/kdd/ChengZYQZCMZ26","t":"Faico: Faithful and Complete Knowledge Graph Augmented Reasoning","au":[["Guo Cheng",[0,1]],["Kangfei Zhao",0],["Ke Ye",0],["Pengpeng Qiao",2],["Zhiwei Zhang",0],["Saiguang Che",1],["Shaonan Ma",1],["Mingxing Zhang",3]],"u":"https://doi.org/10.1145/3770854.3780336","dblp":"https://dblp.org/rec/conf/kdd/ChengZYQZCMZ26.html","g":["Knowledge Graph","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780336","c":"jul","ins":["Beijing Institute of Technology","QiYuan Lab","Institute of Science Tokyo","Tsinghua University"],"a":"Large language models (LLMs) augmented with knowledge graphs (KGs) have exhibited great potential for complex reasoning tasks. However, existing approaches often struggle with incomplete subgraph retrieval and inaccurate semantic alignment, which hinder reasoning performance and answer quality. In this paper, we present Faico, a KG-enhanced reasoning framework designed to achieve both semantic faithfulness and structural completeness. Faico decouples model inference from graph traversal by integrating a finetuned LLM-based relation type generator for accurate semantic mapping and a KG retriever for reasoning subgraph search. Based on the predicted relation types, we model the reasoning subgraph (RS) as a 𝑘-bounded edge type (𝑘-BET) subgraph, where 𝑘constrains the recurrence of relation types within paths, and devise a budget-dominance-based algorithm to efficiently identify the maximal 𝑘-BET subgraph. Our framework ensures comprehensive coverage of relevant multi-hop relations while reducing computational overhead. Through extensive experiments on multiple KGQA benchmarks, Faico demonstrates improvements in both effectiveness and efficiency over LLM-native and state-of-the-art KG-augmented reasoning baselines, delivering more accurate, complete answers and lower inference latency."},{"i":"conf/kdd/CuiLQWGL26","t":"Improving Heterogeneous Graph Contrastive Learning Robustness via Hierarchical Vulnerability Protection","au":[["Jinhao Cui",0],["Chaoyang Li",[0,1]],["Jianyang Qin",0],["Lingzhi Wang",0],["Cuiyun Gao",0],["Qing Liao",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780241","dblp":"https://dblp.org/rec/conf/kdd/CuiLQWGL26.html","g":["Graph/GNN","Self-Supervised/Contrastive","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780241","c":"jul","a":"Recently, Heterogeneous Graph Contrastive Learning (HGCL) has received significant attention due to its impressive capability to represent heterogeneous graphs without detailed annotations. However, the inherent fragility of heterogeneous graph structures makes HGCL vulnerable to perturbation attacks. Most existing defense works for heterogeneous graphs primarily focus on supervised scenarios, which protect all nodes equally via structural pruning. This defensive mechanism can result in insufficient structure information for HGCL, thus degrading performance in self-supervised scenarios without labels. In this paper, we argue that some nodes are more susceptible to attacks, and the influence of the perturbation attack will accumulate across layers during representation aggregation. To tackle these problems, we propose a novel Heterogeneous Graph Contrastive Learning with Hierarchical Vulnerability Protection (HVP-HGCL), which identifies the most vulnerable nodes to perturbation attack and protects them across different aggregation layers to improve the robustness of HGCL. Specifically, we first design the Vulnerability Detection (VD) based on the HGCL framework to determine which nodes are more sensitive to attack in self-supervised scenarios. Subsequently, we propose a simple but efficient Hierarchical Protection (HP) to safeguard those vulnerable nodes from attack noise during different layers. Combining the above two modules, HVP-HGCL can not only improve the robustness of HGCL but also ensure sufficient structural information for effective contrastive learning. Extensive experiments demonstrate that HVP-HGCL improves robustness against adversarial attacks and achieves competitive performance on downstream tasks. ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780241","ins":["Harbin Institute of Technology","Peng Cheng Laboratory"]},{"i":"conf/kdd/CuiSH26","t":"Submodular Maximization underk-System Constraints in Parallel: A Trifecta of Approximation, Adaptivity, and Query Complexity","au":[["Shuang Cui",0],["Yu-e Sun",1],["He Huang",0]],"u":"https://doi.org/10.1145/3770854.3780251","dblp":"https://dblp.org/rec/conf/kdd/CuiSH26.html","g":["Optimization/Theory"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780251","c":"jul","a":"Submodular optimization serves as a foundational framework for numerous data mining tasks requiring the extraction of representative subsets from large-scale datasets under combinatorial constraints. In this paper, we study the fundamental problem of maximizing a general submodular function (not necessarily monotone) under a general 𝑘-system constraint, and propose a novel parallel algorithm. For this problem, our algorithm is the first to simultaneously achieve nearly best-known guarantees across three key metrics: an approximation ratio of (1−𝜖)3( √ 𝑘+1)−2, an adaptive complexity of O( √ 𝑘log2 𝑛), and a query complexity of O( √ 𝑘𝑛log𝑛), which effectively mitigates the trade-offs in prior work. Moreover, we generalize our approach to solve regularized submodular maximization problems while maintaining the same complexities. To the best of our knowledge, the resulting algorithm is the first parallel algorithm with a provable approximation ratio for this class of problems. We validate our theoretical contributions through extensive experiments on real-world applications, including maximum coverage on networks and movie recommendations. The empirical results strongly show the superiority of our proposed algorithms in terms of objective value, adaptivity, and query efficiency.","ins":["School of Computer Science and Technology, Soochow University","School of Rail Transportation, Soochow University"]},{"i":"conf/kdd/DangML26","t":"Holistic Data Scheduler for LLM Pre-training via Multi-Objective Reinforcement Learning","au":[["Chenhao Dang",[0,1]],["Jing Ma",[2,3]],["Mingjie Liao",[4,5,6]],["accuracy on the MMLU benchmark.",null]],"u":"https://doi.org/10.1145/3770854.3780325","dblp":"https://dblp.org/rec/conf/kdd/DangML26.html","g":["LLM","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780325","c":"jul","a":"The composition of training data, governed by the diversity of sources and their mixing strategy, is a cornerstone of Large Language Model (LLM) pre-training. Online Data Mixing (ODM), the technique of adaptively adjusting data mixtures during training, has emerged as a promising direction to improve efficiency. However, existing methods are constrained by their reliance on a singular optimization perspective, which fundamentally overlooks the need for complex LLM pre-training to consider the dynamic data composition from multiple dimensions. To overcome this limitation, we introduce the Holistic Data Scheduler (HDS), a novel online data mixing framework. HDS formulates the data scheduling challenge as a reinforcement learning problem in a continuous control space and leverages the Soft Actor-Critic (SAC) algorithm for its stability and sample efficiency in exploring the high-dimensional policy space. At the core of HDS lies a novel multi-objective, holistic reward function that integrates three critical perspectives: a data-driven ∗Corresponding author of this paper. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780325 reward for quality, a loss-driven reward capturing inter-domain influence, and a model-driven reward based on weight norms. To validate our design and determine its optimal configuration, we conducted systematic experiments on LLMs of various sizes. On The Pile benchmark, HDS reaches the final validation perplexity of the next best method with 44% fewer training iterations. Furthermore, it achieves a 7.2% improvement on the MMLU 0-shot task along with consistent gains on other benchmarks, showcasing its ability to enhance both training efficiency and final model capability.","ins":["China Electronics Technology Group","Corporation 15th Research Institute","Renmin University of China","BRAIN","Alibaba Group","Figure 1: Performance evaluation of the Holistic Data Scheduler (HDS). All results are from a Pythia-1B model trained for 50","billion tokens on The Pile dataset. (a) Unweighted average validation perplexity across the 22 domains of The Pile. (b) 0-shot"]},{"i":"conf/kdd/DharZH26","t":"Effective and Robust Multimodal Medical Image Analysis","au":[["Joy Dhar",[0,1]],["Maryam Haghighat",[2,3,4]],["Number of Models",5]],"u":"https://doi.org/10.1145/3770854.3780331","dblp":"https://dblp.org/rec/conf/kdd/DharZH26.html","g":["Multimodal/VLM","Healthcare/Bio","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780331","c":"jul","a":"Multimodal Fusion Learning (MFL), leveraging disparate data from various imaging modalities (e.g., MRI, CT, SPECT), has shown great potential for addressing medical problems such as skin cancer and brain tumor prediction. However, existing MFL methods face three key limitations: a) they often specialize in specific modalities, and overlooks effective shared complementary information across diverse modalities, hence limiting their generalizability for multidisease analysis; b) they rely on computationally expensive models, restricting their applicability in resource-limited settings; and c) they lack robustness against adversarial attacks, compromising reliability in medical AI applications. To address these limitations, we propose a novel Multi-Attention Integration Learning (MAIL) network, incorporating two key components: a) an efficient residual learning attention block for capturing refined modality-specific multi-scale patterns and b) an efficient multimodal cross-attention module for learning enriched complementary shared representations across diverse modalities. Furthermore, to ensure adversarial robustness, we extend MAIL network to design Robust-MAIL by incorporating random projection filters and modulated attention noise. Extensive evaluations on 20 public datasets show that both MAIL and Robust-MAIL outperform existing methods, achieving performance gains of up to 9.34% while reducing computational costs by up to 78.3%. These results highlight the superiority of our approaches, ensuring more reliable predictions than top competitors. Code: https://github.com/misti1203/MAIL-Robust-MAIL. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780331","ins":["Indian Institute of Technology Ropar","Deakin University","Queensland University of Technology","Performance (%)","FLOPs (G)","Figure 1: (Left) Cost–performance trade-off: comparison of our proposed MAIL framework vs. computationally-intensive fusion models (e.g., DRIFA-Net [12], MuMu [25]). (Right) Adversarial robustness: comparison of proposed Robust-MAIL vs. SOTA methods under a PGD attack."]},{"i":"conf/kdd/DingSB26","t":"Few-shot Multimodal Anomaly Detection via Dynamic Intra-modal Sparsity Attention and Quality-aware Cross-modal Fusion in Microservice System","au":[["Kaiqi Ding",0],["Zijian Song",0],["Kaigui Bian",0]],"u":"https://doi.org/10.1145/3770854.3780304","dblp":"https://dblp.org/rec/conf/kdd/DingSB26.html","g":["Few-Shot/Zero-Shot","Multimodal/VLM","Anomaly/Outlier"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780304","c":"jul","a":"The dynamic nature of microservice architectures necessitates robust few-shot anomaly detection (AD) systems to prevent cascading failures. However, current multimodal approaches remain inadequate for cold-start scenarios due to their dependence on extensive training data. The fundamental challenge in few-shot AD lies in two critical aspects: (1) effective feature extraction from intramodalities, and (2) the alignment of heterogeneous multimodal representations, particularly the distribution discrepancy between discrete token embeddings from logs and continuously evolving representations from traces and metrics. To overcome these challenges, we present FuseGuard, an LLM-enhanced framework that pioneers quality-aware multimodal fusion for few-shot AD. First, our intra-modal feature extraction employs a Dynamic Sparse Correlation Attention mechanism for metrics, Spatio-temporal Encoding for traces, and LLM-enhanced semantic-frequency encoding for logs, enabling adaptive representation of time-evolving patterns. Second, we introduce hierarchical cross-modal alignment via token projection, layer-wise distillation, and consistency learning to preserve modality-specific features while enabling effective knowledge transfer. Finally, a quality-aware fusion mechanism dynamically weights modalities based on uncertainty estimation. Evaluated on three open-source platforms (MSDS, GAIA, TrainTicket) and a production system, FuseGuard’s few-shot capability outperforms SOTA by 19.69%-77.07% F1-score across four datasets.","ins":["School of CS, Peking University"]},{"i":"conf/kdd/DongZTL26","t":"Certified Defense on the Fairness of Graph Neural Networks","au":[["Yushun Dong",0],["Binchi Zhang",1],["Hanghang Tong",2],["Jundong Li",1]],"u":"https://doi.org/10.1145/3770854.3780323","dblp":"https://dblp.org/rec/conf/kdd/DongZTL26.html","g":["Graph/GNN","Fairness/Bias"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780323","c":"jul","a":"Graph Neural Networks (GNNs) have emerged as a prominent graph learning model in various graph-based tasks over the years. Nevertheless, due to the vulnerabilities of GNNs, it has been empirically shown that malicious attackers could easily corrupt the fairness level of their predictions by adding perturbations to the input graph data. In this paper, we take crucial steps to study a novel problem of certifiable defense on the fairness level of GNNs. Specifically, we propose a principled framework named ELEGANT and present a detailed theoretical certification analysis for the fairness of GNNs. ELEGANT takes any GNN as its backbone, and the fairness level of such a backbone is theoretically impossible to be corrupted under certain perturbation budgets for attackers. Notably, ELEGANT does not make any assumptions over the GNN structure or parameters, and does not require re-training the GNNs to realize certification. Hence it can serve as a plug-and-play framework for any optimized GNNs ready to be deployed. We verify the satisfactory effectiveness of ELEGANT in practice through extensive experiments on real-world datasets across different backbones of GNNs and parameter settings.","ins":["Florida State University","University of Virginia","University of Illinois at Urbana-Champaign"]},{"i":"conf/kdd/DuDRZ26","t":"Revisiting Redundancy in Diffusion Transformers: A Temporal-Spatial Joint Caching Strategy for Efficient Sampling","au":[["Chenxi Du",0],["Yongheng Deng",0],["Ju Ren",0],["Yaoxue Zhang",0]],"u":"https://doi.org/10.1145/3770854.3780174","dblp":"https://dblp.org/rec/conf/kdd/DuDRZ26.html","g":["Diffusion/Generation","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780174","c":"jul","a":"Diffusion Transformers (DiTs) achieve impressive generative performance but suffer from significant inference latency. Existing feature caching–based acceleration methods mainly exploit temporal redundancy, often assuming high similarity across timesteps. However, our analysis shows that such redundancy is dynamic and inconsistent. More crucially, we identify a previously underexplored form of efficiency, namely spatial redundancy, characterized by high similarity between adjacent transformer blocks within the same timestep. Motivated by this dual-dimensional redundancy, we propose Temporal-Spatial Joint Cache, a training-free inference acceleration strategy that dynamically determines optimal reuse operations across temporal and spatial dimensions. Our approach features a redundancy-guided operation selector that estimates local feature stability using second-order divided differences, enabling fine-grained decisions between full computation, temporal cache, and spatial cache. Furthermore, we use interpolation-based feature prediction to capture local feature evolution for more accurate reuse. In addition, we propose a bounded cache distance control mechanism to mitigate error accumulation from excessive reuse. Together, these components allow our method to deliver substantial inference speedups without retraining or compromising generation fidelity, offering a new perspective on efficiency in diffusion transformer inference.","ins":["Tsinghua University"]},{"i":"conf/kdd/DuWSZJ26","t":"Reinforcement Speculative Decoding for Fast Ranking","au":[["Yingpeng Du",0],["Tianjun Wei",0],["Zhu Sun",1],["Jie Zhang",0],["Xun Jiang",[2,3]]],"u":"https://doi.org/10.1145/3770854.3780197","dblp":"https://dblp.org/rec/conf/kdd/DuWSZJ26.html","g":["Search/IR","Reinforcement Learning","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780197","c":"jul","a":"Large Language Models (LLMs) have been widely adopted in ranking systems such as information retrieval (IR) systems and recommender systems (RSs). To alleviate the latency of auto-regressive decoding, some studies explore the single (first) token decoding for ranking approximation, but they suffer from severe degradation in tail positions. Although speculative decoding (SD) methods can be a remedy with verification at different positions, they face challenges in ranking systems due to their left-to-right decoding paradigm. Firstly, ranking systems require strict latency constraints, but verification rounds in SD methods remain agnostic; Secondly, SD methods usually discard listwise ranking knowledge about unaccepted items in previous rounds, hindering future multi-token prediction, especially when candidate tokens are the unaccepted items. In this paper, we propose a Reinforcement Speculative Decoding method for fast ranking inference of LLMs. To meet the ranking systems’ latency requirement, we propose an up-to-down decoding paradigm that employs an agent to iteratively modify the ranking sequence under a constrained budget. Specifically, we design a ranking-tailored policy optimization, actively exploring optimal multi-round ranking modification policy verified by LLMs via reinforcement learning (RL). To better approximate the target LLM under the constrained budget, we trigger the agent fully utilizing the listwise ranking knowledge about all items verified by LLMs across different rounds in RL, enhancing the modification policy of the agent. More importantly, we demonstrate the theoretical robustness and advantages of our paradigm and implementation. Experiments on both IR and RS tasks show the effectiveness of our proposed method.","ins":["Nanyang Technological University","Singapore University of Technology and Design","Tianqiao and Chrissy Chen institute.","Theta Health Inc."]},{"i":"conf/kdd/FanLZYD26","t":"Incident-Guided Spatiotemporal Traffic Forecasting","au":[["Lixiang Fan",0],["Bohao Li",0],["Tao Zou",0],["Junchen Ye",1],["Bowen Du",1]],"u":"https://doi.org/10.1145/3770854.3780215","dblp":"https://dblp.org/rec/conf/kdd/FanLZYD26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780215","c":"jul","a":"Recent years have witnessed the rapid development of deep-learningbased, graph-neural-network-based forecasting methods for modern intelligent transportation systems. However, most existing work focuses exclusively on capturing spatio-temporal dependencies from historical traffic data, while overlooking the fact that suddenly occurring transportation incidents, such as traffic accidents and adverse weather, serve as external disturbances that can substantially alter temporal patterns. We argue that this issue has become a major obstacle to modeling the dynamics of traffic systems and improving prediction accuracy, but the unpredictability of incidents makes it difficult to observe patterns from historical sequences. To address these challenges, this paper proposes a novel framework named the Incident-Guided Spatiotemporal Graph Neural Network (IGSTGNN). IGSTGNN explicitly models the incident’s impact through two core components: an Incident-Context Spatial Fusion (ICSF) module to capture the initial heterogeneous spatial influence, and a Temporal Incident Impact Decay (TIID) module to model the subsequent dynamic dissipation. To facilitate research on the spatio-temporal impact of incidents on traffic flow, a large-scale dataset is constructed and released, featuring incident records that are time-aligned with traffic time series. On this new benchmark, the proposed IGSTGNN framework is demonstrated to achieve state-of-the-art performance. Furthermore, the generalizability of the ICSF and TIID modules is validated by integrating them into various existing models.","ins":["the State Key Laboratory of Complex and Critical Software Environment, Beihang University","School of Transportation Science and Engineering, Beihang University"]},{"i":"conf/kdd/FanLLWWLYLZ26","t":"PBSketch: Finding Periodic Burst Items in Data Streams","au":[["Zhuochen Fan",0],["Zhongxian Liang",1],["Zirui Liu",2],["Dayu Wang",3],["Dong Wen",[4,5]],["Wenjun Li",0],["Tong Yang",2],["Yuzhou Liu",6],["Weizhe Zhang",1]],"u":"https://doi.org/10.1145/3770854.3780188","dblp":"https://dblp.org/rec/conf/kdd/FanLLWWLYLZ26.html","g":["Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780188","c":"jul","a":"Detecting periodic burst (PB) items in data streams is crucial for applications like rate limiting but remains unexplored. While combining existing sketch algorithms offers a baseline, it suffers from significant inaccuracy and inefficiency. In this paper, we propose PBSketch, the first dedicated sketch algorithm designed for detecting PB items in real time. Its key techniques mainly include: 1) a two-stage hierarchical structure that efficiently maintains potential burst items and discards those without potential; 2) a fine-grained PB selection mechanism during window processing, coupled with the Window Smoothing Processing optimization to amortize performance overhead and eliminate processing spikes. We provide its error bounds through rigorous theoretical analysis. Our extensive experiments show that PBSketch outperforms the baseline solution in accuracy and speed. By deploying it on an FPGA platform, the throughput is further significantly improved. Moreover, it effectively optimizes a practical application of rate limiting, clearly improving performance with almost negligible overhead.","ins":["Pengcheng Laboratory","Harbin Institute of Technology","Peking University","Nanyang Technological University","National University of Defense","Technology, Changsha, China","Jilin University"]},{"i":"conf/kdd/FengCZPDLCJ26","t":"The Eminence in Shadow: Exploiting Feature Boundary Ambiguity for Robust Backdoor Attacks","au":[["Zhou Feng",[0,1]],["Jiahao Chen",[0,1]],["Chunyi Zhou",[0,1]],["Yuwen Pu",[2,3,4]],["Tianyu Du",[0,5]],["Jinbao Li",[6,7]],["Jianhai Chen",[0,1]],["Shouling Ji",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780322","dblp":"https://dblp.org/rec/conf/kdd/FengCZPDLCJ26.html","g":["Security/Attack"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780322","c":"jul","a":"Deep neural networks (DNNs) underpin critical applications yet remain vulnerable to backdoor attacks, typically reliant on heuristic brute-force methods. Despite significant empirical advancements in backdoor research, the lack of rigorous theoretical analysis limits understanding of underlying mechanisms, constraining attack predictability and adaptability. Therefore, we provide a theoretical analysis targeting backdoor attacks, focusing on how sparse decision boundaries enable disproportionate model manipulation. Based on this finding, we derive a closed-form “ambiguous boundary region” wherein negligible relabeled samples induce substantial misclassification. Influence function analysis further quantifies significant parameter shifts caused by these margin samples, with minimal impact on clean accuracy, formally grounding why such low poison rates suffice for efficacious attacks. Leveraging these insights, we propose Eminence, an explainable and robust black-box backdoor framework with provable theoretical guarantees and inherent stealth properties. Eminence optimizes a universal, visually subtle trigger that strategically exploits vulnerable decision boundaries and effectively achieves robust misclassification with exceptionally low poison rates (≤0.01%, compared to SOTA methods typically requiring ≥1%). Comprehensive experiments ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780322 validate our theoretical discussions and demonstrate the effectiveness of Eminence, confirming an exponential relationship between margin poisoning and adversarial boundary manipulation. Eminence maintains ≥90% attack success rate, exhibits negligible clean-accuracy loss, and demonstrates high transferability across diverse models, datasets and scenarios. Our code is available at https://github.com/NESA-Lab/Eminence","ins":["Zhejiang University","College of Computer Science and Technology","Chongqing University","School of Big Data & Software","Engineering","School of Software Technology","Qilu University of Technology","(Shandong Academy of Science)"]},{"i":"conf/kdd/FujiwaraGIKNNK26","t":"Fast Vector Quantization Algorithm for ScaNN","au":[["Yasuhiro Fujiwara",0],["Ángel López García-Arias",0],["Yasutoshi Ida",0],["Atsutoshi Kumagai",0],["Masahiro Nakano",0],["Makoto Nakatsuji",0],["Akisato Kimura",0]],"u":"https://doi.org/10.1145/3770854.3780233","dblp":"https://dblp.org/rec/conf/kdd/FujiwaraGIKNNK26.html","g":["Search/IR","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780233","c":"jul","ins":["NTT, Inc."],"a":"Maximum Inner Product Search (MIPS) is a popular task to find the vector with the highest inner product for a given query. ScaNN is a score-aware quantization approach for MIPS that effectively transforms vectors with higher inner products into short sequences of codewords within codebooks. When quantizing vectors, it iteratively updates codebooks by assigning vectors to codewords and computing inverse matrices obtained from the assigned vectors. ScaNN, however, incurs a high computation cost when quantizing large-scale data. This is because (1) it computes quantization losses for all pairs of vectors and codewords, and (2) the size of the inverse matrices is quadratic in the number of dimensions. Our proposal, F-ScaNN, increases the efficiency of ScaNN through two techniques: (1) it computes the upper and lower bounds of the losses to assign vectors, and (2) it employs the conjugate gradient method to avoid computing the inverse matrix. Theoretically, we can obtain the same quantization results as ScaNN. Furthermore, we can improve search accuracy by using scaled codewords. Experiments show that our approach is significantly faster than previous approaches."},{"i":"conf/kdd/GaoWGWPHHW26","t":"Tokenizing 3D Molecule Structure with Quantized Spherical Coordinates","au":[["Kaiyuan Gao",0],["Yusong Wang",1],["Haoxiang Guan",[2,3]],["Zun Wang",4],["Shanghai Artificial Intelligence",4],["Qizhi Pei",5],["Shanghai Artificial Intelligence",4],["John Hopcroft",6],["Kun He",0],["Lijun Wu",[4,7]],["Shanghai Artificial Intelligence",[4,7]]],"u":"https://doi.org/10.1145/3770854.3780301","dblp":"https://dblp.org/rec/conf/kdd/GaoWGWPHHW26.html","g":["Healthcare/Bio"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780301","c":"jul","a":"While language models (LMs) have demonstrated remarkable generalpurpose capabilities across domains, including molecule generation using line notations such as SMILES and SELFIES, their direct application to 3D structure design remains constrained by two interdependent challenges. First, the difficulty in designing a 3D line notation that ensures SE(3)-invariant atomic coordinates and supports autoregressive generation. Second, the incompatibility between continuous spatial coordinates and the discrete token inputs required by LMs. To address this, we propose Mol-StrucTok, a unified framework for tokenizing 3D molecular structures. Our approach comprises two key innovations: (1) a 3D line notation—Spherical Coordinate Notation—that encodes local atomic environments in spherical coordinates, agnostic to 2D notations and inherently SE(3)- invariant; and (2) a structure-aware Vector Quantized Variational Autoencoder (VQ-VAE) for discretizing these coordinates into chemically valid tokens suitable for language model processing. Leveraging this tokenization framework, we train a GPT-2 style model for end-to-end 3D molecular generation. Empirical results demonstrate strong, task-dependent performance: in unconditional generation, ∗Corresponding author. This work is supported by National Natural Science Foundation (U22B2017). This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780301 Mol-StrucTok achieves diffusion-level stability with 28× faster inference; in conditional generation, it reduces property-matching mean absolute error (MAE) by 5–8× compared to diffusion-based meth
