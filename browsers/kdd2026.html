est: Efficient Vector Search on Kunpeng CPU","au":[["Kaihao Ma",0],["Meiling Wang",0],["Senkevich Oleg",[0,1]],["Zijian Li",2],["Daihao Xue",2],["Shenzhen Yinwang Intelligent",2],["Dmitriy Malyshev",[3,4,5]],["Yangming Lv",0],["Shihai Xiao",0],["Xiao Yan",[6,7]],["Radionov Alexander",[0,1]],["Weidi Zeng",[0,1]],["Yuanzhan Gao",0],["Zhiyu Zou",0],["Xin Yao",0],["Lin Liu",0],["Junhao Wu",0],["Yiding Liu",0],["Yaoyao Fu",0],["Gongyi Wang",0],["Gong Zhang",0],["Fei Yi",0],["Yingfan Liu",8]],"u":"https://doi.org/10.1145/3770854.3783920","dblp":"https://dblp.org/rec/conf/kdd/MaWSLXMLXYRZGZY26.html","g":["Search/IR","Efficiency/Compression"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783920","c":"jul","a":"Vector search, which returns the vectors most similar to a given query vector from a large vector dataset, underlies many important applications such as search, recommendation, and LLMs. To be economic, vector search needs to be efficient to reduce the resources required by a given query workload. However, existing vector search libraries (e.g., Faiss and DiskANN) are optimized for ∗Dr Xiao Yan is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783920 x86 CPU architectures (i.e., Intel and AMD CPUs) while Huawei Kunpeng CPUs are based on the ARM architecture and competitive in compute power. In this paper, we present KBest as a vector search library tailored for the latest Kunpeng 920 CPUs. To be efficient, KBest incorporates extensive hardware-aware and algorithmic optimizations, which include single-instruction-multiple-data (SIMD) accelerated distance computation, data prefetch, index refinement, early termination, and vector quantization. Experiment results show that KBest outperforms SOTA vector search libraries running on x86 CPUs, and our optimizations can improve the query throughput by over 2x. Currently, KBest serves applications from both our internal business and external enterprise clients with tens of millions of queries on a daily basis. 2347","ins":["Huawei Technologies Co., Ltd.","Moscow, Russian Federation","Technology Co., Ltd.","Higher School of Economics","Nizhniy Novgorod, Russian","Federation","Wuhan University","Institute for Math and AI","Xidian University"]},{"i":"conf/kdd/PhilonenkoKB26","t":"Can-SAVE: Deploying Low-Cost and Population-Scale Cancer Screening via Survival Analysis Variables and EHR","au":[["Petr Philonenko",0],["Vladimir Kokh",0],["Sber AI",0],["Pavel Blinov",0]],"u":"https://doi.org/10.1145/3770854.3783930","dblp":"https://dblp.org/rec/conf/kdd/PhilonenkoKB26.html","g":["Healthcare/Bio"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783930","c":"jul","a":"Conventional medical cancer screening methods are costly, laborintensive, and extremely difficult to scale. Although AI can improve cancer detection, most systems rely on complex or specialized medical data, making them impractical for large-scale screening. We introduce Can-SAVE, a lightweight AI system that ranks populationwide cancer risks solely based on medical history events. By integrating survival model outputs into a gradient-boosting framework, our approach detects subtle, long-term patient risk patterns – often well before clinical symptoms manifest. Can-SAVE was rigorously evaluated on a real-world dataset of 2.5 million adults spanning five Russian regions, marking the study as one of the largest and most comprehensive deployments of AI-driven cancer risk assessment. In a retrospective oncologist-supervised study over 1.9M patients, Can-SAVE achieves a 3.8–9.9x higher detection rate at identical screening volumes and an Average Precision (AP) of 0.228 vs. 0.193 for the best baseline (LoRA-tuned Qwen3-Embeddings via DeepSeek-R1 summarization). In a year-long prospective pilot (426K patients), our method almost doubled the cancer detection rate (+91%) and increased population coverage by 36% over the national screening protocol. The system demonstrates practical scalability: a city-wide population of 1 million patients can be processed in under three hours using standard hardware, enabling seamless clinical integration. This work proves that Can-SAVE achieves nationally significant cancer detection improvements while adhering to real-world public healthcare constraints, offering immediate clinical utility and a replicable framework for population-wide screening. Code for training and feature engineering is available at https://github.com/sb-ai-lab/Can-SAVE.","ins":["Sber AI Lab"]},{"i":"conf/kdd/PonrajDW26","t":"Building Transparency in Deep Learning-Powered Network Traffic Classification: A Traffic-Explainer Framework","au":[["Riya Ponraj",0],["Ramakrishnan Durairajan",1],["Yu Wang",0]],"u":"https://doi.org/10.1145/3770854.3783939","dblp":"https://dblp.org/rec/conf/kdd/PonrajDW26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783939","c":"jul","a":"Recent advancements in deep learning have significantly enhanced the performance and efficiency of network operations. However, the lack of transparency in their predictions and decision-making has made network operators reluctant to deploy DL-based solutions in production networks. To tackle this challenge, we propose Traffic-Explainer, a model-agnostic and input-perturbation-based deep learning framework aiming for explaining sequential-based network operations tasks. By maximizing the mutual information between predictions on original sequential instances and their masked counterparts, Traffic-Explainer automatically uncovers the most influential features driving model predictions. Extensive experiments demonstrate the superiority of Traffic-Explainer to existing explanation methods. Practically, we further apply TrafficExplainer to identify influential features and bootstrap transparency across three network operation tasks: traffic application identification, localization, and network cartography. In the first two tasks, Traffic-Explainer identifies the most decisive bytes that identify traffic applications and locations. In network cartography, TrafficExplainer identifies submarine cables that drive the mapping of traceroute to the physical path. Our implementation is publicly available at https://github.com/KINDLab-Fly/Traffic-Explainer.","ins":["University of Oregon","University of Oregon, Link Oregon"]},{"i":"conf/kdd/RajagopalanVYGC26","t":"ALF: Advertiser Large Foundation Model for Multi-Modal Advertiser Understanding","au":[["Santosh Rajagopalan",0],["Jonathan Vronsky",0],["Songbai Yan",0],["S. Alireza Golestaneh",0],["Shubhra Chandra",0],["Min Zhou",0]],"u":"https://doi.org/10.1145/3770854.3783927","dblp":"https://dblp.org/rec/conf/kdd/RajagopalanVYGC26.html","g":["Multimodal/VLM","LLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783927","c":"jul","a":"We present ALF (Advertiser Large Foundation model), a multimodal transformer architecture for understanding advertiser behavior and intent across text, image, video, and structured data modalities. Through contrastive learning and multi-task optimization, ALF creates unified advertiser representations that capture both content and behavioral patterns. Our model achieves stateof-the-art performance on critical tasks including fraud detection, policy violation identification, and advertiser similarity matching. In production deployment, ALF demonstrates significant real-world impact by delivering simultaneous gains in both precision and recall, for instance boosting recall by over 40 percentage points on one critical policy and increasing precision to 99.8% on another. The architecture’s effectiveness stems from its novel combination of multi-modal transformations, inter-sample attention mechanism, spectrally normalized projections, and calibrated probabilistic outputs.","ins":["Google"]},{"i":"conf/kdd/RenXXWYH26","t":"VideoRAG: Retrieval-Augmented Generation with Extreme Long-Context Videos","au":[["Xubin Ren",0],["Lingrui Xu",0],["Long Xia",1],["Shuaiqiang Wang",1],["Dawei Yin",1],["Chao Huang",0]],"u":"https://doi.org/10.1145/3770854.3783944","dblp":"https://dblp.org/rec/conf/kdd/RenXXWYH26.html","g":["RAG/Retrieval","Multimodal/VLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783944","c":"jul","a":"Retrieval-Augmented Generation (RAG) has demonstrated remarkable success in enhancing Large Language Models (LLMs) through external knowledge integration. However, its application has primarily focused on textual content, leaving the rich domain of multimodal video knowledge predominantly unexplored. This paper introduces VideoRAG, a retrieval-augmented generation framework designed for processing extremely long-context videos. Our core innovation lies in a dual-channel architecture that integrates graph-based textual knowledge grounding for cross-video semantic relationships and multi-modal context encoding for visual feature preservation. This design empowers VideoRAG to process unlimited-length videos by constructing precise knowledge graphs spanning multiple videos. The framework maintains semantic dependencies through specialized multi-modal retrieval paradigms, enabling comprehensive understanding of extended video content. We evaluate VideoRAG on our proposed LongerVideos benchmark, comprising over 160 videos totaling 134+ hours across lecture, documentary, and entertainment categories. VideoRAG demonstrates substantial performance improvements compared to existing RAG alternatives and long video understanding methods. The source code for VideoRAG implementation, along with the benchmark dataset, are available at: https://github.com/HKUDS/VideoRAG.","ins":["The University of Hong Kong","Baidu Inc."]},{"i":"conf/kdd/RuanJTLZLHYWW26","t":"Predictive Mobile Refueling for Agricultural Machinery via Deep Reinforcement Learning","au":[["Sijie Ruan",0],["Renchi Jiang",0],["Song Tang",0],["Yexin Li",[1,2]],["Weixin Zhai",3],["Xinhao Liu",0],["Bingbing Hu",4],["Kunlun Beidou Intelligence",4],["Hanning Yuan",0],["Caicong Wu",3],["Shuliang Wang",0]],"u":"https://doi.org/10.1145/3770854.3783928","dblp":"https://dblp.org/rec/conf/kdd/RuanJTLZLHYWW26.html","g":["Reinforcement Learning"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783928","c":"jul","a":"With the advancement of agricultural modernization, agricultural machinery is widely used for crop harvesting. Traditionally, agricultural machines must be refueled at gas stations regularly, affecting the harvesting efficiency. A mobile refueling service has emerged in recent years, in which refueling tankers can move to serve the refueling request. However, the current mobile refueling system is still in an on-demand mode, which may not achieve timely response. Therefore, in this paper, we propose a new mobile refueling mode, i.e., predictive mobile refueling. To tackle the challenge of sparse rewards in predictive mobile refueling, we develop a two-stage reinforcement learning-based scheduling strategy MobRef, which decouples the scheduling process into a central request dispatcher and a distributed tanker reposition scheduler, and further introduces a potential energy-based reward shaping function to facilitate the training of the reposition scheduler. Extensive experiments on two real-world datasets demonstrate the effectiveness of MobRef, which outperforms the best baseline by 12.71% on average. We also present a deployed system based on MobRef, which is used internally in China National Petroleum Corporation. ∗Weixin Zhai and Caicong Wu are also affiliated with Key Laboratory of Agricultural Machinery Monitoring and Big Data Applications, Ministry of Agriculture and Rural Affairs, Beijing, China. †Hanning Yuan is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783928","ins":["Beijing Institute of Technology","State Key Laboratory of General Artificial","Intelligence, BIGAI","University","Technologies Co., Ltd."]},{"i":"conf/kdd/SheHWSWAXZL26","t":"ECGMind: A Foundation Model for ECG Classification via Dynamic Energy Guidance","au":[["Yuqi She",0],["Junhao Huang",0],["Erke Wang",0],["Xianhao Song",0],["Liping Wang",0],["Haotong An",0],["Chen Xu",0],["Han Zhang",0],["Xuemin Lin",1]],"u":"https://doi.org/10.1145/3770854.3783947","dblp":"https://dblp.org/rec/conf/kdd/SheHWSWAXZL26.html","g":["Healthcare/Bio","Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783947","c":"jul","a":"Electrocardiogram (ECG) analysis is crucial for the diagnosis of cardiovascular disease. However, real-world deployment faces three key challenges: (1) the need for large amounts of manually labeled ECG data, which is time-consuming to collect. (2) the necessity of flexible addressing issues such as variations in clinical data distribution, noise, and low data quality. (3) the requirement for models to generalize across ECG data from different application scenarios. To address these issues, we propose ECGMind, a self-supervised foundational model for various ECG classification tasks. ECGMind is trained on unlabeled data and utilizes a masked autoencoder (MAE) backbone to selectively mask critical regions (e.g., R waves), thereby promoting the reconstruction of diagnostically important features. A dynamic energy score adjusts the importance of each ECG patch based on reconstruction difficulty, prioritizing hard-toreconstruct areas to enhance feature learning. Our experiments are conducted on both static and dynamic ECG datasets, involving different classification tasks. The results demonstrate ECGMind’s superior performance and scalability, offering a solution for both clinical and ambulatory ECG analysis. ECGMind has deployed as an intelligent diagnostic service at http://heartmind.ecgdb.com. The core code can be evaluated at https://github.com/tianti1/ECGMind.","ins":["East China Normal University","Shanghai Jiao Tong University"]},{"i":"conf/kdd/ShenCWXZBZ26","t":"KAN-FIF: Spline-Parameterized Lightweight Physics-based Tropical Cyclone Estimation on Meteorological Satellite","au":[["Jiakang Shen",[0,1]],["Qinghui Chen",[0,1]],["Runtong Wang",[0,1]],["Chenrui Xu",[0,1]],["Jinglin Zhang",[0,1]],["Cong Bai",[2,3]],["Feng Zhang",[4,5]]],"u":"https://doi.org/10.1145/3770854.3783929","dblp":"https://dblp.org/rec/conf/kdd/ShenCWXZBZ26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783929","c":"jul","a":"Tropical cyclones (TC) are among the most destructive natural disasters, causing catastrophic damage to coastal regions through extreme winds, heavy rainfall, and storm surges. Timely monitoring of tropical cyclones is crucial for reducing loss of life and property, yet it is hindered by the computational inefficiency and high parameter counts of existing methods on resource-constrained edge devices. Current physics-guided models suffer from linear feature interactions that fail to capture high-order polynomial relationships between TC attributes, leading to inflated model sizes and hardware incompatibility. To overcome these challenges, this study introduces the Kolmogorov–Arnold Network-based Feature Interaction Framework (KAN-FIF), a lightweight multimodal architecture that integrates MLP and CNN layers with spline-parameterized KAN layers. For Maximum Sustained Wind (MSW) prediction, experiments demonstrate that the KAN-FIF framework achieves a 94.8% reduction in parameters (0.99MB vs 19MB) and 68.7% faster inference per sample (2.3ms vs 7.35ms) compared to baseline model Phy-CoCo, while maintaining superior accuracy with 32.5% lower MAE. The offline deployment experiment of the FY-4 series meteorological satellite processor on the Qingyun-1000 development ∗Corresponding author This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783929 board achieved a 14.41ms per-sample inference latency with the KAN-FIF framework, demonstrating promising feasibility for operational TC monitoring and extending deployability to edge-device AI applications. The code is released at https://github.com/JinglinZhang/KAN-FIF.","ins":["Shandong University","School of Control Science and Engineering","Zhejiang University of Technology","College of Computer Science","Fudan University","Department of Atmospheric and Oceanic Sciences and Institutes of Atmospheric Sciences"]},{"i":"conf/kdd/ShenJLTLYHLCL26","t":"A Multi-Stage Structural Captioning Framework for Enhancing Chinese Image-to-Video Generation in Baidu","au":[["Lei Shen",0],["Zhipeng Jin",1],["Xiawei Li",1],["Wen Tao",1],["Shiyuan Li",1],["Yi Yang",1],["Cong Han",1],["Shuanglong Li",1],["Zhongmin Cai",0],["Lin Liu",1]],"u":"https://doi.org/10.1145/3770854.3783931","dblp":"https://dblp.org/rec/conf/kdd/ShenJLTLYHLCL26.html","g":["Multimodal/VLM","Diffusion/Generation"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783931","c":"jul","a":"The rapid advancement of video generation technology, particularly in the domain of image-to-video generation, is significantly transforming both personal and industrial applications. The performance of video generation models is heavily influenced by the quality of data, specifically video content and captions. Among these, the quality of video captions directly impacts the model’s ability to follow user instructions. Currently, video captions are typically generated using vision-language model (VLM)-based methods. However, issues such as hallucinations, incomplete descriptions, and inaccuracies remain prevalent. To address these challenges, we propose a novel optimization framework for a multi-expert, structured video captioning model, specifically designed to enhance the performance of Chinese image-to-video tasks in Baidu’s business scenarios. First, we construct a structured video caption dataset by combining a large language model (LLM) with human annotations, and introduce a hallucination-aware adaptive GRPO algorithm. A two-stage fine-tuning alignment strategy is employed to improve the accuracy of fine-grained content descriptions and mitigate hallucinations. Second, we design independent video sub-expert models to characterize subject motion intensity and camera movement, thereby expanding the dimensionality of video captions and addressing the ∗Work was done when interned at Baidu Inc. †Equal contribution. ‡Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783931 issue of inaccurate sub-dimension descriptions in a single VLM. Finally, we leverage multi-level structured video captions to guide the training of the video generation model, resulting in improved quality and consistency in video generation. Extensive experiments demonstrate that our method consistently outperforms the baseline. Specifically, it achieves a 2.49% improvement in F1-score on event-level cross-validation and reduces hallucination occurrences by 30.9%. Moreover, our framework significantly enhances the quality of Chinese video generation, yielding a 2.9% increase in the VBench total score and a 9.2% improvement in the proportion of high-quality generated videos.","ins":["Xi’an Jiaotong University","Baidu Inc."]},{"i":"conf/kdd/ShenHX26","t":"Data-Centric Dual-Layer Adversarial Learning for Fraud Detection under Label Delay and Concept Drift","au":[["Mingxuan Shen",[0,1]],["Liang Hong",[2,0,1]],["Qingying Xu",[0,1]]],"u":"https://doi.org/10.1145/3770854.3783941","dblp":"https://dblp.org/rec/conf/kdd/ShenHX26.html","g":["Anomaly/Outlier","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783941","c":"jul","a":"Banks often uncover new fraud cases by tracing connections from previously confirmed ones. In practice, this process faces two intertwined challenges: audits delay label confirmation, and fraud groups continually evolve their behaviors. These challenges manifest as label delay (LD) and concept drift (CD), which jointly degrade fraud detection. Errors introduced by delayed labels can propagate along network links, further amplifying the impact of concept drift. We propose a Data-Centric Dual-Layer Adversarial Framework (DDAF) that jointly addresses LD and CD by improving data robustness in a backbone-agnostic way. DDAF introduces a counterfactual attribution module to disentangle and quantify the individual and interaction effects of LD and CD. Guided by such attributions, we construct adversarial training graphs at two levels: node-level feature perturbations to mitigate delay-induced bias, and communitylevel structural perturbations to adapt to evolving group behavior. This dual-layer design coordinates correction across node and community scales, reducing error accumulation over time. On public datasets, DDAF improves AUC by 3.4 points and F1 by 3.5 points over strong baselines. In a large commercial bank deployment, DDAF identified 1,449 previously unknown fraud accounts, and expanded risk coverage in daily operations.","ins":["School of Information Management","Wuhan University","School of Artificial Intelligence"]},{"i":"conf/kdd/TangTFSWZL26","t":"FilDeep: Learning Large Deformations of Elastic-Plastic Solids with Multi-Fidelity Data","au":[["Jianheng Tang",[0,1]],["Shilong Tao",[0,1]],["Zhe Feng",[0,1]],["Haonan Sun",[0,1]],["Menglu Wang",2],["Zhanxing Zhu",[3,4,5]],["Yunhuai Liu",[0,1,6,7]],["Ministry of Education",null]],"u":"https://doi.org/10.1145/3770854.3783959","dblp":"https://dblp.org/rec/conf/kdd/TangTFSWZL26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783959","c":"jul","a":"The scientific computation of large deformations in elastic-plastic solids is crucial in various manufacturing applications. Traditional numerical methods exhibit several inherent limitations, prompting Deep Learning (DL) as a promising alternative. The effectiveness of current DL techniques typically depends on the availability of high-quantity and high-accuracy datasets, which are yet difficult to obtain in large deformation problems. During the dataset construction process, a dilemma stands between data quantity and data accuracy, leading to suboptimal performance in the DL models. To address this challenge, we focus on a representative application of large deformations, the stretch bending problem, and propose FilDeep, a Fidelity-based Deep Learning framework for large Deformation of elastic-plastic solids. Our FilDeep aims to resolve the quantity-accuracy dilemma by simultaneously training with both low-fidelity and high-fidelity data, where the former provides greater quantity but lower accuracy, while the latter offers higher accuracy but in less quantity. In FilDeep, we provide meticulous designs for the practical large deformation problem. Particularly, we propose attention-enabled cross-fidelity modules to effectively ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783959 capture long-range physical interactions across MF data. To the best of our knowledge, our FilDeep presents the first DL framework for large deformation problems using MF data. Extensive experiments demonstrate that our FilDeep consistently achieves state-of-the-art performance and can be efficiently deployed in manufacturing.","ins":["Peking University","School of Computer Science","Fuyao Group","University of Southampton","School of Electrical and Computer","Science","Key Lab of High Confidence Software","Technologies (Peking University)"]},{"i":"conf/kdd/TaxPLHKOVA26","t":"MCGrad: Multicalibration at Web Scale","au":[["Niek Tax",0],["Lorenzo Perini",0],["Fridolin Linder",0],["Daniel Haimovich",0],["Dima Karamshuk",0],["Nastaran Okati",[1,2]],["Milan Vojnovic",[0,3]],["Pavlos Athanasios",[4,0]]],"u":"https://doi.org/10.1145/3770854.3783954","dblp":"https://dblp.org/rec/conf/kdd/TaxPLHKOVA26.html","g":["Fairness/Bias","Web/Social"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783954","c":"jul","a":"We propose MCGrad, a novel and scalable multicalibration algorithm. Multicalibration - calibration in subgroups of the data - is an important property for the performance of machine learningbased systems. Existing multicalibration methods have thus far received limited traction in industry. We argue that this is because existing methods (1) require such subgroups to be manually specified, which ML practitioners often struggle with, (2) are not scalable, or (3) may harm other notions of model performance such as log loss and Area Under the Precision-Recall Curve (PRAUC). MCGrad does not require explicit specification of protected groups, is scalable, and often improves other ML evaluation metrics instead of harming them. MCGrad has been in production at Meta, and is now part of hundreds of production models. We present results from these deployments as well as results on public datasets. We provide an open source implementation of MCGrad at https://github.com/facebookincubator/MCGrad.","ins":["Meta Platforms, Inc.","Max Planck Institute for Software","Systems","The London School of Economics and Political Science","Apostolopoulos"]},{"i":"conf/kdd/WangMYHLHYCLJYL26","t":"MTGenRec: An Efficient Distributed Training System for Generative Recommendation Models in Meituan","au":[["Yuxiang Wang",[0,1]],["Chi Ma",[0,2]],["Xiao Yan",[0,2]],["Mincong Huang",[0,1]],["Xiaoguang Li",[0,1]],["Ruidong Han",[0,1]],["Bin Yin",[0,1]],["Shangyu Chen",[0,1]],["Xiang Li",[0,1]],["Fei Jiang",[0,1]],["Lei Yu",[0,1]],["Chuan Liu",[0,1]],["Wei Lin",[0,1]],["Haowei Han",[0,1]],["Xiaokai Zhou",[0,1]],["Bo Du",[3,4,5,6]],["Jiawei Jiang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3783925","dblp":"https://dblp.org/rec/conf/kdd/WangMYHLHYCLJYL26.html","g":["Recommendation","Efficiency/Compression"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783925","c":"jul","a":"Recommendation is crucial for both user experience and company revenue in Meituan as a leading lifestyle company, and generative recommendation models (GRMs) are shown to produce quality recommendations recently. However, existing systems are limited by insufficient functionality support and inefficient implementations for training GRMs in industrial scenarios. As such, we introduce MTGenRec as an efficient and scalable system for GRM training. ∗Both authors contributed equally to this research. †Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783925 Specifically, to handle real-time insertions/deletions of sparse embeddings, MTGenRec employs dynamic hash tables to replace static ones. To improve training efficiency, MTGenRec conducts dynamic sequence balancing to address the computation load imbalances among GPUs and adopts feature ID deduplication alongside automatic table merging to accelerate embedding lookup. Extensive experiments show that MTGenRec improves training throughput by 1.6× – 2.4× while achieving good scalability when running over 100 GPUs. MTGenRec has been deployed for many applications in Meituan and is now handling hundreds of millions of requests on a daily basis. On the delivery platform, we observe a 1.22% growth in user order volume and a 1.31% enhancement in online PV_CTR.","ins":["Wuhan University","School of Computer Science","Institute for Math and AI","Wuhan University, School of Computer Science, National","Engineering Research Center for Multimedia Software, Hubei Key","Laboratory of Multimedia and Network Communication","Engineering"]},{"i":"conf/kdd/XuYLGZYWWG26","t":"ASTAFN: Bridging the Gap Between Weather Foundation Models and Accurate Station-Level Forecasting","au":[["Bihe Xu",[0,1,2]],["Zhicheng Yan",[0,1,2]],["Qingyong Li",[0,1,2]],["Zhiqing Guo",[0,1,2]],["Dong Zheng",[3,4,5]],["Wen Yao",[3,4,5]],["Bo Wang",[6,7]],["Zhao Wang",[6,7]],["Yangliao Geng",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3783935","dblp":"https://dblp.org/rec/conf/kdd/XuYLGZYWWG26.html","g":["Spatiotemporal/Urban","Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783935","c":"jul","a":"Weather Foundation Models (WFMs) have recently attracted significant attention for their exceptional performance and inference efficiency in global-scale weather forecasting. However, their coarse spatial resolution and inherent biases constrain their utility for station-level forecasting, which is crucial for applications such as renewable energy management and aviation safety. To address these limitations, we propose the Adaptive Spatiotemporal Alignment Fusion Network (ASTAFN), a novel framework designed for accurate station-level weather forecasting through the synergistic integration of WFMs and station observations. ASTAFN incorporates two complementary data sources: (1) recent station observations, which offer fine-grained local trend information, and (2) WFM-generated forecasts, which provide broad-scale weather patterns. The core innovation of ASTAFN lies in its proxy station learning mechanism, which aligns the spatial structure and corrects the biases of WFMs relative to actual station data, facilitating the extraction of homogeneous spatiotemporal features from both sources. These ∗Correspondence to: Yangli-ao Geng <gengyla@bjtu.edu.cn> Qingyong Li <liqy@ bjtu.edu.cn>. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783935 features are dynamically fused at each forecasting step using an adaptive strategy, effectively compensating for WFM biases and enhancing predictive accuracy. Experimental evaluations on three real-world datasets demonstrate that ASTAFN reduces mean absolute error by 20%–35% compared to baseline WFMs for station-level wind speed forecasting. ASTAFN has been deployed on the regional station-level weather forecasting and analysis platform of the Chinese Academy of Meteorological Sciences, currently serving the Guangdong and Yunnan provinces in southern China.","ins":["Key Laboratory of Big Data &","Artificial Intelligence in Transportation (Ministry of Education), Beijing Jiaotong","University","State Key Laboratory of Severe","Weather Meteorological Science and Technology & CMA Key Laboratory","of Lightning, Chinese Academy of Meteorological Sciences","National Key Laboratory of Renewable Energy Grid-Integration, China Electric Power Research","Institute"]},{"i":"conf/kdd/YaoHCLSYFGH26","t":"Macro Graph of Experts for Billion-Scale Multi-Task Recommendation","au":[["Hongyu Yao",0],["Zijin Hong",[1,2]],["Hao Chen",3],["Zhiqing Li",3],["Qijie Shen",4],["Zuobin Ying",3],["Qihua Feng",5],["Huan Gong",[6,7]],["Feiran Huang",[8,0]]],"u":"https://doi.org/10.1145/3770854.3783958","dblp":"https://dblp.org/rec/conf/kdd/YaoHCLSYFGH26.html","g":["Recommendation","Graph/GNN"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783958","c":"jul","a":"Graph-based multi-task learning at billion-scale presents a significant challenge, as different tasks correspond to distinct billionscale graphs. Traditional multi-task learning methods often neglect these graph structures, relying solely on individual user and item embeddings. However, disregarding graph structures overlooks substantial potential for improving performance. In this paper, we introduce the Macro Graph of Experts (MGOE) framework, the first approach capable of leveraging macro graph embeddings to capture task-specific macro features while modeling the correlations between task-specific experts. Specifically, we propose the concept of a Macro Graph Bottom, which, for the first time, enables multi-task learning models to incorporate graph information effectively. We design the Macro Prediction Tower to dynamically integrate macro knowledge across tasks. MGOE has been deployed at scale, powering multi-task learning for a leading billion-scale recommender system, Alibaba. Extensive offline experiments conducted on three public benchmark datasets demonstrate its superiority over state-of-the-art multi-task learning methods, establishing MGOE as a breakthrough in multi-task graph-based recommendation. Furthermore, online A/B tests confirm the superiority of MGOE in billion-scale recommender systems. ∗Both authors contributed equally to this research. † Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783958","ins":["Jinan University","The Hong Kong Polytechnic","University","City University of Macau","Alibaba Group","Beijing Institute of Technology","National University of Defense","Technology","Beihang University"]},{"i":"conf/kdd/YehSDFJFSWPDCRW26","t":"TREASURE: A Transformer-Based Foundation Model for High-Volume Transaction Understanding","au":[["Chin-Chia Michael Yeh",0],["Uday Singh Saini",0],["Xin Dai",0],["Xiran Fan",0],["Shubham Jain",0],["Yujie Fan",0],["Jiarui Sun",0],["Junpeng Wang",0],["Menghai Pan",0],["Yingtong Dou",0],["Yuzhong Chen",0],["Vineeth Rakesh",0],["Liang Wang",0],["Yan Zheng",0],["Mahashweta Das",0]],"u":"https://doi.org/10.1145/3770854.3783942","dblp":"https://dblp.org/rec/conf/kdd/YehSDFJFSWPDCRW26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783942","c":"jul","a":"Payment networks form the backbone of modern commerce, generating high volumes of transaction records from daily activities. Properly modeling this data can enable applications such as abnormal behavior detection and consumer-level insights for hyper-personalized experiences, ultimately improving people’s lives. In this paper, we present TREASURE, TRansformer Engine As Scalable Universal transaction Representation Encoder, a multipurpose transformer-based foundation model specifically designed for transaction data. The model simultaneously captures both consumer behavior and payment network signals (such as response codes and system flags), providing comprehensive information necessary for applications like accurate recommendation systems and abnormal behavior detection. Verified with industry-grade datasets, TREASURE features three key capabilities: 1) an input module with dedicated sub-modules for static and dynamic attributes, enabling more efficient training and inference; 2) an efficient and effective training paradigm for predicting high-cardinality categorical attributes; and 3) demonstrated effectiveness as both a standalone model that increases abnormal behavior detection performance by 111% over production systems and an embedding provider that enhances recommendation models by 104%. We present key insights from extensive ablation studies, benchmarks against production models, and case studies, highlighting valuable knowledge gained from developing TREASURE.","ins":["Visa Research"]},{"i":"conf/kdd/YewXSFOWSYG26","t":"Dynamic Content Moderation in Livestreams: Combining Supervised Classification with MLLM-Boosted Similarity Matching","au":[["Wei Chee Yew",0],["Hailun Xu",0],["Sanjay Saha",0],["Xiaotian Fan",0],["Hiok Hian Ong",0],["David Yuchen Wang",0],["Kanchan Sarkar",0],["Zhenheng Yang",0],["Danhui Guan",0]],"u":"https://doi.org/10.1145/3770854.3783936","dblp":"https://dblp.org/rec/conf/kdd/YewXSFOWSYG26.html","g":["Multimodal/VLM","LLM","Web/Social"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783936","c":"jul","a":"Content moderation remains a critical yet challenging task for largescale user-generated video platforms, especially in livestreaming environments where moderation must be timely, multimodal, and robust to evolving forms of unwanted content. We present a hybrid moderation framework deployed at production scale that combines supervised classification for known violations with reference-based similarity matching for novel or subtle cases. This hybrid design enables robust detection of both explicit violations and novel edge cases that evade traditional classifiers. Multimodal inputs (text, audio, visual) are processed through both pipelines, with a multimodal large language model (MLLM) distilling knowledge into each to boost accuracy while keeping inference lightweight. In production, the classification pipeline achieves 67% recall at 80% precision, and the similarity pipeline achieves 76% recall at 80% precision. Large-scale A/B tests show a 6–8% reduction in user views of unwanted livestreams. These results demonstrate a scalable and adaptable approach to multimodal content governance, capable of addressing both explicit violations and emerging adversarial behaviors.","ins":["TikTok"]},{"i":"conf/kdd/YinWBXW26","t":"From Clicks to Preference: A Multi-stage Alignment Framework for Generative Query Suggestion in Conversational System","au":[["Junhao Yin",0],["Haolin Wang",0],["Peng Bao",0],["Ju Xu",0],["Yongliang Wang",0]],"u":"https://doi.org/10.1145/3770854.3783953","dblp":"https://dblp.org/rec/conf/kdd/YinWBXW26.html","g":["Search/IR","LLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783953","c":"jul","a":"Generative query suggestion using large language models offers a powerful way to enhance conversational systems, but aligning outputs with nuanced user preferences remains a critical challenge. To address this, we introduce a multi-stage framework designed for progressive alignment between the generation policy and user intent. Our pipeline begins with prompt engineering as a cold-start strategy, followed by the Supervised Fine-Tuning stage, in which we introduce a distillation method on click logs to create a robust foundational model. To better model user preferences while capturing their inherent uncertainty, we develop a Gaussian Reward Model (GaRM) that represents user preferences as probability distributions rather than point estimates. Finally, we employ reinforcement learning to align the generation policy with these preferences, guided by a composite reward function that integrates GaRM with auxiliary heuristics to mitigate reward hacking. To maintain training stability, this process is enhanced by a novel out-of-distribution regularization method and a two-stage reward fusion technique. Extensive experiments demonstrate that our framework significantly outperforms baselines on both automatic and human evaluations and yields a 34% relative increase in user engagement as measured by click-through rate in live A/B tests.","ins":["ByteDance Inc."]},{"i":"conf/kdd/ZengJCLLHLSXYCF26","t":"Optimizing Generative Ranking Relevance via Reinforcement Learning in Xiaohongshu Search","au":[["Ziyang Zeng",0],["Heming Jing",1],["Jindong Chen",1],["Xiangli Li",1],["Hongyu Liu",1],["Yixuan He",1],["Zhengyu Li",1],["Yige Sun",1],["Zheyong Xie",1],["Yuqing Yang",0],["Shaosheng Cao",1],["Jun Fan",1],["Yi Wu",1],["Yao Hu",1]],"u":"https://doi.org/10.1145/3770854.3783917","dblp":"https://dblp.org/rec/conf/kdd/ZengJCLLHLSXYCF26.html","g":["Search/IR","Reinforcement Learning"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783917","c":"jul","a":"Ranking relevance is a fundamental task in search engines, aiming to identify the items most relevant to a given user query. Traditional relevance models typically produce scalar scores or directly predict relevance labels, limiting both interpretability and the modeling of complex relevance signals. Inspired by recent advances in Chain-ofThought (CoT) reasoning for complex tasks, we investigate whether explicit reasoning can enhance both interpretability and performance in relevance modeling. However, existing reasoning-based Generative Relevance Models (GRMs) primarily rely on supervised fine-tuning on large amounts of human-annotated or synthetic CoT data, which often leads to limited generalization. Moreover, domain-agnostic, free-form reasoning tends to be overly generic and insufficiently grounded, limiting its potential to handle the diverse and ambiguous cases prevalent in open-domain search. In this work, we formulate relevance modeling in Xiaohongshu search as a reasoning task and introduce a Reinforcement Learning (RL)-based training framework to enhance the grounded reasoning capabilities of GRMs. Specifically, we incorporate practical business-specific relevance criteria into the multi-step reasoning prompt design and ∗This work was conducted during Ziyang’s internship at Xiaohongshu. †Both authors contributed equally to this work. ‡Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783917 propose Stepwise Advantage Masking (SAM), a lightweight processsupervision strategy which facilitates effective learning of these criteria through improved credit assignment. To enable industrial deployment, we further distill the large-scale RL-tuned model to a lightweight version suitable for real-world search systems. Extensive offline evaluations and online A/B tests demonstrate that our approach consistently delivers significant improvements across key relevance and business metrics, validating its effectiveness, robustness, and practicality for large-scale industrial search systems.","ins":["Beijing University of Posts and Telecommunications","Xiaohongshu Inc."]},{"i":"conf/kdd/ZhaiMWLHTFL26","t":"Heterogeneous Multi-treatment Uplift Modeling for Trade-off Optimization in Short-Video Recommendation","au":[["Chenhao Zhai",0],["Shenzhen International Graduate",0],["Chang Meng",1],["Xueliang Wang",1],["Shuchang Liu",1],["Xiaolong Hu",1],["Shisong Tang",1],["Xiaoqiang Feng",1],["Xiu Li",0],["Shenzhen International Graduate",0]],"u":"https://doi.org/10.1145/3770854.3783933","dblp":"https://dblp.org/rec/conf/kdd/ZhaiMWLHTFL26.html","g":["Recommendation","Causal"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783933","c":"jul","a":"The rapid proliferation of short videos on social media platforms presents unique challenges and opportunities for recommendation systems. Users exhibit diverse preferences, and the responses resulting from different strategies often conflict with one another, potentially exhibiting inverse correlations between metrics such as watch time and video view counts. Existing uplift models face limitations in handling the heterogeneous multi-treatment scenarios of short-video recommendations, often failing to effectively capture both the synergistic and individual causal effects of different strategies. Furthermore, traditional fixed-weight approaches for balancing these responses lack personalization and can result in biased decision-making. To address these issues, we propose a novel Heterogeneous Multi-treatment Uplift Modeling (HMUM) framework for trade-off optimization in short-video recommendations. HMUM comprises an Offline Hybrid Uplift Modeling (HUM) module, which captures the synergistic and individual effects of multiple strategies, and an Online Dynamic Decision-Making (DDM) module, which estimates the weights of different user responses in real-time for personalized decision-making. Evaluated on two public datasets, an industrial dataset, and online A/B experiments on the Kuaishou platform, our model demonstrated superior offline performance and significant improvements in key metrics. It is now fully deployed on the platform, benefiting hundreds of millions of users. ∗Both authors contributed equally to this research. †Work done when he was a research intern at Kuaishou Technology. ‡The corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783933","ins":["School, Tsinghua University","Kuaishou Technology"]},{"i":"conf/kdd/ZhangLZZZWSCZZL26","t":"Q-Regularized Generative Auto-Bidding: From Suboptimal Trajectories to Optimal Policies","au":[["Mingming Zhang",0],["Information Security and Trusted",[1,2]],["Na Li",0],["Information Security and Trusted",[1,2]],["Feiqing Zhuang",2],["Hongyang Zheng",2],["Jiangbing Zhou",2],["Wuyin Wang",2],["Shengjie Sun",2],["Xiaowei Chen",2],["Junxiong Zhu",2],["Lixin Zou",0],["Information Security and Trusted",1],["Chenliang Li",0],["Information Security and Trusted",1]],"u":"https://doi.org/10.1145/3770854.3783950","dblp":"https://dblp.org/rec/conf/kdd/ZhangLZZZWSCZZL26.html","g":["Reinforcement Learning"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783950","c":"jul","a":"With the rapid development of e-commerce, auto-bidding has become a key asset in optimizing advertising performance under diverse advertiser environments. The current approaches focus on reinforcement learning (RL) and generative models. These efforts imitate offline historical behaviors by utilizing a complex structure with expensive hyperparameter tuning. The suboptimal trajectories further exacerbate the difficulty of policy learning. To address these challenges, we proposes QGA, a novel Q-value regularized Generative Auto-bidding method. In QGA, we propose to plug a Q-value regularization with double Q-learning strategy into the Decision Transformer backbone. This design enables joint ∗Both authors contributed equally to this research. Work done when Mingming Zhang and Na Li were interns at Taobao & Tmall Group of Alibaba. †Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783950 optimization of policy imitation and action-value maximization, allowing the learned bidding policy to both leverage experience from the dataset and alleviate the adverse impact of the suboptimal trajectories. Furthermore, to safely explore the policy space beyond the data distribution, we propose a Q-value guided dualexploration mechanism, in which the DT model is conditioned on multiple return-to-go targets and locally perturbed actions. This entire exploration process is dynamically guided by the aforementioned Q-value module, which provides principled evaluation for each candidate action. Experiments on public benchmarks and simulation environments demonstrate that QGA consistently achieves superior or highly competitive results compared to existing alternatives. Notably, in large-scale real-world A/B testing, QGA achieves a 3.27% increase in Ad GMV and a 2.49% improvement in Ad ROI1.","ins":["Key Laboratory of Aerospace","Computing, Ministry of Education, School of Cyber Science and Engineering, Wuhan University","Taobao & Tmall Group of Alibaba"]},{"i":"conf/kdd/ZhangCZLWXZ26","t":"VALUE: Value-Aware Large Language Model for Query Rewriting via Weighted Trie in Sponsored Search","au":[["Xiao Zhang",0],["Guanyu Chen",0],["Boyang Zuo",1],["Feng Li",0],["Pengjie Wang",0],["Jian Xu",0],["Bo Zheng",0]],"u":"https://doi.org/10.1145/3770854.3783951","dblp":"https://dblp.org/rec/conf/kdd/ZhangCZLWXZ26.html","g":["LLM","Search/IR"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783951","c":"jul","a":"Query-to-bidword (i.e., bidding keyword) rewriting is fundamental to sponsored search, transforming noisy user queries into semantically relevant and commercially valuable keywords. Recent advances in large language models (LLMs) improve semantic relevance through generative retrieval frameworks, but they rarely encode the commercial value of keywords. As a result, rewrites are often semantically correct yet economically suboptimal, and a reinforcement learning from human feedback (RLHF) stage is usually added after supervised fine-tuning (SFT) to mitigate this deficiency. However, conventional preference alignment frequently overemphasize the ordering of bidword values and is susceptible to overfitting, which degrades rewrite quality. In addition, bidword value changes rapidly, while existing generative methods do not respond to these fluctuations. To address this shortcoming, we introduce VALUE (Value-Aware Large language model for qUery rewriting via wEighted trie), a framework that integrates value awareness directly into generation and enhances value alignment during training. VALUE employs the Weighted Trie, a novel variant of the classical trie that stores real-time value signals for each token. During decoding, the framework adjusts the LLM’s token probabilities with these signals, constraining the search space and steering generation toward high-value rewrites. The alignment stage uses a fine-grained preference learning strategy that emphasizes stable, high-value differences and down-weights noisy or transient fluctuations, thereby improving robustness and reducing overfitting. Offline experiments show that VALUE significantly outperforms ∗This author contributed to this work during his internship at Alibaba. †Corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783951 baselines in both semantic matching and value-centric metrics. Online A/B tests further revealed that our Revenue Per Mille (RPM) metric increased by 1.64%. VALUE has been deployed on our advertising system since October 2024 and served the Double Eleven promotions, the biggest shopping carnival in China.","ins":["Taobao & Tmall Group of Alibaba","Tsinghua University"]},{"i":"conf/kdd/ZhaoZZL26","t":"ChannelMTS: A Multi-modal Time-Series Framework for High-Speed Railway Channel Prediction","au":[["Haihong Zhao",[0,1]],["Zinan Zheng",[0,1]],["Chenyi Zi",[0,1]],["Jia Li",[0,1]]],"u":"https://doi.org/10.1145/3770854.3783957","dblp":"https://dblp.org/rec/conf/kdd/ZhaoZZL26.html","g":["Multimodal/VLM","Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783957","c":"jul","a":"Accurate channel prediction is crucial for high-speed railway communications, especially in the 5G/6G era. Existing single-modality methods struggle to capture the intricate temporal and environmental dynamics, leading to suboptimal performance. To address this, we propose ChannelMTS, a novel multi-modal time-series framework that integrates both channel and environmental information to enhance prediction accuracy. First, ChannelMTS represents environmental conditions as snapshots, which are subsequently enhanced by a retrieval-augmented statistical channel module and embedded into an environmental time-series space using a transformer. Then, it aligns the channel and environmental time-series distributions to reduce the modality disparity. Finally, it adaptively fuses both modalities to achieve accurate channel prediction. This design can effectively leverage the complementary strengths of both modalities to enrich single-modality channel time series. Extensive experiments on real-world channel datasets show that ChannelMTS consistently outperforms state-of-the-art baselines. Moreover, online A/B testing reveals a significant 70%-90% performance improvement, and real-world deployment confirms its practical value.","ins":["The Hong Kong University of Science and Technology","Data Science and Analytics Thrust"]},{"i":"conf/kdd/ZhuDDWSLBVLBZLL26","t":"ENCO: Deploying Production-Scale Engineering Copilots","au":[["Yiwen Zhu",0],["Mathieu Demarne",0],["Kai Deng",0],["Wenjing Wang",0],["Nutan Sahoo",0],["Hannah Lerner",0],["Anjali Bhavan",0],["Divya Vermareddy",0],["Yunlei Lu",0],["Swati Bararia",0],["William Zhang",1],["Xia Li",0],["Katherine Lin",0],["Miso Cilimdzic",0],["Subru Krishnan",0]],"u":"https://doi.org/10.1145/3770854.3783949","dblp":"https://dblp.org/rec/conf/kdd/ZhuDDWSLBVLBZLL26.html","g":["LLM","Code/Programming"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783949","c":"jul","a":"Software engineers frequently grapple with the challenge of accessing fragmented documentation and telemetry data, such as Troubleshooting Guides (TSGs), incident reports, code repositories, and internal tools maintained by different teams. In this work, we introduced ENCO, a comprehensive framework for developing, deploying, and managing copilots tailored to improve productivity in large scale production scenarios. The framework combines an innovative NL2SearchQuery module with a lightweight hierarchical agentic planner to enable accurate and efficient retrieval-augmented generation (RAG) for code, semi-structured data and documents. These components allow the copilot to retrieve relevant information from diverse sources and invoke the right skills with low latency to answer highly complex technical questions. Since its launch in September 2023, ENCO has demonstrated its effectiveness through widespread adoption, enabling tens of thousands of interactions and engaging over 1,000 monthly active users (MAUs). The system has been continuously optimized based on usage patterns and user feedback, resulting in measurable improvements in response relevance, latency, and user satisfaction.","ins":["Microsoft","Carnegie Mellon University"]},{"i":"conf/kdd/DengXWDMZW26","t":"LMID: A Comprehensive Multimodal Dataset for Failure Prediction in Cloud Computing Systems","au":[["Lingfei Deng",0],["Ruqiao Xu",0],["Yunong Wang",0],["Xiaoming Du",0],["Xuhua Ma",0],["Xudong Zheng",0],["Dongrui Wu",1]],"u":"https://doi.org/10.1145/3770854.3785684","dblp":"https://dblp.org/rec/conf/kdd/DengXWDMZW26.html","g":["Benchmark/Dataset","Multimodal/VLM","Anomaly/Outlier"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785684","c":"jul","a":"Failure prediction is crucial for ensuring the stability of cloud computing systems and has garnered extensive attention from both academia and industry. Generally, data used for prediction includes two modalities: 1) Text data, such as logs; and, 2) Numerical data, such as error counts and monitoring metrics. However, most existing failure prediction algorithms for cloud computing only focus on a single modality. The lack of high-quality multimodal datasets from real-world production environments constrains academic research on multimodal failure prediction. To fill this gap, this paper releases a large multimodal dataset of operation data from the Alibaba cloud computing platform, namely, Logs and Metrics Integration Dataset (LMID). It consists of 100 million pieces of logs (textual data) and 37 dimensions of monitoring metrics (numerical data) from 220,000 physical machines. To our knowledge, it is the first multimodal dataset for cloud computing system failure prediction, and is expected to greatly benefit the community. This paper provides a detailed introduction to the construction of LMID, its contents, and the performance of state-of-the-art algorithms on it. It also conducts extensive experiments to reveal a new insight that cross-modality connections are effective for failure prediction. LMID is now available at https://huggingface.co/datasets/AliyunECSAlgos/LMID.","ins":["Alibaba Cloud, Alibaba Group","Huazhong University of Science and Technology"]},{"i":"conf/kdd/DizajiTHHR26","t":"T-GRAB: A Synthetic Diagnostic Benchmark for Learning on Temporal Graphs","au":[["Alireza Dizaji",[0,1]],["Benedict Aaron Tjandra",0],["Mehrab Hamidi",[0,1]],["Shenyang Huang",[0,2,3]],["Guillaume Rabusseau",[0,1]],["CIFAR AI Chair",null]],"u":"https://doi.org/10.1145/3770854.3785699","dblp":"https://dblp.org/rec/conf/kdd/DizajiTHHR26.html","g":["Benchmark/Dataset","Graph/GNN","Time Series"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785699","c":"jul","a":"Dynamic graph learning methods have recently emerged as powerful tools for modelling relational data evolving through time. However, despite extensive benchmarking efforts, it remains unclear whether current Temporal Graph Neural Networks (TGNNs) effectively capture core temporal patterns such as periodicity, causeand-effect, and long-range dependencies. In this work, we introduce the Temporal Graph Reasoning Benchmark (T-GRAB), a comprehensive set of synthetic tasks designed to systematically probe the capabilities of TGNNs to reason across time. T-GRAB provides controlled, interpretable tasks that isolate key temporal skills: counting/memorizing periodic repetitions, inferring delayed causal effects, and capturing long-range dependencies over both spatial and temporal dimensions. We evaluate 11 temporal graph learning methods on these tasks, revealing fundamental shortcomings in their ability to generalize temporal patterns. Our findings offer actionable insights into the limitations of current models, highlight challenges hidden by traditional real-world benchmarks, and motivate the development of architectures with stronger temporal reasoning abilities. The code for T-GRAB can be found at: https: //github.com/alirezadizaji/T-GRAB.","ins":["Mila - Quebec AI Institute","DIRO, Université de Montréal","McGill University","University of Oxford"]},{"i":"conf/kdd/FengHXSLLLBN26","t":"Voxlect: A Speech Foundation Model Benchmark for Modeling Dialects and Regional Languages Around the Globe","au":[["Tiantian Feng",0],["Kevin Huang",0],["Anfeng Xu",0],["Xuan Shi",0],["Thanathai Lertpetchpun",0],["Jihwan Lee",0],["Yoonjeong Lee",0],["Dani Byrd",0],["Shrikanth Narayanan",0]],"u":"https://doi.org/10.1145/3770854.3785687","dblp":"https://dblp.org/rec/conf/kdd/FengHXSLLLBN26.html","g":["Benchmark/Dataset","NLP/Text"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785687","c":"jul","a":"We present Voxlect, a novel benchmark for modeling dialects and regional languages worldwide using speech foundation models. Specifically, we report comprehensive benchmark evaluations on dialects and regional language varieties in English, Arabic, Mandarin and Cantonese, Tibetan, Indic languages, Thai, Spanish, French, German, Brazilian Portuguese, and Italian. Our study used over 2 million training utterances from 30 publicly available speech corpora that are provided with dialectal information. We evaluate the performance of several widely used speech foundation models in classifying speech dialects. We assess the robustness of the dialectal models under noisy conditions and present an error analysis that highlights modeling results aligned with geographic continuity. In addition to benchmarking dialect classification, we demonstrate several downstream applications enabled by Voxlect. Specifically, we show that Voxlect can be applied to augment existing speech recognition datasets with dialect information, enabling a more detailed analysis of ASR performance across dialectal variations. Voxlect is also used as a tool to evaluate the performance of speech generation systems. Voxlect is publicly available with the RAIL license at: https://github.com/tiantiaf0627/voxlect.","ins":["University of Southern California"]},{"i":"conf/kdd/GengC26","t":"REALM-Bench: A Benchmark for Evaluating Multi-Agent Systems on Real-world, Dynamic Planning and Scheduling Tasks","au":[["Longling Geng",[0,1,2]],["Edward Y. Chang",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3785692","dblp":"https://dblp.org/rec/conf/kdd/GengC26.html","g":["Benchmark/Dataset","Agent"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785692","c":"jul","a":"This benchmark suite provides a comprehensive evaluation framework for assessing both individual LLMs and multi-agent systems in real-world planning and scheduling scenarios. The suite encompasses 14 designed planning and scheduling problems that progress from basic to highly complex, incorporating key aspects such as multi-agent coordination, inter-agent dependencies, and dynamic environmental disruptions. Each problem can be scaled along three dimensions: the number of parallel planning threads, the complexity of inter-dependencies, and the frequency of unexpected disruptions requiring real-time adaptation. The benchmark includes 14 detailed problem specifications, 15 comparison methods including Random, LPT, SPT, STPT, MPSR, DRL-Liu, GP, GEP, LSO, SPT/TWKR, DRL-Chen, DRL-Zhang, 2+ evaluation metrics, and baseline implementations using 3+ LLMs including GPT-4o, Claude-3.7, DeepSeek-R1, and 4 contemporary frameworks including LangGraph, AutoGen, CrewAI, and Swarm, enabling rigorous testing of both single-agent and multi-agent planning capabilities. Through standardized evaluation criteria and scalable complexity, this benchmark aims to be open-sourced to drive progress in developing more adaptable, robust, and scalable AI planning systems for real-world applications. Datasets:https://github.com/genglongling/REALM-Bench Code:https://github.com/genglongling/M-APPLE-OS","ins":["Computer Science Department","Stanford University","Stanford, CA, USA"]},{"i":"conf/kdd/GrotschlaXW26","t":"Benchmarking Positional Encodings for GNNs and Graph Transformers","au":[["Florian Grötschla",0],["Jiaqing Xie",0],["Roger Wattenhofer",0]],"u":"https://doi.org/10.1145/3770854.3785701","dblp":"https://dblp.org/rec/conf/kdd/GrotschlaXW26.html","g":["Benchmark/Dataset","Graph/GNN"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785701","c":"jul","a":"Positional Encodings (PEs) are essential for injecting structural information into Graph Neural Networks (GNNs), particularly Graph Transformers, yet their empirical impact remains insufficiently understood. We introduce a unified benchmarking framework that decouples PEs from architectural choices, enabling a fair comparison across 8 GNN and Transformer models, 9 PEs, and 10 synthetic and real-world datasets. Across more than 500 model–PE–dataset configurations, we find that commonly used expressiveness proxies, including Weisfeiler–Lehman distinguishability, do not reliably predict downstream performance. In particular, highly expressive PEs frequently fail to improve, and can even degrade performance on real-world tasks. At the same time, we identify several simple and previously overlooked model–PE combinations that match or outperform recent state-of-the-art methods. Our results demonstrate the strong task-dependence of PEs and underscore the need for empirical validation beyond theoretical expressiveness. To support reproducible research, we release an open-source benchmarking framework for evaluating PEs for graph learning tasks.","ins":["ETH Zurich"]},{"i":"conf/kdd/KangKJHAKKAH26","t":"SynSym: A Synthetic Data Generation Framework for Psychiatric Symptom Identification","au":[["Migyeong Kang",0],["Jihyun Kim",0],["Hyolim Jeon",0],["Sunwoo Hwang",0],["Jihyun An",1],["Yonghoon Kim",2],["Haewoon Kwak",3],["Jisun An",3],["Jinyoung Han",0]],"u":"https://doi.org/10.1145/3770854.3785698","dblp":"https://dblp.org/rec/conf/kdd/KangKJHAKKAH26.html","g":["Healthcare/Bio","Diffusion/Generation"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785698","c":"jul","a":"Psychiatric symptom identification on social media aims to infer fine-grained mental health symptoms from user-generated posts, allowing a detailed understanding of users’ mental states. However, the construction of large-scale symptom-level datasets remains challenging due to the resource-intensive nature of expert labeling and the lack of standardized annotation guidelines, which in turn limits the generalizability of models to identify diverse symptom expressions from user-generated text. To address these issues, we propose SynSym, a synthetic data generation framework for constructing generalizable datasets for symptom identification. Leveraging large language models (LLMs), SynSym constructs high-quality training samples by (1) expanding each symptom into sub-concepts to enhance the diversity of generated expressions, (2) producing synthetic expressions that reflect psychiatric symptoms in diverse linguistic styles, and (3) composing realistic multi-symptom expressions, informed by clinical co-occurrence patterns. We validate SynSym on three benchmark datasets covering different styles of depressive symptom expression. Experimental results demonstrate that models trained solely on the synthetic data generated by SynSym perform comparably to those trained on real data, and benefit further from additional fine-tuning with real data. These findings underscore the potential of synthetic data as an alternative resource to real-world annotations in psychiatric symptom modeling, and SynSym serves as a practical framework for generating clinically relevant and realistic symptom expressions.","ins":["Sungkyunkwan University","Samsung Medical Center","Omnicns","Indiana University"]},{"i":"conf/kdd/KimCLK26","t":"ARCTraj: A Dataset and Benchmark of Human Reasoning Trajectories for Abstract Problem Solving","au":[["Sejin Kim",0],["Hayan Choi",1],["Seokki Lee",0],["Sundong Kim",0]],"u":"https://doi.org/10.1145/3770854.3785683","dblp":"https://dblp.org/rec/conf/kdd/KimCLK26.html","g":["Benchmark/Dataset","LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785683","c":"jul","a":"We present ARCTraj, a dataset and methodological framework for modeling human reasoning through complex visual tasks in the Abstraction and Reasoning Corpus (ARC). While ARC has inspired extensive research on abstract reasoning, most existing approaches rely on static input–output supervision, which limits insight into how reasoning unfolds over time. ARCTraj addresses this gap by recording temporally ordered, object-level actions that capture how humans iteratively transform inputs into outputs, revealing intermediate reasoning steps that conventional datasets overlook. Collected via the O2ARC web interface, it contains around 10,000 trajectories annotated with task identifiers, timestamps, and success labels across 400 training tasks from the ARC-AGI-1 benchmark. It further defines a unified reasoning pipeline encompassing data collection, action abstraction, Markov decision process (MDP) formulation, and downstream learning, enabling integration with reinforcement learning, generative modeling, and sequence modeling methods such as PPO, World Models, GFlowNets, Diffusion agents, and Decision Transformers. Analyses of spatial selection, color attribution, and strategic convergence highlight the structure and diversity of human reasoning. Together, these contributions position ARCTraj as a structured and interpretable foundation for studying human-like reasoning, advancing explainability, alignment, and generalizable intelligence.","ins":["GIST","VTOV Inc."]},{"i":"conf/kdd/LiCYHZQZDLXY26","t":"Compliance-to-Code: Enhancing Financial Compliance Checking via Code Generation","au":[["Siyuan Li",0],["Jian Chen",0],["Rui Yao",0],["Xuming Hu",0],["Peilin Zhou",0],["Weihua Qiu",1],["Simin Zhang",0],["Chucheng Dong",2],["Zhiyao Li",0],["Qipeng Xie",3],["Zixuan Yuan",0]],"u":"https://doi.org/10.1145/3770854.3785703","dblp":"https://dblp.org/rec/conf/kdd/LiCYHZQZDLXY26.html","g":["Code/Programming","LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785703","c":"jul","a":"Nowadays, regulatory compliance has become a cornerstone of corporate governance, ensuring adherence to systematic legal frameworks. At its core, financial regulations often comprise highly intricate provisions, layered logical structures, and numerous exceptions, which inevitably result in labor-intensive or comprehension challenges. To mitigate this, recent Regulatory Technology (RegTech) and Large Language Models (LLMs) have gained significant attention in automating the conversion of regulatory text into executable compliance logic. However, their performance remains suboptimal particularly when applied to Chinese-language financial regulations, due to three key limitations: (1) incomplete domain-specific knowledge representation, (2) insufficient hierarchical reasoning capabilities, and (3) failure to maintain temporal and logical coherence. One promising solution is to develop a domain specific and code-oriented dataset for model training. Existing datasets such as LexGLUE, LegalBench, and CODE-ACCORD are often English-focused, domain-mismatched, or lack fine-grained ∗These authors contributed equally to this work. †Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785703 granularity for compliance code generation. To fill these gaps, we present Compliance-to-Code 1, the first large-scale Chinese dataset dedicated to financial regulatory compliance. Covering 1,159 annotated clauses from 361 regulations across ten categories, each clause is modularly structured with four logical elements-subject, condition, constraint, and contextual information-along with regulation relations. We provide deterministic Python code mappings, detailed code reasoning, and code explanations to facilitate automated auditing. To demonstrate utility, we present FinCheck: a pipeline for regulation structuring, code generation, and report generation. Compliance-to-Code establishes a new benchmark for LLM-based compliance automation. Experimental evaluation shows that GLM-4-9B-0414 achieves the best performance on key task in regulation structuring and DeepSeek-R1-0528 performs the best in compliance code generation tasks.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","Sun Yat-Sen University","University of California, Riverside","The Hong Kong University of Science and Technology"]},{"i":"conf/kdd/LiKCM26","t":"Can LLM-based Financial Investing Strategies Outperform the Market in Long Run?","au":[["Weixian Waylon Li",[0,1]],["Hyeonjun Kim",[2,3]],["Mihai Cucuringu",[4,5]],["Tiejun Ma",[0,1]]],"u":"https://doi.org/10.1145/3770854.3785702","dblp":"https://dblp.org/rec/conf/kdd/LiKCM26.html","g":["LLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785702","c":"jul","a":"Large Language Models (LLMs) have recently been leveraged for asset pricing and stock trading applications, enabling AI agents to generate investment decisions from unstructured financial data. However, most evaluations of LLM timing-based investing strategies are conducted on narrow timeframes and limited stock universes, overstating effectiveness due to survivorship and data-snooping biases. We critically assess their generalisability and robustness by proposing FINSABER1, a backtesting framework evaluating timing-based strategies across longer periods and a larger universe of symbols. Systematic backtests over two decades and 100+ symbols reveal that previously reported LLM advantages deteriorate significantly under broader cross-section and over a longer-term evaluation. Our market regime analysis further demonstrates that LLM strategies are overly conservative in bull markets, underperforming passive benchmarks, and overly aggressive in bear markets, incurring heavy losses. These findings highlight the need to develop LLM strategies that are able to prioritise trend detection and regime-aware risk controls over mere scaling of framework complexity.","ins":["AIAI, School of Informatics","The University of Edinburgh","Global Finance Research Center","Sungkyunkwan University","Department of Mathematics","University of California, Los Angeles"]},{"i":"conf/kdd/LiZTHLXWCZDLWRS26","t":"CNText2Sign and CNSign: Unified Chinese Sign Language Datasets for Bidirectional Accessibility","au":[["Yulong Li",0],["Yuxuan Zhang",0],["Feilong Tang",1],["Ming Hu",1],["Zhixiang Lu",0],["Haochen Xue",0],["Jianghao Wu",1],["Rui Chen",0],["Mian Zhou",0],["Kang Dang",0],["Chong Li",0],["Yifang Wang",0],["Imran Razzak",[2,3]],["Jionglong Su",0]],"u":"https://doi.org/10.1145/3770854.3785676","dblp":"https://dblp.org/rec/conf/kdd/LiZTHLXWCZDLWRS26.html","g":["Benchmark/Dataset","NLP/Text","Multimodal/VLM"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785676","c":"jul","a":"Sign language is the primary communication mode for 72 million hearing-impaired individuals worldwide, necessitating effective bidirectional Sign Language Production and Sign Language Translation systems. However, functional bidirectional systems require a unified linguistic environment, hindered by the lack of suitable unified datasets, particularly those providing the necessary pose information for accurate Sign Language Production (SLP) evaluation. Concurrently, current SLP evaluation methods like backtranslation ignore pose accuracy, and high-quality coordinated generation remains challenging. To create this crucial environment and overcome these challenges, we introduce CNText2Sign and CNSign, which together constitute the first unified dataset aimed at supporting bidirectional accessibility systems for Chinese sign language; CNText2Sign provides 15,000 natural language-to-sign mappings and standardized skeletal keypoints for 8,643 vocabulary items supporting pose assessment. Building upon this foundation, ∗equal contribution †Co-Corresponding author. Dataset download: git clone https://www.modelscope.cn/datasets/iostream11/KD-MSLRT.git This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3785676 we propose the AuraLLM model, which leverages a decoupled architecture with CNText2Sign’s pose data for novel direct gesture accuracy assessment. The model employs retrieval augmentation and Cascading Vocabulary Resolution to handle semantic mapping and out-of-vocabulary words, and achieves all-scenario production with controllable coordination of gestures and facial expressions via pose-conditioned video synthesis. Concurrently, our Sign Language Translation model SignMST-C employs targeted self-supervised pretraining for dynamic feature capture, achieving new SOTA results on PHOENIX2014-T with BLEU-4 scores up to 32.08. AuraLLM establishes a strong performance baseline on CNText2Sign with a BLEU-4 score of 50.41 under direct evaluation.","ins":["Xi’an Jiaotong-Liverpool University","Monash University","Mohamed bin Zayed University of Artificial Intelligence","Abu Dhabi, United Arab Emirates"]},{"i":"conf/kdd/LiuHS26","t":"ITDR: An Instruction Tuning Dataset for Enhancing Large Language Models in Recommendations","au":[["Zekun Liu",[0,1]],["Xiaowen Huang",[0,1,2]],["Mining and Embodied Intelligence",[3,4]],["Jitao Sang",[0,1,2]],["Mining and Embodied Intelligence",[3,4]]],"u":"https://doi.org/10.1145/3770854.3785694","dblp":"https://dblp.org/rec/conf/kdd/LiuHS26.html","g":["Benchmark/Dataset","LLM","Recommendation"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785694","c":"jul","a":"Large language models (LLMs) have demonstrated outstanding performance in natural language processing tasks. However, in the field of recommender systems, due to the inherent structural discrepancy between user behavior data and natural language, LLMs struggle to effectively model the associations between user preferences and items. Although prompt-based methods can generate recommendation results, their inadequate understanding of recommendation tasks leads to constrained performance. To address this gap, we construct a comprehensive instruction tuning dataset, ITDR, which encompasses seven subtasks across two root tasks: user-item interaction and user-item understanding. The dataset integrates data from 13 public recommendation datasets and is built using manually crafted standardized templates, comprising approximately 200,000 instances. Experimental results demonstrate that ITDR significantly enhances the performance of mainstream open-source LLMs such as GLM-4, Qwen2.5, Qwen2.5-Instruct and LLaMA-3.2 on recommendation tasks. Furthermore, we analyze the correlations between tasks and explore the impact of task descriptions and data scale on instruction tuning effectiveness. Finally, we perform comparative experiments against closed-source LLMs with massive parameters. Our tuning dataset ITDR, the fine-tuned large recommendation models, all LoRA modules, and the complete experimental results are available at https://github.com/hellolzk/ITDR.","ins":["Beijing Jiaotong University","School of Computer Science and Technology","Beijing Key Laboratory of Traffic Data","Key Laboratory of Big Data &","Artificial Intelligence in Transportation, Ministry of Education"]},{"i":"conf/kdd/LuZW26","t":"HAROOD: A Benchmark for Out-of-distribution Generalization in Sensor-based Human Activity Recognition","au":[["Wang Lu",[0,1]],["Yao Zhu",[0,1]],["Jindong Wang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3785681","dblp":"https://dblp.org/rec/conf/kdd/LuZW26.html","g":["Benchmark/Dataset","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"benchmark","acm":"https://dl.acm.org/doi/10.1145/3770854.3785681","c":"jul","a":"Sensor-based human activity recognition (HAR) mines activity patterns from the time-series sensory data. In realistic scenarios, variations across individuals, devices, environments, and time introduce significant distributional shifts for the same activities. Recent efforts attempt to solve this challenge by applying or adapting existing out-of-distribution (OOD) algorithms, but only in certain distribution shift scenarios (e.g., cross-device or cross-position), lacking comprehensive insights on the effectiveness of these algorithms. For instance, is OOD necessary to HAR? Which OOD algorithm performs the best? In this paper, we fill this gap by proposing HA- ROOD, a comprehensive benchmark for HAR in OOD settings. We define 4 OOD scenarios: cross-person, cross-position, cross-data
