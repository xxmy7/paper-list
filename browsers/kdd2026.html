arantees. Experiments and analyses demonstrate that HDGC effectively captures geometric space characteristics, achieves superior performance, and provides a great foundation for defending inference attacks.","ins":["Beihang University","Guangxi Normal University","The University of Edinburgh"]},{"i":"conf/kdd/WuZLZM26","t":"Interest Entropy: Rethinking Contrastive Learning for Sequential Recommendation with Interest Uncertainty","au":[["Binquan Wu",0],["Kun Zeng",0],["Yicheng Luo",0],["Junhao Zheng",0],["Qianli Ma",0]],"u":"https://doi.org/10.1145/3770854.3780333","dblp":"https://dblp.org/rec/conf/kdd/WuZLZM26.html","g":["Recommendation","Self-Supervised/Contrastive"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780333","c":"jul","a":"Sequential Recommendation predicts the next item based on users’ past behaviors, but sparse interaction data makes user preferences hard to learn. Recently, contrastive learning has shown promise in this area. It augments data to form positive pairs and maximizing their similarity, allowing the model to learn more generalizable user interests. However, they mainly adopt uniform augmentation and alignment to all sequences, ignoring the challenges arising from their distinct interest structure, namely semantic discrepancy and semantic bias. In this paper, we first study the impact of augmentation on sequence’s semantic through Interest Entropy, which measures the diversity and density of interest distribution. Our finding shows only a small fraction of sequences are stable under perturbation. These sequences mainly exhibit low or high entropy, reflecting focused or casual interests. This limits the effectiveness of contrastive learning, which relies on semantically consistent positive pairs. Furthermore, with spectral analysis, we show that positive alignment may cause low-entropy sequences to overlook niche interests, while high-entropy sequences may amplify interestirrelevant signals, which we term semantic bias. Finally, based on Interest Entropy, we propose IERec, a simple yet effective mutual retrieval augmented contrastive learning method that mitigates the above issues in a unified manner. For each anchor sequence (those with low or high entropy), we retrieve semantically similar sequences with complementary entropy, and concatenate them to form a positive view. Sequences that are easily affected, mainly those with medium entropy, are excluded from augmentation. This approach can avoid harmful semantic discrepancy of positive pairs and reduce the effect of the semantic bias, leading to improved performance. Moreover, using interest entropy to guide contrastive learning can further improve existing CL-based SR methods.","ins":["South China University of Technology"]},{"i":"conf/kdd/WuZYZPG26","t":"StabCF: A Stabilized Training Method for Collaborative Filtering","au":[["Xi Wu",0],["Wenzhe Zhang",0],["Liangwei Yang",1],["Yi Zhao",2],["Jiquan Peng",0],["Jibing Gong",[0,3,4,5]]],"u":"https://doi.org/10.1145/3770854.3780319","dblp":"https://dblp.org/rec/conf/kdd/WuZYZPG26.html","g":["Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780319","c":"jul","a":"Collaborative Filtering (CF) with implicit feedback is widely used in personalized recommender systems. In most real-world scenarios, only implicit feedback signals are available, making CF training heavily dependent on sampling-based paradigms—typically optimized via pairwise ranking losses such as Bayesian Personalized Ranking (BPR). This simple yet effective approach has achieved remarkable success and remains the foundation of many modern recommender models. However, despite its empirical success, little attention has been paid to the inherent training instability issue under this sampling-based paradigm. In this paper, we conduct an in-depth analysis of training stability and find that unstable training not only hinders convergence but also leads to fluctuating and suboptimal recommendation performance. We identify two fundamental sources of this instability in CF: (1) noisy or sparse positive samples, where a single observed interaction may not reliably reflect user preference; and (2) inconsistent negative samples, where randomly drawn negatives from unobserved space vary drastically in negative hardness, leading to uninformative or noisy gradient updates. To address these two challenges, we propose StabCF, a Stabilized Training Method for Collaborative Filtering, which improves training stability by synthesizing enriched positive samples from historical positives and constructing consistent hard negatives through user-aware negatives mixing. By replacing raw training triplets with synthesized positive-negative pairs, StabCF effectively smooths the training dynamics and improves convergence stability. Extensive experiments on three public datasets demonstrate that StabCF not only significantly stabilizes the training process but also achieves superior recommendation performance. Our PyTorch implementation is available1. ∗Corresponding authors: Jibing Gong and Yi Zhao 1https://github.com/Wu-Xi/StabCF This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780319","ins":["Yanshan University","University of Illinois","Tsinghua University","Hebei Key Laboratory of Computer","Virtual Technology and System","Integration"]},{"i":"conf/kdd/WuZHLWSG26","t":"Exploring Diffusion Models' Corruption Stage in Few-Shot Fine-tuning and Mitigating with Bayesian Neural Networks","au":[["Xiaoyu Wu",0],["Jiaru Zhang",0],["Yang Hua",1],["Bohan Lyu",2],["Hao Wang",[3,4]],["Tao Song",0],["Haibing Guan",0]],"u":"https://doi.org/10.1145/3770854.3780252","dblp":"https://dblp.org/rec/conf/kdd/WuZHLWSG26.html","g":["Diffusion/Generation","Few-Shot/Zero-Shot"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780252","c":"jul","a":"Few-shot fine-tuning of Diffusion Models (DMs) is a key advancement, significantly reducing training costs and enabling personalized AI applications. However, we explore the training dynamics of DMs and observe an unanticipated phenomenon: during the training process, image fidelity initially improves, then unexpectedly deteriorates with the emergence of noisy patterns, only to recover later with severe overfitting. We term the stage with generated noisy patterns as corruption stage. To understand this corruption stage, we begin by heuristically modeling the one-shot fine-tuning scenario, and then extend this modeling to more general cases. Through this modeling, we identify the primary cause of this corruption stage: a narrowed learning distribution inherent in the nature of few-shot fine-tuning. To tackle this, we apply Bayesian Neural Networks (BNNs) on DMs with variational inference to implicitly broaden the learned distribution, and present that the learning target of the BNNs can be naturally regarded as an expectation of the diffusion loss and a further regularization with the pretrained DMs. This approach is highly compatible with current few-shot fine-tuning methods in DMs and does not introduce any extra inference costs. Experimental results demonstrate that our method significantly mitigates corruption, and improves the fidelity, quality and diversity of the generated images in both object-driven and subject-driven generation tasks.","ins":["Shanghai Jiao Tong University","Queen’s University Belfast","Tsinghua University","Stevens Institute of Technology","Department of Electrical and Computer Engineering"]},{"i":"conf/kdd/XiTYZZGQW26","t":"CoPHo: Classifier-guided Conditional Topology Generation with Persistent Homology","au":[["Gongli Xi",0],["Ye Tian",[1,2]],["Mengyu Yang",[1,2]],["Zhenyu Zhao",[1,2]],["Yuchao Zhang",[3,4]],["Xiangyang Gong",[1,2]],["Xirong Que",[1,2]],["Wendong Wang",[1,2]]],"u":"https://doi.org/10.1145/3770854.3780317","dblp":"https://dblp.org/rec/conf/kdd/XiTYZZGQW26.html","g":["Graph/GNN","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780317","c":"jul","a":"The structure of topology underpins much of the research on performance and robustness, yet available topology data are typically scarce, necessitating the generation of synthetic graphs with desired properties for testing or release. Prior diffusion-based approaches either embed conditions into the diffusion model, requiring retraining for each attribute and hindering real-time applicability, or use classifier-based guidance post-training, which does not account for topology scale and practical constraints. In this paper, we show from a discrete perspective that gradients from a pre-trained graph-level classifier can be incorporated into the discrete reverse diffusion posterior to steer generation toward specified structural properties. Based on this insight, we propose Classifier-guided Conditional Topology Generation with Persistent Homology (CoPHo), which builds a persistent homology filtration over intermediate graphs and interprets features as guidance signals that steer generation toward the desired properties at each denoising step. Experiments on four generic/network datasets demonstrate that CoPHo outperforms existing methods at matching target metrics, and we further ∗Corresponding author: Ye Tian. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780317 validate its transferability on the QM9 molecular dataset. The code is available at https://github.com/Lrbomchz/CoPHo.","ins":["School of Cyberspace Security, Beijing University of Posts and Telecommunications","State Key Laboratory of Networking and Switching Technology, Beijing","University of Posts and Telecommunications","School of Computer Science (National","Pilot Software Engineering School), Beijing University of Posts and Telecommunications"]},{"i":"conf/kdd/XiaLXZWLLQZA26","t":"Bayesian Robust Financial Trading with Adversarial Synthetic Market Data","au":[["Haochong Xia",0],["Simin Li",1],["Ruixiao Xu",1],["Zhixia Zhang",1],["Hongxiang Wang",1],["Zhiqian Liu",1],["Teng Yao Long",0],["Molei Qin",0],["Chuqiao Zong",0],["Bo An",0]],"u":"https://doi.org/10.1145/3770854.3780175","dblp":"https://dblp.org/rec/conf/kdd/XiaLXZWLLQZA26.html","g":["Reinforcement Learning","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780175","c":"jul","a":"Algorithmic trading relies on machine learning models to make trading decisions. Despite strong in-sample performance, these models often degrade when confronted with evolving real-world market regimes, which can shift dramatically due to macroeconomic changes—e.g., monetary policy updates or unanticipated fluctuations in participant behavior. We identify two core challenges that perpetuate this mismatch: (1) insufficient robustness in existing policy against uncertainties in high-level market fluctuations, and (2) the absence of a realistic and diverse simulation environment for training, leading to policy overfitting. To address these issues, we propose a Bayesian Robust Framework that systematically integrates a macro-conditioned generative model with robust policy learning. On the data side, to generate realistic and diverse data, we propose a macro-conditioned GAN-based generator that leverages macroeconomic indicators as primary control variables, synthesizing data with faithful temporal, cross-instrument, and macro correlations. On the policy side, to learn robust policy against market fluctuations, we cast the trading process as a two-player zero-sum Bayesian Markov game, wherein an adversarial agent simulates shifting regimes by perturbing macroeconomic indicators in the macro-conditioned generator, while the trading agent—guided by a quantile belief network—maintains and updates its belief over hidden market states. The trading agent seeks a Robust Perfect Bayesian Equilibrium via Bayesian neural fictitious self-play, stabilizing learning under adversarial market perturbations. Extensive experiments on 9 financial instruments demonstrate that our framework outperforms 9 state-of-the-art baselines. In extreme events like the COVID pandemic, our method shows improved profitability ∗Both authors contributed equally to this research. †Corresponding Author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780175 and risk management, offering a reliable solution for trading under uncertain and rapidly shifting market dynamics.","ins":["Nanyang Technological University","Beihang University"]},{"i":"conf/kdd/XiaLZZWHY26","t":"CSSG: A Continuous Spatio-temporal Graph Learning Framework with Scalable Spatial Granularity","au":[["Kaiwen Xia",[0,1]],["Qi Zhang",0],["Xinrui Zhang",0],["Shuai Wang",0],["Xuming Hu",2],["Philip S. Yu",3]],"u":"https://doi.org/10.1145/3770854.3780161","dblp":"https://dblp.org/rec/conf/kdd/XiaLZZWHY26.html","g":["Spatiotemporal/Urban","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780161","c":"jul","a":"Spatio-temporal data is extensively collected in ubiquitous cyberphysical systems, where modeling complex spatio-temporal dependencies using Spatio-Temporal Graph (STG) is crucial for downstream decision-making tasks. However, these tasks often necessitate that STG methods adapt to the coupling between varying spatial granularity and continuous temporal evolution, leading to certain limitations in the scalability and dynamic continuous-time modeling capabilities of existing methods. To this end, we propose a Continuous spatio-temporal graph learning framework with Scalable Spatial Granularity (CSSG). This framework establishes the coupling between scalable spatial granularity and continuous temporal evolution through anchor set-based spatial modeling and local conservation-based temporal modeling. Specifically, CSSG first derives the initial node spatio-temporal embeddings using a spatiotemporal encoding module that takes scalable spatial embeddings based on anchor sets as input. Then, a bidirectional differential edge aggregation module dynamically updates the continuous interaction weights of edges based on local conservation. Finally, a spatio-temporal adaptive fusion module integrates continuous change patterns of bidirectional edges into a unified node representation, generating initial node states for the decoder to infer future states. Extensive experiments on various real-world datasets verify the scalability and effectiveness of CSSG in continuous spatiotemporal prediction for varying spatial granularities, while also † Equal contributions. ★Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780161 demonstrating greater efficiency compared to state-of-the-art solutions with comparable performance. The source code, data have been made available at https://github.com/kaiwxai/CSSG.","ins":["Southeast University","Li Lin†★","The Hong Kong University of Science and Technology (Guangzhou)","University of Illinois Chicago"]},{"i":"conf/kdd/XiaoLM26","t":"Graph Perturbation Analysis for Subgraph Counting","au":[["Hanhua Xiao",0],["Yuchen Li",0],["Kyriakos Mouratidis",0]],"u":"https://doi.org/10.1145/3770854.3780256","dblp":"https://dblp.org/rec/conf/kdd/XiaoLM26.html","g":["Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780256","c":"jul","a":"Subgraph counting, which involves determining the frequency of a query graph within a data graph, has numerous applications such as query optimization, fraud detection, and evaluating the expressiveness of graph neural networks. Despite its importance, there has been no systematic study on the impact of adversarial graph perturbations on subgraph counts. In this work, we examine the kSub problem, which aims to identify 𝑘edge additions that maximize the count of a query graph. We prove that kSub is intractable due to its NP-hardness, even for constant approximation. To address this, we relax the problem into a top-𝑘selection, termed topkSub. Depending on the structure of the relaxed query graph, we distinguish two possible processing scenarios (namely, the connected and the disconnected case), and design dedicated search space pruning strategies for each scenario. Additionally, we develop sampling techniques on the pruned search space to scale topkSub for handling large graphs. In the form of a case study, we demonstrate that topkSub effectively uncovers vulnerabilities in state-of-the-art GNN models for subgraph counting, providing a significant advantage over alternative graph perturbation methods. The efficiency analysis shows that our pruning techniques achieve substantial speedups for exact processing in both connected and disconnected cases, while our sampling methods reduce estimation errors by 1-2 orders of magnitude compared to state-of-the-art samplers.","ins":["Singapore Management University"]},{"i":"conf/kdd/XinLMYYWCGYX26","t":"LISRec: Modeling User Preferences with Learned Item Shortcuts for Sequential Recommendation","au":[["Haidong Xin",0],["Zhenghao Liu",0],["Sen Mei",1],["Yukun Yan",1],["Shi Yu",1],["Shuo Wang",1],["Zulong Chen",2],["Yu Gu",0],["Ge Yu",0],["Chenyan Xiong",3]],"u":"https://doi.org/10.1145/3770854.3780337","dblp":"https://dblp.org/rec/conf/kdd/XinLMYYWCGYX26.html","g":["Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780337","c":"jul","a":"User-item interaction histories are pivotal for sequential recommendation systems but often include noise, such as unintended clicks or actions that fail to reflect genuine user preferences. To address this, we propose Learned Item Shortcuts for Sequential Recommendation (LISRec), a novel framework that explicitly captures stable preferences by extracting personalized semantic shortcuts from historical interactions. LISRec first learns task-agnostic semantic representations to assess item similarities, then constructs a personalized semantic graph over all user-interacted items. By identifying the maximal semantic connectivity subset within this graph, LISRec selects the most representative items as semantic shortcuts to guide user preference modeling. This focused representation filters out irrelevant actions while preserving the diversity of genuine interests. Experimental results on the Yelp and Amazon Product datasets illustrate that LISRec achieves a 13% improvement over baseline recommendation models, showing its effectiveness in capturing stable user interests. Further analysis indicates that shortcut-based histories better capture user preferences, making more accurate and relevant recommendations. All codes and datasets are available at https://github.com/NEUIR/LISRec.","ins":["Northeastern University","Tsinghua University","Alibaba Group","Carnegie Mellon University"]},{"i":"conf/kdd/XuGWPWWWWZ26","t":"Advanced Global Wildfire Activity Modeling with Hierarchical Graph ODE","au":[["Fan Xu",0],["Wei Gong",0],["Hao Wu",1],["Lilan Peng",2],["Nan Wang",3],["Qingsong Wen",4],["Squirrel AI",4],["Xian Wu",4],["Kun Wang",5],["Xibin Zhao",1]],"u":"https://doi.org/10.1145/3770854.3780193","dblp":"https://dblp.org/rec/conf/kdd/XuGWPWWWWZ26.html","g":["Spatiotemporal/Urban","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780193","c":"jul","a":"Wildfires, as an integral component of the Earth system, are governed by a complex interplay of atmospheric, oceanic, and terrestrial processes spanning a vast range of spatiotemporal scales. Modeling their global activity on large timescales is therefore a critical yet challenging task. While deep learning has recently achieved significant breakthroughs in global weather forecasting, its potential for global wildfire behavior prediction remains underexplored. In this work, we reframe this problem and introduce the Hierarchical Graph ODE (HiGO), a novel framework designed to learn the multiscale, continuous-time dynamics of wildfires. Specifically, we represent the Earth system as a multi-level graph hierarchy and propose an adaptive filtering message passing mechanism for both intra- and inter-level information flow, enabling more effective feature extraction and fusion. Furthermore, we incorporate GNN- parameterized Neural ODE modules at multiple levels to explicitly learn the continuous dynamics inherent to each scale. Through extensive experiments on the SeasFire Cube dataset, we demonstrate that HiGO significantly outperforms state-of-the-art baselines on long-range wildfire forecasting. Moreover, its continuous-time predictions exhibit strong observational consistency, highlighting its potential for real-world applications.","ins":["University of Science and Technology","Tsinghua University","Southwest Jiaotong University","Beijing Jiaotong University","Tencent","Nanyang Technological University"]},{"i":"conf/kdd/XuCYLWLN26","t":"Learning and Editing Universal Graph Prompt Tuning via Reinforcement Learning","au":[["Jinfeng Xu",0],["Zheyu Chen",1],["Shuo Yang",0],["Jinze Li",0],["Hewei Wang",2],["Yijie Li",2],["Edith C. H. Ngai",0]],"u":"https://doi.org/10.1145/3770854.3780291","dblp":"https://dblp.org/rec/conf/kdd/XuCYLWLN26.html","g":["Graph/GNN","Reinforcement Learning"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780291","c":"jul","a":"The \"pre-training, prompt-tuning\" has emerged as a pivotal paradigm in advancing the performance of graph representation learning models across a wide range of downstream tasks. This paradigm leverages the power of pre-trained models and task-specific prompts to bridge the gap between general graph representations and taskspecific requirements. Early graph prompt tuning approaches relied on task-specific designs for Graph Neural Networks (GNNs), limiting their adaptability across diverse pre-training strategies. In contrast, another promising line of research has investigated universal graph prompt tuning, which operates directly in the input graph’s feature space and builds a theoretical foundation that universal graph prompt tuning can theoretically achieve an equivalent effect of any prompting function, eliminating dependence on specific pre-training strategies. Recent works propose selective node-based graph prompt tuning to pursue more ideal prompts. However, we argue that selective node-based graph prompt tuning inevitably compromises the theoretical foundation of universal graph prompt tuning. In this paper, we strengthen the theoretical foundation of universal graph prompt tuning by introducing stricter constraints, demonstrating that adding prompts to all nodes is a necessary condition for achieving the universality of graph prompts. To this end, we propose a novel model and paradigm, Learning and Editing Universal GrAph Prompt Tuning (LEAP), which preserves the theoretical foundation of universal graph prompt tuning while pursuing more ideal prompts. Specifically, we first build the basic universal graph prompts to preserve the theoretical foundation and then employ actor-critic reinforcement learning to select nodes and edit prompts. Extensive experiments on graph- and node-level tasks ∗Corresponding authors This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780291 across various pre-training strategies in both full-shot and few-shot scenarios show that LEAP consistently outperforms fine-tuning and other prompt-based approaches.","ins":["The University of Hong Kong","Beijing Institute of Technology","Carnegie Mellon University"]},{"i":"conf/kdd/XuCYLWWLLN26","t":"VI-MMRec: Similarity-Aware Training Cost-free Virtual User-Item Interactions for Multimodal Recommendation","au":[["Jinfeng Xu",0],["Zheyu Chen",1],["Shuo Yang",0],["Jinze Li",0],["Zitong Wan",2],["Hewei Wang",3],["Weijie Liu",0],["Yijie Li",3],["Edith C. H. Ngai",0]],"u":"https://doi.org/10.1145/3770854.3780200","dblp":"https://dblp.org/rec/conf/kdd/XuCYLWWLLN26.html","g":["Recommendation","Multimodal/VLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780200","c":"jul","a":"Although existing multimodal recommendation models have shown promising performance, their effectiveness continues to be limited by the pervasive data sparsity problem. This problem arises because users typically interact with only a small subset of available items, leading existing models to arbitrarily treat unobserved items as negative samples. To this end, we propose VI-MMRec, a modelagnostic and training cost-free framework that enriches sparse user-item interactions via similarity-aware virtual user-item interactions. These virtual interactions are constructed based on modalityspecific feature similarities of user-interacted items. Specifically, VI-MMRec introduces two different strategies: (1) Overlay, which independently aggregates modality-specific similarities to preserve modality-specific user preferences, and (2) Synergistic, which holistically fuses cross-modal similarities to capture complementary user preferences. To ensure high-quality augmentation, we design a statistically informed weight allocation mechanism that adaptively assigns weights to virtual user-item interactions based on dataset-specific modality relevance. As a plug-and-play framework, VI-MMRec seamlessly integrates with existing models to enhance their performance without modifying their core architecture. Its flexibility allows it to be easily incorporated into various existing models, maximizing performance with minimal implementation effort. Moreover, VI-MMRec introduces no additional overhead during training, making it significantly advantageous for practical deployment. Comprehensive experiments conducted on six real-world datasets using seven state-of-the-art multimodal recommendation models validate the effectiveness of our VI-MMRec. ∗Corresponding authors This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780200","ins":["The University of Hong Kong","Beijing Institute of Technology","University College Dublin","Carnegie Mellon University"]},{"i":"conf/kdd/XuHWPF26","t":"medDreamer: Model-Based Reinforcement Learning with Latent Imagination on Complex EHRs for Clinical Decision Support","au":[["Qianyi Xu",0],["Gousia Habib",0],["Feng Wu",0],["Dilruk Perera",0],["Mengling Feng",0]],"u":"https://doi.org/10.1145/3770854.3780292","dblp":"https://dblp.org/rec/conf/kdd/XuHWPF26.html","g":["Reinforcement Learning","Healthcare/Bio"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780292","c":"jul","a":"Timely and personalized treatment decisions are essential across a wide range of healthcare settings where patient responses can vary significantly and evolve over time. Clinical data used to support these treatment decisions are often irregularly sampled, where missing data frequencies may implicitly convey information about the patient’s condition. Existing Reinforcement Learning (RL) based clinical decision support systems often ignore the missing patterns and distort them with coarse discretization and simple imputation. They are also predominantly model-free and largely depend on retrospective data, which could lead to insufficient exploration and bias by historical behaviors. To address these limitations, we propose medDreamer, a novel model-based reinforcement learning framework for personalized treatment recommendation. medDreamer contains a world model with an Adaptive Feature Integration module that simulates latent patient states from irregular data and a two-phase policy trained on a hybrid of real and imagined trajectories. This enables learning optimal policies that go beyond the sub-optimality of historical clinical decisions, while remaining close to real clinical data. We evaluate medDreamer on both sepsis and mechanical ventilation treatment tasks using two large-scale Electronic Health Records (EHRs) datasets. Comprehensive evaluations show that medDreamer significantly outperforms model-free and model-based baselines in both clinical outcomes and off-policy metrics.","ins":["National University of Singapore"]},{"i":"conf/kdd/XuHSJ26","t":"Hyper-Relational Knowledge Graph Representation Learning Based on Multi-Granularity Semantic Aware Message Passing","au":[["Qingying Xu",[0,1]],["Liang Hong",[2,0,1]],["Mingxuan Shen",[0,1]],["Aoyuan Jiang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780250","dblp":"https://dblp.org/rec/conf/kdd/XuHSJ26.html","g":["Knowledge Graph","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780250","c":"jul","a":"Real-world networks containing hyper-relational facts can be represented by Hyper-relational Knowledge Graphs (HKGs), which contain rich semantics compared to hypergraphs. In an HKG, multiple entities with a shared property playing different roles form a hyperedge. To mitigate information loss in HKG representation learning, it is important to integrate entity-level roles and hyperedge-level properties. However, such multi-grained semantics are often inadequately learned, as conventional message passing only operates along one granularity, i.e, hyperedges. We propagate information between entities and hyperedges to aggregate entity-level roles at the hyperedge level for message passing. In this paper, we propose an HKG representation learning method based on Multi-granularity Semantic aware Message Passing (HyperSMP), preserving both semantic and structural information. Specifically, we design a fine-grained aggregation layer in HyperSMP to aggregate different roles of entities in hyperedge embeddings using an entity-level attention mechanism. Based on hyperedge embeddings, we propose a granularity-aligned propagation layer that recursively propagates information from hyperedges to entities and properties, capturing message passing paths in and out of hyperedges, respectively. As a result, multi-grained semantics are learned through unification at the hyperedge level to adapt to the message passing mechanism, and the high-order structure is captured through entity information exchange channeled via hyperedge embeddings. Further, HyperSMP discovers multi-hop associations among entities by stacking the above layers. Experimental results on public datasets show that HyperSMP outperforms state-of-the-art methods by at least 9.66% in 𝐹1 score. ∗Corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780250","ins":["School of Information Management","Wuhan University","School of Artificial Intelligence"]},{"i":"conf/kdd/XuCTGY26","t":"MoST: A Foundation Model for Multi-modality Spatio-temporal Traffic Prediction","au":[["Ronghui Xu",0],["Jihao Chen",0],["Jingdong Tian",0],["Chenjuan Guo",0],["Bin Yang",0]],"u":"https://doi.org/10.1145/3770854.3780162","dblp":"https://dblp.org/rec/conf/kdd/XuCTGY26.html","g":["Multimodal/VLM","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780162","c":"jul","a":"Accurate spatio-temporal traffic prediction is essential for optimizing urban traffic management and resource allocation. To reduce the cost and complexity of cross-city deployment, recent studies have explored spatio-temporal foundation models capable of accurate zero-shot prediction. However, these models are limited to single-modal data, which restricts their capacity to capture the complexity of real-world traffic dynamics. The increasing availability of multi-modality data—such as satellite imagery and points of interest (POI)—offers a promising avenue for enhancing cross-city traffic prediction by providing richer background contexts. Despite this potential, developing foundational models for multi-modality spatio-temporal prediction presents two challenges: the availability and quality of multi-modality data vary significantly across cities, with some cities lacking certain modalities or containing noisy information; and spatial patterns are highly localized and specific to individual regions, which hinders generalization. To address these challenges, we propose MoST, a foundation model for multi-modality spatio-temporal traffic prediction. We introduce a Multi-modality Refinement Module that encodes available modality data and adaptively selects task-relevant modalities while suppressing noisy modalities. Furthermore, we design a Spatio-Temporal Prediction Module that incorporates a spatial expert selection mechanism guided by multi-modality cues. This mechanism dynamically identifies region-specific spatial patterns and assigns appropriate spatial experts to model local dependencies. Finally, we conduct extensive experiments on real-world datasets to validate the superior performance and strong generalization capability of MoST.","ins":["East China Normal University"]},{"i":"conf/kdd/XuCLZZ26","t":"DyMerge-LoRA: On-GPU Post-Merge Fusion for High-Throughput Multi-Tenant Composite LoRA Serving","au":[["Rui Xu",0],["Long Chen",0],["Huazheng Lao",0],["Jinquan Zhang",1],["Xia Zhu",0]],"u":"https://doi.org/10.1145/3770854.3780270","dblp":"https://dblp.org/rec/conf/kdd/XuCLZZ26.html","g":["LLM","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780270","c":"jul","a":"In this paper, we consider the problem of efficiently serving multitenant requests for large language models (LLMs) equipped with compositions of multiple Low-Rank Adaptation (LoRA) adapters, aiming to optimize inference throughput, latency, and GPU memory usage. Existing multi-tenant inference systems are primarily architected for a one-to-one mapping between requests and single adapters, limiting their efficiency in handling compositions of multiple LoRA adapters. To address these issues, we propose DyMerge-LoRA, a novel inference serving system specifically designed for high-throughput multi-tenant scenarios by dynamically fusing corresponding LoRA adapters on the GPU. DyMerge-LoRA introduces a Base Adapter Manager (BAM) for efficient GPU memory management of individual basic adapters, a LoRA-Aware Greedy Scheduler (LAG) for batching, and a Mapping-based Adapter Fusion Matrix-Vector Multiplication (MAF-MVM) kernel for high computational throughput. Experimental evaluations conducted on multiple setups demonstrate that DyMerge-LoRA achieves up to 1.1–4× improvement in inference throughput compared to state-of-the-art methods, significantly reduces TTFT, and effectively mitigates GPU memory consumption, validating its effectiveness and performance advantages under diverse workload conditions.","ins":["Southeast University","Guangdong University of Technology"]},{"i":"conf/kdd/XuWLCAW26","t":"Breaking the Boundary Barrier: Robust Model Fingerprinting via Unlearnable Examples in Model-Parameter Space","au":[["Tianlong Xu",[0,1]],["Zixiong Wang",[0,1]],["Gaoyang Liu",[0,1]],["Jian Chen",2],["Ahmed M. Abdelmoniem",[3,4]],["Chen Wang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780310","dblp":"https://dblp.org/rec/conf/kdd/XuWLCAW26.html","g":["Security/Attack","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780310","c":"jul","a":"Deep learning models represent valuable intellectual property due to their high development costs. To protect model ownership, existing fingerprinting techniques have been proposed to use adversarial examples to fingerprint a model’s decision boundaries. However, these fingerprints are inherently fragile, as model decision boundaries are highly sensitive to common model modifications such as fine-tuning, pruning, and adversarial training. In this paper, we propose MFUE (Model Fingerprinting via Unlearnable Examples), a novel fingerprinting methodology that leverages the stable unlearnability of unlearnable examples to fingerprint arbitrary modified models in parameter space, fundamentally circumventing the inherent vulnerability of decision boundaries. To achieve robust model fingerprinting in parameter space, we are the first to identify that unlearnable examples, owing to their persistent training resistance, can serve as stable fingerprints beyond the model’s decision boundaries. To endow unlearnable examples with robustness against arbitrary model modifications, we introduce adversarial training that simulates the randomness of model modifications by jointly optimizing the unlearnable examples over models at different training stages. We evaluate the performance of MFUE against six different attack types, including both model and input tampering. Through extensive experiments, we demonstrate that MFUE outperforms four existing methods in terms of robustness and uniqueness. The code of MFUE is publicly available at: https://github.com/SPHelixLab/MFUE/. ∗Corresponding author. This work was supported in part by the National Natural Science Foundation of China under Grants 62506138, 62272183 and 62502477; by the Key R&D Program of Hubei Province under Grants 2025EHA033, 2024BAB016, 2024BAB031 and 2023BAB074; by the UKRI EPSRC Grant EP/X035085/1; and by the Major Science and Technology Project of Hubei Province under Grants 2024BAA008 and 2024BAA011. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780310","ins":["Hubei Key Laboratory of Internet of Intelligence, School of EIC, Huazhong","University of Science and Technology","Department of Computer Science, China University of Geosciences","School of Electronic Engineering and Computer Science, Queen Mary","University of London"]},{"i":"conf/kdd/XuZZLJWX26","t":"SmartGen: Synthesizing Context-Aware User Behavior Data for Adaptive Smart Home Intelligence","au":[["Zhiyao Xu",0],["Tsinghua Shenzhen International",0],["Dan Zhao",1],["Qingsong Zou",[0,1]],["Tsinghua Shenzhen International",[0,1]],["Qing Li",1],["Yong Jiang",[0,1]],["Tsinghua Shenzhen International",[0,1]],["Yuhang Wang",2],["Jingyu Xiao",3]],"u":"https://doi.org/10.1145/3770854.3780267","dblp":"https://dblp.org/rec/conf/kdd/XuZZLJWX26.html","g":["Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780267","c":"jul","a":"As smart homes become increasingly prevalent, intelligent models are widely used for tasks such as anomaly detection and behavior prediction. These models are typically trained on static datasets, making them brittle to behavioral drift caused by seasonal changes, lifestyle shifts, or evolving routines. However, collecting new behavior data for retraining is often impractical due to its slow pace, high cost, and privacy concerns. In this paper, we propose SmartGen, an LLM-based framework that synthesizes context-aware user behavior data to support continual adaptation of downstream smart home models. SmartGen consists of four key components. First, we design a Time and Semantic-aware Split module to divide long behavior sequences into manageable, semantically coherent subsequences under dual time-span constraints. Second, we propose Semantic-aware Sequence Compression to reduce input length while preserving representative semantics by clustering behavior mapping in latent space. Third, we introduce Graph-guided Sequence Synthesis, which constructs a behavior relationship graph and encodes frequent transitions into prompts, guiding the LLM to generate data aligned with contextual changes while retaining core behavior patterns. Finally, we design a Two-stage Outlier Filter to identify and remove implausible or semantically inconsistent outputs, aiming to improve the factual coherence and behavioral validity of the generated sequences. Experiments on three realworld datasets demonstrate that SmartGen significantly enhances ∗Dan Zhao and Yong Jiang are the corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780267 model performance on anomaly detection and behavior prediction tasks under behavioral drift, with anomaly detection improving by 85.43% and behavior prediction by 70.51% on average. The code is available at https://github.com/xzyvoid/SmartGen.","ins":["Graduate School","Pengcheng Laboratory","Southwest University","The Chinese University of Hong Kong"]},{"i":"conf/kdd/YanLXMW26","t":"Caesar: Optimizing Federated Learning via Low-deviation Compression","au":[["Jiaming Yan",0],["Jianchun Liu",0],["Hongli Xu",0],["Zhenguo Ma",1],["Shilong Wang",0]],"u":"https://doi.org/10.1145/3770854.3780170","dblp":"https://dblp.org/rec/conf/kdd/YanLXMW26.html","g":["Federated","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780170","c":"jul","a":"Compression is an efficient way to relieve the tremendous communication overhead of federated learning (FL) systems. However, for the existing works, the information loss under compression will lead to unexpected model/gradient deviation for the FL training, significantly degrading the training performance, especially under the challenges of data heterogeneity and model obsolescence. To strike a delicate trade-off between model accuracy and traffic cost, we propose Caesar, a novel FL framework with a low-deviation compression approach. For the global model download, we design a greedy method to optimize the compression ratio for each device based on the staleness of the local model, ensuring a precise initial model for local training. Regarding the local gradient upload, we utilize the device’s local data properties (i.e., sample volume and label distribution) to quantify its local gradient’s importance, which then guides the determination of the gradient compression ratio. We have implemented Caesar on two physical platforms with 40 smartphones and 80 NVIDIA Jetson devices. Extensive results show that Caesar can reduce the traffic costs by about 25.54%∼37.88% when achieving the same target accuracy compared to the compressionbased baselines, while incurring only a 0.68% degradation in final test accuracy relative to the full-precision communication.","ins":["University of Science and Technology","China University of Mining and Technology"]},{"i":"conf/kdd/YangLSCLWYLL26","t":"From Agnostic to Specific: Latent Preference Diffusion for Multi-Behavior Sequential Recommendation","au":[["Ruochen Yang",[0,1]],["Xiaodong Li",[0,2]],["Jiawei Sheng",0],["Jiangxia Cao",3],["Xinkui Lin",[0,2]],["Shen Wang",3],["Shuang Yang",3],["Zhaojie Liu",3],["Tingwen Liu",[0,2]]],"u":"https://doi.org/10.1145/3770854.3780285","dblp":"https://dblp.org/rec/conf/kdd/YangLSCLWYLL26.html","g":["Recommendation","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780285","c":"jul","a":"Multi-behavior sequential recommendation (MBSR) aims to learn the dynamic and heterogeneous interactions of users’ multi-behavior sequences, so as to capture user preferences under target behavior for the next interacted item prediction. Unlike previous methods that adopt unidirectional modeling by mapping auxiliary behaviors to target behavior, recent concerns are shifting from behavior-fixed to behavior-specific recommendation. However, these methods still ignore the user’s latent preference that underlying decisionmaking, leading to suboptimal solutions. Meanwhile, due to the asymmetric deterministic between items and behaviors, discriminative paradigm based on preference scoring is unsuitable to capture the uncertainty from low-entropy behaviors to high-entropy items, failing to provide efficient and diverse recommendation. To address these challenges, we propose FatsMB, a framework based diffusion model that guides preference generation From BehaviorAgnostic To Behavior-Specific in latent spaces, enabling diverse and accurate Multi-Behavior Sequential Recommendation. Specifically, we design a Multi-Behavior AutoEncoder (MBAE) to construct a unified user latent preference space, facilitating interaction and collaboration across Behaviors, within Behavior-aware ∗Equal contribution. †Corresponding author. ‡ University of Chinese Academy of Sciences This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780285 RoPE (BaRoPE) employed for multiple information fusion. Subsequently, we conduct target behavior-specific preference transfer in the latent space, enriching with informative priors. A MultiCondition Guided Layer Normalization (MCGLN) is introduced for the denoising. Extensive experiments on real-world datasets demonstrate the effectiveness of our model. We release our code at https://github.com/OrchidViolet/FatsMB.","ins":["Institute of Information Engineering, Chinese Academy of Sciences","School of Cyber Security, UCAS‡","School of Cyber Security, UCAS","Kuaishou Technology"]},{"i":"conf/kdd/YangZAWYS26","t":"Unleashing the Potential of Neighbors: Diffusion-based Latent Neighbor Generation for Session-based Recommendation","au":[["Yuhan Yang",0],["Jie Zou",0],["Guojia An",0],["Jiwei Wei",0],["Yang Yang",0],["Heng Tao Shen",0]],"u":"https://doi.org/10.1145/3770854.3780280","dblp":"https://dblp.org/rec/conf/kdd/YangZAWYS26.html","g":["Recommendation","Diffusion/Generation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780280","c":"jul","a":"Session-based recommendation aims to predict the next item that anonymous users may be interested in, based on their current session interactions. Recent studies have demonstrated that retrieving neighbor sessions to augment the current session can effectively alleviate the data sparsity issue and improve recommendation performance. However, existing methods typically rely on explicitly observed session data, neglecting latent neighbors - not directly observed but potentially relevant within the interest space - thereby failing to fully exploit the potential of neighbor sessions in recommendation. To address the above limitation, we propose a novel model of diffusion-based latent neighbor generation for session-based recommendation, named DiffSBR. Specifically, DiffSBR leverages two diffusion modules, including retrieval-augmented diffusion and self-augmented diffusion, to generate high-quality latent neighbors. In the retrieval-augmented diffusion module, we leverage retrieved neighbors as guiding signals to constrain and reconstruct the distribution of latent neighbors. Meanwhile, we adopt a training strategy that enables the retriever to learn from the feedback provided by the generator. In the self-augmented diffusion module, we explicitly guide the generation of latent neighbors by injecting the current session’s multi-modal signals through contrastive learning. After obtaining the generated latent neighbors, we utilize them to enhance session representations for improving session-based recommendation. Extensive experiments on four public datasets show that DiffSBR generates effective latent neighbors and improves recommendation performance against state-of-the-art baselines.","ins":["University of Electronic Science and Technology of China"]},{"i":"conf/kdd/YiGCHGLDL26","t":"FuXi-γ: Efficient Sequential Recommendation with Exponential-Power Temporal Encoder and Diagonal-Sparse Positional Mechanism","au":[["Dezhi Yi",[0,1]],["Wei Guo",2],["Wenyang Cui",[0,1]],["Wenxuan He",[0,1]],["Huifeng Guo",2],["Yong Liu",2],["Zhenhua Dong",2],["Ye Lu",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780176","dblp":"https://dblp.org/rec/conf/kdd/YiGCHGLDL26.html","g":["Recommendation","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780176","c":"jul","a":"Sequential recommendation aims to model users’ evolving preferences based on their historical interactions. Recent advances leverage Transformer-based architectures to capture global dependencies, but existing methods often suffer from high computational overhead, primarily due to discontinuous memory access in temporal encoding and dense attention over long sequences. To address these limitations, we propose FuXi-𝛾, a novel sequential recommendation framework that improves both effectiveness and efficiency through principled architectural design. FuXi-𝛾adopts a decoderonly Transformer structure and introduces two key innovations: (1) An exponential-power temporal encoder that encodes relative temporal intervals using a tunable exponential decay function inspired by the Ebbinghaus forgetting curve. This encoder enables flexible modeling of both short-term and long-term preferences while maintaining high efficiency through continuous memory access and pure matrix operations. (2) A diagonal-sparse positional mechanism that prunes low-contribution attention blocks using a diagonal-sliding strategy guided by the persymmetry of Toeplitz matrix. Extensive experiments on four real-world datasets demonstrate that FuXi-𝛾 achieves state-of-the-art performance in recommendation quality, while accelerating training by up to 4.74× and inference by up to 6.18×, making it a practical and scalable solution for long-sequence recommendation. Code: https://github.com/Yeedzhi/FuXi-gamma. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780176","ins":["College of Computer Science, DISSec","Nankai University","Huawei Technologies"]},{"i":"conf/kdd/YouYXWLLWXZC26","t":"LoFT-LLM: Low-Frequency Time-series Forecasting with Large Language Models","au":[["Jiacheng You",0],["Jingcheng Yang",1],["Yuhang Xie",2],["Zhongxuan Wu",0],["Xiucheng Li",0],["Feng Li",1],["Pengjie Wang",1],["Jian Xu",1],["Bo Zheng",1],["Xinyang Chen",0]],"u":"https://doi.org/10.1145/3770854.3780245","dblp":"https://dblp.org/rec/conf/kdd/YouYXWLLWXZC26.html","g":["Time Series","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780245","c":"jul","a":"Time-series forecasting in real-world applications such as finance and energy often faces challenges due to limited training data and complex, noisy temporal dynamics. Existing deep forecasting models typically supervise predictions using full-length temporal windows, which include substantial high-frequency noise and obscure long-term trends. Moreover, auxiliary variables containing rich domain-specific information are often underutilized, especially in few-shot settings. To address these challenges, we propose LoFT-LLM, a frequency-aware forecasting pipeline that integrates low-frequency learning with semantic calibration via a large language model (LLM). Firstly, a Patch Low-Frequency forecasting Module (PLFM) extracts stable low-frequency trends from localized spectral patches. Secondly, a residual learner then models high-frequency variations. Finally, a fine-tuned LLM refines the predictions by incorporating auxiliary context and domain knowledge ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780245 through structured natural language prompts. Extensive experiments on financial and energy datasets demonstrate that LoFT-LLM significantly outperforms strong baselines under both full-data and few-shot regimes, delivering superior accuracy, robustness, and interpretability.","ins":["School of Computer Science and Technology, Harbin Institute of Technology (Shenzhen)","Unaffiliated","The Chinese University of Hong Kong"]},{"i":"conf/kdd/YuWWGLLYDC26","t":"Thought-Augmented Planning for LLM-Powered Interactive Recommender Agent","au":[["Haocheng Yu",0],["Yaxiong Wu",1],["Hao Wang",0],["Wei Guo",1],["Yong Liu",1],["Yawen Li",2],["Yuyang Ye",3],["Junping Du",2],["Enhong Chen",0]],"u":"https://doi.org/10.1145/3770854.3780286","dblp":"https://dblp.org/rec/conf/kdd/YuWWGLLYDC26.html","g":["LLM","Recommendation","Agent"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780286","c":"jul","a":"Interactive recommendation is a typical information-seeking task that allows users to interactively express their needs through natural language and obtain personalized recommendations. Large language model-powered (LLM-powered) agents have become a new paradigm in interactive recommendations, effectively capturing users’ real-time needs and enhancing personalized experiences. However, due to limited planning and generalization capabilities, existing formulations of LLM-powered interactive recommender agents struggle to effectively address diverse and complex user intents, such as intuitive, unrefined, or occasionally ambiguous requests. To tackle this challenge, we propose a novel ThoughtAugmented Interactive Recommender Agent system (TAIRA) that addresses complex user intents through distilled thought patterns. Specifically, TAIRA is designed as an LLM-powered multi-agent system featuring a manager agent that orchestrates recommendation tasks by decomposing user needs and planning subtasks, with its planning capacity strengthened through Thought Pattern Distillation (TPD), a thought-augmentation method that extracts high-level thoughts from the agent’s and human experts’ experiences. Through comprehensive experiments conducted across multiple designed datasets, TAIRA exhibits significantly enhanced performance compared to existing methods. Notably, TAIRA’s thought augmentation strategies endow the agent system with the ability to solve complex tasks while generalizing effectively ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780286 on novel tasks, validating its potential as a foundational framework for agent systems, particularly in complex user intent scenarios.","ins":["University of Science and Technology","Huawei Technologies Ltd.","Beijing University of Posts and Telecommunications","ByteDance Inc"]},{"i":"conf/kdd/YuQFZCYWXX26","t":"Rank Matters: Understanding and Defending Model Inversion Attacks via Low-Rank Feature Filtering","au":[["Hongyao Yu",0],["Tsinghua Shenzhen International",0],["Yixiang Qiu",0],["Tsinghua Shenzhen International",0],["Hao Fang",0],["Tsinghua Shenzhen International",0],["Tianqu Zhuang",0],["Tsinghua Shenzhen International",0],["Bin Chen",1],["Sijin Yu",2],["Bin Wang",0],["Tsinghua Shenzhen International",0],["Shu-Tao Xia",0],["Tsinghua Shenzhen International",0],["Ke Xu",3]],"u":"https://doi.org/10.1145/3770854.3780328","dblp":"https://dblp.org/rec/conf/kdd/YuQFZCYWXX26.html","g":["Security/Attack","Privacy/DP"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780328","c":"jul","a":"Model Inversion Attacks (MIAs) pose a significant threat to data privacy by reconstructing sensitive training samples from the knowledge embedded in trained machine learning models. Despite recent progress in enhancing the effectiveness of MIAs across diverse settings, defense strategies have lagged behind—struggling to balance model utility with robustness against increasingly sophisticated attacks. In this work, we propose the ideal inversion error to measure the privacy leakage, and our theoretical and empirical investigations reveals that higher-rank features are inherently more prone to privacy leakage. Motivated by this insight, we propose a lightweight and effective defense strategy based on low-rank feature filtering, which explicitly reduces the attack surface by constraining the dimension of intermediate representations. Extensive experiments across various model architectures and datasets demonstrate that our method consistently outperforms existing defenses, achieving state-of-the-art performance against a wide range of MIAs. Notably, our approach remains effective even in challenging regimes involving high-resolution data and high-capacity models, where prior defenses fail to provide adequate protection. The code is available at https://github.com/Chrisqcwx/LoFt.","ins":["Graduate School, Tsinghua University","Harbin Institute of Technology, Shenzhen","South China University of Technology","Department of Computer Science and Technology, Tsinghua University"]},{"i":"conf/kdd/YuanDTZY26","t":"Towards Self-cognitive Exploration: Metacognitive Knowledge Graph Retrieval Augmented Generation","au":[["Xujie Yuan",[0,1,2,3]],["Shimin Di",[4,5]],["Jielong Tang",[0,1,2,3]],["Libin Zheng",[0,1,2,3]],["Jian Yin",[0,1,2,3]]],"u":"https://doi.org/10.1145/3770854.3780156","dblp":"https://dblp.org/rec/conf/kdd/YuanDTZY26.html","g":["RAG/Retrieval","Knowledge Graph","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780156","c":"jul","a":"Knowledge Graph-based Retrieval-Augmented Generation (KG- RAG) significantly enhances the reasoning capabilities of Large Language Models by leveraging structured knowledge. However, existing KG-RAG frameworks typically operate as open-loop systems, suffering from cognitive blindness, an inability to recognize their exploration deficiencies. This leads to relevance drift and incomplete evidence, which existing self-refinement methods, designed for unstructured text-based RAG, cannot effectively resolve due to the path-dependent nature of graph exploration. To address this challenge, we propose Metacognitive Knowledge Graph Retrieval Augmented Generation (MetaKGRAG), a novel framework inspired by the human metacognition process, which introduces a Perceive-Evaluate-Adjust cycle to enable path-aware, closed-loop refinement. This cycle empowers the system to self-assess exploration quality, identify deficiencies in coverage or relevance, and perform trajectory-connected corrections from precise pivot points. Extensive experiments across five datasets in the medical, legal, and commonsense reasoning domains demonstrate that MetaKGRAG consistently outperforms strong KG-RAG and self-refinement baselines. Our results validate the superiority of our approach and highlight the critical need for path-aware refinement in structured knowledge retrieval. ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780156","ins":["Sun Yat-Sen University","School of Artificial Intelligence","The Technology Innovation Center","for Collaborative Applications of Natural Resources Data in GBA, MNR","Southeast University","School of Computer Science and Engineering"]},{"i":"conf/kdd/ZengSCGCMN26","t":"LLM-based Few-Shot Early Rumor Detection with Imitation Agent","au":[["Fengzhu Zeng",0],["Qian Shao",0],["Ling Cheng",0],["Wei Gao",0],["Shih-Fen Cheng",0],["Jing Ma",1],["Cheng Niu",2]],"u":"https://doi.org/10.1145/3770854.3780315","dblp":"https://dblp.org/rec/conf/kdd/ZengSCGCMN26.html","g":["LLM","Agent","Few-Shot/Zero-Shot","Web/Social"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780315","c":"jul","a":"Early Rumor Detection (EARD) aims to identify the earliest point at which a claim can be accurately classified based on a sequence of social media posts. This is especially challenging in data-scarce settings. While Large Language Models (LLMs) perform well in few-shot NLP tasks, they are not well-suited for time-series data and are computationally expensive for both training and inference. In this work, we propose a novel EARD framework that combines an autonomous agent and an LLM-based detection model, where the agent acts as a reliable decision-maker for early time point determination, while the LLM serves as a powerful rumor detector. This approach offers the first solution for few-shot EARD, necessitating only the training of a lightweight agent and allowing the LLM to remain training-free. Extensive experiments on four real-world datasets show our approach boosts performance across LLMs and surpasses existing EARD methods in accuracy and earliness.","ins":["Singapore Management University","Hong Kong Baptist University","Particle Media, Inc"]},{"i":"conf/kdd/ZhaDMYW26","t":"Align-for-Fusion: Harmonizing Triple Preferences via Dual-oriented Diffusion for Cross-domain Sequential Recommendation","au":[["Yongfu Zha",[0,1]],["Xinxin Dong",[0,1]],["Haokai Ma",2],["Yonghui Yang",2],["Xiaodong Wang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780258","dblp":"https://dblp.org/rec/conf/kdd/ZhaDMYW26.html","g":["Recommendation","Diffusion/Generation","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780258","c":"jul","a":"Personalized sequential recommendation aims to predict the appropriate items to users from their behavioral sequences. To alleviate the data sparsity and interest drift issues, conventional approaches typically utilize the additional behaviors from other domains via cross-domain transition. However, existing cross-domain sequential recommendation (CDSR) algorithms follow the align-then-fusion paradigm which conducts the representation-level alignment across multiple domains and mechanically combine them for recommendation, overlooking the fine-grained multi-domain fusion. Inspired by the advancements of diffusion models (DMs) in distribution matching, we propose an align-for-fusion framework for CDSR to Harmonize triple preferences utilizing Dual-oriented DMs (HorizonRec). Specifically, we first investigate the uncertainty injection of DMs and attribute the fundamental factor of the instability in existing DMs recommenders to the stochastic noise and propose a Mixed-conditioned Distribution Retrieval strategy which leverages the retrieved distribution from users’ authentic behavioral logic as a bridge across the triple domains, enabling consistent multi-domain preference modeling. To suppress the potential noise and emphasize target-relevant interests during multi-domain user representation fusion, we further propose a Dual-oriented Preference Diffusion method to guide the extraction of preferences aligned with users’ authentic interests from each domain under the supervision of the mixed representation. We conduct extensive experiments and analyses on four CDSR datasets from two distinct platforms to verify the effectiveness and robustness of our HorizonRec and its effective mechanism in fine-grained fusion of triple domains. Our code and datasets are available in https://github.com/YongfuZha/HorizonRec. *Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780258","ins":["National University of Defense","Technology","National University of Singapore"]},{"i":"conf/kdd/ZhangCZ26","t":"Mixture-of-RAG: Integrating Text and Tables with Large Language Models","au":[["Chi Zhang",0],["Qiyang Chen",0],["Mengqi Zhang",1]],"u":"https://doi.org/10.1145/3770854.3780171","dblp":"https://dblp.org/rec/conf/kdd/ZhangCZ26.html","g":["RAG/Retrieval","LLM","Tabular"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780171","c":"jul","a":"Large language models (LLMs) achieve optimal utility when their responses are grounded in external knowledge sources. However, real-world documents, such as annual reports, scientific papers, and clinical guidelines, frequently combine extensive narrative content with complex, hierarchically structured tables. While existing retrieval-augmented generation (RAG) systems effectively integrate LLMs’ generative capabilities with external retrieval-based information, their performance significantly deteriorates especially processing such heterogeneous text-table hierarchies. To address this limitation, we formalize the task of Heterogeneous Document RAG, which requires joint retrieval and reasoning across textual and hierarchical tabular data. We propose MixRAG, a novel three-stage framework: (i) hierarchy row-and-column-level (H-RCL) representation that preserves hierarchical structure and heterogeneous relationship, (ii) an ensemble retriever with LLM-based reranking for evidence alignment, and (iii) multi-step reasoning decomposition via a RECAP prompt strategy. To bridge the gap in available data for this domain, we release the dataset DocRAGLib, a 2k-document corpus paired with automatically aligned text-table summaries and gold document annotations. The comprehensive experiment results demonstrate that MixRAG boosts top-1 retrieval by 46% over strong text-only, table-only, and naive-mixture baselines, establishing new state-of-the-art performance for mixed-modality document grounding.","ins":["Beijing Institute of Technology","Zhejiang Gongshang University"]},{"i":"conf/kdd/ZhangRWWJTLWQHL26","t":"DisCo: Diffusion-guided Unbiased Discriminative Learning for Unsupervised Graph Domain Adaptation","au":[["Haodong Zhang",0],["Tao Ren",0],["Changhu Wang",[1,2]],["Yifan Wang",3],["Wei Ju",4],["Huaizhi Tang",0],["Junyu Luo",4],["Zimo Wang",5],["Ziyue Qiao",6],["Xian-Sheng Hua",7],["Xiao Luo",8]],"u":"https://doi.org/10.1145/3770854.3780287","dblp":"https://dblp.org/rec/conf/kdd/ZhangRWWJTLWQHL26.html","g":["Graph/GNN","Diffusion/Generation","Domain Adaptation/Transfer"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780287","c":"jul","a":"This paper investigates the task of unsupervised graph domain adaptation, which facilitates the transfer of knowledge from labeled source graphs to unlabeled target graphs. Recent approaches usually utilize graph contrastive learning and pseudo-labeling to learn from unlabeled target data, which could introduce potential biased representations and supervision of target graphs resulting from serious shifts across two domains. Towards this end, we propose a novel framework named Diffusion-guided Unbiased Discriminative Learning (DisCo) for unsupervised graph domain adaptation. The core of our DisCo is to leverage both feature disentanglement and cross-domain diffusion signals to remove the potential biases for target graphs. In particular, we first utilize adversarial feature disentanglement to extract causal features that are orthogonal to domain biases. More importantly, we retrieve the labels of crossdomain source graphs to generate the conditions, which would be utilized to optimize a diffusion model for label denoising. The consistency between pseudo-labels and denoised labels is measured to reduce the potential biases during domain alignment. Extensive experiments on several real-world benchmarks demonstrate that our proposed DisCo consistently outperforms competing state-ofthe-art baselines. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780287","ins":["Northeastern University","Fred Hutchinson Cancer Research","Center","University of International Business and Economics","Peking University","Beijing Bayi School","Great Bay University","Tongji University","University of Wisconsin-Madison"]},{"i":"conf/kdd/ZhangHYCTH26","t":"IMGNN: An Efficient, Effective and Generalizable Algorithm for Influence Maximization in Social Networks","au":[["Haotian Zhang",0],["Kai Han",[1,2]],["Zhizhuo Yin",3],["Shuang Cui",0],["Jing Tang",3],["Pan Hui",3]],"u":"https://doi.org/10.1145/3770854.3780321","dblp":"https://dblp.org/rec/conf/kdd/ZhangHYCTH26.html","g":["Web/Social","Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780321","c":"jul","a":"Influence Maximization (IM) is a crucial problem in social network analysis and has been extensively studied. Traditional approaches rely on designing approximation algorithms using network sampling; however, these methods lack generalizability and depend on an explicit definition of the influence diffusion model as input. Recently, researchers have turned to deep learning methods to address the shortcomings of traditional IM algorithms, but current learning-based IM algorithms still suffer from severe deficiencies in scalability and generalizability. In this paper, we propose IMGNN, a simple, efficient, effective, and generalizable algorithm powered by graph neural networks. IMGNN is a learning-based IM algorithm with strong generalization capability that reduces the overhead of model retraining while also providing fast seed set inference speed. As a result, IMGNN achieves better performance in terms of both efficiency and effectiveness compared to existing IM algorithms. Its exceptional generalization capability also enables it to be trained on small-scale graphs and directly infer the seed node set for large-scale graphs. IMGNN achieves these advantages by adopting a novel design for feature construction and model training, utilizing features constructed from influence propagations over graphs with randomly skipped nodes. This approach enables IMGNN to avoid overfitting to specific network structures while employing a unique technique to improve time efficiency by training on smaller networks. We have conducted extensive experiments using real-world social networks with up to 40 million nodes, and the results strongly demonstrate the superiority of IMGNN in terms of influence spread, seed node set inference speed, and generalizability. ∗Corresponding Author: Kai Han and Shuang Cui This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780321","ins":["Soochow University","School of Computing and Artificial","Intelligence, Shanghai University of Finance and Economics; Ministry of Education’s Key Laboratory of Interdisciplinary Research of Computation and Economics","Hong Kong University of Science and Technology (Guangzhou)"]},{"i":"conf/kdd/ZhangZZLLTPY26","t":"EviCare: Enhancing Diagnosis Prediction with Deep Model-Guided Evidence for In-Context Reasoning","au":[["Hengyu Zhang",0],["Xuyun Zhang",0],["Pengxiang Zhan",1],["Linhao Luo",2],["Hang Lv",1],["Yanchao Tan",1],["Shirui Pan",3],["Carl Yang",4]],"u":"https://doi.org/10.1145/3770854.3780257","dblp":"https://dblp.org/rec/conf/kdd/ZhangZZLLTPY26.html","g":["Healthcare/Bio","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780257","c":"jul","a":"Recent advances in large language models (LLMs) have enabled promising progress in diagnosis prediction from electronic health records (EHRs). However, existing LLM-based approaches tend to overfit to historically observed diagnoses, often overlooking novel yet clinically important conditions that are critical for early intervention. To address this, we propose EviCare, an in-context reasoning framework that integrates deep model guidance into LLM-based diagnosis prediction. Rather than prompting LLMs directly with raw EHR inputs, EviCare performs (1) deep model inference for candidate selection, (2) evidential prioritization for set-based EHRs, and (3) relational evidence construction for novel diagnosis prediction. These signals are then composed into an adaptive in-context prompt to guide LLM reasoning in an accurate and interpretable manner. Extensive experiments on two real-world EHR benchmarks (MIMIC-III and MIMIC-IV) demonstrate that EviCare 1 achieves significant performance gains, which consistently outperforms both LLM-only and deep model-only baselines by an average of 20.65% across precision and accuracy metrics. The improvements are particularly notable in challenging novel diagnosis prediction, yielding average improvements of 30.97%.","ins":["Macquarie University","Fuzhou University","Monash University","Griffith University","Emory University"]},{"i":"conf/kdd/ZhangFLLLJ26","t":"From Tokenizer Bias to Backbone Capability: A Controlled Study of LLMs for Time Series Forecasting","au":[["Xinyu Zhang",[0,1]],["Shanshan Feng",2],["Xutao Li",0],["Kenghong Lin",0],["Fan Li",1],["Pengfei Jia",0]],"u":"https://doi.org/10.1145/3770854.3780318","dblp":"https://dblp.org/rec/conf/kdd/ZhangFLLLJ26.html","g":["LLM","Time Series"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780318","c":"jul","a":"Using pre-trained large language models (LLMs) as a backbone for time series prediction has recently attracted growing research interest. Existing approaches typically split time series into patches, map them to the token space of LLMs via a Tokenizer, process the tokens through a frozen or fine-tuned LLM backbone, and then reconstruct numerical forecasts using a Detokenizer. However, the actual effectiveness of LLMs for time series forecasting remains under debate. We observe that when trained and evaluated on small datasets, the Tokenizer–Detokenizer components often overfit to the specific data distribution, thereby masking the intrinsic predictive capability of the LLM backbone. To investigate the inherent potential of LLMs in this context, we design three models with identical architectures but distinct pre-training strategies. By leveraging large-scale pre-training, we obtain more unbiased Tokenizer–Detokenizer pairs that are seamlessly integrated with the LLM backbone. Through controlled experiments, we evaluate the zero-shot and few-shot forecasting performance of the LLM, offering insights into its true capabilities. Our extensive experiments reveal that, although the LLM backbone shows some promise, its performance remains limited and does not consistently surpass that of models specifically trained on large-scale time series data. Our source code is publicly available in the repository: https://github.com/SiriZhang45/LLM4TS.","ins":["Harbin Institute of Technology, Shenzhen","Hong Kong Polytechnic University","Wuhan University"]},{"i":"conf/kdd/ZhangZWCY26","t":"ProEx: A Unified Framework Leveraging Large Language Model with Profile Extrapolation for Recommendation","au":[["Yi Zhang",0],["Yiwen Zhang",0],["Yu Wang",0],["Tong Chen",1],["Hongzhi Yin",1]],"u":"https://doi.org/10.1145/3770854.3780284","dblp":"https://dblp.org/rec/conf/kdd/ZhangZWCY26.html","g":["LLM","Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780284","c":"jul","a":"The powerful text understanding and generation capabilities of large language models (LLMs) have brought new vitality to general recommendation with implicit feedback. One possible strategy involves generating a unique user (or item) profile from historical interaction data, which is then mapped to a semantic representation in the language space. However, a single-instance profile may be insufficient to comprehensively capture the complex intentions behind a user’s interacted items. Moreover, due to the inherent instability of LLMs, a biased or misinterpreted profile could even undermine the original recommendation performance. Consequently, an intuitive solution is to generate multiple profiles for each user (or item), each reflecting a distinct aspect of their characteristics. In light of this, we propose a unified recommendation framework with multi-faceted profile extrapolation (ProEx) in this paper. By leveraging chain-of-thought reasoning, we construct multiple distinct profiles for each user and item. These new profiles are subsequently mapped into semantic vectors, extrapolating from the position of the original profile to explore a broader region of the language space. Subsequently, we introduce the concept of environments, where each environment represents a possible linear combination of all profiles. The differences across environments are minimized to reveal the inherent invariance of user preferences. We apply ProEx to three discriminative methods and three generative methods, and conduct extensive experiments on three datasets. The experimental results demonstrate that ProEx significantly enhances the performance of these base recommendation models.","ins":["Anhui University","The University of Queensland"]},{"i":"conf/kdd/ZhangZPLYYY26","t":"DiLA: Enhancing LLM Tool Learning with Differential Logic Layer","au":[["Yu Zhang",0],["Hui-Ling Zhen",1],["Zehua Pei",0],["Yingzhao Lian",1],["Lihao Yin",1],["Mingxuan Yuan",1],["Bei Yu",0]],"u":"https://doi.org/10.1145/3770854.3780224","dblp":"https://dblp.org/rec/conf/kdd/ZhangZPLYYY26.html","g":["LLM","Agent"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780224","c":"jul","a":"Considering the challenges faced by large language models (LLMs) in logical reasoning and planning, prior efforts have sought to augment LLMs with access to external solvers. While progress has been made on simple reasoning problems, solving classical constraint satisfaction problems, such as the Boolean satisfiability problem (SAT) and graph coloring problem (GCP), remains difficult for offthe-shelf solvers due to their intricate expressions and exponential search spaces. In this paper, we propose a novel differential logic layer-aided language modeling (DiLA) approach, where logical constraints are integrated into the forward and backward passes of a network layer, providing another option for LLM tool learning. In DiLA, LLM aims to transform the language description to logic constraints and identify initial solutions of the highest quality, while the differential logic layer focuses on ite
