ratively refining the LLM- prompted solution. Leveraging the logic layer as a bridge, DiLA enhances the logical reasoning ability of LLMs on a range of reasoning problems encoded by Boolean variables, guaranteeing the efficiency and correctness of the solution process. We evaluate the performance of DiLA on three classic constraint satisfaction problems and empirically demonstrate its consistent outperformance against existing prompt-based and solver-aided approaches.","ins":["The Chinese University of Hong Kong","Huawei Noah’s Ark Lab"]},{"i":"conf/kdd/ZhangZTLC26","t":"Explicit v.s. Implicit Memory: Exploring Multi-hop Complex Reasoning Over Personalized Information","au":[["Zeyu Zhang",[0,1]],["Yang Zhang",2],["Haoran Tan",[0,1]],["Rui Li",[0,1]],["Xu Chen",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780184","dblp":"https://dblp.org/rec/conf/kdd/ZhangZTLC26.html","g":["LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780184","c":"jul","a":"In large language model-based agents, memory serves as a critical capability for achieving personalization by storing and utilizing users’ information. Although some previous studies have adopted memory to implement user personalization, they typically focus on preference alignment and simple question-answering. However, in the real world, complex tasks often require multi-hop reasoning on a large amount of user information, which poses significant challenges for current memory approaches. To address this limitation, we propose the multi-hop personalized reasoning task to explore how different memory mechanisms perform in multi-hop reasoning over personalized information. We explicitly define this task and construct a dataset along with a unified evaluation framework. Then, we implement various explicit and implicit memory methods and conduct comprehensive experiments. We evaluate their performance on this task from multiple perspectives and analyze their strengths and weaknesses. Besides, we explore hybrid approaches that combine both paradigms and propose the HybridMem method to address their limitations. We demonstrate the effectiveness of our proposed model through extensive experiments. To benefit the research community, we release this project at https://github.com/nuster1128/MPR.","ins":["Gaoling School of Artificial Intelligence","Renmin University of China","National University of Singapore"]},{"i":"conf/kdd/ZhaoZWWJLWW26","t":"FaST: Efficient and Effective Long-Horizon Forecasting for Large-Scale Spatial-Temporal Graphs via Mixture-of-Experts","au":[["Yiji Zhao",[0,1,2]],["Zihao Zhong",[0,1,2]],["Ao Wang",[0,1,2]],["Haomin Wen",3],["Ming Jin",4],["Yuxuan Liang",[5,6]],["Huaiyu Wan",7],["Hao Wu",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3780165","dblp":"https://dblp.org/rec/conf/kdd/ZhaoZWWJLWW26.html","g":["Spatiotemporal/Urban","Graph/GNN","Efficiency/Compression"],"g_source":"claude-direct","d":"research","ins":["Yunnan University","School of Information","Science and Engineering","Carnegie Mellon University","Griffith University","The Hong Kong University","of Science and Technology","Beijing Jiaotong University"],"acm":"https://dl.acm.org/doi/10.1145/3770854.3780165","c":"jul","a":"Spatial-Temporal Graph (STG) forecasting on large-scale networks has garnered significant attention. However, existing models predominantly focus on short-horizon predictions and suffer from notorious computational costs and memory consumption when scaling to long-horizon predictions and large graphs. Targeting the above challenges, we present FaST, an effective and efficient framework based on heterogeneity-aware Mixture-of-Experts (MoEs) for long-horizon and large-scale STG forecasting, which unlocks oneweek-ahead (672 steps at a 15-minute granularity) prediction with thousands of nodes. FaST is underpinned by two key innovations. First, an adaptive graph agent attention mechanism is proposed to alleviate the computational burden inherent in conventional graph convolution and self-attention modules when applied to large-scale graphs. Second, we propose a new parallel MoE module that replaces traditional feed-forward networks with Gated Linear Units (GLUs), enabling an efficient and scalable parallel structure. Extensive experiments on real-world datasets demonstrate that FaST not only delivers superior long-horizon predictive accuracy but also achieves remarkable computational efficiency compared to state-of-the-art baselines. Source code is publicly available at: https://github.com/yijizhao/FaST."},{"i":"conf/kdd/Zhao26","t":"Fast and Faithful: Scalable Neuro-Symbolic Learning and Reasoning with Differentiable Fuzzy 𝓔𝓛++","au":[["Yizheng Zhao",1]],"u":"https://doi.org/10.1145/3770854.3780220","dblp":"https://dblp.org/rec/conf/kdd/Zhao26.html","g":["LLM","Other"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780220","c":"jul","a":"The unification of neural learning and symbolic reasoning remains a foundational challenge in AI, forcing a persistent trade-off between logical rigor and computational scale. The field has largely diverged into two paths: expressive frameworks rooted in first-order logic that are formally sound but computationally intractable, and scalable methods, such as geometric embeddings, that sacrifice formal logical guarantees for efficiency. In this paper, we introduce DF- EL++, an end-to-end differentiable framework that transcends this trade-off by unifying PTIME-complete reasoning with neural learning. Our primary contribution is a complete, theoretically-grounded methodology centered on a unified semantic-loss framework: we unite the tractable structure of the Description Logic EL++ with a Product-based fuzzy semantics, deriving our learning objective directly from the corresponding Göguen implication to ensure high logical fidelity. This principled semantic core is made robust and practical by two supporting innovations: a normalization strategy that re-architects complex axioms for stable optimization, and a novel domain construction technique that prevents model collapse to ensure non-trivial reasoning. Validated on massive, real-world ontologies like SNOMED CT (377K concepts), DF-EL++ demonstrates a unique synergy of scale and performance: it remains computationally efficient where expressive systems fail, while decisively outperforming dominant scalable baselines in a range of knowledge base completion tasks with up to a 42% relative improvement in Hits@1. This work establishes a new, provably sound, and scalable pathway for a new generation of neuro-symbolic systems that are both empirically powerful and logically reliable.","ins":["Fast and Faithful: Scalable Neuro-Symbolic Learning and Reasoning with Differentiable Fuzzy EL++","National Key Laboratory for Novel Software Technology & School of Artificial Intelligence, Nanjing University"]},{"i":"conf/kdd/ZhaoZYZZSLYWSKW26","t":"Each Rank Could be an Expert: Single-Ranked Mixture of Experts LoRA for Multi-task Learning","au":[["Ziyu Zhao",[0,1]],["Yixiao Zhou",[0,1]],["Xin Yu",[2,3]],["Zhi Zhang",4],["Didi Zhu",0],["Tao Shen",0],["Zexi Li",0],["Jinluan Yang",0],["Xuwu Wang",4],["Jing Su",4],["Kun Kuang",0],["Zhongyu Wei",5],["Fei Wu",0],["Yu Cheng",6]],"u":"https://doi.org/10.1145/3770854.3780222","dblp":"https://dblp.org/rec/conf/kdd/ZhaoZYZZSLYWSKW26.html","g":["LLM","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780222","c":"jul","a":"Low-Rank Adaptation (LoRA) is widely used for adapting large language models (LLMs) to specific domains due to its efficiency and modularity. However, vanilla LoRA struggles with task conflicts in multi-task scenarios. Recent works adopt Mixture of Experts (MoE) by treating each LoRA module as an expert, thereby mitigating task interference through multiple specialized LoRA modules. While effective, these methods often isolate knowledge within individual tasks, failing to fully exploit the shared knowledge across related tasks. In this paper, we establish a connection between single LoRA and multi-LoRA MoE, integrating them into a unified framework. We demonstrate that the dynamic routing of multiple LoRAs is functionally equivalent to rank partitioning and block-level activation within a single LoRA. To systematically study the role of expert granularity in multi-task learning, we conduct an in-depth ∗Equal contributions. †Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780222 investigation within our unified framework. Our empirical results show that a finer-grained expert partitioning not only yields significant performance gains but also captures more diverse parameter patterns. These empirical findings are supported by our theoretical analysis, which proves that finer granularity expands parameter space diversity and tightens the model’s error bound. Building on these findings, we propose Single-ranked Mixture of Experts LoRA (SMoRA), which embeds MoE into LoRA by treating each rank as an independent expert. With a dynamic rank-wise activation mechanism, SMoRA facilitates a flexible composition of knowledge, enabling the model to learn deeper and more diverse features while mitigating task conflicts. Experiments demonstrate that SMoRA activates fewer parameters yet achieves better performance in multi-task scenarios.","ins":["Zhejiang University","Shanghai Innovation Institute","The Pennsylvania State University","State College, United States","Bytedance Seed","Fudan University","Chinese University of Hong Kong"]},{"i":"conf/kdd/ZheFLLHW26","t":"Heterogeneous Multi-Agent Reinforcement Learning with Attention for Cooperative and Scalable Feature Transformation","au":[["Tao Zhe",0],["Huazhen Fang",1],["Kunpeng Liu",2],["Qian Lou",3],["Tamzidul Hoque",0],["Dongjie Wang",0]],"u":"https://doi.org/10.1145/3770854.3780231","dblp":"https://dblp.org/rec/conf/kdd/ZheFLLHW26.html","g":["Reinforcement Learning","Agent"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780231","c":"jul","a":"Feature transformation enhances downstream task performance by generating informative features through mathematical feature crossing. Despite the advancements in deep learning, feature transformation remains essential, particularly for structured data, where deep models often struggle to capture complex feature interactions effectively. Prior literature on automated feature transformation has achieved notable success but often relies on heuristics or exhaustive searches, leading to inefficient and time-consuming processes. Recent works employ reinforcement learning (RL) to enhance traditional approaches through a more effective trial-and-error way. However, two key limitations remain: 1) Dynamic feature expansion during the transformation process, which introduces instability and increases the time complexity of the learning procedure for RL agents; 2) Insufficient cooperation and communication between agents, which results in suboptimal feature crossing operations and degraded model performance. To address them, we propose a novel heterogeneous multi-agent RL framework to enable cooperative and scalable feature transformation. The framework comprises three heterogeneous agents, grouped into two types, each designed to select essential features and operations for feature crossing. To enhance communication among these agents, we implement a shared critic mechanism that facilitates information exchange during the feature transformation process. This collaboration enables the agents to learn more intelligent and effective transformation policies. To handle the dynamically expanding feature space, we tailor multi-head attention-based feature agents to select suitable features for feature crossing. This design facilitates scalable decision-making and effective candidate selection based on comprehensive global feature space information. Additionally, we introduce a state encoding technique during the optimization process to stabilize and enhance the learning dynamics of the RL agents, resulting in more robust and reliable transformation policies. ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780231 Finally, we conduct extensive experiments to validate the effectiveness, efficiency, robustness, and interpretability of our model. Our code and dataset are publicly available on GitHub1.","ins":["University of Kansas","Michigan State University","Clemson University","University of Central Florida"]},{"i":"conf/kdd/ZhengYWX26","t":"Cross-Contrastive Clustering for Multimodal Attributed Graphs with Dual Graph Filtering","au":[["Haoran Zheng",0],["Renchi Yang",0],["Hongtao Wang",0],["Jianliang Xu",0]],"u":"https://doi.org/10.1145/3770854.3780236","dblp":"https://dblp.org/rec/conf/kdd/ZhengYWX26.html","g":["Multimodal/VLM","Graph/GNN","Self-Supervised/Contrastive"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780236","c":"jul","a":"Multimodal Attributed Graphs (MMAGs) are an expressive data model for representing the complex interconnections among entities that associate attributes from multiple data modalities (text, images, etc.). Clustering over such data finds numerous practical applications in real scenarios, including social community detection, medical data analytics, etc. However, as revealed by our empirical studies, existing multi-view clustering solutions largely rely on the high correlation between attributes across various views and overlook the unique characteristics (e.g., low modality-wise correlation and intense feature-wise noise) of multimodal attributes output by large pre-trained language and vision models in MMAGs, leading to suboptimal clustering performance. Inspired by foregoing empirical observations and our theoretical analyses with graph signal processing, we propose the Dual Graph Filtering (DGF) scheme, which innovatively incorporates a feature-wise denoising component into node representation learning, thereby effectively overcoming the limitations of traditional graph filters adopted in the extant multi-view graph clustering approaches. On top of that, DGF includes a tri-cross contrastive training strategy that employs instance-level contrastive learning across modalities, neighborhoods, and communities for learning robust and discriminative node representations. Our comprehensive experiments on eight benchmark MMAG datasets exhibit that DGF is able to outperform a wide range of state-of-the-art baselines consistently and significantly in terms of clustering quality measured against ground-truth labels.","ins":["Hong Kong Baptist University"]},{"i":"conf/kdd/ZhengYZX26","t":"Rethinking Message Passing Neural Networks with Diffusion Distance-guided Stress Majorization","au":[["Haoran Zheng",0],["Renchi Yang",0],["Yubo Zhou",1],["Jianliang Xu",0]],"u":"https://doi.org/10.1145/3770854.3780307","dblp":"https://dblp.org/rec/conf/kdd/ZhengYZX26.html","g":["Graph/GNN"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780307","c":"jul","a":"Message passing neural networks (MPNNs) have emerged as go-to models for learning on graph-structured data in the past decade. Despite their effectiveness, most of such models still incur severe issues such as over-smoothing and -correlation, due to their underlying objective of minimizing the Dirichlet energy and the derived neighborhood aggregation operations. In this paper, we propose the DDSM, a new MPNN model built on an optimization framework that includes the stress majorization and orthogonal regularization for overcoming the above issues. Further, we introduce the diffusion distances for nodes into the framework to guide the new message passing operations and develop efficient algorithms for distance approximations, both backed by rigorous theoretical analyses. Our comprehensive experiments showcase that DDSM consistently and considerably outperforms 15 strong baselines on both homophilic and heterophilic graphs.","ins":["Hong Kong Baptist University","University of Michigan"]},{"i":"conf/kdd/ZhengZSTK26","t":"DiKGRec: Generative Recommender Model with Diffusion and Knowledge Graph-Based Reasoning","au":[["Zhuoxun Zheng",[0,1]],["Baifan Zhou",[2,1]],["Ahmet Soylu",[3,4,1]],["Jie Tang",5],["Evgeny Kharlamov",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780190","dblp":"https://dblp.org/rec/conf/kdd/ZhengZSTK26.html","g":["Recommendation","Diffusion/Generation","Knowledge Graph"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780190","c":"jul","a":"Generative AI has shown remarkable advancements across various tasks, including recommender systems, where recent research leverages generative approaches to provide personalised recommendations based on user-item historical interaction data. However, the inherent sparsity of the interaction data poses a significant challenge to the advancement of generative recommender models. While some discriminative models have explored incorporating knowledge graphs (KGs) to address this issue, they often struggle with noise sensitivity, lack of explainability, and difficulties in handling cold-start scenarios, where new items with little or no historical user interaction data are involved. In this paper, we propose a novel dual-architecture generative model that intuitively integrates a diffusion model with KG-based reasoning, which reflects the propagation of user preference in a KG towards items. Our approach not only improves recommendation accuracy significantly, but also introduces explainability by leveraging the structured insights from KGs. Furthermore, the KG-based reasoning enables our model to effectively address cold-start scenarios. By utilising the semantic connections in the KG, our model can recommend these new items with confidence, overcoming a common limitation of traditional methods. We evaluate our model on three benchmark datasets, demonstrating superior performance (beat SOTA by over 10% in recall@20 in average).","ins":["Bosch Center for AI","University of Oslo","Oslo Metropolitan University","Kristiania University of Applied","Sciences","Tsinghua University"]},{"i":"conf/kdd/ZhongJLNLZYW26","t":"PEANuT: Parameter-Efficient Adaptation with Weight-aware Neural Tweakers","au":[["Yibo Zhong",0],["Independent Researcher",0],["Haoxiang Jiang",0],["Lincan Li",1],["Ryumei Nakada",2],["Tianci Liu",3],["Linjun Zhang",2],["Huaxiu Yao",4],["Haoyu Wang",0]],"u":"https://doi.org/10.1145/3770854.3780230","dblp":"https://dblp.org/rec/conf/kdd/ZhongJLNLZYW26.html","g":["Efficiency/Compression","LLM"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780230","c":"jul","a":"Fine-tuning large pre-trained foundation models often yields excellent downstream performance but is prohibitively expensive when updating all parameters. Parameter-efficient fine-tuning (PEFT) methods such as LoRA alleviate this by introducing lightweight update modules, yet they commonly rely on weight-agnostic linear approximations, limiting their expressiveness. In this work, we propose PEANuT, a novel PEFT framework that introduces weightaware neural tweakers, compact neural modules that generate task-adaptive updates conditioned on frozen pre-trained weights. PEANuT provides a flexible yet efficient way to capture complex update patterns without full model tuning. We theoretically show that PEANuT achieves equivalent or greater expressivity than existing linear PEFT methods with comparable or fewer parameters. Extensive experiments across four benchmarks with over twenty datasets demonstrate that PEANuT consistently outperforms strong baselines in both NLP and vision tasks, while maintaining low computational overhead.","ins":["University at Albany","Florida State University","Rutgers University","Purdue University","University of North Carolina at Chapel Hill"]},{"i":"conf/kdd/ZhouLJMYMYC26","t":"Hitcher: Efficient GPU-based Vector Search via Cluster-Centric Kernel and Hitch-Ride Ordering","au":[["Qihui Zhou",0],["Changji Li",0],["Guanxian Jiang",0],["Chenhao Ma",[1,2,3]],["Xiao Yan",[4,5]],["Yu Mao",6],["Ming-Chang Yang",0],["James Cheng",0]],"u":"https://doi.org/10.1145/3770854.3780212","dblp":"https://dblp.org/rec/conf/kdd/ZhouLJMYMYC26.html","g":["Search/IR","Efficiency/Compression"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780212","c":"jul","a":"Similarity-based vector search, which retrieves the most similar vectors to a given query vector from a large vector dataset, underlies many applications such as search, recommendation, and Large Language Models (LLMs). Some systems run vector search on GPUs to enjoy GPU’s high parallelism, but we observe that they are limited in query throughput and latency. In particular, their query-centric GPU kernel conducts computation independently for each query, failing to reuse data loaded to the GPU shared memory across queries and leading to a low GPU compute utilization. While their batch-based task reordering rearranges computation for queries in a batch to reduce CPU-GPU data transfer, but latency is prolonged since each query needs to wait for its slowest task. To tackle these problems, we propose Hitcher. Specifically, to reuse data across queries and improve GPU utilization, Hitcher implements a cluster-centric GPU kernel to batch computation on the same data for multiple queries. To reduce query latency, Hitcher adopts the hitch-ride ordering, which preserves the arrival order for query processing while batching computation across queries to improve efficiency. Hitcher can also offload computation tasks to the CPU to reduce CPU-GPU data transfer and utilize multiple GPUs. Experimental results show that Hitcher achieves up to 22× lower P99 query latency and 9× higher query throughput when compared with the state-of-the-art GPU-based vector query processing systems. ∗Both authors contributed equally to this research. †Dr. Xiao Yan is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780212","ins":["The Chinese University of Hong Kong","School of Data Science","The Chinese University of Hong","Kong, Shenzhen","Institute for Math and AI, Wuhan","Wuhan University","City University of Hong Kong"]},{"i":"conf/kdd/ZhouYLWXHQJ26","t":"HAL: Accurate, Private, and Efficient Sample Alignment for Multimodal Federated Learning","au":[["Xiaokai Zhou",[0,1]],["Xiao Yan",[0,2]],["Xinyan Li",[0,1]],["Yuxiang Wang",[0,1]],["Quanqing Xu",[3,4]],["Chuang Hu",[0,1]],["Tieyun Qian",[0,1]],["Jiawei Jiang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780223","dblp":"https://dblp.org/rec/conf/kdd/ZhouYLWXHQJ26.html","g":["Federated","Multimodal/VLM","Privacy/DP"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780223","c":"jul","a":"Vertical multimodal federated learning (VMFL) enables multiple clients holding data from different modalities to conduct collaboratively model training. Existing methods typically assume that multimodal data samples (i.e., text and image) from the same entity (i.e., person) are paired across the clients (i.e., aligned). However, this assumption rarely holds in practice, as data is often collected independently with no shared identifiers. To address this challenge, we propose hashing-based alignment (HAL), a new VMFL framework that works without pre-aligned samples. HAL consists of two key components. The first component is an efficient and privacy-preserving method to identify similar samples from different modalities as aligned pairs. It adopts locality sensitive hashing (LSH) for the efficient retrieval of similar samples, introduces a shift-orthogonal hashing scheme to tackle the gaps between different modalities, and uses a bloom-style method for secure Hamming distance estimation. We prove that the shift-orthogonal hashing reduces distance estimation errors and secure Hamming distance estimation satisfies differential privacy. The second component is a neighbor-aware fusion strategy, which applies cross-attention to aggregate informative signals from the aligned samples without relying on explicit similarity scores. Experimental results on two real-world datasets show that compared with five state-of-the-art (SOTA) baselines, HAL improves the cross-modal retrieval accuracy by over 63%, while also achieving up to 154× speedup. ∗Corresponding authors: Quanqing Xu, Chuang Hu, and Jiawei Jiang. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780223","ins":["Wuhan University","School of Computer Science","Institute for Math and AI","Ant Group","OceanBase"]},{"i":"conf/kdd/ZhouZ26","t":"Minimizing Total Biharmonic Distance in Large Graphs via Link Recommendation","au":[["Xinna Zhou",[0,1]],["Zhongzhi Zhang",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780204","dblp":"https://dblp.org/rec/conf/kdd/ZhouZ26.html","g":["Graph/GNN","Recommendation"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780204","c":"jul","a":"The total biharmonic distance, which is the sum of the biharmonic distance between every pair of nodes in a network, is a key metric for evaluating network connectivity and robustness. In this paper, we study the problem of minimizing the total biharmonic distance by adding 𝑘nonexistent edges for a given graph 𝐺and budget 𝑘. The problem is computationally challenging. We show that the objective function of the problem is monotone but not supermodular. To solve this problem, we propose simple greedy algorithms with cubic time complexity. To mitigate the high time complexity of these greedy algorithms, we apply several techniques, including the projection method, the Laplacian solver, and convex hull approximation. These techniques reduce the time complexity of our proposed algorithms from cubic to nearly linear while providing error guarantees. Finally, extensive experiments on real datasets demonstrate both the efficiency and effectiveness of our proposed algorithms.","ins":["College of Computer Science and Artificial Intelligence","Fudan University"]},{"i":"conf/kdd/ZhouLPXZYWJWWWD26","t":"EmoRAG: Evaluating RAG Robustness to Symbolic Perturbations","au":[["Xinyun Zhou",0],["Xinfeng LiB",1],["Yinan Peng",2],["Hengxin Tech.",2],["Ming Xu",2],["Xuanwang Zhang",3],["Miao Yu",1],["Yidong Wang",4],["Xiaojun Jia",1],["Kun Wang",1],["Qingsong Wen",1],["Squirrel Ai Learning",1],["XiaoFeng Wang",1],["Wei Dong",1]],"u":"https://doi.org/10.1145/3770854.3780238","dblp":"https://dblp.org/rec/conf/kdd/ZhouLPXZYWJWWWD26.html","g":["RAG/Retrieval","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780238","c":"jul","a":"Retrieval-Augmented Generation (RAG) systems are increasingly central to robust AI, enhancing large language model (LLM) faithfulness by incorporating external knowledge. However, our study unveils a critical, overlooked vulnerability: their profound susceptibility to subtle symbolic perturbations, particularly through nearimperceptible emotional icons (e.g., “(@_@)”) that can catastrophically mislead retrieval, termed EmoRAG. We demonstrate that injecting a single emoticon into a query makes it nearly 100% likely to retrieve semantically unrelated texts, which contain a matching emoticon. Our extensive experiment across general question-answering and code domains, using a range of state-of-the-art retrievers and generators, reveals three key findings: (I) Single-Emoticon Disaster: Minimal emoticon injections cause maximal disruptions, with a single emoticon almost 100% dominating RAG output. (II) Positional Sensitivity: Placing an emoticon at the beginning of a query can cause severe perturbation, with F1-Scores exceeding 0.92 across all datasets. (III) Parameter-Scale Vulnerability: Counterintuitively, models with larger parameters exhibit greater vulnerability to the interference. We provide an in-depth analysis to uncover the underlying mechanisms of these phenomena. Furthermore, we raise a critical concern regarding the robustness assumption of current RAG systems, envisioning a threat scenario where an adversary exploits this vulnerability to manipulate the RAG system. We evaluate standard defenses and find them insufficient against EmoRAG. To address this, we propose targeted defenses, analyzing their strengths and limitations in mitigating emoticon-based perturbations. Finally, we outline future directions for building robust RAG systems. †Co-first author. ∗Work done when the author was visiting Wei Dong’s group at NTU. BCorresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780238","ins":["ZJU","NTU","NUS","NJU","PKU"]},{"i":"conf/kdd/ZhuangFQYQSY26","t":"Think2Go: Generative Next POI Recommendation with LLM Reasoning","au":[["Zhuang Zhuang",[0,1]],["Shanshan Feng",[2,3]],["Hangwei Qian",[4,5]],["CFAR and IHPC",[4,5]],["Mingqi Yang",[4,5]],["Intelligent Logistics",[0,1]],["Heng Qi",[0,1]],["Yanming Shen",[0,1]],["Baocai Yin",[0,1]]],"u":"https://doi.org/10.1145/3770854.3780334","dblp":"https://dblp.org/rec/conf/kdd/ZhuangFQYQSY26.html","g":["Recommendation","LLM","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"research","acm":"https://dl.acm.org/doi/10.1145/3770854.3780334","c":"jul","a":"Next Point-of-Interest (POI) recommendation task focuses on mining user behavioral preference patterns from historical check-ins to provide personalized suggestions for the next destination. Existing methods primarily rely on shallow contextual information and handcrafted feature interactions to predict the next POI. However, the inherent sparsity and complexity of user mobility patterns limit the computational capacity of non-reasoning models to capture deep intent, while large language models (LLMs) perform suboptimally because they lack a deep understanding of semantic IDs (SIDs) when SIDs are trained separately. To address these limitations, we propose Think2Go, a novel generative next POI recommendation framework, which enhances the model’s comprehension of SID representations and explores diverse spatial-temporal patterns via test-time computational scaling. We unify supervised fine-tuning (SFT) and reinforcement learning (RL)-based reasoning within a single architecture, enabling joint optimization of memorization and adaptive reasoning to better retain user behavior patterns while exploring diverse user preferences. To further calibrate policy optimization in adaptive reasoning, we propose two advantage weighting mechanisms that integrate (1) prompt epistemic uncertainty, estimated via kernel density methods to assess the spatial-temporal ∗Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3780334 periodic pattern alignment between queries and user history, promoting increased exploration under high epistemic uncertainty; and (2) reward-informed advantage scaling, captured by normalizing rewards against their maxima to adapt update magnitudes, thereby improving training stability and mitigating overfitting to noisy signals. This joint calibration forms an implicit curriculum learning strategy, delivering fine-grained, instance-aware policy updates that prevent entropy collapse and support robust exploration. Extensive experiments conducted on three real-world datasets demonstrate that Think2Go exhibits strong generalization capabilities and enhances the LLM’s understanding of SIDs.","ins":["Dalian University of Technology","School of Computer Science and Technology","Wuhan University","School of Computer Science","South China University of Technology","Institute of Digital Business"]},{"i":"conf/kdd/CaoYWWWXL26","t":"Chat2Trade: Automating Financial RFQ Parsing with Fine-Tuned LLMs","au":[["Yixuan Cao",[0,1]],["Chunhao Yang",[0,1]],["Yifan Wang",2],["Jian Wang",2],["Kun Wan",2],["Gang Xiao",2],["Ping Luo",[0,1]]],"u":"https://doi.org/10.1145/3770854.3783923","dblp":"https://dblp.org/rec/conf/kdd/CaoYWWWXL26.html","g":["LLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783923","c":"jul","a":"The trading volume of China’s secondary bond market reached CNY 2,735.44 trillion in 2024. The majority of transactions were conducted through the over-the-counter (OTC) market. In this market, brokers, buyers, and sellers send request-for-quote (RFQ) messages via group or private chats, generating an RFQ pool containing tens of thousands of requests. Brokers search through this pool to match suitable counterparties and facilitate transactions between them. The faster they match, the more trading opportunities and profits they can obtain. However, as RFQs are unstructured text messages, manual matching is time-consuming. Therefore, we built a system to accelerate this process. The core task of this system is to automatically parse RFQs into structured data, which faces two key challenges: highly domain-specific jargon in RFQs and the rapid evolution of jargon patterns. To address these challenges, we propose an RFQ parsing method based on fine-tuned large language models (LLMs). It consists of three sequential components: (1) Message Chunking, which decomposes an RFQ message into shorter items; (2) Few-shot Retrieval, which retrieves similar historical RFQs; and (3) Record Extraction, which generates structured RFQ records leveraging retrieved demonstrations. Compared with baseline methods, this approach delivers significant performance gains and exhibits superior adaptability to novel expressions. Building on this methodology, we developed Chat2Trade, a trading assistance system that parses RFQs and supports rapid filtering and querying. Chat2Trade transforms the brokers’ traditional workflow from actively searching for relevant RFQs into a passive, real-time, pushbased paradigm. The system has been deployed at China Securities, one of the largest securities firms in China, for nearly one year. It improves brokers’ average trading volume by 3.67 times compared to traditional manual methods. ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783923","ins":["State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences (CAS)","University of Chinese Academy of Sciences, CAS","China Securities Co., Ltd."]},{"i":"conf/kdd/ChenZHZZL26","t":"Merchant Category Identification in Weixin Pay","au":[["Aochuan Chen",0],["Information Hub",0],["Haihong Zhao",0],["Information Hub",1],["Simin Huang",1],["Xuan Zong",1],["Jun Zhou",1],["Jia Li",0],["Information Hub",null]],"u":"https://doi.org/10.1145/3770854.3783924","dblp":"https://dblp.org/rec/conf/kdd/ChenZHZZL26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783924","c":"jul","a":"Merchant Category Identification (MCI) is crucial for the integrity and security of digital payment ecosystems, as it underpins vital functions like risk management and regulatory compliance. This task is especially critical for massive platforms like Weixin Pay (the China Mainland version of WeChat Pay), which serves over 1.4 billion monthly active users now. However, accurate identification is challenged by deceptive merchant practices designed to evade proper classification and higher fees. This paper introduces a novel framework that leverages a comprehensive suite of data modalities: texts, images, numerical statistics, and time-series data, to create a robust defense against such deception. To counteract sophisticated deception, we employ two key strategies. First, we construct relational graphs via meta-paths to capture difficult-to-falsify affinities between merchants. Second, we apply Multi-Marginal Optimal Transport (MOT) to achieve a holistic, modality-level alignment, ensuring the model is not misled by corrupted data from any single source. The proposed framework achieves a significant 8.8% improvement in accuracy over state-of-the-art baselines. Furthermore, online A/B testing on Weixin Pay demonstrated that this enhanced accuracy translated into an 18.9% revenue increase by ensuring correct commission fee application, underscoring its real-world effectiveness and financial impact.","ins":["The Hong Kong University of Science and Technology (Guangzhou)","Tencent Inc."]},{"i":"conf/kdd/ChenQCFZCW26","t":"StormMind: Disentangled Layerwise Modeling for Convective Weather Systems","au":[["Jun Chen",0],["Minghui Qiu",0],["Lin Chen",0],["Yan Fang",0],["Shuxin Zhong",0],["Binghong Chen",1],["Guangzhou Meteorological",1],["Kaishun Wu",0]],"u":"https://doi.org/10.1145/3770854.3783926","dblp":"https://dblp.org/rec/conf/kdd/ChenQCFZCW26.html","g":["Spatiotemporal/Urban","Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783926","c":"jul","a":"Timely nowcasting is critical for public safety during fast-evolving storms, where even short delays can trigger cascading failures—as in the October 2024 Spain flash flood that claimed over 90 lives within minutes. While radar offers reliable real-time sensing of atmospheric structure, models that collapse 3D volumes into 2D slices inevitably discard vertical information essential for capturing storm growth, phase transitions, and collapse. We introduce StormMind, a physically grounded framework that forecasts convective evolution by modeling causal interactions across stratified atmospheric layers. StormMind addresses two fundamental challenges: (1) the nonlinear, asynchronous coupling between low-, mid, and high-level processes; and (2) reflectivity uncertainty, where storms with distinct vertical structures may appear deceptively similar on radar, masking their true phase and intensity. To tackle these issues, StormMind designs: i) a Convection Dynamics Extractor that models storm evolution from two complementary perspectives—horizontal morphology, capturing the spatial organization of physical processes within individual atmospheric layers, and vertical coupling, modeling energy exchanges across layers; and ii) a Convection Manifestation Reconstructor that adaptively fuses intraand inter-layer signals, conditioned on the evolving storm state, to infer phase transitions (e.g., initiation, intensification, dissipation). Evaluated on the large-scale 3D-NEXRAD dataset (2020–2022, U.S.), StormMind outperforms strong baselines, achieving a 14.71% *Kaishun Wu and Shuxin Zhong are the corresponding authors. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, August 09–13, 2026, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783926 gain in CSI40. In real-world deployment with the Guangzhou Meteorological Bureau (Mar–May 2025), it improves CSI40 by 9.39% and boosts early-warning accuracy (98.33%).","ins":["HKUST (GZ)","Observatory"]},{"i":"conf/kdd/ChenNM26","t":"ACT: An Adaptive Combinatorial Testing Framework at Scale","au":[["Yingying Chen",0],["Amitabh Nag",0],["Josh Moore",0]],"u":"https://doi.org/10.1145/3770854.3783948","dblp":"https://dblp.org/rec/conf/kdd/ChenNM26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783948","c":"jul","a":"Many cloud companies use combinatorial testing as part of their software validation processes to uncover bugs across different hardware and software configurations. However, as the number of possible configurations and their combinations grows, exhaustively testing every scenario becomes impractical due to limited test resources. Manual selection of test subsets is often inefficient and biased, potentially overlooking critical combinations. Additionally, the dynamic nature of cloud environments, with the risks and prevalence of different combinations constantly evolving, makes it even more challenging to identify the most critical combinations and determine the optimal number of test samples for each combination. In this paper, we introduce an Adaptive Combinatorial Testing (ACT) framework, which dynamically identifies the most relevant configurations and evaluates the importance of their combinations. By leveraging a multi-armed bandit algorithm, a reinforcement learning technique, ACT recommends the optimal subset of combinations for testing, with the aim of continuously learning, uncovering, and prioritizing the most critical test scenarios. Deployed across various Microsoft Azure services, ACT has proven effective in helping developers uncover critical bugs linked to specific combinations that were previously undetected.","ins":["Microsoft Corporation"]},{"i":"conf/kdd/DayDDLCZB26","t":"Case Study: Learning Robust, Long-run Surrogate Metrics with Modeling and Instrumental Variables","au":[["Daniel Day",0],["Matthew Dalton",0],["Samuel Daulton",0],["Benjamin Letham",0],["Xiao Cai",0],["Aojia Zhao",0],["Eytan Bakshy",0]],"u":"https://doi.org/10.1145/3770854.3783922","dblp":"https://dblp.org/rec/conf/kdd/DayDDLCZB26.html","g":["Causal","Robust/Noisy/Spurious"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783922","c":"jul","a":"When developing product changes to improve long-run user outcomes, surrogate metrics are a powerful tool to help accelerate decision making. Randomized, online A/B testing has become the gold standard for measuring long-run outcomes, but waiting for long-run outcomes to materialize in a test greatly reduces iteration speed. To accelerate decision making, we instead can use surrogate metrics that predict the long-run outcome more quickly. However, finding accurate, robust surrogate metrics is challenging in practice. Existing methods propose finding candidate surrogate metrics in various ways, such as re-analyzing past A/B experiments where candidates strongly correlate with the long-run outcome. However, these methods face practical limitations such as being affected by hidden confounders or needing to rely on outdated, historical data. We developed a new approach where we learned user-level surrogate metrics with non-parametric machine learning and instrumental variable (IV) analysis. We trained surrogate metrics for two key, long-run business metrics, BV1 and BV2, in classification and regression settings, respectively. We deployed each surrogate model such that it would be available as a metric to use in all A/B tests in the target product surface. Our surrogate models predicted each user’s long-run outcomes more accurately than baseline heuristics (e.g., our BV1 surrogate model’s AUC was 0.93 vs. 0.79 for the baseline heuristic). At the A/B test level, our surrogate metrics showed greater than 0.9 Pearson correlation with the long-run outcome across A/B tests and achieved at least a 50% improvement in accuracy over other baselines. Our surrogate metrics were >30x more predictive of whether an A/B test’s had consistent post-launch effects. Finally, we provide evidence of surrogacy for ∗Corresponding author This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, August 09–13, 2026, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783922 our metrics where we show in multiple independent A/B tests that directly optimizing for our surrogate metrics drove changes in the long-run target outcome. Our results demonstrate that combining machine learning and causal inference leads not only to accurate surrogate metrics but also evidence they can act like true surrogates in practice.","ins":["Meta"]},{"i":"conf/kdd/ElmachtoubGL26","t":"Choice Modeling and Pricing for Scheduled Services","au":[["Adam N. Elmachtoub",0],["Kumar Goutam",1],["Roger Lederman",1]],"u":"https://doi.org/10.1145/3770854.3783932","dblp":"https://dblp.org/rec/conf/kdd/ElmachtoubGL26.html","g":["Other"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783932","c":"jul","a":"We describe a novel framework for discrete choice modeling and price optimization for settings where scheduled service options (often hierarchical) are offered to customers, which is applicable across many businesses including some within Amazon. In such business settings, the customers would see multiple options, often substitutable, with their features and their prices. These options typically vary in the start and/or end time of the service requested, such as the date of service or a service time window. The costs and demand can vary widely across these different options, resulting in the need for different prices. We propose a system which allows for segmenting the marketplace (as defined by the particular business) using decision trees, while using parametric discrete choice models within each market segment to accurately estimate conversion behavior. Using parametric discrete choice models allows us to capture important behavioral aspects like reference price effects which naturally occur in scheduled service applications. In addition, we provide natural and fast heuristics to do price optimization. For one such Amazon business where we conducted a live A/B experiment, this new framework outperformed the existing pricing system in every key metric, increasing our target performance metric by 19%, while providing a robust platform to support future new services of the business. The model framework has now been in full production for this business since Q4 2023.","ins":["Columbia University and Amazon","Amazon"]},{"i":"conf/kdd/FangZWZW26","t":"Effective Online 3D Bin Packing with Lookahead Parcels Using Monte Carlo Tree Search","au":[["Jiangyi Fang",[0,1,2]],["Bowen Zhou",[3,4]],["Haotian Wang",[0,1,2]],["JD Logistics",[0,1,2]],["Xin Zhu",[0,1,2]],["JD Logistics",[0,1,2]],["Leye Wang",[0,1,2]]],"u":"https://doi.org/10.1145/3770854.3783946","dblp":"https://dblp.org/rec/conf/kdd/FangZWZW26.html","g":["Reinforcement Learning"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783946","c":"jul","a":"Online 3D Bin Packing (3D-BP) with robotic arms is crucial for reducing transportation and labor costs in modern logistics. While Deep Reinforcement Learning (DRL) has shown strong performance, it often fails to adapt to real-world short-term distribution shifts, which arise as different batches of goods arrive sequentially, causing performance drops. We argue that the short-term lookahead information available in modern logistics systems is key to mitigating this issue, especially during distribution shifts. We formulate online 3D-BP with lookahead parcels as a Model Predictive Control (MPC) problem and adapt the Monte Carlo Tree Search (MCTS) framework to solve it. Our framework employs a dynamic exploration prior that automatically balances a learned RL policy and a robust random policy based on the lookahead characteristics. Additionally, we design an auxiliary reward to penalize long-term spatial waste from individual placements. Extensive experiments on real-world datasets show that our method consistently outperforms state-of-the-art baselines, achieving over 10% gains under distributional shifts, 4% average improvement in online deployment, and up to more than 8% in the best case–demonstrating the effectiveness of our framework.","ins":["Key Lab of High Confidence Software","Technologies (Peking University), Ministry of Education &","School of Computer Science, Peking University","Faculty of Computing, Harbin","Institute of Technology"]},{"i":"conf/kdd/FuZHWZHWHF26","t":"HiParse: A Hierarchical Framework for Optimizing Web Content Extraction to Enhance LLM Pre-training Data","au":[["Yuzhuo Fu",0],["Zhuyan Zhou",0],["Chao Huang",0],["Jiayi Wang",0],["Binwei Zeng",0],["Dongke Hu",0],["Xiangchun Wang",0],["Wang Hong",0],["Jin Fan",0]],"u":"https://doi.org/10.1145/3770854.3783937","dblp":"https://dblp.org/rec/conf/kdd/FuZHWZHWHF26.html","g":["LLM","Web/Social"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783937","c":"jul","a":"In the industrial pre-training of large language models (LLMs), largescale web content extraction faces a critical trade-off: rule-based methods sacrifice quality for efficiency, while model-based methods do the opposite. As a result, existing solutions deployed at scale often lead to significant data quality degradation and corpus loss. To address this challenge, which we faced directly at Ant Group, this paper introduces HiParse, a hierarchical adaptive web parsing framework deployed in production. The core of HiParse is to abstract this multi-dimensional challenge into a \"PESO\" (Precision, Efficiency, Scope, Overhead) evaluation model, quantifying parser capabilities and parsing requirements from a \"supply-demand\" perspective. The framework integrates a hybrid parser system and uses a lightweight decision engine to dynamically route different web pages to the optimal parsing strategy. Comprehensive experiments show that HiParse not only achieves superior parsing quality (9.03/10 score) but its direct output corpus, with only 30 billion tokens, also improved the average performance of a downstream LLM on 11 benchmarks by 7.6%. Furthermore, the framework has proven its high throughput, cost-effectiveness, and alignment with business parsing demands under real industrial loads. HiParse provides a high-fidelity, scalable, and cost-effective data solution for enterprise-level LLM pre-training. All the relevant models in the paper will be open source soon.","ins":["Ant Group"]},{"i":"conf/kdd/HongLFYGWHZ26","t":"GenHAR: Generalizing Cross-domain Human Activity Recognition for Last-mile Delivery","au":[["Zhiqing Hong",[0,1,2]],["Zelong Li",[3,4]],["JD Logistics",[3,4]],["Xiubin Fan",[3,4]],["Guang Yang",5],["Baoshen Guo",6],["Haotian Wang",5],["JD Logistics",5],["Tian He",5],["JD Logistics",5],["Desheng Zhang",5]],"u":"https://doi.org/10.1145/3770854.3783921","dblp":"https://dblp.org/rec/conf/kdd/HongLFYGWHZ26.html","g":["Domain Adaptation/Transfer","Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783921","c":"jul","a":"Human Activity Recognition (HAR) has shown remarkable effectiveness in various applications, such as smart healthcare and intelligent manufacturing. However, a major challenge faced by HAR is the distribution shift across different sensor data domains, which often leads to decreased performance when deployed for real-world applications. To address this issue, this paper introduces GenHAR, a novel framework designed to mitigate the domain gap by learning domain-invariant sensor representations. GenHAR aims to enhance the generalization capabilities of HAR on target domains purely with data from the source domain. The key novelty of GenHAR lies in two aspects. Firstly, GenHAR tokenizes sensor data and learns correlations among frequency sensor channel dimensions to improve the robustness of HAR models. Secondly, GenHAR improves the efficiency via selective masking and an efficient attention mechanism. We conduct a systematic analysis of GenHAR by comparing it with state-of-the-art HAR methods on real-world human activity datasets. Results show that GenHAR outperforms state-of-the-art methods by 9.97% in accuracy, and reduces Floating Point Operations by 6.4 times. Moreover, we deploy GenHAR at a leading logistics company in 4 cities, and have detected 2.15 billion real-time activities. We release our code at: https://github.com/Sensor-FoundationModel/GenHAR.","ins":["HKUST (GZ)","zhiqinghong@hkust-","gz.edu.cn","Beijing Normal–Hong","Kong Baptist University","Rutgers University","SMART Center, MIT"]},{"i":"conf/kdd/HuangLZLLHZXC26","t":"Uncertainty-Aware Planning for Disambiguating User Intent in Interactive LLM Agents: Application to Baidu Maps","au":[["Deqiang Huang",0],["Xinjiang Lu",[1,2]],["Jingbo Zhou",[1,2]],["Nijia Lu",2],["Fuxin Li",2],["Bo Hong",2],["Chuanming Zhang",2],["Tong Xu",0],["Enhong Chen",0]],"u":"https://doi.org/10.1145/3770854.3783943","dblp":"https://dblp.org/rec/conf/kdd/HuangLZLLHZXC26.html","g":["LLM","Agent","Spatiotemporal/Urban"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783943","c":"jul","a":"Large language models (LLMs) are revolutionizing user interactions in online map applications by enabling conversational interfaces with intelligent map agents. However, inherent ambiguities and nuances in human communication often lead to incomplete or unclear user instructions. While generating clarification questions can mitigate this issue, existing methods—which rely on promptbased LLM assessments or supervised fine-tuning (SFT) of LLMs with limited annotated data—struggle to reliably determine when clarification is necessary, resulting in cold-start issues and reduced adaptability. To address this gap, we propose an uncertainty-aware dynamic planning framework for intent disambiguation in interactive agent systems, exemplified by Baidu Maps. Our framework leverages LLMs to dynamically generate agent action sequences while estimating query uncertainty. When uncertainty thresholds are exceeded, targeted clarification questions are triggered. Besides, to efficiently navigate the vast uncertainty space, we introduce a novel beam search-based pruning strategy. Crucially, the framework supports context-aware task planning without any additional model training. We evaluate our approach on Baidu Maps and a public robotic task, focusing on uncertainty management and adaptability. Experiments demonstrate that the framework achieves high precision across diverse LLMs without requiring an additional training phase, highlighting its versatility and robustness. Ablation studies confirm that the framework can significantly improve user intent recognition and task success rates. ∗Corresponding authors. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783943","ins":["University of Science and Technology","Frontier Research Department","Baidu Inc."]},{"i":"conf/kdd/JiangHHL26","t":"MixTTE: Multi-Level Mixture-of-Experts for Scalable and Adaptive Travel Time Estimation","au":[["Wenzhao Jiang",0],["Jindong Han",0],["Ruiqian Han",0],["Hao Liu",0]],"u":"https://doi.org/10.1145/3770854.3783940","dblp":"https://dblp.org/rec/conf/kdd/JiangHHL26.html","g":["Spatiotemporal/Urban"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783940","c":"jul","a":"Accurate Travel Time Estimation (TTE) is critical for ride-hailing platforms, where errors directly impact user experience and operational efficiency. While existing production systems excel at holistic route-level dependency modeling, they struggle to capture city-scale traffic dynamics and long-tail scenarios, leading to unreliable predictions in large urban networks. In this paper, we propose MixTTE, a scalable and adaptive framework that synergistically integrates link-level modeling with industrial route-level TTE systems. Specifically, we propose a spatio-temporal external attention module to capture global traffic dynamic dependencies across million-scale road networks efficiently. Moreover, we construct a stabilized graph mixture-of-experts network to handle heterogeneous traffic patterns while maintaining inference efficiency. Furthermore, an asynchronous incremental learning strategy is tailored to enable real-time and stable adaptation to dynamic traffic distribution shifts. Experiments on real-world datasets validate MixTTE significantly reduces prediction errors compared to seven baselines. MixTTE has been deployed in DiDi, substantially improving the accuracy and stability of the TTE service.","ins":["The Hong Kong University of Science and Technology"]},{"i":"conf/kdd/KamarthiSMSLPS26","t":"AHA: Scalable Alternative History Analysis for Operational Timeseries Applications","au":[["Harshavardhan Kamarthi",0],["Harshil Shah",1],["Henry Milner",1],["Sayan Sinha",0],["Yan Li",1],["B. Aditya Prakash",0],["Vyas Sekar",2]],"u":"https://doi.org/10.1145/3770854.3783945","dblp":"https://dblp.org/rec/conf/kdd/KamarthiSMSLPS26.html","g":["Time Series"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783945","c":"jul","a":"Many operational systems collect high-dimensional timeseries data about users/systems on key performance metrics. For instance, ISPs, content distribution networks, and video delivery services collect quality of experience metrics for user sessions associated with metadata (e.g., location, device, ISP). Over such historical data, operators and data analysts often need to run retrospective analysis; e.g., analyze anomaly detection algorithms, experiment with different configurations for alerts, evaluate new algorithms, and so on. We refer to this class of workloads as alternative history analysis for operational datasets. We show that in such settings, traditional data processing solutions (e.g., data warehouses, sampling, sketching, big-data systems) either pose high operational costs or do not guarantee accurate replay. We design and implement a system called AHA (Alternative History Analytics), that overcomes both challenges to provide cost efficiency and fidelity for high-dimensional data. The design of AHA is based on analytical and empirical insights about such workloads: 1) the decomposability of underlying statistics; 2) sparsity in terms of active number of subpopulations over attribute-value combinations; and 3) efficiency structure of aggregation operations in modern analytics databases. Using multiple real-world datasets and as well as case-studies on production pipelines at a large video analytics company, we show that AHA provides 100% accuracy for a broad range of downstream tasks and up to 85× lower total cost of ownership (i.e., compute + storage) compared to conventional methods. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD 2026, Jeju Island, Republic of Korea. © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783945","ins":["Georgia Institute of Technology","Conviva","Carnegie Mellon University"]},{"i":"conf/kdd/KhrylchenkoMMB26","t":"Scaling Recommender Transformers to One Billion Parameters","au":[["Kirill Khrylchenko",0],["Artem Matveev",1],["Sergei Makeev",2],["Vladimir Baikalov",3]],"u":"https://doi.org/10.1145/3770854.3783916","dblp":"https://dblp.org/rec/conf/kdd/KhrylchenkoMMB26.html","g":["Recommendation"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783916","c":"jul","a":"While large transformer models have been successfully used in many real-world applications such as natural language processing, computer vision, and speech processing, scaling transformers for recommender systems remains a challenging problem. Recently, the Generative Recommenders framework was proposed as a way to scale beyond typical Deep Learning Recommendation Models (DLRMs). By reformulating recommendation as a sequential transduction task, it improves scaling properties in terms of compute. Nevertheless, the largest encoder configuration reported by the HSTU authors is only 176 million parameters — far smaller than the hundreds of billions (or even trillions) that are now common in language models. In this work, we present a recipe for training large transformer recommenders with up to one billion parameters. We show that autoregressive learning on user histories naturally decomposes into two subtasks, feedback prediction and next-item prediction, and demonstrate that this decomposition scales effectively across a wide range of transformer sizes. Furthermore, we report a successful deployment on a large-scale music platform serving millions of users. In online A/B tests, the proposed model increases total listening time by +2.26% and raises the likelihood of user likes by +6.37%, constituting (to our knowledge) the largest improvement in recommendation quality reported for any deep learning-based system in the platform’s history.","ins":["HSE University","Yandex, HSE University","Yandex","ITMO University"]},{"i":"conf/kdd/LeiZZZCXW26","t":"Generative Large-Scale Pre-trained Models for Automated Ad Bidding Optimization","au":[["Yu Lei",0],["Jiayang Zhao",1],["Yilei Zhao",1],["Zhaoqi Zhang",2],["Linyou Cai",1],["Qianlong Xie",1],["Xingxing Wang",1]],"u":"https://doi.org/10.1145/3770854.3783956","dblp":"https://dblp.org/rec/conf/kdd/LeiZZZCXW26.html","g":["LLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783956","c":"jul","a":"ACM-Modern auto-bidding systems are required to balance overall performance with diverse advertiser goals and real-world constraints, reflecting the dynamic and evolving needs of the industry. Recent advances in conditional generative models, such as transformers and diffusers, have enabled direct trajectory generation tailored to advertiser preferences, offering a promising alternative to traditional Markov Decision Process-based methods. However, these generative methods face significant challenges, such as the distribution shift between offline and online environments, limited exploration of the action space, and the necessity to meet constraints like marginal Cost-per-Mille (CPM) and Return on Investment (ROI). To tackle these challenges, we propose GRAD (Generative Rewarddriven Ad-bidding with Mixture-of-Experts), a scalable foundation model for auto-bidding that combines an Action-Mixture-ofExperts module for diverse bidding action exploration with the Value Estimator of Causal Transformer for constraint-aware optimization. Extensive offline and online experiments demonstrate that GRAD significantly enhances platform revenue, highlighting its effectiveness in addressing the evolving and diverse requirements of modern advertisers. Furthermore, GRAD has been implemented in multiple marketing scenarios at Meituan, one of the world’s largest online food delivery platforms, leading to a 2.18% increase in Gross Merchandise Value (GMV) and 10.68% increase in ROI.","ins":["Beijing University of Posts and Telecommunications","Meituan","Nanyang Technological University"]},{"i":"conf/kdd/LiJTQLL26","t":"Towards Trustworthy Multimodal Moderation via Policy-Aligned Reasoning and Hierarchical Labeling","au":[["Anqi Li",0],["Wenwei Jin",1],["Jintao Tong",2],["Pengda Qin",1],["Jiawei Li",1],["Guo Lu",0]],"u":"https://doi.org/10.1145/3770854.3783934","dblp":"https://dblp.org/rec/conf/kdd/LiJTQLL26.html","g":["Multimodal/VLM","LLM"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783934","c":"jul","a":"Social platforms have revolutionized information sharing, but also accelerated the dissemination of harmful and policy-violating content. To ensure safety and compliance at scale, moderation systems must go beyond efficiency and offer accuracy and interpretability. However, current approaches largely rely on noisy, label-driven learning, lacking alignment with moderation rules and producing opaque decisions that hinder human review. Therefore, we propose Hierarchical Guard (Hi-Guard), a multimodal moderation framework that introduces a new policy-aligned decision paradigm. The term “Hierarchical” reflects two key aspects of our system design: (1) a hierarchical moderation pipeline, where a lightweight binary model first filters safe content and a stronger model handles fine-grained risk classification; and (2) a hierarchical taxonomy in the second stage, where the model performs path-based classification over a hierarchical taxonomy ranging from coarse to fine-grained levels. To ensure alignment with evolving moderation policies, Hi-Guard directly incorporates rule definitions into the model prompt. To further enhance structured prediction and reasoning, we introduce a multi-level soft-margin reward and optimize with Group Relative Policy Optimization (GRPO), penalizing semantically adjacent misclassifications and improving explanation quality. Extensive experiments and real-world deployment demonstrate that Hi-Guard achieves superior classification accuracy, generalization, and interpretability, paving the way toward scalable, transparent, and trustworthy content safety systems. Code is available at: https://github.com/lianqi1008/Hi-Guard. ∗Project lead. †Corresponding author. This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783934","ins":["Shanghai Jiao Tong University","Xiaohongshu Inc.","Huazhong University of Science and Technology"]},{"i":"conf/kdd/LiMFLZZWF26","t":"KLAN: Kuaishou Landing-page Adaptive Navigator","au":[["Fan Li",0],["Chang Meng",1],["Jiaqi Fu",1],["Shuchang Liu",1],["Jiashuo Zhang",1],["Tianke Zhang",1],["Xueliang Wang",1],["Xiaoqiang Feng",1]],"u":"https://doi.org/10.1145/3770854.3783938","dblp":"https://dblp.org/rec/conf/kdd/LiMFLZZWF26.html","g":["Recommendation"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783938","c":"jul","a":"Modern online platforms configure multiple pages to accommodate diverse user needs. This multi-page architecture inherently establishes a two-stage interaction paradigm between the user and the platform: (1) Stage I: page navigation, navigating users to a specific page and (2) Stage II: in-page interaction, where users engage with customized content within the specific page. While the majority of research has been focusing on the sequential recommendation task that improves users’ feedback in Stage II, there has been little investigation on how to achieve better page navigation in Stage I. To fill this gap, we formally define the task of Personalized Landing Page Modeling (PLPM) into the field of recommender systems: Given a user upon app entry, the goal of PLPM is to proactively select the most suitable landing page from a set of candidates (e.g., functional tabs, content channels, or aggregation pages) to optimize the short-term metric Page Drop-off Ratio (PDR) and the long-term user engagement and satisfaction metrics, while adhering to industrial constraints. Additionally, we propose KLAN (Kuaishou Landing-page Adaptive Navigator), a hierarchical solution framework designed to provide personalized landing pages under the formulation of PLPM. KLAN comprises three key components: (1) KLAN-ISP captures inter-day static page preference; (2) KLAN-IIT captures intra-day dynamic interest transitions and (3) KLAN-AM adaptively integrates both components for optimal navigation decisions. Extensive online experiments conducted on the Kuaishou platform demonstrate the effectiveness of KLAN, obtaining +0.205% and +0.192% improvements on in Daily Active Users (DAU) and user Lifetime (LT). Our KLAN is ultimately deployed on the online platform at full traffic, serving hundreds of ∗Both authors contributed equally to this research. †Work done during an internship at Kuaishou Technology. ‡The corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783938 millions of users. To promote further research in this important area, we will release our dataset and code upon paper acceptance.","ins":["Duke University","Kuaishou Technology"]},{"i":"conf/kdd/LiYWWLWHLSLCYL26","t":"FARM: Frequency-Aware Model for Cross-Domain Live-Streaming Recommendation","au":[["Xiaodong Li",[0,1]],["Ruochen Yang",[0,1]],["Shuang Wen",2],["Shen Wang",2],["Yueyang Liu",2],["Guoquan Wang",2],["Weisong Hu",2],["Qiang Luo",2],["Jiawei Sheng",[0,3]],["Tingwen Liu",[0,3]],["Jiangxia Cao",2],["Shuang Yang",2],["Zhaojie Liu",2]],"u":"https://doi.org/10.1145/3770854.3783955","dblp":"https://dblp.org/rec/conf/kdd/LiYWWLWHLSLCYL26.html","g":["Recommendation"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783955","c":"jul","a":"Live-streaming services have attracted widespread popularity due to their real-time interactivity and entertainment value. Users can engage with live-streaming authors by participating in live chats, posting likes, or sending virtual gifts to convey their preferences and support. However, the live-streaming services faces serious data-sparsity problem, which can be attributed to the following two points: (1) User’s valuable behaviors are usually sparse, e.g., like, comment and gift, which are easily overlooked by the model, making it difficult to describe user’s personalized preference. (2) The main exposure content on our platform is short-video, which is 9 times higher than the exposed live-streaming, leading to the inability of live-streaming content to fully model user preference. To this end, we propose a Frequency-Aware Model for Cross-Domain Live-Streaming Recommendation, termed as FARM. Specifically, we first present the intra-domain frequency aware module to enable our model to perceive user’s sparse yet valuable behaviors, i.e., high-frequency information, supported by the Discrete Fourier Transform (DFT). To transfer user preference across the short-video and live-streaming domains, we propose a novel preference align before fuse strategy, which consists of two parts: the cross-domain preference align module to align user preference in both domains ∗Equal contribution. †Corresponding author. ‡University of Chinese Academy of Sciences. This work was funded by Kuaishou. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783955 with contrastive learning, and the cross-domain preference fuse module to further fuse user preference in both domains using a serious of tailor-designed attention mechanisms. Extensive offline experiments and online A/B testing on Kuaishou live-streaming services demonstrate the effectiveness and superiority of FARM. Our FARM has been deployed in online live-streaming services and currently serves hundreds of millions of users on Kuaishou.","ins":["Institute of Information Engineering, Chinese Academy of Sciences","School of Cyber Security, UCAS‡","Kuaishou Technology","School of Cyber Security, UCAS"]},{"i":"conf/kdd/LiCCLZKLMCSWZZX26","t":"Retain to Refine: Adaptive Online Question Answering via Query Routing and Long-Short Memory","au":[["Yuchen Li",[0,1]],["Jiamin Chen",2],["Xinran Chen",0],["Zhiyu Li",3],["Haojie Zhang",0],["Rui Kong",0],["Jiayi Li",0],["Xinyu Ma",0],["Hengyi Cai",0],["Lixin Su",0],["Shuaiqiang Wang",0],["Jiashu Zhao",4],["Yongqi Zhang",5],["Haoyi Xiong",0],["Linghe Kong",1],["Lei Chen",5],["Dawei Yin",0]],"u":"https://doi.org/10.1145/3770854.3783919","dblp":"https://dblp.org/rec/conf/kdd/LiCCLZKLMCSWZZX26.html","g":["LLM","Search/IR"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783919","c":"jul","a":"Large Language Models (LLMs) have shown strong capabilities in open-domain question answering (QA), but deploying them in realworld online systems introduces critical challenges. These include: (1) handling both simple and complex queries with appropriate levels of reasoning, (2) minimizing latency without compromising ∗Equal contribution. †Corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783919 answer quality, and (3) maintaining answer consistency under evolving and noisy retrieval contexts. To address these challenges, we propose Retain-to-Refine (R2R), an adaptive agent-based QA framework designed for practical deployment. R2R integrates a Query Critic Agent (QCA) to assess query difficulty and route it accordingly: simple queries are answered directly using fast, prompt-based LLM calls, while complex queries are handled by a Memory Augmented Agent (MAA). MAA performs iterative reasoning guided by a unique long-short memory mechanism. Long-term memory retains and consolidates stable, core facts to ground the reasoning process, while short-term memory identifies transient information gaps to formulate highly focused subsequent queries. To ensure evidence quality, a Supervised Retrospection module validates and filters retrieved documents at each step. This agent-based design enables R2R to dynamically allocate computation based on question complexity, reducing unnecessary overhead while preserving 2312","ins":["Baidu Inc.","Shanghai Jiao Tong University","City University of Hong Kong","Peking University","Wilfrid Laurier University","The Hong Kong University of Science and Technology (Guangzhou)"]},{"i":"conf/kdd/LinDLLYZC26","t":"Sell It Before You Make It: Revolutionizing E-Commerce with Personalized AI-Generated Items","au":[["Jianghao Lin",[0,1]],["Peng Du",2],["Jiaqi Liu",1],["Weite Li",2],["Yong Yu",1],["Weinan Zhang",1],["Yang Cao",2]],"u":"https://doi.org/10.1145/3770854.3783918","dblp":"https://dblp.org/rec/conf/kdd/LinDLLYZC26.html","g":["Diffusion/Generation"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783918","c":"jul","a":"E-commerce has revolutionized retail, yet its traditional workflows remain inefficient, with significant resource costs tied to product design and inventory. This paper introduces a novel system deployed at Alibaba that uses AI-generated items (AIGI) to address these challenges with personalized text-to-image generation for e-commerce product design. AIGI enables an innovative business mode called “sell it before you make it”, where merchants can design fashion items and generate photorealistic images with digital models based on textual descriptions. Only when the items have received a certain number of orders, do the merchants start to produce them, which largely reduces reliance on physical prototypes and thus accelerates time to market. For such a promising application, we identify the underlying key scientific challenge, i.e., capturing users’ group-level personalized preferences towards multiple generated images. To this end, we propose a Personalized Group-Level Preference Alignment Framework for Diffusion Models (PerFusion). We first design PerFusion Reward Model for user preference estimation with a feature-crossing-based personalized plug-in. Then we develop PerFusion with a personalized adaptive network to model diverse preferences across users, and meanwhile derive the group-level preference optimization objective to model comparative behaviors among multiple images. Both offline and online experiments demonstrate the effectiveness of our proposed algorithm. The AI-generated items achieve over 13% relative improvements for both click-through rate and conversion rate, as well as 7.9% decrease in return rate, compared to their human-designed ∗Weinan Zhang is the corresponding author. This work is licensed under a Creative Commons Attribution 4.0 International License. KDD ’26, August 09–13, 2026, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783918 counterparts, validating the transformative potential of AIGI for e-commerce platforms.","ins":["Antai College of Economics and Management","Shanghai Jiao Tong University","Alibaba Group"]},{"i":"conf/kdd/LuoCZHGZLCYGLNX26","t":"Meta Lattice: Model Space Redesign for Cost-Effective Industry-Scale Ads Recommendations","au":[["Liang Luo",0],["Yuxin Chen",0],["Zhengyu Zhang",0],["Mengyue Hang",0],["Andrew Gu",0],["Buyun Zhang",0],["Boyang Liu",0],["Chen Chen",0],["Fan Yang",0],["Feifan Gu",0],["Huayu Li",0],["Jade Nie",0],["Jiayi Xu",0],["Jiyan Yang",0],["Jongsoo Park",0],["Laming Chen",0],["Longhao Jin",0],["Qin Huang",0],["Shali Jiang",0],["Shiwen Shen",0],["Shuaiwen Wang",0],["Siyang Yuan",0],["Tongyi Tang",0],["Weilin Zhang",0],["Xi Liu",0],["Xiaohan Wei",0],["Yuchen Hao",0],["Xiaozhen Xia",0],["Yasmine Badr",0],["Zeliang Chen",0],["Chengze Fan",0],["Dong Liang",0],["Qianru Li",0],["Sihan Zeng",0],["Wenjun Wang",0],["Yunlong He",0],["Yinbin Ma",0],["Maxim Naumov",0],["Yantao Yao",0],["Wenlin Chen",0],["Ellie Dingqiao Wen",0]],"u":"https://doi.org/10.1145/3770854.3783952","dblp":"https://dblp.org/rec/conf/kdd/LuoCZHGZLCYGLNX26.html","g":["Recommendation","Efficiency/Compression"],"g_source":"claude-direct","d":"ads","acm":"https://dl.acm.org/doi/10.1145/3770854.3783952","c":"jul","a":"The rapidly evolving landscape of products, surfaces, policies, and regulations poses significant challenges for deploying state-of-theart recommendation models at industry scale, primarily due to data fragmentation across domains and escalating infrastructure costs that hinder sustained quality improvements. To address this challenge, we propose Lattice, a recommendation framework centered around model space redesign that extends Multi-Domain, Multi-Objective (MDMO) learning beyond models and learning objectives. Lattice addresses these challenges through This work is licensed under a Creative Commons Attribution-NonCommercialNoDerivatives 4.0 International License. KDD ’26, Jeju Island, Republic of Korea © 2026 Copyright held by the owner/author(s). ACM ISBN 979-8-4007-2258-5/2026/08 https://doi.org/10.1145/3770854.3783952 a comprehensive model space redesign that combines cross-domain knowledge sharing, data consolidation, model unification, distillation, and system optimizations to achieve significant improvements in both quality and cost-efficiency. Our deployment of Lattice at Meta has resulted in 10% revenuedriving top-line metrics gain, 11.5% user satisfaction improvement, 6% boost in conversion rate, with 20% capacity saving.","ins":["Meta AI"]},{"i":"conf/kdd/MaWSLXMLXYRZGZY26","t":"KB
